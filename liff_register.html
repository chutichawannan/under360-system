<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Under360 — สมัครสมาชิก</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--forest:#1F4D3A;--forest-soft:#EBF3EF;--red:#DC2626;--ink:#1A1A1A;--ink-soft:#6B7280;--ink-xsoft:#D1D5DB;--bg:#F7F8F6;--white:#fff;--sans:'IBM Plex Sans Thai',sans-serif;}
body{font-family:var(--sans);background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.box{width:100%;max-width:340px;}
.logo{text-align:center;font-size:22px;font-weight:700;color:var(--forest);margin-bottom:6px;}
.logo-sub{text-align:center;font-size:12px;color:var(--ink-soft);margin-bottom:20px;}
/* LINE card */
.line-card{background:#fff;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:16px;border:1px solid var(--ink-xsoft);}
.line-av{width:40px;height:40px;border-radius:50%;background:var(--forest-soft);display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden;flex-shrink:0;}
.line-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.line-name{font-size:13px;font-weight:700;}
.line-ok{font-size:10px;color:#22C55E;font-weight:600;}
/* Form */
.fg{margin-bottom:10px;}
.fl{font-size:11px;font-weight:700;color:var(--ink-soft);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:.4px;}
.fi{width:100%;padding:9px 11px;border:1.5px solid var(--ink-xsoft);border-radius:9px;font-size:14px;font-family:var(--sans);background:#fff;}
.fi:focus{outline:none;border-color:var(--forest);}
.fe{font-size:11px;color:var(--red);margin-top:3px;}
/* DOB 3 dropdowns */
.dob-row{display:grid;grid-template-columns:2fr 2.5fr 2.5fr;gap:6px;}
.dob-sel{width:100%;padding:9px 8px;border:1.5px solid var(--ink-xsoft);border-radius:9px;font-size:13px;font-family:var(--sans);background:#fff;height:40px;}
.dob-sel:focus{outline:none;border-color:var(--forest);}
/* Phone + OTP */
.phone-row{display:flex;gap:6px;}
.otp-field{width:100%;padding:10px 11px;border:1.5px solid var(--ink-xsoft);border-radius:9px;font-size:20px;font-weight:700;letter-spacing:8px;text-align:center;font-family:var(--sans);}
.otp-field:focus{outline:none;border-color:var(--forest);}
.otp-field.ok{border-color:#22C55E;background:#F0FDF4;}
.otp-btn{background:var(--forest);color:#fff;border:none;border-radius:9px;padding:9px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--sans);white-space:nowrap;}
.otp-meta{display:flex;justify-content:space-between;font-size:10px;color:var(--ink-soft);margin-top:3px;}
.resend-btn{color:var(--forest);font-weight:700;background:none;border:none;font-family:var(--sans);font-size:10px;cursor:pointer;}
/* Error */
.err-box{background:#FEF2F2;border-radius:8px;padding:8px 12px;font-size:11px;color:var(--red);margin-bottom:8px;display:none;}
/* Button */
.btn-p{width:100%;background:var(--forest);color:#fff;border:none;border-radius:11px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--sans);margin-top:6px;}
.btn-p:disabled{background:var(--ink-xsoft);}
.already{text-align:center;font-size:12px;color:var(--ink-soft);margin-top:12px;}
.gender-btn{flex:1;padding:9px 6px;border:1.5px solid var(--ink-xsoft);border-radius:9px;background:#fff;font-size:13px;cursor:pointer;font-family:var(--sans);transition:.15s;}
.gender-btn.active{border-color:var(--forest);background:var(--forest-soft);font-weight:700;color:var(--forest);}
.already a{color:var(--forest);font-weight:700;text-decoration:none;}
/* Success */
.success{display:none;text-align:center;padding:24px 0;}
.s-icon{font-size:52px;margin-bottom:10px;}
.s-title{font-size:19px;font-weight:700;color:var(--forest);margin-bottom:6px;}
.s-sub{font-size:13px;color:var(--ink-soft);margin-bottom:20px;}
</style>
</head>
<body>
<div class="box">
  <div class="logo">UNDER360</div>
  <div class="logo-sub">สมัครครั้งเดียว สั่งได้ตลอด</div>

  <div id="formArea">
    <!-- LINE auto -->
    <div class="line-card">
      <div class="line-av"><img id="lnAv" src="" onerror="this.style.display='none'"><span id="lnEmoji">👤</span></div>
      <div><div class="line-name" id="lnName">กำลังโหลด...</div><div class="line-ok">✓ ยืนยันผ่าน LINE</div></div>
    </div>

    <!-- DOB -->
    <div class="fg">
      <label class="fl">วันเกิด <span style="color:var(--ink-soft);text-transform:none;font-weight:400">(รับสิทธิ์วันเกิด 🎂)</span></label>
      <div class="dob-row">
        <select class="dob-sel" id="dobDay"><option value="">วัน</option></select>
        <select class="dob-sel" id="dobMonth">
          <option value="">เดือน</option>
          <option value="01">มกราคม</option><option value="02">กุมภาพันธ์</option>
          <option value="03">มีนาคม</option><option value="04">เมษายน</option>
          <option value="05">พฤษภาคม</option><option value="06">มิถุนายน</option>
          <option value="07">กรกฎาคม</option><option value="08">สิงหาคม</option>
          <option value="09">กันยายน</option><option value="10">ตุลาคม</option>
          <option value="11">พฤศจิกายน</option><option value="12">ธันวาคม</option>
        </select>
        <select class="dob-sel" id="dobYear"><option value="">ปี</option></select>
      </div>
    </div>

    <!-- Gender -->
    <div class="fg">
      <label class="fl">เพศ</label>
      <div style="display:flex;gap:8px">
        <button type="button" class="gender-btn" data-val="male" onclick="setGender(this)">👨 ชาย</button>
        <button type="button" class="gender-btn" data-val="female" onclick="setGender(this)">👩 หญิง</button>
        <button type="button" class="gender-btn" data-val="other" onclick="setGender(this)">🧑 ไม่ระบุ</button>
      </div>
    </div>

    <!-- Phone -->
    <div class="fg">
      <label class="fl">เบอร์โทรศัพท์</label>
      <div class="phone-row">
        <input class="fi" id="fPhone" type="tel" maxlength="10" inputmode="numeric" placeholder="0812345678" style="flex:1">
        <button class="otp-btn" onclick="sendOtp()">รับ OTP</button>
      </div>
      <div class="fe" id="errPhone"></div>
    </div>

    <!-- OTP (hidden until phone sent) -->
    <div class="fg" id="otpArea" style="display:none">
      <label class="fl">รหัส OTP 6 หลัก</label>
      <input class="otp-field" id="otpField" type="tel" maxlength="6" inputmode="numeric" placeholder="——————" oninput="checkOtp(this)">
      <div class="otp-meta">
        <span id="otpHint" style="color:var(--ink-soft)">ส่ง OTP แล้ว</span>
        <button class="resend-btn" id="resendBtn" disabled onclick="sendOtp()">ส่งใหม่ใน <span id="cdNum">60</span>s</button>
      </div>
      <div class="fe" id="errOtp"></div>
    </div>

    <div class="err-box" id="errBox"></div>
    <button class="btn-p" id="submitBtn" onclick="doRegister()">สมัครสมาชิก →</button>
    <div class="already">มีบัญชีอยู่แล้ว? <a href="liff_customer.html">สั่งอาหารเลย</a></div>
  </div>

  <!-- Success -->
  <div class="success" id="successArea">
    <div class="s-icon">🎉</div>
    <div class="s-title">ยินดีต้อนรับ!</div>
    <div class="s-sub">สมัครเรียบร้อยแล้ว</div>
    <button class="btn-p" style="max-width:240px;margin:0 auto" onclick="location.href='liff_customer.html'">🛒 สั่งอาหารเลย</button>
  </div>
</div>

<script>
const SB_URL="https://zdartbvhbvqlwzwyyiia.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkYXJ0YnZoYnZxbHd6d3l5aWlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MTY3OTksImV4cCI6MjA5NzM5Mjc5OX0.D41YGH-CuWrVFqcAgXEuhfVTxJ7WY26Xu-PeXBF6LB8";
const LIFF_ID="2010442513-NI3JGTkb";
const DEV=true;
let sb=null,lineProfile=null,otpCode=null,otpOk=false,cdTimer=null;

function getSB(){try{if(!sb&&typeof supabase!=="undefined")sb=supabase.createClient(SB_URL,SB_KEY);return sb;}catch(e){return null;}}

// Init DOB dropdowns
(function(){
  const dayEl=document.getElementById("dobDay");
  for(let i=1;i<=31;i++){const o=document.createElement("option");o.value=String(i).padStart(2,"0");o.textContent=i;dayEl.appendChild(o);}
  const yearEl=document.getElementById("dobYear");
  const y=new Date().getFullYear()-543; // AD year
  for(let i=y;i>=y-80;i--){const o=document.createElement("option");o.value=i;o.textContent=i+543+" ("+(i)+" AD)";yearEl.appendChild(o);}
})();

// LIFF init
window.addEventListener("load",async()=>{
  if(DEV){
    lineProfile={userId:"dev_001",displayName:"Test User",pictureUrl:""};
  } else {
    try{
      await liff.init({liffId:LIFF_ID});
      if(!liff.isLoggedIn()){liff.login();return;}
      lineProfile=await liff.getProfile();
    }catch(e){console.log(e);}
  }
  if(lineProfile){
    document.getElementById("lnName").textContent=lineProfile.displayName;
    if(lineProfile.pictureUrl){document.getElementById("lnAv").src=lineProfile.pictureUrl;document.getElementById("lnEmoji").style.display="none";}
  }
});

function sendOtp(){
  const phone=document.getElementById("fPhone").value.trim();
  if(!/^0[0-9]{9}$/.test(phone)){document.getElementById("errPhone").textContent="กรุณากรอกเบอร์ 10 หลักให้ถูกต้อง";return;}
  document.getElementById("errPhone").textContent="";
  otpCode=DEV?"123456":String(Math.floor(100000+Math.random()*900000));
  if(DEV)alert("DEV — OTP: "+otpCode);
  document.getElementById("otpArea").style.display="block";
  document.getElementById("otpHint").textContent="ส่ง OTP ไปที่ "+phone+" แล้ว";
  document.getElementById("otpField").value="";
  document.getElementById("otpField").className="otp-field";
  document.getElementById("otpField").focus();
  startCd();
}

function checkOtp(el){
  el.value=el.value.replace(/\D/g,"");
  if(el.value.length===6){
    if(el.value===otpCode){
      otpOk=true;
      el.className="otp-field ok";
      document.getElementById("otpHint").textContent="✅ ยืนยันเบอร์โทรสำเร็จ";
      document.getElementById("errOtp").textContent="";
    } else {
      document.getElementById("errOtp").textContent="OTP ไม่ถูกต้อง กรุณาลองใหม่";
      el.value="";el.focus();
    }
  }
}

function startCd(){
  let s=60;const btn=document.getElementById("resendBtn");const cd=document.getElementById("cdNum");
  btn.disabled=true;cd.textContent=s;
  if(cdTimer)clearInterval(cdTimer);
  cdTimer=setInterval(()=>{s--;cd.textContent=s;if(s<=0){clearInterval(cdTimer);btn.innerHTML="ส่ง OTP ใหม่";btn.disabled=false;}},1000);
}

var _gender=null;
function setGender(btn){
  _gender=btn.dataset.val;
  document.querySelectorAll(".gender-btn").forEach(function(b){b.classList.remove("active");});
  btn.classList.add("active");
}
function getDob(){
  const d=document.getElementById("dobDay").value;
  const m=document.getElementById("dobMonth").value;
  const y=document.getElementById("dobYear").value;
  if(d&&m&&y)return y+"-"+m+"-"+d;
  return null;
}

async function doRegister(){
  if(!otpOk){showErr("กรุณายืนยัน OTP ก่อน");return;}
  const btn=document.getElementById("submitBtn");
  btn.disabled=true;btn.textContent="⏳ กำลังบันทึก...";
  const sb_=getSB();
  if(sb_){
    await sb_.from("customers").upsert({
      line_uid:lineProfile.userId,
      name:lineProfile.displayName,
      line_display_name:lineProfile.displayName,
      line_picture_url:lineProfile.pictureUrl||"",
      phone:document.getElementById("fPhone").value.trim(),
      birth_date:getDob(),
      gender:_gender
      // ⚠️ ไม่ใส่ loyalty_points/tier ตรงนี้ตั้งใจ — เดิมเขียน points:0 (คอลัมน์ไม่มีจริง เลยไม่มีผลอะไร)
      // ถ้าเปลี่ยนเป็น loyalty_points:0 ตรงๆ จะเสี่ยงรีเซ็ตแต้มลูกค้าเดิมเป็น 0 ทุกครั้งที่ upsert ซ้ำ (onConflict:line_uid)
      // รอนัทตัดสินใจเรื่องระบบแต้มใหม่ก่อน (ดู CLAUDE.md)
    },{onConflict:"line_uid"});
  }
  localStorage.setItem("line_uid",lineProfile.userId);
  localStorage.setItem("customer_name",lineProfile.displayName);
  document.getElementById("formArea").style.display="none";
  document.getElementById("successArea").style.display="block";
}
function showErr(m){const e=document.getElementById("errBox");e.textContent=m;e.style.display="block";setTimeout(()=>e.style.display="none",3000);}
</script>
</body>
</html>
