<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Home Editor — Under360</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--g:#1F4D3A;--gl:#EBF3EF;--ink:#1A1A1A;--ink2:#666;--bg:#F4F4F4;--brd:rgba(0,0,0,.1);--r:14px;--sh:0 2px 12px rgba(0,0,0,.08);}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
button{font-family:inherit;cursor:pointer;border:none;}
input,select,textarea{font-family:inherit;}

/* Header */
.hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#fff;border-bottom:0.5px solid var(--brd);position:sticky;top:0;z-index:200;}
.hdr-title{font-size:15px;font-weight:800;color:var(--g);flex:1;}
.btn-save{background:var(--g);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:700;}
.btn-back{width:34px;height:34px;background:none;font-size:18px;color:var(--ink2);}

/* Status */
.toast-bar{padding:8px 16px;font-size:13px;text-align:center;display:none;}
.toast-bar.show{display:block;}
.toast-bar.ok{background:#D1FAE5;color:#065F46;}
.toast-bar.err{background:#FEE2E2;color:#B91C1C;}
.toast-bar.info{background:#EFF6FF;color:#1E40AF;}

/* Section tabs */
.sec-tabs{display:flex;background:#fff;border-bottom:0.5px solid var(--brd);overflow-x:auto;scrollbar-width:none;}
.sec-tabs::-webkit-scrollbar{display:none;}
.sec-tab{flex:1;padding:11px 8px;font-size:13px;font-weight:600;background:none;color:var(--ink2);border-bottom:2.5px solid transparent;white-space:nowrap;min-width:0;}
.sec-tab.on{color:var(--g);border-bottom-color:var(--g);}

/* Sections */
.sec{display:none;padding-bottom:90px;}
.sec.on{display:block;}

/* ─── COLLAGE SECTION ─── */
.preview-label{display:flex;align-items:center;gap:8px;padding:12px 16px 8px;}
.preview-label span{font-size:12px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.06em;flex:1;}
.auto-ctrl{display:flex;align-items:center;gap:6px;}
.toggle-btn{padding:5px 12px;border-radius:14px;border:1.5px solid var(--brd);background:#fff;font-size:12px;font-weight:700;color:var(--ink2);}
.toggle-btn.on{background:var(--g);color:#fff;border-color:var(--g);}
.speed-sel{padding:4px 8px;border-radius:10px;border:1px solid var(--brd);font-size:12px;background:#fff;}

/* Continuous strip preview */
.strip-wrap{background:#f0f0f0;border-radius:14px;margin:4px 12px;overflow-x:auto;overflow-y:hidden;}
.strip-hint{font-size:11px;color:#aaa;text-align:center;padding:3px;}</p>

.col-scroll-he{overflow-x:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:row;flex-wrap:nowrap;align-items:flex-start;gap:10px;padding:8px 12px 10px;scrollbar-width:none;cursor:grab;width:max-content;min-width:100%;}
.col-scroll-he::-webkit-scrollbar{display:none;}
.col-scroll-he.dragging{cursor:grabbing;user-select:none;}
/* continuous — ไม่ paginate, กว้างคงที่ให้การ์ดถัดไปโผล่ */
.col-group-he{display:flex;flex-direction:row;flex-shrink:0;flex-grow:0;
  height:200px;gap:6px;width:304px;min-width:304px;max-width:304px;align-items:stretch;}
.col-card-he{border-radius:14px;overflow:hidden;position:relative;cursor:pointer;flex-shrink:0;border:2.5px solid transparent;transition:border-color .15s;}
.col-card-he img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.col-card-he.lg{flex:0 0 182px;width:182px;}
.col-col-he{flex:0 0 116px;width:116px;display:flex;flex-direction:column;gap:6px;}
.col-card-he.sm{flex:1;}
.col-card-he.active{border-color:var(--g);}
.col-card-he.empty{background:#F0F0F0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:#bbb;font-size:11px;}
.col-card-he.empty span{font-size:24px;}
.col-ov-he{position:absolute;inset:0;background:linear-gradient(165deg,rgba(0,0,0,.04),rgba(0,0,0,.56));}
.col-body-he{position:absolute;bottom:0;left:0;right:0;padding:10px;}
.col-title-he{font-size:14px;font-weight:800;color:#fff;line-height:1.2;}
.col-title-he.sm{font-size:11px;}
.col-sub-he{font-size:10px;color:rgba(255,255,255,.8);}
.col-cta-he{display:inline-block;margin-top:5px;padding:4px 10px;border:1.5px solid rgba(255,255,255,.7);border-radius:16px;color:#fff;font-size:10px;font-weight:600;}
.sel-indicator{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:50%;background:var(--g);color:#fff;font-size:12px;display:none;align-items:center;justify-content:center;font-weight:800;}
.col-card-he.active .sel-indicator{display:flex;}

/* Card list (scroll to select) */
.card-list{padding:10px 12px;display:flex;flex-direction:column;gap:6px;}
.card-list-item{background:#fff;border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;border:1.5px solid transparent;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.card-list-item.active{border-color:var(--g);background:var(--gl);}
.card-list-thumb{width:46px;height:34px;border-radius:7px;overflow:hidden;flex-shrink:0;}
.card-list-thumb img{width:100%;height:100%;object-fit:cover;}
.card-list-thumb .thumb-bg{width:100%;height:100%;}
.card-list-info{flex:1;min-width:0;}
.card-list-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-list-sz{font-size:11px;color:var(--ink2);margin-top:1px;}
.card-drag{color:#ccc;font-size:18px;cursor:grab;}
.card-del-btn{width:28px;height:28px;border-radius:50%;background:#FEE2E2;color:#B91C1C;font-size:13px;display:flex;align-items:center;justify-content:center;}
.add-card-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border:1.5px dashed var(--g);border-radius:10px;background:var(--gl);color:var(--g);font-size:13px;font-weight:700;width:100%;}

/* Card editor panel */
.card-edit-panel{background:#fff;margin:0 12px 8px;border-radius:14px;overflow:hidden;box-shadow:var(--sh);}
.cep-hdr{padding:12px 14px;background:var(--gl);display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:var(--g);}
.cep-body{padding:14px;}
.field{margin-bottom:13px;}
.field:last-child{margin-bottom:0;}
.field label{display:block;font-size:12px;font-weight:700;color:var(--ink2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em;}
.field input,.field select{width:100%;border:1px solid var(--brd);border-radius:9px;padding:10px 12px;font-size:14px;background:#fff;color:var(--ink);}
.field input:focus,.field select:focus{outline:none;border-color:var(--g);box-shadow:0 0 0 3px rgba(31,77,58,.1);}
.size-btns{display:flex;gap:8px;}
.size-btn{flex:1;padding:10px;border-radius:9px;border:1.5px solid var(--brd);background:#fff;font-size:13px;font-weight:700;color:var(--ink2);text-align:center;}
.size-btn.on{background:var(--g);border-color:var(--g);color:#fff;}
.field-hint{font-size:11px;color:#888;margin-top:4px;}

/* Image upload */
.img-upload-area{border:1.5px dashed var(--brd);border-radius:10px;padding:14px;text-align:center;cursor:pointer;background:#FAFAFA;position:relative;overflow:hidden;transition:border-color .15s;}
.img-upload-area:hover{border-color:var(--g);}
.img-upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0;}
.img-upload-icon{font-size:28px;margin-bottom:4px;}
.img-upload-txt{font-size:12px;color:var(--ink2);font-weight:600;}
.img-upload-hint{font-size:11px;color:#aaa;margin-top:2px;}
.img-preview-box{border-radius:10px;overflow:hidden;margin-top:8px;display:none;position:relative;}
.img-preview-box img{width:100%;height:80px;object-fit:cover;display:block;}
.img-clear-btn{position:absolute;top:4px;right:4px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.5);color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;}
.or-divider{display:flex;align-items:center;gap:8px;margin:10px 0;color:#bbb;font-size:12px;}
.or-divider::before,.or-divider::after{content:'';flex:1;height:1px;background:var(--brd);}

/* Bg color */
.color-row{display:flex;align-items:center;gap:8px;}
.color-row input[type=color]{width:44px;height:44px;border-radius:8px;border:1px solid var(--brd);padding:2px;cursor:pointer;}
.color-presets{display:flex;gap:6px;flex-wrap:wrap;}
.color-dot{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
.color-dot.on{border-color:var(--ink);}

/* Move up/down */
.move-btns{display:flex;gap:8px;margin-top:4px;}
.move-btn{flex:1;padding:9px;border-radius:8px;border:1px solid var(--brd);background:#fff;font-size:13px;font-weight:600;color:var(--ink2);}

/* ─── CATEGORY SECTION ─── */
.cat-scroll{overflow-x:auto;display:flex;align-items:center;gap:6px;padding:10px 14px;scrollbar-width:none;background:#fff;border-bottom:0.5px solid var(--brd);}
.cat-scroll::-webkit-scrollbar{display:none;}
.cat-btn-he{padding:7px 14px;border-radius:20px;background:#F0F0F0;color:var(--ink2);font-size:13px;font-weight:600;white-space:nowrap;flex-shrink:0;border:1px solid transparent;}
.cat-btn-he.on{background:var(--g);color:#fff;}
.cat-rename-input{font-size:13px;font-weight:600;border:none;background:transparent;color:inherit;min-width:60px;max-width:120px;outline:none;}

.item-list-he{padding:10px 12px 0;}
.item-row-he{display:flex;align-items:center;gap:8px;background:#fff;border-radius:10px;padding:9px 12px;margin-bottom:6px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.item-drag-he{font-size:18px;color:#ccc;cursor:grab;flex-shrink:0;}
.item-idx{min-width:24px;height:24px;border-radius:6px;background:#F0F0F0;font-size:11px;font-weight:700;color:var(--ink2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.item-info-he{flex:1;min-width:0;}
.item-code-he{font-size:10px;color:#aaa;font-weight:700;}
.item-name-he{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-kcal-he{font-size:11px;color:#888;}
.item-price-he{font-size:13px;font-weight:700;color:#C9573F;flex-shrink:0;}
.cat-key-hint{padding:6px 14px 10px;font-size:11px;color:#aaa;}

/* FAB */
.fab{position:fixed;bottom:20px;right:16px;background:var(--g);color:#fff;border-radius:28px;padding:13px 22px;font-size:14px;font-weight:700;box-shadow:0 4px 18px rgba(31,77,58,.4);display:flex;align-items:center;gap:8px;z-index:199;}

/* Misc */
.spin{width:18px;height:18px;border:2px solid var(--brd);border-top-color:var(--g);border-radius:50%;animation:sp .7s linear infinite;display:inline-block;}
@keyframes sp{to{transform:rotate(360deg)}}
.empty-txt{padding:30px;text-align:center;color:#aaa;font-size:14px;}
.upload-progress{height:3px;background:var(--gl);margin-top:6px;border-radius:3px;display:none;}
.upload-progress .bar{height:100%;background:var(--g);border-radius:3px;transition:width .3s;}
</style>
</head>
<body>
<div class="hdr">
  <button class="btn-back" onclick="history.back()">←</button>
  <div class="hdr-title">🏠 Home Editor</div>
  <a href="/liff_customer.html" target="_blank" style="padding:7px 12px;border-radius:16px;border:1.5px solid var(--g);color:var(--g);font-size:12px;font-weight:700;text-decoration:none;white-space:nowrap;">👁 Preview</a>
  <button class="btn-save" onclick="saveAll()">☁ บันทึก</button>
</div>
<div class="toast-bar" id="toast"></div>

<div class="sec-tabs">
  <button class="sec-tab on" onclick="switchSec(0)">📸 Collage</button>
  <button class="sec-tab" onclick="switchSec(1)">📋 จัดลำดับเมนู</button>
</div>

<!-- ═══ SEC 0: COLLAGE ═══ -->
<div class="sec on" id="sec0">
  <!-- Preview controls -->
  <div style="padding:10px 12px 4px;display:flex;align-items:center;gap:8px">
    <label style="font-size:12px;font-weight:700;color:var(--ink2);white-space:nowrap">Section Title:</label>
    <input id="sectionTitle" value="Meal Plans" style="flex:1;border:1px solid var(--brd);border-radius:8px;padding:6px 10px;font-size:14px;font-weight:700"
      placeholder="เช่น Meal Plans, Featured, โปรโมชั่น..."
      oninput="saveSectionTitle()">
  </div>
  <div class="preview-label">
    <span>Preview (scroll ←→)</span>
    <div class="auto-ctrl">
      <button class="toggle-btn" id="autoBtn" onclick="toggleAuto()">⏸ หยุด</button>
      <select class="speed-sel" id="speedSel" onchange="updateSpeed()">
        <option value="180">ช้ามาก</option>
        <option value="90" selected>ปกติ</option>
        <option value="45">เร็ว</option>
      </select>
    </div>
  </div>

  <!-- Continuous strip -->
  <div class="strip-wrap">
    <div class="col-scroll-he" id="colScroll">
      <div class="empty-txt"><div class="spin"></div></div>
    </div>
    <div class="strip-hint">← เลื่อนดูทุก card →</div>
  </div>

  <!-- Card list -->
  <div class="card-list" id="cardList"></div>
  <div style="padding:0 12px 8px">
    <button class="add-card-btn" onclick="addCard()">＋ เพิ่ม Card ใหม่</button>
  </div>

  <!-- Editor panel -->
  <div id="editorPanel"></div>
</div>

<!-- ═══ SEC 1: CATEGORY ORDER ═══ -->
<div class="sec" id="sec1">
  <div class="cat-scroll" id="catScroll">
    <div class="spin"></div>
  </div>
  <div class="cat-key-hint" id="catKeyHint"></div>
  <div class="item-list-he" id="itemListHe">
    <div class="empty-txt"><div class="spin"></div></div>
  </div>
</div>

<button class="fab" onclick="saveAll()">☁ บันทึกทั้งหมด</button>

<script>
const SB_URL='https://zdartbvhbvqlwzwyyiia.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkYXJ0YnZoYnZxbHd6d3l5aWlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MTY3OTksImV4cCI6MjA5NzM5Mjc5OX0.D41YGH-CuWrVFqcAgXEuhfVTxJ7WY26Xu-PeXBF6LB8';
const COLORS=['#1F4D3A','#2D6B53','#3D8B6E','#5B4E2E','#7C3D1E','#2563EB','#6D28D9','#BE185D'];
const CAT_LABELS_STORED = {}; // loaded from Supabase on init

let sb, cards=[], menuItems=[], activeCat=null, activeCardIdx=null;
let autoScrollOn=true, autoScrollSpeed=90, autoTimer=null, currentPage=0;

// ── INIT ──
window.onload = async function(){
  sb = supabase.createClient(SB_URL, SB_KEY);
  await Promise.all([loadCards(), loadMenuItems()]);
  try{ const {data:td}=await sb.from('kitchen_data').select('value').eq('key','home_section_title').maybeSingle(); if(td?.value) document.getElementById('sectionTitle').value=td.value; }catch(e){}
  setupDragScroll();
  startAutoScroll();
};

// ── DATA ──
async function loadCards(){
  try{
    const {data} = await sb.from('home_layout').select('*').order('sort_order');
    cards = (data||[]).map(r=>({
      id:r.section_key, title:r.title||'', subtitle:r.subtitle||'',
      bg_color:r.bg_color||'#1F4D3A', bg_image:r.bg_image||'',
      size:(r.col_span||2)>=3?'large':'small',
      link_cat:(r.item_filter||{}).category||(r.item_filter||{}).he_group||'',
      sort_order:r.sort_order||0
    }));
  }catch(e){
    cards=[
      {id:'meal_hp',title:'HP Meal Plan',subtitle:'High Protein · 7 เมนู/สัปดาห์',bg_color:'#1F4D3A',bg_image:'',size:'large',link_cat:'meal_hp',sort_order:0},
      {id:'meal_lc',title:'Low Carb',subtitle:'Low Carb · ลดน้ำหนัก',bg_color:'#2D6B53',bg_image:'',size:'small',link_cat:'meal_lc',sort_order:1},
      {id:'weekly',title:'Weekly Menu',subtitle:'Special เปลี่ยนทุปดาห์',bg_color:'#3D8B6E',bg_image:'',size:'small',link_cat:'__anchor__',sort_order:2}
    ];
  }
  renderAll();
}

async function loadMenuItems(){
  try{
    const {data} = await sb.from('menu_items').select('id,name,code,price,calories,category,is_available,sort_order').eq('is_available',true).order('sort_order');
    menuItems = data||[];
  }catch(e){ menuItems=[]; }
  // Load custom labels from Supabase
  try{
    const {data:ld} = await sb.from('kitchen_data').select('value').eq('key','category_labels').maybeSingle();
    if(ld?.value){ Object.assign(CAT_LABELS_STORED, ld.value); }
  }catch(e){}
  renderCatSection();
}

// ── RENDER COLLAGE ──
function renderAll(){ renderPreview(); renderCardList(); }

function renderPreview(){
  const el = document.getElementById('colScroll');
  if(!cards.length){ el.innerHTML='<div class="empty-txt">ยังไม่มี card</div>'; return; }

  // Group: consecutive [large, sm, sm] or [sm, sm] or [large] 
  const groups=[];
  let i=0;
  while(i<cards.length){
    const g=[];
    g.push(cards[i]); i++;
    // fill right column if first is large
    while(i<cards.length && cards[i].size==='small' && g.length<3){ g.push(cards[i]); i++; }
    groups.push(g);
  }

  el.innerHTML = groups.map((g,gi)=>{
    const main=g[0];
    let html='<div class="col-group-he">';
    html+=renderPrevCard(main, cards.indexOf(main));
    if(g.length>1){
      html+='<div class="col-col-he">';
      g.slice(1).forEach(c=>{ html+=renderPrevCard(c, cards.indexOf(c)); });
      html+='</div>';
    }
    html+='</div>';
    return html;
  }).join('');

  
}

function renderPrevCard(c,idx){
  const isLg=c.size==='large';
  const bg=`background:${c.bg_color}`;
  const img=c.bg_image?`<img src="${c.bg_image}" onerror="this.style.display='none'">`:'';
  const active=activeCardIdx===idx?' active':'';
  return `<div class="col-card-he ${isLg?'lg':'sm'}${active}" style="${bg}" onclick="selectCard(${idx})">
    ${img}
    <div class="col-ov-he"></div>
    <div class="col-body-he">
      <div class="col-title-he${isLg?'':' sm'}">${esc(c.title)}</div>
      <div class="col-sub-he">${esc(c.subtitle)}</div>
      ${isLg&&c.show_cta!==false?`<span class="col-cta-he">${esc(c.cta_text||'ดูเมนู →')}</span>`:''}
    </div>
    <div class="sel-indicator">✓</div>
  </div>`;
}

function renderCardList(){
  const el = document.getElementById('cardList');
  el.innerHTML = cards.map((c,i)=>{
    const thumbBg=c.bg_image?`<img src="${c.bg_image}" onerror="this.style.display='none'">`:`<div class="thumb-bg" style="background:${c.bg_color};width:100%;height:100%"></div>`;
    return `<div class="card-list-item${activeCardIdx===i?' active':''}" onclick="selectCard(${i})">
      <span class="card-drag" onclick="event.stopPropagation()">⠿</span>
      <div class="card-list-thumb">${thumbBg}</div>
      <div class="card-list-info">
        <div class="card-list-name">${esc(c.title)||'(ไม่มีชื่อ)'}</div>
        <div class="card-list-sz">${c.size==='large'?'⬛ ใหญ่':'▪ เล็ก'} · #${i+1}</div>
      </div>
      <button class="card-del-btn" onclick="event.stopPropagation();deleteCard(${i})">🗑</button>
    </div>`;
  }).join('');
}

function selectCard(idx){
  activeCardIdx = (activeCardIdx===idx) ? null : idx;
  renderAll();
  if(activeCardIdx!==null){
    renderEditor();
    document.getElementById('editorPanel').scrollIntoView({behavior:'smooth',block:'nearest'});
  } else {
    document.getElementById('editorPanel').innerHTML='';
  }
  // scroll preview to show the selected card group
  scrollToCard(idx);
}

function scrollToCard(idx){
  const el=document.getElementById('colScroll');
  const group=el.querySelector('.col-group-he');
  if(!group) return;
  const gw=group.offsetWidth+10;
  // Find which group the card belongs to
  let gi=0, ci=0;
  while(ci<idx && ci<cards.length){
    const c=cards[ci];
    if(c.size==='large'){ gi++; ci++; } else { ci++; }
    if(ci<cards.length && cards[ci]?.size==='small'){ ci++; }
  }
  el.scrollTo({left:gi*gw, behavior:'smooth'});
}

// ── CARD EDITOR ──
function renderEditor(){
  if(activeCardIdx===null){ document.getElementById('editorPanel').innerHTML=''; return; }
  const c=cards[activeCardIdx];
  const i=activeCardIdx;

  // Build link options
  const cats=[...new Set(menuItems.map(m=>m.category).filter(Boolean))];
  const catOptions=cats.map(cat=>`<option value="${cat}"${c.link_cat===cat?' selected':''}>${getCatLabel(cat)} (${cat})</option>`).join('');

  document.getElementById('editorPanel').innerHTML=`
  <div class="card-edit-panel">

function triggerUpload(){ document.getElementById('imgFile').click(); }

async function handleImageUpload(e){
  const file=e.target.files[0];
  if(!file) return;
  if(file.size>2*1024*1024){ showToast('ไฟล์ใหญ่เกิน 2MB','err'); return; }

  // Show progress
  document.getElementById('uploadProg').style.display='block';
  setProgress(20);

  // Compress image
  const compressed = await compressImage(file, 1200, 800, 0.85);
  setProgress(50);

  try{
    const ext = file.name.split('.').pop().replace('jpeg','jpg');
    const fname = `card_${Date.now()}.${ext}`;
    const {data,error} = await sb.storage.from('card-images').upload(fname, compressed, {cacheControl:'86400',upsert:true});
    setProgress(80);
    if(error) throw error;
    const {data:urlData} = sb.storage.from('card-images').getPublicUrl(fname);
    cards[activeCardIdx].bg_image = urlData.publicUrl;
    setProgress(100);
    setTimeout(()=>{ document.getElementById('uploadProg').style.display='none'; },500);
  }catch(err){
    // Fallback: use local base64 preview
    const reader=new FileReader();
    reader.onload=ev=>{
      cards[activeCardIdx].bg_image=ev.target.result;
      document.getElementById('uploadProg').style.display='none';
      renderAll();
      renderEditor();
    };
    reader.readAsDataURL(compressed);
    showToast('Storage ไม่พร้อม — ใช้ base64 แทน (ชั่วคราว)','info');
    return;
  }
  renderAll(); renderEditor();
}

function setProgress(pct){
  document.getElementById('uploadBar').style.width=pct+'%';
}

function compressImage(file, maxW, maxH, q){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
        if(h>maxH){w=Math.round(w*maxH/h);h=maxH;}
        const cv=document.createElement('canvas');
        cv.width=w; cv.height=h;
        const ctx=cv.getContext('2d');
        // White background for JPEGs
        ctx.fillStyle='#ffffff';
        ctx.fillRect(0,0,w,h);
        ctx.drawImage(img,0,0,w,h);
        cv.toBlob(blob=>resolve(blob),'image/jpeg',q);
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function onUrlInput(){
  const url=document.getElementById('c-img-url').value.trim();
  if(activeCardIdx===null) return;
  cards[activeCardIdx].bg_image=url;
  const prev=document.getElementById('imgPrev');
  const box=document.getElementById('imgPrevBox');
  if(url){ prev.src=url; box.style.display='block'; } else { box.style.display='none'; }
  renderAll();
}

function clearImage(){
  if(activeCardIdx===null) return;
  cards[activeCardIdx].bg_image='';
  const box=document.getElementById('imgPrevBox');
  if(box) box.style.display='none';
  const url=document.getElementById('c-img-url');
  if(url) url.value='';
  renderAll();
}

function liveUpdate(){
  if(activeCardIdx===null) return;
  const c=cards[activeCardIdx];
  c.title=document.getElementById('c-title').value;
  c.subtitle=document.getElementById('c-sub').value;
  c.bg_color=document.getElementById('c-color').value;
  c.link_cat=document.getElementById('c-cat').value;
  const url=(document.getElementById('c-img-url').value||'').trim();
  if(url) c.bg_image=url;
  const ctaEl=document.getElementById('c-show-cta');
  if(ctaEl) c.show_cta=ctaEl.checked;
  const ctaTxtEl=document.getElementById('c-cta-text');
  if(ctaTxtEl) c.cta_text=ctaTxtEl.value;
  renderAll();
}

function setSize(sz){ if(activeCardIdx===null)return; cards[activeCardIdx].size=sz; renderAll(); renderEditor(); }
function setColor(col){ if(activeCardIdx===null)return; cards[activeCardIdx].bg_color=col; document.getElementById('c-color').value=col; renderAll(); renderEditor(); }

function addCard(){
  cards.push({id:'card_'+Date.now(),title:'Card ใหม่',subtitle:'',bg_color:'#2D6B53',bg_image:'',size:'small',link_cat:'',sort_order:cards.length});
  activeCardIdx=cards.length-1;
  renderAll(); renderEditor();
  setTimeout(()=>{
    const sc=document.getElementById('colScroll');
    sc.scrollTo({left:sc.scrollWidth,behavior:'smooth'});
  },100);
}

function deleteCard(idx){
  if(!confirm(`ลบ Card "${cards[idx].title}"?`)) return;
  cards.splice(idx,1);
  if(activeCardIdx>=cards.length) activeCardIdx=null;
  renderAll();
  document.getElementById('editorPanel').innerHTML='';
}

function moveCard(dir){
  const i=activeCardIdx;
  if(i+dir<0||i+dir>=cards.length) return;
  [cards[i],cards[i+dir]]=[cards[i+dir],cards[i]];
  activeCardIdx=i+dir;
  renderAll(); renderEditor();
}

// Navigation handled by native scroll

// Auto-scroll
function startAutoScroll(){
  stopAutoScroll();
  if(!autoScrollOn) return;
  const SCROLL_PX = 1;
  let lastScrollTime = 0;
  function smoothTick(ts){
    if(!autoScrollOn){ return; }
    if(ts-lastScrollTime > (1000/60)){
      const el=document.getElementById('colScroll')?.parentElement; // scroll strip-wrap
      if(el){
        el.scrollLeft += SCROLL_PX * (90/autoScrollSpeed);
        if(el.scrollLeft >= el.scrollWidth - el.clientWidth - 5){ el.scrollLeft=0; }
      }
      lastScrollTime=ts;
    }
    autoTimer=requestAnimationFrame(smoothTick);
  }
  autoTimer=requestAnimationFrame(smoothTick);
}
function stopAutoScroll(){ if(autoTimer){cancelAnimationFrame(autoTimer);autoTimer=null;} }
function toggleAuto(){
  autoScrollOn=!autoScrollOn;
  document.getElementById('autoBtn').textContent=autoScrollOn?'⏸ หยุด':'▶ ออโต้';
  document.getElementById('autoBtn').classList.toggle('on',!autoScrollOn);
  autoScrollOn?startAutoScroll():stopAutoScroll();
}
function updateSpeed(){
  autoScrollSpeed=parseInt(document.getElementById('speedSel').value);
  if(autoScrollOn){ startAutoScroll(); }
}

// Mouse drag scroll
function setupDragScroll(){
  const el=document.getElementById('colScroll')?.parentElement||document.getElementById('colScroll');
  let dragging=false, startX=0, startSL=0;
  el.addEventListener('mousedown',e=>{dragging=true;startX=e.pageX;startSL=el.scrollLeft;el.classList.add('dragging');stopAutoScroll();});
  document.addEventListener('mousemove',e=>{if(!dragging)return;el.scrollLeft=startSL-(e.pageX-startX);});
  document.addEventListener('mouseup',()=>{
    if(!dragging) return;
    dragging=false;el.classList.remove('dragging');
    setTimeout(updateNavBtns,100);
    if(autoScrollOn) startAutoScroll();
  });
  
  
}

// ── CATEGORY SECTION ──
function renderCatSection(){
  const cats=getCats();
  const bar=document.getElementById('catScroll');
  if(!cats.length){ bar.innerHTML='<span style="color:#aaa;font-size:13px">ไม่มีสินค้าออนไลน์</span>'; return; }
  if(!activeCat) activeCat=cats[0];

  bar.innerHTML=cats.map(cat=>{
    const label=getCatLabel(cat);
    const cnt=menuItems.filter(m=>m.category===cat).length;
    return `<button class="cat-btn-he${activeCat===cat?' on':''}" title="key: ${cat}" onclick="selectCatHe('${cat}')">
      <input class="cat-rename-input" value="${esc(label)}" title="key: ${cat}"
        onclick="event.stopPropagation()"
        onchange="renameCat('${cat}',this.value)"
        onblur="renameCat('${cat}',this.value)"
        style="color:inherit">
      <span style="opacity:.7;font-size:11px;margin-left:3px">${cnt}</span>
    </button>`;
  }).join('');
  document.getElementById('catKeyHint').textContent = `key จริง: "${activeCat}" · ดับเบิลคลิกชื่อเพื่อ rename`;
  renderCatItems();
}

function getCats(){
  const seen={},cats=[];
  menuItems.forEach(m=>{ if(m.category&&!seen[m.category]){seen[m.category]=1;cats.push(m.category);} });
  return cats;
}

function getCatLabel(cat){
  return CAT_LABELS_STORED[cat] || CAT_LABELS[cat] || cat;
}
const CAT_LABELS={
  meal_hp:'🥩 HP Plan',meal_lc:'🥗 LC Plan',
  no_regular:'🍱 ข้าวกล่อง',no_special:'⭐ สัปดาห์นี้',
  pack_regular:'📦 แพคกับข้าว',pack_special:'📦 แพคพิเศษ',trend:'🌟 เทรนด์'
};

let renameSaveTimer=null;
function renameCat(key,newName){
  CAT_LABELS_STORED[key]=newName;
  // Debounced save to Supabase
  clearTimeout(renameSaveTimer);
  renameSaveTimer=setTimeout(async()=>{
    try{
      await sb.from('kitchen_data').upsert({key:'category_labels',value:{...CAT_LABELS_STORED},updated_at:new Date().toISOString()},{onConflict:'key'});
      showToast('✅ บันทึกชื่อหมวดแล้ว','ok');
    }catch(e){ showToast('⚠️ บันทึกไม่ได้','err'); }
  },1200);
}

function selectCatHe(cat){
  activeCat=cat;
  renderCatSection();
}

function renderCatItems(){
  const el=document.getElementById('itemListHe');
  const items=menuItems.filter(m=>m.category===activeCat);
  if(!items.length){ el.innerHTML='<div class="empty-txt">ไม่มีสินค้าในหมวดนี้</div>'; return; }
  el.innerHTML=items.map((m,i)=>`
    <div class="item-row-he" draggable="true" data-id="${m.id}">
      <span class="item-drag-he">⠿</span>
      <div class="item-idx">${i+1}</div>
      <div class="item-info-he">
        <div class="item-code-he">${m.code||''}</div>
        <div class="item-name-he">${esc(m.name)}</div>
        ${m.calories?`<div class="item-kcal-he">${m.calories} kcal</div>`:''}
      </div>
      <div class="item-price-he">฿${m.price}</div>
    </div>`).join('');
  setupItemDrag();
}

let dragSrc2=null;
function setupItemDrag(){
  const rows=document.querySelectorAll('.item-row-he');
  rows.forEach(row=>{
    row.addEventListener('dragstart',e=>{dragSrc2=row;row.style.opacity='.4';});
    row.addEventListener('dragend',()=>{row.style.opacity='1';});
    row.addEventListener('dragover',e=>{e.preventDefault();row.style.background='var(--gl)';});
    row.addEventListener('dragleave',()=>{row.style.background='';});
    row.addEventListener('drop',e=>{
      e.preventDefault();row.style.background='';
      if(dragSrc2===row) return;
      const si=menuItems.findIndex(m=>m.id==dragSrc2.dataset.id);
      const ti=menuItems.findIndex(m=>m.id==row.dataset.id);
      if(si<0||ti<0) return;
      [menuItems[si],menuItems[ti]]=[menuItems[ti],menuItems[si]];
      menuItems.filter(m=>m.category===activeCat).forEach((m,j)=>{m.sort_order=j+1;});
      renderCatItems();
    });
  });
}

// ── SAVE ──
async function saveSectionTitle(){
  const title = document.getElementById('sectionTitle').value;
  try{ await sb.from('kitchen_data').upsert({key:'home_section_title',value:title,updated_at:new Date().toISOString()},{onConflict:'key'}); }catch(e){}
}

async function saveAll(){
  showToast('กำลังบันทึก...','info');
  let ok=true;
  try{
    for(let i=0;i<cards.length;i++){
      const c=cards[i];
      await sb.from('home_layout').upsert({
        section_key:c.id, section_type:c.size==='large'?'meal_plan':'promo',
        col_start:1,row_start:i+1, col_span:c.size==='large'?4:2, row_span:c.size==='large'?4:2,
        title:c.title, subtitle:c.subtitle, bg_color:c.bg_color, bg_image:c.bg_image,
        text_color:'#fff', item_filter:c.link_cat?{category:c.link_cat}:{},
        sort_order:i, is_active:true, updated_at:new Date().toISOString()
      },{onConflict:'section_key'});
    }
  }catch(e){ ok=false; }
  try{
    const changed=menuItems.filter(m=>m.sort_order!==undefined);
    for(const m of changed){ await sb.from('menu_items').update({sort_order:m.sort_order}).eq('id',m.id); }
  }catch(e){}
  showToast(ok?'✅ บันทึกสำเร็จ!':'⚠️ บางส่วนไม่สำเร็จ — ตรวจสอบ console',ok?'ok':'err');
}

// ── UI HELPERS ──
function switchSec(idx){
  document.querySelectorAll('.sec').forEach((s,i)=>s.classList.toggle('on',i===idx));
  document.querySelectorAll('.sec-tab').forEach((t,i)=>t.classList.toggle('on',i===idx));
}
function showToast(msg,type){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast-bar show'+(type?' '+type:'');
  if(type&&type!=='info') setTimeout(()=>{el.className='toast-bar';},3000);
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
