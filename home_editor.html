<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Home Editor — Under360</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --g:#1F4D3A; --gl:#EBF3EF; --ink:#1A1A1A; --ink2:#666; --bg:#F8F8F8;
  --brd:rgba(0,0,0,.1); --r:14px; --shadow:0 2px 12px rgba(0,0,0,.08);
}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
button{font-family:inherit;cursor:pointer;}

/* ── Header ── */
.hdr{display:flex;align-items:center;gap:10px;padding:14px 16px;background:#fff;border-bottom:0.5px solid var(--brd);position:sticky;top:0;z-index:100;}
.hdr-title{font-size:16px;font-weight:800;color:var(--g);flex:1;}
.hdr-save{background:var(--g);color:#fff;border:none;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:700;}
.hdr-back{width:36px;height:36px;border:none;background:none;font-size:20px;color:var(--ink2);display:flex;align-items:center;justify-content:center;}
.status-bar{padding:6px 16px;font-size:12px;text-align:center;display:none;}
.status-bar.show{display:block;}
.status-bar.ok{background:#D1FAE5;color:#065F46;}
.status-bar.err{background:#FEE2E2;color:#B91C1C;}

/* ── Section tabs ── */
.sec-tabs{display:flex;background:#fff;border-bottom:0.5px solid var(--brd);}
.sec-tab{flex:1;padding:12px 0;font-size:13px;font-weight:600;border:none;background:none;color:var(--ink2);border-bottom:2.5px solid transparent;}
.sec-tab.on{color:var(--g);border-bottom-color:var(--g);}

/* ══ SECTION 1: Collage Editor ══ */
.sec{display:none;padding:0 0 80px;}
.sec.on{display:block;}

/* Preview strip */
.preview-label{padding:14px 16px 8px;font-size:13px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.06em;}
.col-preview{overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;display:flex;gap:10px;padding:0 16px 12px;scrollbar-width:none;}
.col-preview::-webkit-scrollbar{display:none;}
.col-group-preview{display:flex;min-width:calc(100vw - 32px);height:220px;gap:8px;scroll-snap-align:start;flex-shrink:0;}
.col-card-prev{border-radius:16px;overflow:hidden;position:relative;cursor:pointer;flex-shrink:0;border:2.5px solid transparent;transition:border-color .15s;}
.col-card-prev.lg{flex:3;}
.col-card-prev.sm{flex:1;}
.col-card-prev.active{border-color:var(--g);}
.col-card-prev img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.col-ov-p{position:absolute;inset:0;background:linear-gradient(165deg,rgba(0,0,0,.05),rgba(0,0,0,.58));}
.col-body-p{position:absolute;bottom:0;left:0;right:0;padding:12px;}
.col-title-p{font-size:15px;font-weight:800;color:#fff;}
.col-title-p.sm{font-size:12px;}
.col-sub-p{font-size:10px;color:rgba(255,255,255,.8);margin-top:1px;}
.col-cta-p{display:inline-block;margin-top:6px;padding:4px 12px;border:1.5px solid rgba(255,255,255,.7);border-radius:20px;color:#fff;font-size:11px;font-weight:600;}
.col-card-prev .add-card-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;height:100%;background:#F2F2F2;color:#aaa;font-size:12px;}
.col-card-prev .add-card-btn span{font-size:28px;}

/* Right column for preview */
.col-col-prev{flex:2;display:flex;flex-direction:column;gap:8px;}

/* Card editor panel */
.card-editor{background:#fff;margin:12px 16px;border-radius:var(--r);padding:16px;box-shadow:var(--shadow);}
.card-editor-title{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.card-editor-del{width:32px;height:32px;border-radius:50%;background:#FEE2E2;color:#B91C1C;border:none;font-size:16px;display:flex;align-items:center;justify-content:center;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:4px;}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--brd);border-radius:8px;padding:9px 12px;font-size:14px;font-family:inherit;background:#fff;color:var(--ink);}
.field input:focus,.field select:focus{outline:none;border-color:var(--g);}
.size-btns{display:flex;gap:8px;}
.size-btn{flex:1;padding:10px;border-radius:8px;border:1.5px solid var(--brd);background:#fff;font-size:13px;font-weight:600;color:var(--ink2);}
.size-btn.on{background:var(--gl);border-color:var(--g);color:var(--g);}
.img-preview{width:100%;height:80px;border-radius:8px;object-fit:cover;margin-top:6px;display:none;}
.add-card-row{display:flex;justify-content:center;padding:12px 16px;}
.add-card-btn-main{display:flex;align-items:center;gap:8px;background:var(--gl);color:var(--g);border:1.5px dashed var(--g);border-radius:10px;padding:10px 20px;font-size:13px;font-weight:700;}

/* ══ SECTION 2: Category editor ══ */
.cat-tab-bar{overflow-x:auto;display:flex;gap:6px;padding:12px 16px;scrollbar-width:none;background:#fff;border-bottom:0.5px solid var(--brd);}
.cat-tab-bar::-webkit-scrollbar{display:none;}
.cat-btn{padding:7px 16px;border-radius:20px;border:none;background:#F2F2F2;color:var(--ink2);font-size:13px;font-weight:600;white-space:nowrap;flex-shrink:0;}
.cat-btn.on{background:var(--g);color:#fff;}
.cat-count{font-size:11px;opacity:.8;margin-left:4px;}

.item-list{padding:0 16px 80px;}
.item-row{display:flex;align-items:center;gap:10px;background:#fff;border-radius:10px;padding:10px 12px;margin-top:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.item-drag{font-size:20px;color:#ccc;cursor:grab;flex-shrink:0;}
.item-info{flex:1;min-width:0;}
.item-code{font-size:10.5px;color:#999;font-weight:600;}
.item-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-kcal{font-size:11px;color:#888;margin-top:2px;}
.item-price{font-size:14px;font-weight:700;color:#C9573F;flex-shrink:0;}
.item-toggle{width:36px;height:36px;border-radius:50%;border:none;font-size:16px;flex-shrink:0;}
.item-toggle.on{background:var(--gl);color:var(--g);}
.item-toggle.off{background:#F2F2F2;color:#999;}
.item-order{width:24px;height:24px;border-radius:4px;border:1px solid var(--brd);background:#fff;font-size:11px;font-weight:700;color:var(--ink2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* FAB save */
.fab-save{position:fixed;bottom:20px;right:16px;background:var(--g);color:#fff;border:none;border-radius:28px;padding:14px 24px;font-size:15px;font-weight:700;box-shadow:0 4px 18px rgba(31,77,58,.4);display:flex;align-items:center;gap:8px;z-index:200;}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--ink2);font-size:14px;gap:10px;}
.spin{width:20px;height:20px;border:2px solid var(--brd);border-top-color:var(--g);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="hdr">
  <button class="hdr-back" onclick="history.back()">←</button>
  <div class="hdr-title">Home Editor</div>
  <button class="hdr-save" onclick="saveAll()">บันทึก</button>
</div>
<div class="status-bar" id="statusBar"></div>

<div class="sec-tabs">
  <button class="sec-tab on" onclick="switchSec(0)">📸 Collage บนสุด</button>
  <button class="sec-tab" onclick="switchSec(1)">📋 จัดลำดับเมนู</button>
</div>

<!-- ══ SEC 0: COLLAGE EDITOR ══ -->
<div class="sec on" id="sec0">
  <div class="preview-label">Preview (scroll เพื่อดูทุก card)</div>
  <div class="col-preview" id="colPreview">
    <div class="loading"><div class="spin"></div>กำลังโหลด...</div>
  </div>
  <div id="cardEditorWrap"></div>
  <div class="add-card-row">
    <button class="add-card-btn-main" onclick="addCard()">
      <span style="font-size:20px">＋</span> เพิ่ม Card ใหม่
    </button>
  </div>
</div>

<!-- ══ SEC 1: CATEGORY ORDER ══ -->
<div class="sec" id="sec1">
  <div class="cat-tab-bar" id="catTabBar">
    <div class="loading"><div class="spin"></div></div>
  </div>
  <div class="item-list" id="itemList">
    <div class="loading"><div class="spin"></div>กำลังโหลด...</div>
  </div>
</div>

<button class="fab-save" onclick="saveAll()">☁ บันทึกทั้งหมด</button>

<script>
const SB_URL = 'https://zdartbvhbvqlwzwyyiia.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkYXJ0YnZoYnZxbHd6d3l5aWlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MTY3OTksImV4cCI6MjA5NzM5Mjc5OX0.D41YGH-CuWrVFqcAgXEuhfVTxJ7WY26Xu-PeXBF6LB8';

let sb, cards = [], menuItems = [], activeCat = null, activeCardIdx = null;
const CAT_LABELS = {meal_hp:'High Protein',meal_lc:'Low Carb',meal_s:'Special',meal_d:'Diet',meal_no:'No Carb'};

window.onload = async function() {
  sb = supabase.createClient(SB_URL, SB_KEY);
  await Promise.all([loadCards(), loadMenuItems()]);
};

// ══ DATA LOADING ══
async function loadCards() {
  try {
    const {data} = await sb.from('home_layout').select('*').order('sort_order');
    cards = (data||[]).map(function(r){ return {
      id: r.section_key,
      title: r.title||'',
      subtitle: r.subtitle||'',
      bg_color: r.bg_color||'#1F4D3A',
      bg_image: r.bg_image||'',
      size: (r.col_span||2) >= 3 ? 'large' : 'small',
      link_cat: (r.item_filter||{}).category || (r.item_filter||{}).he_group || '',
      sort_order: r.sort_order||0
    };});
  } catch(e) {
    // Default cards
    cards = [
      {id:'meal_hp',title:'HP Meal Plan',subtitle:'High Protein · 7 เมนู/สัปดาห์',bg_color:'#1F4D3A',bg_image:'',size:'large',link_cat:'meal_hp',sort_order:0},
      {id:'meal_lc',title:'Low Carb',subtitle:'Low Carb · ลดน้ำหนัก',bg_color:'#2D6B53',bg_image:'',size:'small',link_cat:'meal_lc',sort_order:1},
      {id:'meal_s',title:'Weekly Menu',subtitle:'Special เปลี่ยนทุปดาห์',bg_color:'#3D8B6E',bg_image:'',size:'small',link_cat:'meal_s',sort_order:2}
    ];
  }
  renderPreview();
}

async function loadMenuItems() {
  try {
    const {data} = await sb.from('menu_items').select('*').eq('is_available', true).order('sort_order');
    menuItems = data||[];
  } catch(e) { menuItems = []; }
  renderCatTabs();
}

// ══ SEC 0: COLLAGE PREVIEW ══
function renderPreview() {
  var el = document.getElementById('colPreview');
  if (!cards.length) { el.innerHTML = '<div style="padding:40px;text-align:center;color:#aaa">ยังไม่มี card — กด เพิ่ม Card ใหม่</div>'; return; }

  // Group into pages of 3 (1 large + up to 2 small)
  var groups = [], i = 0;
  while (i < cards.length) {
    var g = [];
    if (cards[i].size === 'large') { g.push(cards[i]); i++; } else { g.push(cards[i]); i++; }
    while (i < cards.length && cards[i].size === 'small' && g.length < 3) { g.push(cards[i]); i++; }
    groups.push(g);
  }

  var html = groups.map(function(g, gi) {
    var mainCard = g[0];
    var isLg = mainCard.size === 'large';
    var cardHtml = renderPreviewCard(mainCard, cards.indexOf(mainCard));
    var rightHtml = '';
    if (g.length > 1) {
      var smCards = g.slice(1).map(function(c){ return renderPreviewCard(c, cards.indexOf(c)); }).join('');
      rightHtml = '<div class="col-col-prev">'+smCards+'</div>';
    }
    return '<div class="col-group-preview">'+cardHtml+rightHtml+'</div>';
  }).join('');

  el.innerHTML = html;
}

function renderPreviewCard(c, idx) {
  var isLg = c.size === 'large';
  var imgHtml = c.bg_image ? '<img src="'+c.bg_image+'" onerror="this.style.display=\'none\'">' : '';
  var bg = 'background:'+c.bg_color+';';
  return '<div class="col-card-prev '+(isLg?'lg':'sm')+(activeCardIdx===idx?' active':'')+'" style="'+bg+'" onclick="selectCard('+idx+')">'
    +imgHtml
    +'<div class="col-ov-p"></div>'
    +'<div class="col-body-p">'
    +'<div class="col-title-p'+(isLg?'':' sm')+'">'+esc(c.title)+'</div>'
    +'<div class="col-sub-p">'+esc(c.subtitle)+'</div>'
    +(isLg?'<span class="col-cta-p">ดูเมนู →</span>':'')
    +'</div>'
    +'</div>';
}

function selectCard(idx) {
  activeCardIdx = (activeCardIdx === idx) ? null : idx;
  renderPreview();
  renderCardEditor();
}

function renderCardEditor() {
  var wrap = document.getElementById('cardEditorWrap');
  if (activeCardIdx === null) { wrap.innerHTML = ''; return; }
  var c = cards[activeCardIdx];
  if (!c) { wrap.innerHTML = ''; return; }
  wrap.innerHTML = '<div class="card-editor">'
    +'<div class="card-editor-title"><span>✏️ แก้ไข Card #'+(activeCardIdx+1)+'</span>'
    +'<button class="card-editor-del" onclick="deleteCard('+activeCardIdx+')" title="ลบ card นี้">🗑</button></div>'
    +'<div class="field"><label>ขนาด Card</label>'
    +'<div class="size-btns">'
    +'<button class="size-btn'+(c.size==='large'?' on':'')+'" onclick="setCardSize(\'large\')">⬛ ใหญ่ (2/3)</button>'
    +'<button class="size-btn'+(c.size==='small'?' on':'')+'" onclick="setCardSize(\'small\')">▪ เล็ก (1/3)</button>'
    +'</div></div>'
    +'<div class="field"><label>ชื่อ</label><input id="c-title" value="'+esc(c.title)+'" oninput="updateCard()"></div>'
    +'<div class="field"><label>คำบรรยาย</label><input id="c-sub" value="'+esc(c.subtitle)+'" oninput="updateCard()"></div>'
    +'<div class="field"><label>รูปพื้นหลัง (URL)</label>'
    +'<input id="c-img" value="'+esc(c.bg_image)+'" placeholder="https://..." oninput="updateCard();previewImg()">'
    +'<img id="c-img-prev" class="img-preview" src="'+c.bg_image+'" '+(c.bg_image?'style="display:block"':'')+'></div>'
    +'<div class="field"><label>สีพื้นหลัง (ถ้าไม่มีรูป)</label>'
    +'<input type="color" id="c-color" value="'+c.bg_color+'" style="height:44px;border-radius:8px;padding:4px;width:100%;" oninput="updateCard()"></div>'
    +'<div class="field"><label>ลิ้งไปที่ (category หรือ __anchor__ เพื่อเลื่อนลงเมนู)</label>'
    +'<input id="c-cat" value="'+esc(c.link_cat)+'" placeholder="เช่น meal_hp หรือ __anchor__" oninput="updateCard()"></div>'
    +'<div style="display:flex;gap:8px;margin-top:4px">'
    +(activeCardIdx > 0 ? '<button style="flex:1;padding:9px;border-radius:8px;border:1px solid var(--brd);background:#fff;font-size:13px;" onclick="moveCard(-1)">↑ ขึ้น</button>' : '')
    +(activeCardIdx < cards.length-1 ? '<button style="flex:1;padding:9px;border-radius:8px;border:1px solid var(--brd);background:#fff;font-size:13px;" onclick="moveCard(1)">↓ ลง</button>' : '')
    +'</div>'
    +'</div>';
}

function updateCard() {
  if (activeCardIdx === null) return;
  var c = cards[activeCardIdx];
  c.title = document.getElementById('c-title').value;
  c.subtitle = document.getElementById('c-sub').value;
  c.bg_image = document.getElementById('c-img').value;
  c.bg_color = document.getElementById('c-color').value;
  c.link_cat = document.getElementById('c-cat').value;
  renderPreview();
}

function previewImg() {
  var url = document.getElementById('c-img').value;
  var prev = document.getElementById('c-img-prev');
  if (url) { prev.src = url; prev.style.display = 'block'; } else { prev.style.display = 'none'; }
}

function setCardSize(sz) {
  if (activeCardIdx === null) return;
  cards[activeCardIdx].size = sz;
  renderPreview();
  renderCardEditor();
}

function deleteCard(idx) {
  if (!confirm('ลบ card นี้?')) return;
  cards.splice(idx, 1);
  activeCardIdx = null;
  renderPreview();
  renderCardEditor();
}

function addCard() {
  cards.push({id:'card_'+Date.now(),title:'ชื่อ Card ใหม่',subtitle:'',bg_color:'#2D6B53',bg_image:'',size:'small',link_cat:'',sort_order:cards.length});
  activeCardIdx = cards.length - 1;
  renderPreview();
  renderCardEditor();
  // Scroll to end
  setTimeout(function(){ var el=document.getElementById('colPreview'); if(el) el.scrollLeft=el.scrollWidth; }, 100);
}

function moveCard(dir) {
  var i = activeCardIdx;
  if (i + dir < 0 || i + dir >= cards.length) return;
  var tmp = cards[i]; cards[i] = cards[i+dir]; cards[i+dir] = tmp;
  activeCardIdx = i + dir;
  renderPreview();
  renderCardEditor();
}

// ══ SEC 1: CATEGORY ORDER ══
function renderCatTabs() {
  var bar = document.getElementById('catTabBar');
  var cats = getCats();
  if (!cats.length) { bar.innerHTML = '<div style="color:#aaa;padding:8px;font-size:13px">ยังไม่มีสินค้าออนไลน์</div>'; return; }
  bar.innerHTML = cats.map(function(c) {
    var cnt = menuItems.filter(function(m){ return m.category===c; }).length;
    return '<button class="cat-btn'+(activeCat===c?' on':'')+'" onclick="selectCat(\''+c+'\')">'+(CAT_LABELS[c]||c)+'<span class="cat-count">'+cnt+'</span></button>';
  }).join('');
  if (!activeCat && cats.length) { activeCat = cats[0]; renderCatItems(); }
}

function getCats() {
  var seen = {}, cats = [];
  menuItems.forEach(function(m){ if(m.category && !seen[m.category]){ seen[m.category]=1; cats.push(m.category); }});
  return cats;
}

function selectCat(cat) {
  activeCat = cat;
  renderCatTabs();
  renderCatItems();
}

function renderCatItems() {
  var el = document.getElementById('itemList');
  var items = menuItems.filter(function(m){ return m.category === activeCat; });
  if (!items.length) { el.innerHTML = '<div class="loading">ไม่มีสินค้าในหมวดนี้</div>'; return; }
  el.innerHTML = items.map(function(m, i) {
    return '<div class="item-row" draggable="true" data-id="'+m.id+'" data-idx="'+i+'">'
      +'<span class="item-drag">⠿</span>'
      +'<div class="item-order">'+(m.sort_order||'-')+'</div>'
      +'<div class="item-info"><div class="item-code">'+(m.code||'')+'</div><div class="item-name">'+esc(m.name)+'</div><div class="item-kcal">'+(m.calories||'')+(m.calories?' kcal':'')+'</div></div>'
      +'<div class="item-price">฿'+m.price+'</div>'
      +'</div>';
  }).join('');
  setupDrag();
}

// Simple drag-to-reorder
var dragSrc = null;
function setupDrag() {
  var rows = document.querySelectorAll('.item-row');
  rows.forEach(function(row) {
    row.addEventListener('dragstart', function(e){ dragSrc = this; this.style.opacity='.4'; });
    row.addEventListener('dragend', function(){ this.style.opacity='1'; });
    row.addEventListener('dragover', function(e){ e.preventDefault(); this.style.background='var(--gl)'; });
    row.addEventListener('dragleave', function(){ this.style.background=''; });
    row.addEventListener('drop', function(e) {
      e.preventDefault(); this.style.background='';
      if (dragSrc === this) return;
      var srcId = dragSrc.dataset.id;
      var tgtId = this.dataset.id;
      var srcIdx = menuItems.findIndex(function(m){ return m.id==srcId; });
      var tgtIdx = menuItems.findIndex(function(m){ return m.id==tgtId; });
      if (srcIdx<0||tgtIdx<0) return;
      var tmp = menuItems[srcIdx]; menuItems[srcIdx] = menuItems[tgtIdx]; menuItems[tgtIdx] = tmp;
      // Update sort_order values
      menuItems.filter(function(m){ return m.category===activeCat; }).forEach(function(m,i){ m.sort_order = i+1; });
      renderCatItems();
    });
  });
}

// ══ SAVE ══
async function saveAll() {
  showStatus('กำลังบันทึก...', '');
  var ok = true;

  // Save collage cards to home_layout
  try {
    for (var i=0; i<cards.length; i++) {
      var c = cards[i];
      var row = {
        section_key: c.id,
        section_type: c.size==='large' ? 'meal_plan' : 'promo',
        col_start: 1, row_start: i+1,
        col_span: c.size==='large' ? 4 : 2,
        row_span: c.size==='large' ? 4 : 2,
        title: c.title,
        subtitle: c.subtitle,
        bg_color: c.bg_color,
        bg_image: c.bg_image,
        text_color: '#fff',
        item_filter: c.link_cat ? {category:c.link_cat} : {},
        sort_order: i,
        is_active: true
      };
      var {error} = await sb.from('home_layout').upsert(row, {onConflict:'section_key'});
      if (error) { ok = false; console.error(error); }
    }
  } catch(e) { ok = false; }

  // Save menu item sort orders
  try {
    var catItems = menuItems.filter(function(m){ return m.sort_order !== undefined; });
    for (var j=0; j<catItems.length; j++) {
      var m = catItems[j];
      await sb.from('menu_items').update({sort_order: m.sort_order}).eq('id', m.id);
    }
  } catch(e) { /* sort_order save is best-effort */ }

  showStatus(ok ? '✅ บันทึกสำเร็จ!' : '⚠️ บันทึกบางส่วนไม่สำเร็จ', ok ? 'ok' : 'err');
}

function showStatus(msg, type) {
  var el = document.getElementById('statusBar');
  el.textContent = msg;
  el.className = 'status-bar show' + (type ? ' '+type : '');
  if (type) setTimeout(function(){ el.className='status-bar'; }, 3000);
}

function switchSec(idx) {
  document.querySelectorAll('.sec').forEach(function(s,i){ s.classList.toggle('on', i===idx); });
  document.querySelectorAll('.sec-tab').forEach(function(t,i){ t.classList.toggle('on', i===idx); });
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
