  const badge    = pkg.is_active
    ? `<span style="font-size:11px;background:var(--forest-soft);color:var(--forest);padding:2px 8px;border-radius:10px;font-weight:600;">เปิดขาย</span>`
    : `<span style="font-size:11px;background:var(--surface-2);color:var(--ink-soft);padding:2px 8px;border-radius:10px;">ปิดอยู่</span>`;
  let html = `<div class="card" style="margin-bottom:8px;">
    <div class="row pkg-row-hd" data-pkg-id="${pkg.id}" style="cursor:pointer;">
      <div style="flex:1;min-width:0;">
        <div class="name-line">
          <span class="code-badge">${escapeHtml(pkg.size)}</span>
          <span class="name">${escapeHtml(pkg.name)}</span>
          ${badge}
        </div>
        <div style="font-size:12px;color:var(--ink-soft);margin-top:2px;">
          ${pkg.qty} กล่อง · ฿${Number(pkg.base_price).toLocaleString()} · ${itemCnt} เมนูในแพค
        </div>
      </div>
      <span style="font-size:12px;color:var(--turmeric);flex-shrink:0;padding:4px 0 4px 8px;">${isOpen ? '▲' : '▼ แก้ไข'}</span>
    </div>`;
  if(isOpen) html += renderPackageEditor(pkg);
  html += `</div>`;
  return html;
}

function renderPackageEditor(pkg){
  // Init editing state only when freshly opening this package
  if(state._pkgEditorInit !== pkg.id){
    state.editingPkgItems = {};
    (state.pkgItems[pkg.id] || []).forEach(it => {
      state.editingPkgItems[it.sku] = it.extra_price;
    });
    state._pkgEditorInit = pkg.id;
    state.pkgMenuSearch  = '';
  }

  const activeRecipes = (state.recipes || []).filter(r => r.status === 'active');
  const q = (state.pkgMenuSearch || '').trim().toLowerCase();
  const shown = q
    ? activeRecipes.filter(r => (r.name||'').toLowerCase().includes(q) || (r.code||'').toLowerCase().includes(q))
    : activeRecipes;
  const checkedCount = Object.keys(state.editingPkgItems).length;

  // ── Menu list rows ──
  let rows = '';
  shown.forEach(r => {
    const sku      = r.code || '';
    const isChk    = Object.prototype.hasOwnProperty.call(state.editingPkgItems, sku);
    const ep       = isChk ? state.editingPkgItems[sku] : 0;
    const isZero   = ep === 0;
    const isForty  = ep === 40;
    const isCustom = isChk && !isZero && !isForty;
    const qBtn = (price, active, baseColor) =>
      `<button type="button" class="pkg-q-price" data-sku="${escapeHtml(sku)}" data-price="${price}"
        style="padding:3px 8px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;
               border:1px solid ${active?baseColor:'var(--line)'};border-radius:6px;
               background:${active?baseColor:'var(--surface-2)'};
               color:${active?'#fff':'var(--ink)'};">${price===0?'+0':'+'+price}</button>`;
    rows += `<div class="pkg-menu-row" data-sku="${escapeHtml(sku)}"
        data-sn="${escapeHtml((r.name||'').toLowerCase())}"
        data-sc="${escapeHtml((r.code||'').toLowerCase())}"
        style="display:flex;align-items:center;gap:8px;padding:8px 12px;
               border-bottom:1px solid var(--line);${isChk?'background:var(--forest-soft);':''}">
      <input type="checkbox" class="pkg-item-chk" data-sku="${escapeHtml(sku)}" ${isChk?'checked':''}
        style="width:16px;height:16px;flex-shrink:0;cursor:pointer;">
      <span class="code-badge" style="font-size:10.5px;flex-shrink:0;">${escapeHtml(sku||'—')}</span>
      <span class="pkg-item-name" style="flex:1;min-width:0;font-size:13px;overflow:hidden;
             text-overflow:ellipsis;white-space:nowrap;${isChk?'':'color:var(--ink-soft);'}"
        >${escapeHtml(r.name||'')}</span>
      <div class="pkg-price-ctrl" style="display:flex;align-items:center;gap:3px;flex-shrink:0;
           ${isChk?'':'opacity:.3;pointer-events:none;'}">
        ${qBtn(0,  isChk&&isZero,  'var(--forest)')}
        ${qBtn(40, isForty,        'var(--turmeric)')}
        <input type="number" class="pkg-custom-price" data-sku="${escapeHtml(sku)}"
          value="${isCustom?ep:''}" placeholder="฿" min="0"
          style="width:48px;padding:3px 5px;text-align:center;font-family:inherit;font-size:12px;
                 border:1px solid ${isCustom?'var(--turmeric)':'var(--line)'};border-radius:6px;">
      </div>
    </div>`;
  });

  return `<div class="panel" style="background:#fdfbf6;">
    <div class="grid2" style="margin-bottom:12px;">
      <div class="field"><label>ชื่อแพค</label>
        <input type="text" class="pkg-f-name" value="${escapeHtml(pkg.name)}" placeholder="เช่น Package S">
      </div>
      <div class="field"><label>Size</label>
        <select class="pkg-f-size">
          ${['S','M','L'].map(s=>`<option value="${s}"${pkg.size===s?' selected':''}>${s}</option>`).join('')}
        </select>
      </div>
      <div class="field"><label>จำนวนกล่อง</label>
        <input type="number" class="pkg-f-qty" value="${pkg.qty}" min="1">
      </div>
      <div class="field"><label>ราคาฐาน (฿)</label>
        <input type="number" class="pkg-f-price" value="${pkg.base_price}" min="0">
      </div>
    </div>
    <div class="field" style="margin-bottom:10px;"><label>คำอธิบาย</label>
      <input type="text" class="pkg-f-desc" value="${escapeHtml(pkg.description||'')}"
        placeholder="เช่น เลือก 9 กล่องจากเมนู online">
    </div>
    <label style="display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:18px;cursor:pointer;">
      <input type="checkbox" class="pkg-f-active" ${pkg.is_active?'checked':''}> เปิดขายแพคนี้
    </label>
    <div style="display:flex;align-items:center;justify-content:space-between;
         margin-bottom:8px;flex-wrap:wrap;gap:6px;">
      <span style="font-size:13px;font-weight:600;color:var(--forest);">เมนูในแพคนี้</span>
      <span id="pkgCheckedCount" style="font-size:12px;color:var(--ink-soft);">
        ${checkedCount} เมนูถูกเลือก · active ทั้งหมด ${activeRecipes.length} รายการ
      </span>
    </div>
    <input type="text" id="pkgMenuSearchInput" value="${escapeHtml(state.pkgMenuSearch||'')}"
      placeholder="🔍 ค้นหาชื่อเมนูหรือโค้ด..."
      style="width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:8px;
             font-size:13.5px;font-family:inherit;margin-bottom:8px;">
    <div id="pkgMenuList"
      style="max-height:380px;overflow-y:auto;border:1px solid var(--line);border-radius:8px;background:#fff;">
      ${rows || `<div class="empty" style="padding:20px;">ไม่พบเมนูที่ตรงกัน</div>`}
    </div>
    <div class="panel-actions" style="margin-top:12px;">
      <button class="btn btn-primary pkg-save-btn" data-pkg-id="${pkg.id}">💾 บันทึก</button>
      <button class="btn btn-ghost btn-sm" id="closePkgEditorBtn">ยกเลิก</button>
      <button class="btn btn-warn btn-sm pkg-delete-btn" data-pkg-id="${pkg.id}"
        style="margin-left:auto;">🗑 ลบแพค</button>
    </div>
  </div>`;
}

function attachPackagesHandlers(){
  // Toggle open/close card
  document.querySelectorAll('.pkg-row-hd').forEach(row => {
    row.onclick = () => {
      const pid = row.dataset.pkgId;
      state.openPkgId      = state.openPkgId === pid ? null : pid;
      state._pkgEditorInit = null;
      render();
    };
  });

  // New package
  const newPkgBtn = document.getElementById('newPkgBtn');
  if(newPkgBtn) newPkgBtn.onclick = async () => {
    const sb = getSB(); if(!sb) return;
    const { data, error } = await sb.from('packages').insert({
      name: 'Package ใหม่', size: 'S', qty: 9, base_price: 990,
      description: '', is_active: false, display_order: state.packages.length
    }).select().single();
    if(error){ showToast('สร้างแพคไม่สำเร็จ'); return; }
    state.packages.push(data);
    state.pkgItems[data.id] = [];
    state.openPkgId      = data.id;
    state._pkgEditorInit = null;
    logActivity('package', `สร้างแพค "${data.name}"`);
    render();
  };

  // Close editor (cancel)
  const closePkgEditorBtn = document.getElementById('closePkgEditorBtn');
  if(closePkgEditorBtn) closePkgEditorBtn.onclick = () => {
    state.openPkgId      = null;
    state._pkgEditorInit = null;
    render();
  };

  // Search — filter in-place, no render
  const pkgSearch = document.getElementById('pkgMenuSearchInput');
  if(pkgSearch){
    pkgSearch.onclick  = e => e.stopPropagation();
    pkgSearch.oninput  = () => {
      const q = pkgSearch.value.trim().toLowerCase();
      state.pkgMenuSearch = pkgSearch.value;
      document.querySelectorAll('.pkg-menu-row').forEach(row => {
        row.style.display = (!q || row.dataset.sn.includes(q) || row.dataset.sc.includes(q)) ? '' : 'none';
      });
    };
  }

  // Checkbox toggle — DOM inline, no render
  document.querySelectorAll('.pkg-item-chk').forEach(chk => {
    chk.onclick  = e => e.stopPropagation();
    chk.onchange = () => {
      const sku    = chk.dataset.sku;
      const row    = chk.closest('.pkg-menu-row');
      const ctrl   = row.querySelector('.pkg-price-ctrl');
      const nameEl = row.querySelector('.pkg-item-name');
      if(chk.checked){
        state.editingPkgItems[sku] = 0;
        row.style.background = 'var(--forest-soft)';
        if(ctrl)   { ctrl.style.opacity = '1'; ctrl.style.pointerEvents = ''; }
        if(nameEl) nameEl.style.color = '';
        row.querySelectorAll('.pkg-q-price').forEach(b => {
          const active = b.dataset.price === '0';
          b.style.background  = active ? 'var(--forest)' : 'var(--surface-2)';
          b.style.color       = active ? '#fff' : 'var(--ink)';
          b.style.borderColor = active ? 'var(--forest)' : 'var(--line)';
        });
        row.querySelector('.pkg-custom-price').value = '';
      } else {
        delete state.editingPkgItems[sku];
        row.style.background = '';
        if(ctrl)   { ctrl.style.opacity = '0.3'; ctrl.style.pointerEvents = 'none'; }
        if(nameEl) nameEl.style.color = 'var(--ink-soft)';
        row.querySelectorAll('.pkg-q-price').forEach(b => {
          b.style.background = 'var(--surface-2)';
          b.style.color = 'var(--ink)';
          b.style.borderColor = 'var(--line)';
        });
      }
      const countEl = document.getElementById('pkgCheckedCount');
      if(countEl) countEl.textContent = `${Object.keys(state.editingPkgItems).length} เมนูถูกเลือก`;
    };
  });

  // Quick price buttons (+0 / +40) — DOM inline, no render
  document.querySelectorAll('.pkg-q-price').forEach(btn => {
    btn.onclick = e => {
      e.stopPropagation();
      const sku   = btn.dataset.sku;
      if(!Object.prototype.hasOwnProperty.call(state.editingPkgItems, sku)) return;
      const price = parseInt(btn.dataset.price) || 0;
      state.editingPkgItems[sku] = price;
      const row     = btn.closest('.pkg-menu-row');
      const isForty = price === 40;
      row.querySelectorAll('.pkg-q-price').forEach(b => {
        const a  = parseInt(b.dataset.price) === price;
        const ac = isForty ? 'var(--turmeric)' : 'var(--forest)';
        b.style.background  = a ? ac : 'var(--surface-2)';
        b.style.color       = a ? '#fff' : 'var(--ink)';
        b.style.borderColor = a ? ac : 'var(--line)';
      });
      const ci = row.querySelector('.pkg-custom-price');
      if(ci){ ci.value = ''; ci.style.borderColor = 'var(--line)'; }
    };
  });

  // Custom price input — DOM inline, no render
  document.querySelectorAll('.pkg-custom-price').forEach(inp => {
    inp.onclick  = e => e.stopPropagation();
    inp.oninput  = () => {
      const sku = inp.dataset.sku;
      if(!Object.prototype.hasOwnProperty.call(state.editingPkgItems, sku)) return;
      const val = parseFloat(inp.value);
      if(!isNaN(val) && val >= 0){
        state.editingPkgItems[sku] = val;
        const row = inp.closest('.pkg-menu-row');
        row.querySelectorAll('.pkg-q-price').forEach(b => {
          b.style.background = 'var(--surface-2)';
          b.style.color = 'var(--ink)';
          b.style.borderColor = 'var(--line)';
        });
        inp.style.borderColor = 'var(--turmeric)';
      }
    };
  });

  // Save package
  document.querySelectorAll('.pkg-save-btn').forEach(btn => {
    btn.onclick = async () => {
      if(!requireUser()) return;
      const pkgId  = btn.dataset.pkgId;
      const panel  = btn.closest('.panel');
      const name   = panel.querySelector('.pkg-f-name').value.trim();
      const size   = panel.querySelector('.pkg-f-size').value;
      const qty    = parseInt(panel.querySelector('.pkg-f-qty').value) || 1;
      const price  = parseInt(panel.querySelector('.pkg-f-price').value) || 0;
      const desc   = panel.querySelector('.pkg-f-desc').value.trim();
      const active = panel.querySelector('.pkg-f-active').checked;
      if(!name){ showToast('กรุณาใส่ชื่อแพค'); return; }
      btn.disabled = true;
      btn.textContent = 'กำลังบันทึก...';
      try {
        const sb = getSB(); if(!sb) throw new Error('no sb');
        const { error: pkgErr } = await sb.from('packages').update({
          name, size, qty, base_price: price,
          description: desc, is_active: active,
          updated_at: new Date().toISOString()
        }).eq('id', pkgId);
        if(pkgErr) throw pkgErr;
        const { error: delErr } = await sb.from('package_items').delete().eq('package_id', pkgId);
        if(delErr) throw delErr;
        const toInsert = Object.entries(state.editingPkgItems).map(([sku, extra_price]) => ({
          package_id: pkgId, sku, extra_price: Math.round(Number(extra_price)) || 0
        }));
        if(toInsert.length){
          const { error: insErr } = await sb.from('package_items').insert(toInsert);
          if(insErr) throw insErr;
        }
        const pkg = state.packages.find(p => p.id === pkgId);
        if(pkg) Object.assign(pkg, { name, size, qty, base_price: price, description: desc, is_active: active });
        state.pkgItems[pkgId] = toInsert;
        state.openPkgId      = null;
        state._pkgEditorInit = null;
        logActivity('package', `แก้ไขแพค "${name}"`);
        render();
        showToast(`บันทึก "${name}" แล้ว ✓`);
      } catch(e){
        showToast('บันทึกไม่สำเร็จ: ' + (e.message || ''));
        btn.disabled = false;
        btn.textContent = '💾 บันทึก';
      }
    };
  });

  // Delete package
  document.querySelectorAll('.pkg-delete-btn').forEach(btn => {
    btn.onclick = () => {
      if(!requireUser()) return;
      const pkgId = btn.dataset.pkgId;
      const pkg   = state.packages.find(p => p.id === pkgId);
      showConfirm(`ลบแพค "${pkg?.name||''}" ถาวร? เมนูในแพคทั้งหมดจะถูกลบด้วย`, async () => {
        const sb = getSB(); if(!sb) return;
        const { error } = await sb.from('packages').delete().eq('id', pkgId);
        if(error){ showToast('ลบไม่สำเร็จ'); return; }
        state.packages       = state.packages.filter(p => p.id !== pkgId);
        delete state.pkgItems[pkgId];
        state.openPkgId      = null;
        state._pkgEditorInit = null;
        logActivity('package', `ลบแพค "${pkg?.name||''}"`);
        render();
        showToast('ลบแพคแล้ว');
      });
    };
  });
}

async function init(){
  // ── 4 SEQUENTIAL READS (was 9, was 16) ────────────────────────────────────
  // Large mutable data (separate keys so individual persists stay cheap)
  const rec      = await getStored('recipes',     true);
  const ing      = await getStored('ingredients', true);
  // All config/small data in one key
  const cfg      = await getStored('appConfig',   true);
  let lastName; try{ lastName = localStorage.getItem('lastNickname'); }catch(e){ lastName=null; }

  // ── ⚙️ Global Settings (ตั้งค่าจาก Operation Hub → ตั้งค่า, แชร์กับ KQ) ──
  try{
    const gs = await getStored('globalSettings', true);
    state.dbMenuPageSize = (gs && gs.dbMenuPageSize != null) ? gs.dbMenuPageSize : 30;
  }catch(e){ state.dbMenuPageSize = 30; }

  // ── UNPACK CONFIG (with migration from old separate keys) ──────────────────
  let cats, sups, plan, appSettings, initFlags, mpData, mpDates;
  if(cfg){
    cats        = cfg.categories;
    sups        = cfg.suppliers;
    plan        = cfg.planItems;
    appSettings = cfg.appSettings;
    initFlags   = cfg.initFlags || {};
    mpData      = cfg.mealPlanData  || {};
    mpDates     = cfg.mealPlanDates || [];
  } else {
    // One-time migration: read all old individual keys
    const [c,s,p,as,fl,mp,md,mb] = [
      await getStored('categories',  true),
      await getStored('suppliers',   true),
      await getStored('planItems',   true),
      await getStored('appSettings', true),
      await getStored('initFlags',   true),
      await getStored('mealPlanData',  true),
      await getStored('mealPlanDates', true),
      await getStored('mealPlanBundle',true),
    ];
    cats = c; sups = s; plan = p;
    appSettings = as || {};
    initFlags   = fl || {};
    mpData  = mp || (mb&&mb.mpData)  || {};
    mpDates = md || (mb&&mb.mpDates) || [];
    // Also migrate even older individual flag keys into initFlags
    if(!initFlags.ratingMigratedV2)  initFlags.ratingMigratedV2  = await getStored('ratingMigratedV2', true);
    // Also migrate even older appSettings keys
    if(!appSettings.pinModeEnabled !== undefined || !appSettings.hideNutritionCols !== undefined){
      if(appSettings.pinModeEnabled===undefined) appSettings.pinModeEnabled = await getStored('pinModeEnabled',true);
      if(appSettings.hideNutritionCols===undefined) appSettings.hideNutritionCols = await getStored('hideNutritionCols',true);
    }
  }

  // ── APPLY DATA ─────────────────────────────────────────────────────────────
  const catsData = cats || DEFAULT_CATEGORIES.map(c=>Object.assign({}, c));
  const supsData = sups || DEFAULT_SUPPLIERS.map(s=>Object.assign({}, s));
  const recData  = rec  || JSON.parse(JSON.stringify(SEED_RECIPES));
  const ingData  = ing  || [];
  const planData = plan || [];

  let pinOrderSeq = 0;
  recData.forEach(r=>{
    if(!r.categories){ r.categories = r.product_line ? [r.product_line] : []; }
    if('product_line' in r) delete r.product_line;
    if(r.rating===undefined) r.rating = 2;
    if(r.quickNote===undefined) r.quickNote = '';
    if(r.pinned===undefined) r.pinned = false;
    if(r.pinOrder===undefined) r.pinOrder = (pinOrderSeq++);
    if(r.pinSubCode===undefined) r.pinSubCode = null;
    if(r.stock===undefined || r.stock===null) r.stock = 0;
    if(r.available_online===undefined) r.available_online = false;
    if(r.no_morning===undefined) r.no_morning = false;
    if(r.he_group===undefined) r.he_group = '';
    if(r.description===undefined) r.description = '';
    if(r.image_urls===undefined) r.image_urls = r.image_url ? [r.image_url] : [];
    if(r.selling_price===undefined) r.selling_price = 0;
    if(!r.parts){
      r.parts = [{ label:'', instructions: r.instructions||'', lines: r.lines||[] }];
      delete r.lines; delete r.instructions;
    }
  });
  ingData.forEach(i=>{
    if(!i.type) i.type = 'ingredient';
    if(i.ingCategory===undefined) i.ingCategory = guessIngCategory(i);
    if(i.stock===undefined || i.stock===null) i.stock = 0;
    if(i.market_price_kg===undefined){ i.market_price_kg = (i.unit==='g' && i.cost_per_unit) ? Math.round(i.cost_per_unit*1000*100)/100 : 0; }
    if(!i.suppliers) i.suppliers = [];
    if(i.defaultSupplier===undefined) i.defaultSupplier = null;
  });

  state.categories = catsData; state.recipes = recData; state.ingredients = ingData;

  state.suppliers = supsData; state.planItems = planData;
  if(lastName) { state.currentUser = lastName; state.nameInputDraft = lastName; }
  state.pinModeEnabled    = !!(appSettings && appSettings.pinModeEnabled);
  state.hideNutritionCols = (appSettings && appSettings.hideNutritionCols!=null) ? !!appSettings.hideNutritionCols : true;
  state.mpSlots    = (appSettings && appSettings.mpSlots && appSettings.mpSlots.length) ? appSettings.mpSlots : ['ชุดที่ 1'];
  state.mpViewDays = (appSettings && appSettings.mpViewDays) || 7;

  state.mpData  = mpData;
  state.mpDates = [...new Set([...mpDates, ...Object.keys(mpData)])].sort();

  // ── ONE-TIME SEED IMPORTS / MIGRATION ─────────────────────────────────────
  let largeDataChanged = !rec || !cats || !sups;
  if(!initFlags.ratingMigratedV2){  migrateRatingV2(); largeDataChanged = true; }
  // Auto-classify all ingredients (emoji + category + supplier) — runs once
  if(!initFlags.ingClassifiedV1){
    state.ingredients.forEach(i=>{
      const cls = autoClassifyIngredient(i.name);
      if(!i.ingCategory || i.ingCategory==='') i.ingCategory = cls.cat;
      if(!i.ingEmoji) i.ingEmoji = cls.emoji;
      if(!i.defaultSupplier && !i.suppliers?.length){
        const sup = state.suppliers.find(s=>s.key===cls.sup);
        if(sup){ i.suppliers=[cls.sup]; i.defaultSupplier=cls.sup; }
      }
    });
    largeDataChanged = true;
  }

  // ── WRITE BACK ────────────────────────────────────────────────────────────
  // Always write appConfig (small, contains all config + plan + mealplan)
  await setStored('appConfig', {
    categories:   state.categories,
    suppliers:    state.suppliers,
    planItems:    state.planItems,
    mealPlanData: state.mpData,
    mealPlanDates:state.mpDates,
    appSettings: {
      pinModeEnabled:   state.pinModeEnabled,
      hideNutritionCols:state.hideNutritionCols,
      mpSlots:          state.mpSlots,
      mpViewDays:       state.mpViewDays,
    },
    initFlags: {
      ratingMigratedV2:  true,
      ingClassifiedV1:   true,
    },
  }, true);
  // Large data: only write on first load or after migration
  if(largeDataChanged){
    await setStored('recipes',     state.recipes,     true);
    await setStored('ingredients', state.ingredients, true);
  }
  await loadActivityLog();
  render();
}

function migrateRatingV2(){
  state.recipes.forEach(r=>{
    let v = r.rating;
    if(v===undefined || v===null) v = 0;
    if(v<=0) r.rating = 2;
    else if(v<=2) r.rating = 1;
    else if(v===3) r.rating = 2;
    else r.rating = 3;
  });
}
function _buildAppConfig(){
  return {
    categories:   state.categories,

// Debounced render — prevents re-render storm from rapid clicks
let _renderTimer = null;
function render(immediate){
  if(immediate){ _doRender(true); return; } // force=true bypasses keyboard check
  clearTimeout(_renderTimer);
  _renderTimer = setTimeout(()=>_doRender(false), 80);
}
function _doRender(force){
  // ป้องกัน keyboard เด้ง: ถ้า user พิมพ์อยู่ + ไม่ใช่ force render → skip
  if(!force){
    const active = document.activeElement;
    if(active && (active.tagName==='INPUT'||active.tagName==='TEXTAREA')){
      const safeIds = ['db-search','sortModeSelect','showRetired','showRetiredChk','searchInput','ingSearch','custTierSel','custSortSel'];
      const inPanel = active.closest && active.closest('[data-edit]');
      if(!inPanel && !safeIds.includes(active.id)){
        if(!_renderPending){
          _renderPending = true;
          active.addEventListener('blur', ()=>{ _renderPending=false; _doRender(false); }, {once:true});
        }
        return;
      }
    }
  }
  _renderPending = false;
  const app = document.getElementById('app');
  const who = document.getElementById('whoami');
  // บันทึก scroll + focus ก่อน rebuild DOM
  const savedScrollTop = app.scrollTop;
  const savedScrollY   = window.scrollY;
  const focusedId      = document.activeElement?.id || null;
  const focusedSel     = (focusedId && document.activeElement.setSelectionRange)
    ? document.activeElement.selectionStart : null;
  // บันทึก ingredient input focus (ไม่มี id ต้องใช้ position)
  let ingFocus = null;
  const focusedEl = document.activeElement;
  if(focusedEl && focusedEl.closest){
    const ingRow = focusedEl.closest('.ing-line');
    if(ingRow){
      ingFocus = {
        partIdx: ingRow.dataset.partIdx,
        lineIdx: ingRow.dataset.idx,
        field: focusedEl.classList.contains('ln-name')?'ln-name':
               focusedEl.classList.contains('ln-qty') ?'ln-qty':'ln-unit',
        sel: focusedEl.selectionStart||0
      };
    }
  }
  who.innerHTML = renderWhoami();
  document.getElementById('actLogWrap').innerHTML = renderActivityLogBar();
  const actLogToggleBtn = document.getElementById('actLogToggleBtn');
  if(actLogToggleBtn) actLogToggleBtn.onclick = ()=>{ state.showActivityLog = !state.showActivityLog; render(); };
  document.querySelector('.tabs').style.display = 'flex';
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===state.tab));
  document.getElementById('fabNew').style.display = state.tab==='recipes' ? 'block':'none';
  if(state.tab==='recipes') app.innerHTML = renderRecipesTab();
  else if(state.tab==='ingredients') app.innerHTML = renderIngredientsTab();
  else if(state.tab==='plan') app.innerHTML = renderPlanTab();
  else if(state.tab==='mealplan') app.innerHTML = renderMealPlanTab();
  else if(state.tab==='packages') app.innerHTML = renderPackagesTab();
  app.innerHTML += `<datalist id="ingList">${state.ingredients.map(i=>`<option value="${escapeHtml(i.name)}">`).join('')}</datalist>`;
  if(state.showCategoryManager){ app.innerHTML += renderCategoryManager(); }
  if(state.showSupplierManager){ app.innerHTML += renderSupplierManager(); }
  if(state.showNameGate){ app.innerHTML += renderNameGateModal(); }
  attachHandlers();
  attachWhoamiHandlers();
  if(state.tab==='mealplan') attachMealPlanHandlers();
  if(state.tab==='packages') attachPackagesHandlers();
  if(state.showCategoryManager) attachCategoryManagerHandlers();
  if(state.showSupplierManager) attachSupplierManagerHandlers();
  if(state.showNameGate) attachNameGateModalHandlers();
  // คืน scroll position หลัง rebuild (ไม่ให้หน้ากระโดด)
  app.scrollTop = savedScrollTop;
  if(savedScrollY) window.scrollTo(0, savedScrollY);
  // คืน focus: ingredient input ก่อน (ใช้ position) แล้วค่อย fallback id
  if(ingFocus){
    const row = document.querySelector(`.ing-line[data-part-idx="${ingFocus.partIdx}"][data-idx="${ingFocus.lineIdx}"]`);
    if(row){
      const el = row.querySelector('.'+ingFocus.field);
      if(el){ el.focus(); if(el.setSelectionRange) el.setSelectionRange(ingFocus.sel, ingFocus.sel); }
    }
  } else if(focusedId){
    const el = document.getElementById(focusedId);
    if(el){ el.focus(); if(focusedSel!==null && el.setSelectionRange) el.setSelectionRange(focusedSel,focusedSel); }
  }
}

// ══════════════════════════════════════
// 📜 ACTIVITY LOG — batch ต่อ session+ประเภท กันสแปม (คลิก +10 สต็อกรัวๆ = แถวเดียว รวมยอด)
// session_id สุ่มใหม่ทุกครั้งที่เปิดหน้า (1 รอบเปิดเว็บ = 1 session) — เขียนจริงหลัง debounce 3 วิ
// ══════════════════════════════════════
const _actLogSessionId = (crypto.randomUUID ? crypto.randomUUID() : ('s'+Date.now()+Math.random().toString(36).slice(2)));
let _actLogCache = {};      // key: action_type -> {id, count, items:{label:delta}}
let _actLogFlushTimers = {};
let activityLogRows = [];
const ACT_LOG_ICON = {stock:'📦', category:'🏷️', package:'🎁', he_layout:'🏠', mp_offer:'🥗'};
const ACT_LOG_SOURCE_LABEL = {db:'DB', he:'Home Editor', oh:'Operation Hub'};

function logActivity(actionType, itemLabel, delta){
  let cache = _actLogCache[actionType];
  if(!cache) cache = _actLogCache[actionType] = {id:null, count:0, items:{}};
  cache.count++;
  if(itemLabel){ cache.items[itemLabel] = (cache.items[itemLabel]||0) + (typeof delta==='number' ? delta : 1); }
  clearTimeout(_actLogFlushTimers[actionType]);
  _actLogFlushTimers[actionType] = setTimeout(()=>_actLogFlush(actionType), 3000);
}
function buildActLogSummary(actionType, cache){
  const entries = Object.entries(cache.items);
  const fmt = entries.map(([k,v])=>{
    if(actionType==='stock') return `${k} ${v>0?'+':''}${v}`;
    return v>1 ? `${k} ×${v}` : k;
  });
  const shown = fmt.slice(0,5).join(', ');
  const more = fmt.length>5 ? ` +อีก ${fmt.length-5} รายการ` : '';
  return shown + more;
}
async function _actLogFlush(actionType){
  const cache = _actLogCache[actionType]; if(!cache) return;
  const sb = getSB(); if(!sb) return;
  const actor = state.currentUser || 'ไม่ทราบชื่อ';
  const summary = buildActLogSummary(actionType, cache);
  try{
    if(!cache.id){
      const {data,error} = await sb.from('activity_log').insert({
        session_id:_actLogSessionId, actor, source:'db', action_type:actionType,
        summary, detail:{items:cache.items, count:cache.count}
      }).select().single();
      if(error) throw error;
      cache.id = data.id;
    } else {
      await sb.from('activity_log').update({
        summary, detail:{items:cache.items, count:cache.count}, updated_at:new Date().toISOString()
      }).eq('id', cache.id);
    }
    await loadActivityLog();
    const wrap = document.getElementById('actLogWrap');
    if(wrap) wrap.innerHTML = renderActivityLogBar();
  }catch(e){ console.error('actLogFlush:',e); }
}
async function loadActivityLog(){
  const sb = getSB(); if(!sb) return;
  try{
    const {data,error} = await sb.from('activity_log').select('*').order('updated_at',{ascending:false}).limit(50);
    if(error) throw error;
    activityLogRows = data||[];
  }catch(e){ console.error('loadActivityLog:',e); }
}
function timeAgo(iso){
  const mins = Math.floor((Date.now()-new Date(iso).getTime())/60000);
  if(mins<1) return 'เมื่อกี้';
  if(mins<60) return mins+' นาทีที่แล้ว';
  const hrs = Math.floor(mins/60);
  if(hrs<24) return hrs+' ชม.ที่แล้ว';
  return Math.floor(hrs/24)+' วันที่แล้ว';
}
function renderActivityLogBar(){
  const latest = activityLogRows[0];
  const latestText = latest
    ? `${ACT_LOG_ICON[latest.action_type]||'📝'} <b>${escapeHtml(latest.actor)}</b> ${escapeHtml(latest.summary)} <span class="act-log-time">· ${timeAgo(latest.updated_at)}</span>`
    : 'ยังไม่มีประวัติการเปลี่ยนแปลง';
  return `<div class="act-log-bar">
    <span class="act-log-latest">${latestText}</span>

function renderActivityLogPanel(){
  if(!activityLogRows.length) return `<div class="act-log-panel"><div class="empty" style="padding:16px;">ยังไม่มีประวัติการเปลี่ยนแปลง</div></div>`;

    allCats.forEach(cat=>{
      const label = getCategory(cat)?.label || cat;
      const cnt = state.recipes.filter(r=>(r.categories||[]).includes(cat)&&(r.status==='active'||state.showRetired)).length;
      if(!cnt) return;
      html += `<button class="cat-tab-db${state.activeCatTab===cat?' on':''}" onclick="setCatTab('${escapeHtml(cat)}')">${escapeHtml(label)} <span class="cnt">${cnt}</span></button>`;
    });
    html += '</div>';
  }

  html += `<div class="toolbar">
    <div class="search-box"><input type="text" id="searchInput" placeholder="ค้นหาชื่อเมนูหรือโค้ด..." value="${escapeHtml(state.search)}"></div>
    ${renderCategoryPicker(state.categoryFilter, 'filter')}
    <div style="display:flex;align-items:center;gap:5px;flex-shrink:0;">
      <span style="font-size:11px;font-weight:600;color:var(--ink-soft);white-space:nowrap;letter-spacing:.5px;text-transform:uppercase;">จัดเรียง</span>
      <select class="sort-sel" id="sortModeSelect">
        <option value="category" ${state.sortMode==='category'?'selected':''}>หมวดหมู่ (ออนไลน์ก่อน)</option>
        <option value="code_asc" ${state.sortMode==='code_asc'?'selected':''}>โค้ด A→Z</option>
        <option value="name_asc" ${state.sortMode==='name_asc'?'selected':''}>ชื่อ ก→ฮ</option>
        <option value="stock_asc" ${state.sortMode==='stock_asc'?'selected':''}>สต็อก ↑</option>
        <option value="stock_desc" ${state.sortMode==='stock_desc'?'selected':''}>สต็อก ↓</option>
      </select>
    </div>
    <div class="rating-filter-wrap"><span>คะแนนขั้นต่ำ</span>${renderRatingDots3(state.ratingFilter, 'filter')}</div>
    <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink-soft);">
      <input type="checkbox" id="showRetired" ${state.showRetired?'checked':''}> แสดงเมนูที่เลิกขาย
    </label>
  </div>`;

  const q = state.search.trim().toLowerCase();
  let filtered = state.recipes.filter(r=>{
    // Category tab pre-filter (fastest) — ใช้ r.categories (array) ไม่ใช่ r.category (เดี่ยว)
    // panel ที่เปิดอยู่ไม่ต้องหายตอนแก้หมวดของตัวเอง (เฉพาะเช็คหมวดเท่านั้น — สลับแท็บจริงจะปิด panel ให้เองใน setCatTab)
    if(state.activeCatTab === '__ptt__'){ if(!r.pinned && r.id!==state.openId) return false; }
    else if(state.activeCatTab !== '__all__'){ if(!(r.categories||[]).includes(state.activeCatTab) && r.id!==state.openId) return false; }
    if(!state.showRetired && r.status!=='active') return false;
    if(state.showOnlineOnly && !r.available_online) return false;  // กรองเฉพาะออนไลน์
    if(state.categoryFilter.length && !(r.categories||[]).some(c=>state.categoryFilter.includes(c))) return false;
    if(state.ratingFilter && (r.rating||0) < state.ratingFilter) return false;
    if(q && !(r.name.toLowerCase().includes(q) || (r.code||'').toLowerCase().includes(q))) return false;
    return true;
  });

  if(filtered.length===0){
    let otherHint = '';
    if(q && state.categoryFilter.length){
      const inOther = state.recipes.filter(r=>(r.status==='active'||!r.status)&&(r.name.toLowerCase().includes(q)||(r.code||'').toLowerCase().includes(q)));
      if(inOther.length) otherHint = ` <span style="font-size:12px;color:var(--forest);cursor:pointer;text-decoration:underline;" onclick="state.categoryFilter=[];render()">💡 พบ ${inOther.length} เมนูในหมวดอื่น — คลิกเพื่อดู</span>`;
    }
    html += `<div class="empty">ไม่พบเมนูที่ตรงกับเงื่อนไข ลองล้างคำค้นหรือกด "+ เมนูใหม่"${otherHint}</div>`;
    return html;
  }

  // PTT section แสดงเสมอเมื่ออยู่ใน PTT tab หรือเปิด pin mode
  const showPTT = state.pinModeEnabled || state.activeCatTab === '__ptt__';
  const pinnedItems = showPTT ? filtered.filter(r=>r.pinned).sort((a,b)=>(a.pinOrder||0)-(b.pinOrder||0)) : [];
  const pinnedIds = new Set(pinnedItems.map(r=>r.id));
  let restItems = filtered.filter(r=>!pinnedIds.has(r.id));

  // ── จำกัดจำนวนที่แสดงต่อหน้า (ตั้งค่าที่ ⚙️ ตั้งค่า ใน Operation Hub) ──
  const pageSize = state.dbMenuPageSize || 0;
  const restTotal = restItems.length;
  let pageLimitNotice = '';
  if(pageSize > 0 && restTotal > pageSize){
    restItems = restItems.slice(0, pageSize);
    pageLimitNotice = `<div class="empty" style="padding:10px 14px;font-size:12.5px;text-align:left;background:var(--surface);border-radius:8px;margin-bottom:10px;">
      แสดง ${pageSize} จาก ${restTotal} รายการ — ค้นหาหรือกดแท็บหมวดหมู่เพื่อดูรายการที่เหลือ
      <span style="color:var(--ink-soft);">(ปรับจำนวนต่อหน้าได้ที่ Operation Hub → ⚙️ ตั้งค่า)</span>
    </div>`;
  }

  // Bulk bar — shows as soon as bulk mode is on; no need to select anything first
  if(state.bulkMode){
    const sel = state.selectedIds.size;
    const total = filtered.length;
    const allSelected = total>0 && filtered.every(r=>state.selectedIds.has(r.id));
    const someSelected = sel>0 && !allSelected;
    html = `<div class="bulk-bar" id="bulkBar">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;flex-shrink:0;">
        <input type="checkbox" id="bulkMasterChk" ${allSelected?'checked':''} ${someSelected?'data-indeterminate="true"':''} style="width:17px;height:17px;cursor:pointer;">
        <span>${sel>0?`เลือก <b>${sel}</b> / ${total} รายการ`:'เลือก 0 / '+total+' รายการ'}</span>
      </label>
      ${sel>0?`
        <button class="btn btn-ghost btn-sm" id="bulkDeselectAll">✕ ยกเลิก</button>
        <div style="width:1px;background:rgba(255,255,255,.3);height:18px;flex-shrink:0;"></div>
        <button class="btn btn-ghost btn-sm" id="bulkOpenSell">✓ เปิดขาย</button>
        <button class="btn btn-ghost btn-sm" id="bulkCloseSell">✗ ปิดขาย</button>
        <button class="btn btn-ghost btn-sm" id="bulkPin">📌 Pin</button>
        <button class="btn btn-ghost btn-sm" id="bulkUnpin">Unpin</button>
      `:'<span style="font-size:12px;opacity:.65;margin-left:4px;">ติ๊กรายการที่ต้องการ หรือกด checkbox ซ้ายเพื่อเลือกทั้งหมด</span>'}
    </div>` + html;
  }

  if(pinnedItems.length){
    html += `<div class="line-group ptt-group"><h2 class="ptt-head"><span class="ptt-pill">PTT</span>ปักหมุดไว้บนสุด (${pinnedItems.length}) <span style="font-size:11px;color:var(--ink-soft);font-weight:400;">— ลากเพื่อเรียงลำดับ</span></h2>`;
    pinnedItems.forEach((r,idx)=>{ html += renderRecipeCard(r, computeTotals(r), {pinIdx:idx, pinTotal:pinnedItems.length, draggable:false}); });
    html += `</div>`;
  }

  if(restItems.length===0) return html;

  html += pageLimitNotice;

  if(state.sortMode && state.sortMode!=='category'){
    let sorted = [...restItems];
    if(state.sortMode==='online_first'){
      // PTT already shown above; within rest: online → offline active → retired
      // also hide duplicates (same name) that are already in PTT
      const pttNames = new Set(pinnedItems.map(r=>(r.name||'').trim().toLowerCase()));
      const onlineItems   = sorted.filter(r=>r.available_online && r.status==='active' && !pttNames.has((r.name||'').trim().toLowerCase()));
      const offlineItems  = sorted.filter(r=>!r.available_online && r.status==='active' && !pttNames.has((r.name||'').trim().toLowerCase()));
      const retiredItems  = sorted.filter(r=>r.status!=='active');
      const _collOnline  = !q && state.collapsedCats['_online']  !== false;
      const _collOffline = !q && state.collapsedCats['_offline'] !== false;
      const _collRetired = !q && state.collapsedCats['_retired'] !== false;
      if(onlineItems.length){
        html += `<div class="line-group"><h2 onclick="toggleCatCollapse('_online')" style="cursor:pointer;user-select:none;display:flex;align-items:center;gap:7px;"><span style="font-size:12px;color:#666;display:inline-block;transform:${_collOnline?'rotate(-90deg)':'rotate(0deg)'};transition:transform .2s;">▼</span><span class="dot" style="background:var(--forest)"></span>🛒 ออนไลน์ (${onlineItems.length})</h2>`;
        if(!_collOnline) onlineItems.forEach(r=>{ html += renderRecipeCard(r, computeTotals(r)); });
        html += `</div>`;
      }
      if(offlineItems.length){
        html += `<div class="line-group"><h2 onclick="toggleCatCollapse('_offline')" style="cursor:pointer;user-select:none;display:flex;align-items:center;gap:7px;"><span style="font-size:12px;color:#666;display:inline-block;transform:${_collOffline?'rotate(-90deg)':'rotate(0deg)'};transition:transform .2s;">▼</span><span class="dot" style="background:var(--ink-soft)"></span>○ ออฟไลน์ (${offlineItems.length})</h2>`;
        if(!_collOffline) offlineItems.forEach(r=>{ html += renderRecipeCard(r, computeTotals(r)); });
        html += `</div>`;
      }
      if(retiredItems.length && state.showRetired){
        html += `<div class="line-group"><h2 onclick="toggleCatCollapse('_retired')" style="cursor:pointer;user-select:none;display:flex;align-items:center;gap:7px;"><span style="font-size:12px;color:#666;display:inline-block;transform:${_collRetired?'rotate(-90deg)':'rotate(0deg)'};transition:transform .2s;">▼</span><span class="dot" style="background:#ccc"></span>เลิกผลิต (${retiredItems.length})</h2>`;
        if(!_collRetired) retiredItems.forEach(r=>{ html += renderRecipeCard(r, computeTotals(r)); });
        html += `</div>`;
      }
      return html;
    }
    if(state.sortMode==='code_asc') sorted.sort((a,b)=>(a.code||'').localeCompare(b.code||''));
    else if(state.sortMode==='name_asc') sorted.sort((a,b)=>(a.name||'').localeCompare(b.name||'','th'));
    else if(state.sortMode==='stock_asc') sorted.sort((a,b)=>(a.stock||0)-(b.stock||0));
    else if(state.sortMode==='stock_desc') sorted.sort((a,b)=>(b.stock||0)-(a.stock||0));
    html += `<div class="line-group">`;
    sorted.forEach(r=>{ html += renderRecipeCard(r, computeTotals(r)); });
    html += `</div>`;
    return html;
  }

  const grouped = {};
  restItems.forEach(r=>{
    const cats = (r.categories&&r.categories.length) ? r.categories : ['_none'];
    cats.forEach(ck=>{ (grouped[ck] = grouped[ck]||[]).push(r); });
  });

  const orderedKeys = [...state.categories.map(c=>c.key), '_none'];
  orderedKeys.forEach(key=>{
    const items = grouped[key];
    if(!items || items.length===0) return;
    // ออนไลน์ขึ้นก่อนเสมอ ภายในแต่ละหมวด
    items.sort((a,b)=>{
      const aOn = a.available_online && a.status==='active' ? 0 : 1;
      const bOn = b.available_online && b.status==='active' ? 0 : 1;
      return aOn - bOn;
    });
    const cat = key==='_none' ? {label:'ไม่ระบุหมวด', color:'#999'} : getCategory(key);
    const _isColl = !q && state.collapsedCats[key] !== false;
    const safeKey = escapeHtml(key);
    const catContentId = 'cc-' + key.replace(/[^a-z0-9]/gi,'_');
    // ใส่ ID บน arrow + content div → toggle ด้วย CSS ไม่ต้อง re-render
    html += `<div class="line-group">
      <h2 onclick="toggleCatCollapse('${safeKey}')" style="cursor:pointer;user-select:none;display:flex;align-items:center;gap:7px;">
        <span id="arr-${catContentId}" style="font-size:12px;color:#666;display:inline-block;transform:${_isColl?'rotate(-90deg)':'rotate(0deg)'};transition:transform .2s;">▼</span>
        <span class="dot" style="background:${cat.color};flex-shrink:0;"></span>
        <span>${escapeHtml(cat.label)}</span>
        <span style="font-size:12px;color:#999;margin-left:2px">(${items.length})</span>
      </h2>
      <div id="${catContentId}" style="display:${_isColl?'none':'block'}">`;
    // Pagination สำหรับ uncategorized หรือ category ที่มีเยอะ
    const pageKey = 'page_'+key;
    const pageSize = 25;
    const page = state.catPages && state.catPages[pageKey] ? state.catPages[pageKey] : 1;
    const showItems = items.slice(0, page * pageSize);
    showItems.forEach(r=>{
      const tot = computeTotals(r);
      html += renderRecipeCard(r, tot);
    });
    if(items.length > showItems.length){
      html += `<div style="text-align:center;padding:12px"><button onclick="loadMoreCat('${safeKey}')" 
        style="padding:8px 20px;border-radius:20px;border:1.5px solid var(--forest);color:var(--forest);background:#fff;font-size:13px;font-weight:700;cursor:pointer">
        โหลดเพิ่ม ${Math.min(pageSize, items.length-showItems.length)} รายการ (เหลือ ${items.length-showItems.length})
      </button></div>`;
    }
    html += `</div></div>`;
  });
  return html;
}



function setCatTab(cat) {
  if(cat !== state.activeCatTab) state.openId = null;  // สลับแท็บจริง → ปิด panel ที่เปิดค้างไว้ (กันตามไปทุกหน้า)
  state.activeCatTab = cat;
  render();
}

function toggleCatCollapse(key){
  // undefined/true=collapsed → false (expand); false=expanded → true (collapse)
  state.collapsedCats[key] = state.collapsedCats[key] === false ? true : false;
  const isCollapsed = state.collapsedCats[key] !== false;
  // ← Direct DOM toggle: ไม่ต้อง re-render ทั้งหน้า
  const cid = 'cc-' + key.replace(/[^a-z0-9]/gi,'_');
  const content = document.getElementById(cid);
  const arrow   = document.getElementById('arr-' + cid);
  if(content) content.style.display = isCollapsed ? 'none' : 'block';
  if(arrow)   arrow.style.transform  = isCollapsed ? 'rotate(-90deg)' : 'rotate(0deg)';
}

function renderPttCard(r){
  const isOpen = state.openId === r.id;
  const isOnline = r.available_online && r.status === 'active';
  const subcode = r.pinSubCode || '';
  return `<div class="ptt-row" draggable="true" data-id="${r.id}" data-ptt="1">
    <span class="ptt-drag">⠿</span>
    <div class="ptt-online-dot ${isOnline?'on':'off'}" title="${isOnline?'ออนไลน์':'ออฟไลน์'}"></div>
    <span class="ptt-code">${escapeHtml(r.code||'-')}</span>
    <input type="text" class="ptt-sub subcode-input" data-id="${r.id}" value="${escapeHtml(subcode)}"
      placeholder="subcode" maxlength="12" style="width:64px">
    <span class="ptt-name" onclick="state.openId=(state.openId==='${r.id}'?null:'${r.id}'); render()">
      ${escapeHtml(r.name||'(ยังไม่มีชื่อ)')}
    </span>
    <div class="ptt-stock-ctrl">
      <button class="ptt-qb" onclick="chgStockFast('${r.id}',-1)">−</button>
      <input type="number" class="ptt-stock-num" data-stock-id="${r.id}"
        value="${r.stock||0}" oninput="saveStockInline('${r.id}',this.value)">
      <button class="ptt-qb plus" onclick="chgStockFast('${r.id}',1)">+</button>
    </div>
    <button class="ptt-open-btn" onclick="state.openId=(state.openId==='${r.id}'?null:'${r.id}'); render()">
      ${isOpen?'▲':'แก้ไข'}
    </button>
  </div>
  ${isOpen ? renderRecipeCard(r, computeTotals(r)) : ''}`;
}

function chgStockFast(id, delta){
  const r = state.recipes.find(r=>r.id===id);
  if(!r) return;
  r.stock = Math.max(0, (r.stock||0) + delta);
  // อัพเดท input ตรงๆ ไม่ re-render
  const inp = document.querySelector('[data-stock-id="'+id+'"]');
  if(inp) inp.value = r.stock;
  persistRecipesDebounced();
  syncStockDebounced(r);
}

function saveStockInline(id, val){
  const r = state.recipes.find(r=>r.id===id);
  if(!r) return;
  r.stock = Math.max(0, parseInt(val)||0);
  persistRecipesDebounced();
  syncStockDebounced(r);
}

// ดัน stock ขึ้น menu_items จริง (คนละที่กับ persistRecipes ที่เซฟแค่ local working copy)
// nat: null=ไม่จำกัด(ค่าเริ่มต้น) / 0=หมดสต็อกจริง / N=เหลือ N — ต้องมี code ถึง sync ได้ (เหมือน syncOnlineMenu)
let _stockSyncTimers = {};
function syncStockDebounced(r){
  if(!r || !r.code) return;
  clearTimeout(_stockSyncTimers[r.id]);
  _stockSyncTimers[r.id] = setTimeout(async () => {
    try{
      const sb = getSB();
      const { error } = await sb.from('menu_items').update({ stock_total: r.stock }).eq('code', r.code);
      if(error) throw error;
    }catch(e){ console.error('syncStockDebounced failed', e); showToast('⚠ ซิงค์สต็อกออนไลน์ไม่สำเร็จ'); }
  }, 500);
}

function renderRecipeCard(r, tot, pinInfo){
  const isOpen = state.openId === r.id;
  const chips = (r.categories||[]).map(ck=>{
    const c = getCategory(ck);
    return `<span class="cat-chip"><span class="cat-dot" style="background:${c?c.color:'#999'}"></span>${escapeHtml(c?c.label:ck)}</span>`;
  }).join('');
  const isSelling = r.status==='active';
  const isPinned = !!r.pinned;
  const stockVal = r.stock||0;
  const isDraggable = !!(pinInfo && pinInfo.draggable);
  const isSelected = state.bulkMode && state.selectedIds.has(r.id);

  let toggles = '';
  if(state.bulkMode){
    toggles += `<input type="checkbox" class="row-select-chk" data-id="${r.id}" ${isSelected?'checked':''}>`;
  }
  if(state.pinModeEnabled){
    toggles += `<label class="row-toggle-lbl" title="ปักหมุด PTT"><input type="checkbox" class="pin-toggle" data-id="${r.id}" ${isPinned?'checked':''}>📌</label>`;
    if(isDraggable){
      toggles += `<span class="ptt-drag-handle" title="ลากเพื่อเรียงลำดับ">⠿</span>`;
    }
  }
  toggles += `<label class="row-toggle-lbl" title="เปิดขายอยู่ตอนนี้"><input type="checkbox" class="selling-toggle" data-id="${r.id}" ${isSelling?'checked':''}>เปิดขาย</label>`;

  let row = `<div class="card${isPinned?' is-pinned':''}${isOpen?' is-open':''}" data-id="${r.id}">
    <div class="row recipe-row${!isSelling?' not-selling':''}" data-id="${r.id}">
      <div class="row-toggles">${toggles}</div>
      <div class="code-col">
        <span class="code-badge">${escapeHtml(r.code||'-')}</span>
        ${isPinned
          ? `<input type="text" class="subcode-input" data-id="${r.id}" value="${escapeHtml(r.pinSubCode||'')}" placeholder="sub code..." maxlength="12" title="Sub code">`
          : ''  /* subcode เฉพาะรายการที่ pin เท่านั้น */
        }
      </div>
      <div class="name-wrap">
        <div class="name-line">
          <span class="name">${escapeHtml(r.name||'(ไม่มีชื่อ)')}</span>
          ${chips ? `<div class="chip-row">${chips}</div>` : ''}
        </div>
        <div class="quick-row${!tot.complete?' incomplete':''}${isOpen?' hidden':''}">
          ${renderRatingDots3(r.rating===undefined?2:r.rating, 'row', r.id)}
          <input type="text" class="quick-note-input" data-id="${r.id}" placeholder="โน้ตสั้นๆ..." value="${escapeHtml(r.quickNote||'')}">
          <span class="quick-kcal">${!tot.complete ? '⚠ ขาด '+tot.unmatched+' วัตถุดิบ' : (tot.kcal>0 ? fmtNum(tot.kcal)+' kcal' : '—')}</span>
        </div>
      </div>
      <div class="stock-ctrl" data-id="${r.id}">
        <button type="button" class="stock-minus" data-id="${r.id}">−</button>
        <div><input type="number" class="stock-val" data-id="${r.id}" value="${stockVal}" step="1"><div class="stock-lbl">สต็อก</div></div>
        <button type="button" class="stock-plus" data-id="${r.id}">+</button>
        <button type="button" class="stock-plus10" data-id="${r.id}" title="เติมทีละ 10">+10</button>
      </div>
      <button class="online-toggle-btn${r.available_online?' online-on':''}" data-id="${r.id}" title="${r.available_online?'คลิกเพื่อปิดสั่งออนไลน์':'คลิกเพื่อเปิดให้สั่งออนไลน์ผ่าน LIFF'}">
        ${r.available_online?'🛒 ออนไลน์':'○ ออฟไลน์'}</button>
      <span class="meta">${tot.cost>0?'฿'+fmtMoney(tot.cost):'—'}${r.selling_price?' · ขาย ฿'+r.selling_price:''}</span>
      <button type="button" class="expand-btn" data-id="${r.id}" title="${isOpen?'ปิดแผงแก้ไข':'เปิดแผงแก้ไข'}">${isOpen?'▲':'▼'}</button>
    </div>`;
  if(isOpen) row += renderEditPanel(r);
  row += `</div>`;
  return row;
}

function renderCategoryPicker(selectedKeys, mode){
  const isOpen = mode==='filter' ? state.filterPickerOpen : state.recipePickerOpen;
  const summary = selectedKeys.length ? selectedKeys.map(k=>categoryLabel(k)).join(', ') : (mode==='filter' ? 'ทุกหมวด' : 'เลือกหมวด...');
  let html = `<div class="cat-picker" data-mode="${mode}">
    <button type="button" class="cat-picker-btn">${escapeHtml(summary)} ▾</button>`;
  if(isOpen){
    html += `<div class="cat-picker-panel">`;
    state.categories.forEach(c=>{
      const checked = selectedKeys.includes(c.key) ? 'checked' : '';
      html += `<label><input type="checkbox" class="cat-check" value="${c.key}" ${checked}><span class="cat-dot" style="background:${c.color}"></span>${escapeHtml(c.label)}</label>`;
    });
    html += `<div class="cat-picker-add"><input type="text" class="cat-new-input" placeholder="เพิ่มหมวดใหม่..."><button type="button" class="btn btn-ghost btn-sm cat-add-btn">+</button></div>`;
    html += `<button type="button" class="btn btn-ghost btn-sm cat-manage-trigger" style="width:100%;margin-top:6px;">⚙ จัดการหมวดทั้งหมด</button>`;
    html += `</div>`;
  }
  html += `</div>`;
  return html;
}

          <span>${r.no_morning?'🌅 ไม่ส่งช่วงเช้า (Meal Plan / ผลิตสด)':'○ ส่งได้ทุกช่วงเวลา'}</span>
        </label>
      </div>

    <div class="field"><label>ส่วนประกอบของสูตร (แยกเป็นพาร์ทได้ เช่น "หมักไก่" / "ทำซอส" — แต่ละพาร์ทมีวัตถุดิบและวิธีทำของตัวเอง ชื่อวัตถุดิบต้องตรงกับในแท็บ "วัตถุดิบ" ระบบจะคำนวณต้นทุน/แคลรวมทุกพาร์ทให้อัตโนมัติ)</label>
      <div class="parts-wrap">

    <div class="field">

      <div id="img-slots-${r.id}" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px">

        <textarea class="f-notes" placeholder="" style="height:60px">${escapeHtml(r.notes||'')}</textarea>

    ${(()=>{
      if(!tot.kcal && !tot.protein) return '';

function renderPhotoBox(id){
  const photo = state.photoCache[id];
  if(photo === '__loading__'){
    return `<div class="photo-box" data-id="${id}"><div class="photo-loading">กำลังโหลดรูป...</div></div>`;
  }
  if(photo){
    return `<div class="photo-box" data-id="${id}">
      <img class="photo-preview" src="${photo}">
      <div class="photo-actions">
        <label class="btn btn-ghost btn-sm photo-replace-label">เปลี่ยนรูป<input type="file" accept="image/*" class="photo-upload-input" data-id="${id}" style="display:none;"></label>
        <button type="button" class="btn btn-warn btn-sm rmPhoto" data-id="${id}">ลบรูป</button>
      </div>
    </div>`;
  }
  return `<div class="photo-box" data-id="${id}">
    <label class="photo-upload-label">+ อัพโหลดรูป<input type="file" accept="image/*" class="photo-upload-input" data-id="${id}" style="display:none;"></label>
  </div>`;
}
function renderPartBlock(part, pIdx, totalParts){
  const lines = (part.lines && part.lines.length) ? part.lines : [{name:'',qty:'',unit:'g'}];
  return `<div class="part-block" data-part-idx="${pIdx}">
    <div class="part-head">
      <input type="text" class="part-label" placeholder="ชื่อพาร์ท เช่น หมักไก่ (เว้นว่างได้ถ้ามีพาร์ทเดียว)" value="${escapeHtml(part.label||'')}">
      ${totalParts>1 ? `<button type="button" class="rm rmPart" data-part-idx="${pIdx}">× ลบพาร์ทนี้</button>` : ''}
    </div>
    <div class="ing-lines" data-part-idx="${pIdx}">
      ${lines.map((l,lIdx)=>renderIngLine(l,pIdx,lIdx)).join('')}
    </div>
    <button type="button" class="btn btn-ghost btn-sm addLine" data-part-idx="${pIdx}">+ เพิ่มบรรทัดวัตถุดิบ</button>
    <textarea class="part-instructions" data-part-idx="${pIdx}" placeholder="วิธีทำของพาร์ทนี้...">${escapeHtml(part.instructions||'')}</textarea>
  </div>`;
}

function renderIngLine(l, partIdx, idx){
  return `<div class="ing-line" data-part-idx="${partIdx}" data-idx="${idx}">
    <input type="text" class="ln-name" list="ingList" placeholder="ชื่อวัตถุดิบ" value="${escapeHtml(l.name||'')}">
    <input type="number" class="ln-qty" placeholder="ปริมาณ" value="${l.qty!==undefined?l.qty:''}" step="any">
    <input type="text" class="ln-unit" placeholder="หน่วย" value="${escapeHtml(l.unit||'')}">
    <button class="rm rmLine" data-part-idx="${partIdx}" data-idx="${idx}">×</button>
  </div>
  <div class="line-calc" data-part-idx="${partIdx}" data-calc-idx="${idx}">${renderLineCalcInner(l)}</div>`;
}

function renderTotalsLive(r, tot){
  if(!tot) tot = computeTotals(r);
  const fl = v => Math.floor(v||0);
  return `<div class="totals-box">
    <div class="t">ต้นทุนรวม<b>${tot.cost>0?'฿'+fmtMoney(tot.cost):'—'}</b></div>
    <div class="t">แคลอรี่รวม<b>${tot.kcal>0?fl(tot.kcal)+' kcal':'—'}</b></div>
    <div class="t">โปรตีน<b>${fl(tot.protein)} g</b></div>
    <div class="t">คาร์บ<b>${fl(tot.carb)} g</b></div>
    <div class="t">ไขมัน<b>${fl(tot.fat)} g</b></div>
    ${!tot.complete?'<div class="unlinked-flag" style="margin:0;">⚠ มี '+tot.unmatched+' วัตถุดิบไม่ตรงลิสต์ — ต้นทุน/โภชนาการอาจไม่ครบ (กดปุ่ม ➕ ที่บรรทัดนั้นเพื่อเพิ่มเข้าลิสต์)</div>':''}
  </div>`;
}

const PIECE_UNITS = new Set(['ชิ้น','ฟอง','อัน','ถาด','ห่อ','กล่อง','ขวด','แพ็ค','ลัง']);
function isPieceUnit(u){ return PIECE_UNITS.has((u||'').trim()); }

function renderIngredientsTab(){
  const showNutri = !state.hideNutritionCols;
  const q = state.search.trim().toLowerCase();
  const catF = state.ingCategoryFilter || '';
  const unitF = state.ingUnitFilter || 'all';

  let allList = state.ingredients.filter(i=>{
    if(q && !i.name.toLowerCase().includes(q)) return false;
    if(catF && (i.ingCategory||'')!==catF) return false;
    if(unitF==='weight' && isPieceUnit(i.unit)) return false;
    if(unitF==='piece' && !isPieceUnit(i.unit)) return false;
    return true;
  });

  // Count per category for badges
  const catCounts = {};
  state.ingredients.forEach(i=>{ const c=i.ingCategory||''; catCounts[c]=(catCounts[c]||0)+1; });
  const total = state.ingredients.length;

  let html = `<div class="toolbar" style="flex-wrap:wrap;gap:6px;">
    <div class="search-box"><input type="text" id="ingSearch" placeholder="ค้นหาวัตถุดิบ..." value="${escapeHtml(state.search)}"></div>
    <button class="icon-btn${showNutri?' active':''}" id="toggleNutriColsBtn" data-tip="${showNutri?'ซ่อนโภชนาการ':'แสดงโภชนาการ (kcal/P/C/F)'}">🔬</button>

    ${ING_CATEGORIES.map(c=>`<button class="ing-cat-btn${catF===c?' active':''}" data-cat="${escapeHtml(c)}">${escapeHtml(c)}${catCounts[c]?' ('+catCounts[c]+')':''}</button>`).join('')}

  html += `<div class="table-scroll"><table class="ing-table ing-compact"><thead><tr>

  // New row — ย้ายขึ้นบนสุด (ใต้หัวตาราง) จะได้ไม่ต้องเลื่อนลงไปกรอกล่างสุด

    <td><input type="text" class="new-name" placeholder="ชื่อวัตถุดิบใหม่..."></td>
    <td><select class="new-ingcat" style="width:100%;padding:3px 4px;border:1px solid var(--line);border-radius:5px;font-size:12px;font-family:inherit;">
      <option value="">ประเภท...</option>
      ${ING_CATEGORIES.map(c=>`<option value="${c}">${c}</option>`).join('')}
    </select></td>
    <td><input type="text" class="new-unit" list="unitList" placeholder="g" style="width:48px;"></td>

    <td class="cost-calc" id="newCostCalc">—</td>

    <td><input type="number" class="new-stock" placeholder="0" step="0.1" min="0" style="width:60px;"></td>
    ${nutriNew}
    <td><button class="btn btn-primary btn-sm addIngBtn" data-type="ingredient">+ เพิ่ม</button></td>
  </tr>`;

  // รายการวัตถุดิบเดิม (ต่อจากแถวเพิ่มด้านบน)
  allList.forEach(i=>{ html += renderIngRow(i, showNutri); });
  html += `</tbody></table></div>`;
  html += `<datalist id="unitList">${UNIT_SUGGEST.map(u=>`<option value="${u}">`).join('')}</datalist>`;
  return html;
}

    <td><input type="number" class="ing-f-market" value="${mktVal||''}" step="any" placeholder="฿/กก."></td>
    <td><span class="cost-calc">${costPerU>0?'฿'+fmtNum(costPerU):'—'}</span></td>
    <td>${renderSupplierPicker(i)}</td>
    <td><div style="display:flex;align-items:center;gap:3px;">
      <button type="button" class="ing-stock-minus" data-id="${i.id}">−</button>

      <button type="button" class="ing-stock-plus" data-id="${i.id}">+</button>

    ${nutriCells}
    <td style="white-space:nowrap;">
      <button class="btn btn-ghost btn-sm saveIngRow" data-id="${i.id}">บันทึก</button>
      <button class="btn btn-warn btn-sm delIngRow" data-id="${i.id}">ลบ</button>

function escapeHtml(s){
  return (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function getRecipeFromPanel(panelEl, id){
  const r = JSON.parse(JSON.stringify(state.recipes.find(x=>x.id===id)));
  r.code = panelEl.querySelector('.f-code').value.trim();
  r.name = panelEl.querySelector('.f-name').value.trim();
  r.notes = panelEl.querySelector('.f-notes').value;
  const spEl = panelEl.querySelector('.f-selling-price');
  if(spEl) r.selling_price = parseFloat(spEl.value)||0;
  const aoEl = panelEl.querySelector('.f-available-online');
  if(aoEl) r.available_online = aoEl.checked;
  const nmEl = panelEl.querySelector('.f-no-morning');
  if(nmEl) r.no_morning = nmEl.checked;
  const descEl = panelEl.querySelector('.f-description');
  if(descEl) r.description = descEl.value;
  const hgEl = panelEl.querySelector('.f-he-group');
  if(hgEl) r.he_group = hgEl.value.trim();
  const parts = [];
  panelEl.querySelectorAll('.part-block').forEach(partEl=>{
    const label = partEl.querySelector('.part-label').value.trim();
    const instructions = partEl.querySelector('.part-instructions').value;
    const lines = [];
    partEl.querySelectorAll('.ing-line').forEach(row=>{
      lines.push({
        name: row.querySelector('.ln-name').value.trim(),
        qty: row.querySelector('.ln-qty').value,
        unit: row.querySelector('.ln-unit').value.trim()
      });
    });
    parts.push({ label, instructions, lines: lines.filter(l=>l.name) });
  });
  r.parts = parts;
  return r;
}

function movePinned(id, dir){
  if(!requireUser()) return;
  const pinnedSorted = state.recipes.filter(x=>x.pinned).sort((a,b)=>(a.pinOrder||0)-(b.pinOrder||0));
  const idx = pinnedSorted.findIndex(x=>x.id===id);
  const swapIdx = idx+dir;
  if(idx<0 || swapIdx<0 || swapIdx>=pinnedSorted.length) return;
  const tmp = pinnedSorted[idx].pinOrder;
  pinnedSorted[idx].pinOrder = pinnedSorted[swapIdx].pinOrder;
  pinnedSorted[swapIdx].pinOrder = tmp;
  const now = new Date().toISOString();
  pinnedSorted[idx].updated_by = state.currentUser; pinnedSorted[idx].updated_at = now;
  pinnedSorted[swapIdx].updated_by = state.currentUser; pinnedSorted[swapIdx].updated_at = now;
  persistRecipes();
  render();
}

// แถบหมวด (.cat-tab-strip) เลื่อนได้อยู่แล้วแต่ scrollbar ซ่อน — เมาส์บนเดสก์ท็อปลากเลื่อนไม่ได้ถ้าไม่มีทัชแพด
// ผูก drag-to-scroll ให้เหมือนที่ทำใน liff_customer.html (.ctabs) — element ใหม่ทุก render เลยต้อง setup ใหม่ทุกครั้ง
function setupCatTabDragScroll(){
  const el = document.querySelector('.cat-tab-strip');
  if(!el || el._dragSet) return; el._dragSet = true;
  let down=false, sx=0, sl=0, moved=false;
  el.addEventListener('mousedown', e=>{ down=true; moved=false; sx=e.pageX; sl=el.scrollLeft; });
  window.addEventListener('mousemove', e=>{ if(!down) return; const dx=e.pageX-sx; if(Math.abs(dx)>4) moved=true; el.scrollLeft=sl-dx; });
  window.addEventListener('mouseup', ()=>{ down=false; });
  el.addEventListener('click', e=>{ if(moved){ e.preventDefault(); e.stopPropagation(); } }, true);
}

    const sortModeSelect = document.getElementById('sortModeSelect');

        } else {

        }

    }
    const bulkDeselectAll = document.getElementById('bulkDeselectAll');
    if(bulkDeselectAll) bulkDeselectAll.onclick = ()=>{ state.selectedIds=new Set(); render(); };
    const bulkOpenSell = document.getElementById('bulkOpenSell');
    if(bulkOpenSell) bulkOpenSell.onclick = ()=>{
      if(!requireUser()) return;
      state.selectedIds.forEach(id=>{ const r=state.recipes.find(x=>x.id===id); if(r){ r.status='active'; r.updated_by=state.currentUser; r.updated_at=new Date().toISOString(); } });
      persistRecipes(); state.selectedIds=new Set(); state.bulkMode=false; render();
      showToast('เปิดขายที่เลือกแล้ว');
    };
    const bulkCloseSell = document.getElementById('bulkCloseSell');
    if(bulkCloseSell) bulkCloseSell.onclick = ()=>{
      if(!requireUser()) return;
      state.selectedIds.forEach(id=>{ const r=state.recipes.find(x=>x.id===id); if(r){ r.status='retired'; r.updated_by=state.currentUser; r.updated_at=new Date().toISOString(); } });
      persistRecipes(); state.selectedIds=new Set(); state.bulkMode=false; render();
      showToast('ปิดขายที่เลือกแล้ว');
    };
    const bulkPin = document.getElementById('bulkPin');
    if(bulkPin) bulkPin.onclick = ()=>{
      if(!requireUser()) return;
      state.selectedIds.forEach(id=>{ const r=state.recipes.find(x=>x.id===id); if(r){ r.pinned=true; r.pinOrder=Date.now()+Math.random(); } });
      persistRecipes(); state.selectedIds=new Set(); state.bulkMode=false; render();
      showToast('Pin แล้ว');
    };
    const bulkUnpin = document.getElementById('bulkUnpin');
    if(bulkUnpin) bulkUnpin.onclick = ()=>{
      if(!requireUser()) return;
      state.selectedIds.forEach(id=>{ const r=state.recipes.find(x=>x.id===id); if(r){ r.pinned=false; r.pinSubCode=null; } });
      persistRecipes(); state.selectedIds=new Set(); state.bulkMode=false; render();
      showToast('Unpin แล้ว');
    };

    // Row select checkboxes — stop propagation so clicking checkbox doesn't open the recipe panel
    document.querySelectorAll('.row-select-chk').forEach(chk=>{
      chk.onclick = e=>e.stopPropagation();
      chk.onchange = ()=>{
        if(chk.checked) state.selectedIds.add(chk.dataset.id);
        else state.selectedIds.delete(chk.dataset.id);
        render();
      };
    });

    // Sub code inputs — only shown when PTT pinned
    document.querySelectorAll('.subcode-input').forEach(inp=>{
      inp.onclick = e=>e.stopPropagation();
      inp.onkeydown = e=>{ if(e.key==='Enter') inp.blur(); e.stopPropagation(); };
      inp.onblur = ()=>{
        const r = state.recipes.find(x=>x.id===inp.dataset.id);
        if(!r) return;
        const val = inp.value.trim()||null;
        if(r.pinSubCode !== val){
          r.pinSubCode = val;
          r.updated_by = state.currentUser;
          r.updated_at = new Date().toISOString();
          persistRecipes();
        }
      };
    });

    // PTT drag-to-reorder
    let dragSrcId = null;
    document.querySelectorAll('.ptt-group .card[draggable="true"]').forEach(card=>{
      card.ondragstart = (e)=>{
        dragSrcId = card.dataset.id;
        e.dataTransfer.effectAllowed = 'move';
        card.style.opacity = '0.5';
      };
      card.ondragend = ()=>{ card.style.opacity=''; document.querySelectorAll('.card.drag-over').forEach(c=>c.classList.remove('drag-over')); };
      card.ondragover = (e)=>{ e.preventDefault(); e.dataTransfer.dropEffect='move'; card.classList.add('drag-over'); };
      card.ondragleave = ()=>{ card.classList.remove('drag-over'); };
      card.ondrop = (e)=>{
        e.preventDefault();
        card.classList.remove('drag-over');
        const targetId = card.dataset.id;
        if(!dragSrcId || dragSrcId===targetId) return;
        if(!requireUser()) return;
        const pinned = state.recipes.filter(x=>x.pinned).sort((a,b)=>(a.pinOrder||0)-(b.pinOrder||0));
        const srcIdx = pinned.findIndex(x=>x.id===dragSrcId);
        const tgtIdx = pinned.findIndex(x=>x.id===targetId);
        if(srcIdx<0||tgtIdx<0) return;
        pinned.splice(tgtIdx, 0, pinned.splice(srcIdx,1)[0]);
        pinned.forEach((r,i)=>{ r.pinOrder=i; r.updated_by=state.currentUser; r.updated_at=new Date().toISOString(); });
        dragSrcId = null;
        persistRecipes();
        render();
      };
    });
    const si = document.getElementById('searchInput');
    if(si) si.oninput = e=>{ state.search = e.target.value; render(); document.getElementById('searchInput').focus(); document.getElementById('searchInput').setSelectionRange(state.search.length,state.search.length); };
    const sr = document.getElementById('showRetired');
    if(sr) sr.onchange = e=>{ state.showRetired = e.target.checked; render(); };

    document.querySelectorAll('.rating-row3[data-mode="row"]').forEach(rr=>{

          e.stopPropagation();

          render();

    const filterRatingRow = document.querySelector('.rating-row3[data-mode="filter"]');

      };
    });
    document.querySelectorAll('.quick-note-input').forEach(inp=>{
      inp.onclick = e=>e.stopPropagation();

      inp.onblur = ()=>{
        const r = state.recipes.find(x=>x.id===inp.dataset.id);
        if(r && r.quickNote !== inp.value){
          if(!requireUser()) return;
          r.quickNote = inp.value;
          r.updated_by = state.currentUser;
          r.updated_at = new Date().toISOString();

          render();

    document.querySelectorAll('.row-toggle-lbl, .pin-order-btns, .stock-ctrl').forEach(el=>{ el.onclick = e=>e.stopPropagation(); });

      chk.onchange = ()=>{
        if(!requireUser()) { render(); return; }
        const r = state.recipes.find(x=>x.id===chk.dataset.id);
        r.pinned = chk.checked;
        if(chk.checked) r.pinOrder = Date.now();
        else r.pinSubCode = null;  // clear sub code when unpinned

        persistRecipes();
        render();
      };

    document.querySelectorAll('.selling-toggle').forEach(chk=>{
      chk.onclick = e=>e.stopPropagation();

        if(!requireUser()) { render(); return; }

        r.updated_at = new Date().toISOString();
        persistRecipes();
        render();
      };
    });

    // 🛒 Online toggle — เปิด/ปิดให้สั่งผ่าน LIFF
    document.querySelectorAll('.online-toggle-btn').forEach(btn=>{
      btn.onclick = (e)=>{
        e.stopPropagation();
        if(!requireUser()) return;
        const r = state.recipes.find(x=>x.id===btn.dataset.id);
        if(!r) return;

        r.updated_by = state.currentUser;
        r.updated_at = new Date().toISOString();

        render();

        syncOnlineMenu(r);  // ← sync เข้า menu_items ทันที (OH/LIFF เห็นตรงกับ DB เลย)

    // 📤 Export button
    const exportOnlineBtn = document.getElementById('exportOnlineBtn');
    if(exportOnlineBtn) exportOnlineBtn.onclick = exportOnlineMenus;
    // 🛒 Online filter toggle — กดตัวเลข "N ออนไลน์" เพื่อกรองเฉพาะออนไลน์
    const toggleOnlineBtn = document.getElementById('toggleOnlineFilterBtn');
    if(toggleOnlineBtn) toggleOnlineBtn.onclick = (e)=>{

      render(true);
