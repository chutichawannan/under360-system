const PIECE_UNITS = new Set(['ชิ้น','ฟอง','อัน','ถาด','ห่อ','กล่อง','ขวด','แพ็ค','ลัง']);
function isPieceUnit(u){ return PIECE_UNITS.has((u||'').trim()); }

function renderIngredientsTab(){
  const showNutri = !state.hideNutritionCols;
  const q = state.search.trim().toLowerCase();
  const catF = state.ingCategoryFilter || '';
  const unitF = state.ingUnitFilter || 'all';

  let allList = state.ingredients.filter(i=>{
    if(q && !i.name.toLowerCase().includes(q)) return false;
    if(catF && (i.ingCategory||'')!==catF) return false;
    if(unitF==='weight' && isPieceUnit(i.unit)) return false;
    if(unitF==='piece' && !isPieceUnit(i.unit)) return false;
    return true;
  });

  // Count per category for badges
  const catCounts = {};
  state.ingredients.forEach(i=>{ const c=i.ingCategory||''; catCounts[c]=(catCounts[c]||0)+1; });
  const total = state.ingredients.length;

  let html = `<div class="toolbar" style="flex-wrap:wrap;gap:6px;">
    <div class="search-box"><input type="text" id="ingSearch" placeholder="ค้นหาวัตถุดิบ..." value="${escapeHtml(state.search)}"></div>
    <button class="icon-btn${showNutri?' active':''}" id="toggleNutriColsBtn" data-tip="${showNutri?'ซ่อนโภชนาการ':'แสดงโภชนาการ (kcal/P/C/F)'}">🔬</button>
    <button class="btn btn-ghost btn-sm" id="manageSupBtn">⚙ แหล่งซื้อ</button>
  </div>`;

  // Category filter chips
  html += `<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;align-items:center;">
    <span style="font-size:11.5px;color:var(--ink-soft);margin-right:2px;">ประเภท:</span>
    <button class="ing-cat-btn${catF===''?' active':''}" data-cat="">ทั้งหมด (${total})</button>
    ${ING_CATEGORIES.map(c=>`<button class="ing-cat-btn${catF===c?' active':''}" data-cat="${escapeHtml(c)}">${escapeHtml(c)}${catCounts[c]?' ('+catCounts[c]+')':''}</button>`).join('')}

    <span style="width:1px;background:var(--line);height:18px;margin:0 2px;"></span>

  const nutriHead = showNutri ? `<th class="nutri-col-w">kcal</th><th class="nutri-col-w">P</th><th class="nutri-col-w">C</th><th class="nutri-col-w">F</th>` : '';

  allList.forEach(i=>{ html += renderIngRow(i, showNutri); });

  // New row
  const nutriNew = showNutri ? `
    <td><input type="number" class="new-kcal nutri-col-w" placeholder="0" step="any"></td>
    <td><input type="number" class="new-protein nutri-col-w" placeholder="0" step="any"></td>
    <td><input type="number" class="new-carb nutri-col-w" placeholder="0" step="any"></td>
    <td><input type="number" class="new-fat nutri-col-w" placeholder="0" step="any"></td>` : '';
  html += `<tr data-newrow="1">
    <td><input type="text" class="new-name" placeholder="ชื่อวัตถุดิบใหม่..."></td>
    <td><select class="new-ingcat" style="width:100%;padding:3px 4px;border:1px solid var(--line);border-radius:5px;font-size:12px;font-family:inherit;">
      <option value="">ประเภท...</option>
      ${ING_CATEGORIES.map(c=>`<option value="${c}">${c}</option>`).join('')}
    </select></td>
    <td><input type="text" class="new-unit" list="unitList" placeholder="g" style="width:48px;"></td>
    <td><input type="number" class="new-market" placeholder="฿/กก." step="any" style="width:80px;"></td>
    <td class="cost-calc" id="newCostCalc">—</td>
    <td style="font-size:11px;color:var(--ink-soft);">เลือกได้หลังบันทึก</td>
    <td><input type="number" class="new-stock" placeholder="0" step="0.1" min="0" style="width:60px;"></td>
    ${nutriNew}
    <td><button class="btn btn-primary btn-sm addIngBtn" data-type="ingredient">+ เพิ่ม</button></td>
  </tr>`;
  html += `</tbody></table></div>`;
  html += `<datalist id="unitList">${UNIT_SUGGEST.map(u=>`<option value="${u}">`).join('')}</datalist>`;
  return html;
}

    <td><div style="display:flex;align-items:center;gap:5px;">

      <input type="text" class="ing-f-name" value="${escapeHtml(i.name)}" style="flex:1;min-width:0;">
    </div></td>

      <option value="">—</option>
      ${ING_CATEGORIES.map(c=>`<option value="${c}" ${(i.ingCategory||'')=== c?'selected':''}>${c}</option>`).join('')}
    </select></td>
    <td><input type="text" class="ing-f-unit" list="unitList" value="${escapeHtml(i.unit||'')}" style="width:48px;"></td>
    <td><input type="number" class="ing-f-market" value="${mktVal||''}" step="any" placeholder="฿/กก."></td>
    <td><span class="cost-calc">${costPerU>0?'฿'+fmtNum(costPerU):'—'}</span></td>
    <td>${renderSupplierPicker(i)}</td>
    <td><div style="display:flex;align-items:center;gap:3px;">
      <button type="button" class="ing-stock-minus" data-id="${i.id}">−</button>

      <button type="button" class="ing-stock-plus" data-id="${i.id}">+</button>
    </div></td>
    ${nutriCells}
    <td style="white-space:nowrap;">
      <button class="btn btn-ghost btn-sm saveIngRow" data-id="${i.id}">บันทึก</button>
      <button class="btn btn-warn btn-sm delIngRow" data-id="${i.id}">ลบ</button>
    </td>
  </tr>`;

function escapeHtml(s){
  return (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function getRecipeFromPanel(panelEl, id){
  const r = JSON.parse(JSON.stringify(state.recipes.find(x=>x.id===id)));
  r.code = panelEl.querySelector('.f-code').value.trim();
  r.name = panelEl.querySelector('.f-name').value.trim();
  r.notes = panelEl.querySelector('.f-notes').value;
  const spEl = panelEl.querySelector('.f-selling-price');
  if(spEl) r.selling_price = parseFloat(spEl.value)||0;
  const aoEl = panelEl.querySelector('.f-available-online');
  if(aoEl) r.available_online = aoEl.checked;
  const descEl = panelEl.querySelector('.f-description');
  if(descEl) r.description = descEl.value;
  const hgEl = panelEl.querySelector('.f-he-group');
  if(hgEl) r.he_group = hgEl.value.trim();
  const parts = [];
  panelEl.querySelectorAll('.part-block').forEach(partEl=>{
    const label = partEl.querySelector('.part-label').value.trim();
    const instructions = partEl.querySelector('.part-instructions').value;
    const lines = [];
    partEl.querySelectorAll('.ing-line').forEach(row=>{
      lines.push({
        name: row.querySelector('.ln-name').value.trim(),
        qty: row.querySelector('.ln-qty').value,
        unit: row.querySelector('.ln-unit').value.trim()
      });
    });
    parts.push({ label, instructions, lines: lines.filter(l=>l.name) });
  });
  r.parts = parts;
  return r;
}

function movePinned(id, dir){
  if(!requireUser()) return;
  const pinnedSorted = state.recipes.filter(x=>x.pinned).sort((a,b)=>(a.pinOrder||0)-(b.pinOrder||0));
  const idx = pinnedSorted.findIndex(x=>x.id===id);
  const swapIdx = idx+dir;
  if(idx<0 || swapIdx<0 || swapIdx>=pinnedSorted.length) return;
  const tmp = pinnedSorted[idx].pinOrder;
  pinnedSorted[idx].pinOrder = pinnedSorted[swapIdx].pinOrder;
  pinnedSorted[swapIdx].pinOrder = tmp;
  const now = new Date().toISOString();
  pinnedSorted[idx].updated_by = state.currentUser; pinnedSorted[idx].updated_at = now;
  pinnedSorted[swapIdx].updated_by = state.currentUser; pinnedSorted[swapIdx].updated_at = now;
  persistRecipes();
  render();
}

function attachHandlers(){
  document.querySelectorAll('.tab-btn').forEach(b=>b.onclick=()=>{ state.tab=b.dataset.tab; state.search=''; state.openId=null; render(); });

  // Close all floating pickers on outside click
  document.onclick = ()=>{
    let changed = false;
    if(state.filterPickerOpen){ state.filterPickerOpen=false; changed=true; }
    if(state.recipePickerOpen){ state.recipePickerOpen=false; changed=true; }
    if(state.supplierPickerOpenFor){ state.supplierPickerOpenFor=null; changed=true; }
    if(state.pttPickerOpen){ state.pttPickerOpen=false; changed=true; }
    if(state.planDropdownOpen){ state.planDropdownOpen=false; changed=true; }
    if(changed) render();
  };

  document.getElementById('fabNew').onclick = ()=>{
    const id = 'r'+Date.now();
    if(!requireUser()) return;
    const defaultCats = state.categoryFilter.length ? [...state.categoryFilter] : [];
    // Auto-pin + ใส่ category จาก tab ที่กำลังดูอยู่
    const autoCat = (state.activeCatTab && state.activeCatTab !== '__all__' && state.activeCatTab !== '__ptt__')
      ? state.activeCatTab : (defaultCats[0] || '');
    const newR = {id, code:'', name:'', categories: autoCat ? [autoCat] : defaultCats,
      category: autoCat, // v0.4 category field
      status:'active', parts:[{label:'', instructions:'', lines:[{name:'',qty:'',unit:'g'}]}],
      notes:'', quickNote:'', rating:2,
      pinned: true,
      pinOrder: -(Date.now()),  // ← ค่าลบ = เล็กที่สุด = sort ขึ้นบนสุดเสมอ
      pinSubCode:null, stock:0, available_online:false,
      description:'', image_urls:[], image_url:'', he_group:'', updated_at:null};
    state.recipes.unshift(newR);
    state.photoCache[id] = null;
    state.tab='recipes'; state.openId=id; state.recipePickerOpen=false;
    state.activeCatTab = '__all__';
    state.pinModeEnabled = true;
    state.collapsedCats['_ptt'] = false;
    state.collapsedCats['_none'] = false;
    persistAppConfig();
    render(true);
    // Scroll to panel + focus ช่องชื่อเมนู
    setTimeout(()=>{
      const panel = document.querySelector('[data-edit="'+id+'"]');
      if(panel){
        panel.scrollIntoView({behavior:'smooth', block:'start'});
        const nameInp = panel.querySelector('.f-name');
        if(nameInp) setTimeout(()=>nameInp.focus(), 150);
      }
    }, 80);
  };

  if(state.tab==='recipes'){
    const manageCatBtn = document.getElementById('manageCatBtn');
    if(manageCatBtn) manageCatBtn.onclick = ()=>{ state.showCategoryManager = true; render(); };
    const togglePinModeBtn = document.getElementById('togglePinModeBtn');
    if(togglePinModeBtn) togglePinModeBtn.onclick = ()=>{
      if(!requireUser()) return;
      state.pinModeEnabled = !state.pinModeEnabled;
      persistAppConfig();
      render();
    };
    const toggleBulkModeBtn = document.getElementById('toggleBulkModeBtn');
    if(toggleBulkModeBtn) toggleBulkModeBtn.onclick = ()=>{
      state.bulkMode = !state.bulkMode;
      if(!state.bulkMode) state.selectedIds = new Set();
      render();
    };
    const toggleStatBarBtn = document.getElementById('toggleStatBarBtn');
    if(toggleStatBarBtn) toggleStatBarBtn.onclick = ()=>{ state.showStatBar = !state.showStatBar; render(); };
    const sortModeSelect = document.getElementById('sortModeSelect');
    if(sortModeSelect) sortModeSelect.onchange = e=>{ state.sortMode = e.target.value; render(); };

    // Bulk action handlers
    const masterChk = document.getElementById('bulkMasterChk');
    if(masterChk){
      // Set indeterminate visually
      if(masterChk.dataset.indeterminate==='true') masterChk.indeterminate = true;
      masterChk.onchange = ()=>{
        if(masterChk.checked){
          // Select all VISIBLE rows (respects current search/category/rating filter)
          document.querySelectorAll('.row-select-chk').forEach(chk=>state.selectedIds.add(chk.dataset.id));
        } else {
          state.selectedIds = new Set();
        }
        render();
      };
    }
    const bulkDeselectAll = document.getElementById('bulkDeselectAll');
    if(bulkDeselectAll) bulkDeselectAll.onclick = ()=>{ state.selectedIds=new Set(); render(); };
    const bulkOpenSell = document.getElementById('bulkOpenSell');
    if(bulkOpenSell) bulkOpenSell.onclick = ()=>{
      if(!requireUser()) return;
      state.selectedIds.forEach(id=>{ const r=state.recipes.find(x=>x.id===id); if(r){ r.status='active'; r.updated_by=state.currentUser; r.updated_at=new Date().toISOString(); } });
      persistRecipes(); state.selectedIds=new Set(); state.bulkMode=false; render();
      showToast('เปิดขายที่เลือกแล้ว');
    };
    const bulkCloseSell = document.getElementById('bulkCloseSell');
    if(bulkCloseSell) bulkCloseSell.onclick = ()=>{
      if(!requireUser()) return;
      state.selectedIds.forEach(id=>{ const r=state.recipes.find(x=>x.id===id); if(r){ r.status='retired'; r.updated_by=state.currentUser; r.updated_at=new Date().toISOString(); } });
      persistRecipes(); state.selectedIds=new Set(); state.bulkMode=false; render();
      showToast('ปิดขายที่เลือกแล้ว');
    };
    const bulkPin = document.getElementById('bulkPin');
    if(bulkPin) bulkPin.onclick = ()=>{
      if(!requireUser()) return;
      state.selectedIds.forEach(id=>{ const r=state.recipes.find(x=>x.id===id); if(r){ r.pinned=true; r.pinOrder=Date.now()+Math.random(); } });
      persistRecipes(); state.selectedIds=new Set(); state.bulkMode=false; render();
      showToast('Pin แล้ว');
    };
    const bulkUnpin = document.getElementById('bulkUnpin');
    if(bulkUnpin) bulkUnpin.onclick = ()=>{
      if(!requireUser()) return;
      state.selectedIds.forEach(id=>{ const r=state.recipes.find(x=>x.id===id); if(r){ r.pinned=false; r.pinSubCode=null; } });
      persistRecipes(); state.selectedIds=new Set(); state.bulkMode=false; render();
      showToast('Unpin แล้ว');
    };

    // Row select checkboxes — stop propagation so clicking checkbox doesn't open the recipe panel
    document.querySelectorAll('.row-select-chk').forEach(chk=>{
      chk.onclick = e=>e.stopPropagation();
      chk.onchange = ()=>{
        if(chk.checked) state.selectedIds.add(chk.dataset.id);
        else state.selectedIds.delete(chk.dataset.id);
        render();
      };
    });

    // Sub code inputs — only shown when PTT pinned
    document.querySelectorAll('.subcode-input').forEach(inp=>{
      inp.onclick = e=>e.stopPropagation();
      inp.onkeydown = e=>{ if(e.key==='Enter') inp.blur(); e.stopPropagation(); };
      inp.onblur = ()=>{
        const r = state.recipes.find(x=>x.id===inp.dataset.id);
        if(!r) return;
        const val = inp.value.trim()||null;
        if(r.pinSubCode !== val){
          r.pinSubCode = val;
          r.updated_by = state.currentUser;
          r.updated_at = new Date().toISOString();
          persistRecipes();
        }
      };
    });

    // PTT drag-to-reorder
    let dragSrcId = null;
    document.querySelectorAll('.ptt-group .card[draggable="true"]').forEach(card=>{
      card.ondragstart = (e)=>{
        dragSrcId = card.dataset.id;
        e.dataTransfer.effectAllowed = 'move';
        card.style.opacity = '0.5';
      };
      card.ondragend = ()=>{ card.style.opacity=''; document.querySelectorAll('.card.drag-over').forEach(c=>c.classList.remove('drag-over')); };
      card.ondragover = (e)=>{ e.preventDefault(); e.dataTransfer.dropEffect='move'; card.classList.add('drag-over'); };
      card.ondragleave = ()=>{ card.classList.remove('drag-over'); };
      card.ondrop = (e)=>{
        e.preventDefault();
        card.classList.remove('drag-over');
        const targetId = card.dataset.id;
        if(!dragSrcId || dragSrcId===targetId) return;
        if(!requireUser()) return;
        const pinned = state.recipes.filter(x=>x.pinned).sort((a,b)=>(a.pinOrder||0)-(b.pinOrder||0));
        const srcIdx = pinned.findIndex(x=>x.id===dragSrcId);
        const tgtIdx = pinned.findIndex(x=>x.id===targetId);
        if(srcIdx<0||tgtIdx<0) return;
        pinned.splice(tgtIdx, 0, pinned.splice(srcIdx,1)[0]);
        pinned.forEach((r,i)=>{ r.pinOrder=i; r.updated_by=state.currentUser; r.updated_at=new Date().toISOString(); });
        dragSrcId = null;
        persistRecipes();
        render();
      };
    });
    const si = document.getElementById('searchInput');
    if(si) si.oninput = e=>{ state.search = e.target.value; render(); document.getElementById('searchInput').focus(); document.getElementById('searchInput').setSelectionRange(state.search.length,state.search.length); };
    const sr = document.getElementById('showRetired');
    if(sr) sr.onchange = e=>{ state.showRetired = e.target.checked; render(); };

    document.querySelectorAll('.rating-row3[data-mode="row"]').forEach(rr=>{
      rr.querySelectorAll('.rating-dot3').forEach(dot=>{
        dot.onclick = (e)=>{
          e.stopPropagation();
          if(!requireUser()) return;
          const r = state.recipes.find(x=>x.id===rr.dataset.id);
          const val = parseInt(dot.dataset.val);
          r.rating = (r.rating===val) ? 0 : val;
          r.updated_by = state.currentUser;
          r.updated_at = new Date().toISOString();
          persistRecipes();
          render();
        };
      });
    });
    const filterRatingRow = document.querySelector('.rating-row3[data-mode="filter"]');
    if(filterRatingRow) filterRatingRow.querySelectorAll('.rating-dot3').forEach(dot=>{
      dot.onclick = ()=>{
        const val = parseInt(dot.dataset.val);
        state.ratingFilter = (state.ratingFilter===val) ? 0 : val;
        render();
      };
    });
    document.querySelectorAll('.quick-note-input').forEach(inp=>{
      inp.onclick = e=>e.stopPropagation();
      inp.onkeydown = e=>{ if(e.key==='Enter') e.target.blur(); };
      inp.onblur = ()=>{
        const r = state.recipes.find(x=>x.id===inp.dataset.id);
        if(r && r.quickNote !== inp.value){
          if(!requireUser()) return;
          r.quickNote = inp.value;
          r.updated_by = state.currentUser;
          r.updated_at = new Date().toISOString();
          persistRecipes();
          render();
        }
      };
    });

    document.querySelectorAll('.row-toggle-lbl, .pin-order-btns, .stock-ctrl').forEach(el=>{ el.onclick = e=>e.stopPropagation(); });
    document.querySelectorAll('.pin-toggle').forEach(chk=>{
      chk.onclick = e=>e.stopPropagation();
      chk.onchange = ()=>{
        if(!requireUser()) { render(); return; }
        const r = state.recipes.find(x=>x.id===chk.dataset.id);
        r.pinned = chk.checked;
        if(chk.checked) r.pinOrder = Date.now();
        else r.pinSubCode = null;  // clear sub code when unpinned
        r.updated_by = state.currentUser;
        r.updated_at = new Date().toISOString();
        persistRecipes();
        render();
      };
    });
    document.querySelectorAll('.selling-toggle').forEach(chk=>{
      chk.onclick = e=>e.stopPropagation();
      chk.onchange = ()=>{
        if(!requireUser()) { render(); return; }
        const r = state.recipes.find(x=>x.id===chk.dataset.id);
        r.status = chk.checked ? 'active' : 'retired';
        r.updated_by = state.currentUser;
        r.updated_at = new Date().toISOString();
        persistRecipes();
        render();
      };
    });

    // 🛒 Online toggle — เปิด/ปิดให้สั่งผ่าน LIFF
    document.querySelectorAll('.online-toggle-btn').forEach(btn=>{
      btn.onclick = (e)=>{
        e.stopPropagation();
        if(!requireUser()) return;
        const r = state.recipes.find(x=>x.id===btn.dataset.id);
        if(!r) return;
        r.available_online = !r.available_online;
        r.updated_by = state.currentUser;
        r.updated_at = new Date().toISOString();
        persistRecipes();
        render();
        showToast(r.available_online ? '🛒 เปิดให้สั่งออนไลน์แล้ว' : '○ ปิดออนไลน์แล้ว');
      };
    });

    // 📤 Export button
    const exportOnlineBtn = document.getElementById('exportOnlineBtn');
    if(exportOnlineBtn) exportOnlineBtn.onclick = exportOnlineMenus;
    // 🛒 Online filter toggle — กดตัวเลข "N ออนไลน์" เพื่อกรองเฉพาะออนไลน์
    const toggleOnlineBtn = document.getElementById('toggleOnlineFilterBtn');
    if(toggleOnlineBtn) toggleOnlineBtn.onclick = (e)=>{
      e.stopPropagation();
      state.showOnlineOnly = !state.showOnlineOnly;
      render(true);
    };
    const importIngrBtn = document.getElementById('importIngrBtn');
    if(importIngrBtn) importIngrBtn.onclick = migrateIngredientSeed;
    const importNoCodeBtn = document.getElementById('importNoCodeBtn');
    if(importNoCodeBtn) importNoCodeBtn.onclick = migrateNoCodeRecipes;
    const migrateBtn = document.getElementById('migrateBtn');
    if(migrateBtn) migrateBtn.onclick = migrateDefaultPricesAndVegan;
    const migrateToSbBtn = document.getElementById('migrateToSbBtn');
    if(migrateToSbBtn) migrateToSbBtn.onclick = migrateWindowStorageToSupabase;
    // drag-drop handles pin ordering now

    document.querySelectorAll('.stock-ctrl').forEach(ctrl=>{
      const id = ctrl.dataset.id;
      const valInput = ctrl.querySelector('.stock-val');
      const commitStock = (newVal)=>{
        if(!requireUser()) return;
        const r = state.recipes.find(x=>x.id===id);
        r.stock = newVal;
        r.updated_by = state.currentUser;
        r.updated_at = new Date().toISOString();
        persistRecipes();
        render();
      };
      ctrl.querySelector('.stock-minus').onclick = (e)=>{ e.stopPropagation(); const r=state.recipes.find(x=>x.id===id); commitStock(Math.max(0,(r.stock||0)-1)); };
      ctrl.querySelector('.stock-plus').onclick = (e)=>{ e.stopPropagation(); const r=state.recipes.find(x=>x.id===id); commitStock((r.stock||0)+1); };
      valInput.onclick = e=>e.stopPropagation();
      valInput.onkeydown = e=>{ if(e.key==='Enter') e.target.blur(); };
      valInput.onblur = ()=>{
        const r = state.recipes.find(x=>x.id===id);
        const newVal = parseFloat(valInput.value)||0;
        if(newVal !== (r.stock||0)) commitStock(newVal);
      };
    });

    document.querySelectorAll('.cat-picker').forEach(picker=>{
      const mode = picker.dataset.mode;
      picker.querySelector('.cat-picker-btn').onclick = (e)=>{
        e.stopPropagation();
        if(mode==='filter') state.filterPickerOpen = !state.filterPickerOpen;
        else state.recipePickerOpen = !state.recipePickerOpen;
        render();
      };
      // กัน panel ปิดเมื่อคลิกข้างใน
      const panel_ = picker.querySelector('.cat-picker-panel');
      if(panel_) panel_.onclick = e => e.stopPropagation();
      picker.querySelectorAll('.cat-check').forEach(chk=>{
        chk.onclick = e=>e.stopPropagation();
        chk.onchange = ()=>{
          const key = chk.value;
          if(mode==='filter'){
            const i = state.categoryFilter.indexOf(key);
            if(chk.checked && i===-1) state.categoryFilter.push(key);

        i.stock = parseFloat(tr.querySelector('.ing-f-stock').value)||0;
        const fKcal = tr.querySelector('.ing-f-kcal'), fProtein = tr.querySelector('.ing-f-protein'), fCarb = tr.querySelector('.ing-f-carb'), fFat = tr.querySelector('.ing-f-fat');
        if(fKcal) i.kcal_per_unit = parseFloat(fKcal.value)||0;
        if(fProtein) i.protein_per_unit = parseFloat(fProtein.value)||0;
        if(fCarb) i.carb_per_unit = parseFloat(fCarb.value)||0;
        if(fFat) i.fat_per_unit = parseFloat(fFat.value)||0;
        i.updated_by = state.currentUser;
        i.updated_at = new Date().toISOString();
        persistIngredients();
        showToast('บันทึกแล้ว');
        render();
      };
      tr.querySelector('.delIngRow').onclick = ()=>{
        if(!requireUser()) return;
        showConfirm('ลบวัตถุดิบนี้ถาวร?', ()=>{
          state.ingredients = state.ingredients.filter(x=>x.id!==id);
          persistIngredients();
          render();
        });
      };
    });
    const newMarketInp = document.querySelector('.new-market');
    if(newMarketInp) newMarketInp.oninput = ()=>{
      const val = parseFloat(newMarketInp.value);
      const calcEl = document.getElementById('newCostCalc');
      if(calcEl){
        const costPerG = !isNaN(val) && val>0 ? Math.round(val/1000*100000)/100000 : 0;
        calcEl.textContent = costPerG>0 ? '฿'+fmtNum(costPerG) : '—';
      }
    };
    const addBtn = document.querySelector('.addIngBtn');
    if(addBtn) addBtn.onclick = ()=>{
      if(!requireUser()) return;
      const name = document.querySelector('.new-name').value.trim();
      if(!name){ showToast('กรุณาพิมพ์ชื่อ'); return; }
      const fKcal = document.querySelector('.new-kcal'), fProtein = document.querySelector('.new-protein'), fCarb = document.querySelector('.new-carb'), fFat = document.querySelector('.new-fat');
      const fMarketNew = document.querySelector('.new-market');
      const fCatNew = document.querySelector('.new-ingcat');
      const mktVal = fMarketNew ? (parseFloat(fMarketNew.value)||0) : 0;
      state.ingredients.push({
        id: 'i'+Date.now(),
        name,
        type: 'ingredient',
        ingCategory: fCatNew ? fCatNew.value : (state.ingCategoryFilter||''),
        unit: document.querySelector('.new-unit').value.trim()||'g',
        market_price_kg: mktVal,
        cost_per_unit: mktVal>0 ? Math.round(mktVal/1000*100000)/100000 : 0,
        stock: parseFloat(document.querySelector('.new-stock').value)||0,
        kcal_per_unit: fKcal ? (parseFloat(fKcal.value)||0) : 0,
        protein_per_unit: fProtein ? (parseFloat(fProtein.value)||0) : 0,
        carb_per_unit: fCarb ? (parseFloat(fCarb.value)||0) : 0,
        fat_per_unit: fFat ? (parseFloat(fFat.value)||0) : 0,
        suppliers: [], defaultSupplier: null,
        updated_by: state.currentUser,
        updated_at: new Date().toISOString(),
      });
      persistIngredients();
      render();
      showToast('เพิ่มแล้ว');
    };
  }
}

init();
</script>
</body>
</html>
