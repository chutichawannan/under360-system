<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Main Database — Under360</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FAF6EF;
  --surface:#FFFFFF;
  --surface-2:#F2ECE0;
  --ink:#2B2925;
  --ink-soft:#7A7468;
  --line:#E7DFD0;
  --forest:#1F4D3A;
  --forest-soft:#E3ECE6;
  --turmeric:#D98C2B;
  --turmeric-soft:#FBEDD8;
  --coral:#C9573F;
  --coral-soft:#F8E4DD;
  --saffron:#E8B339;
  --saffron-soft:#FBF1D9;
  --leaf:#3C7A5C;
  --leaf-soft:#E7EFE9;
  --radius:10px;
  /* aliases used in v2 components */
  --brd:#E7DFD0;
  --cream:#FAF6EF;
  --gl:#E3ECE6;
}
@keyframes spin{to{transform:rotate(360deg);}}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:'IBM Plex Sans Thai',sans-serif;-webkit-font-smoothing:antialiased;}
.mono{font-family:'IBM Plex Mono',monospace;}
header.top{position:sticky;top:0;z-index:20;background:var(--forest);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
header.top h1{font-size:17px;font-weight:600;margin:0;letter-spacing:.2px;}
header.top .sub{font-size:12px;opacity:.75;margin-top:2px;}
.tabs{display:flex;gap:6px;background:#fff;border-bottom:1px solid var(--line);padding:0 16px;position:sticky;top:56px;z-index:19;overflow-x:auto;}
.tab-btn{appearance:none;border:none;background:transparent;padding:13px 14px;font-size:14px;font-weight:500;color:var(--ink-soft);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;}
.tab-btn.active{color:var(--forest);border-bottom-color:var(--forest);font-weight:600;}
main{max-width:1120px;margin:0 auto;padding:10px 14px 80px;}
.stat-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.stat-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:10px 14px;flex:1;min-width:130px;}
.stat-card .num{font-size:20px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:var(--forest);}
.stat-card .lbl{font-size:11.5px;color:var(--ink-soft);margin-top:2px;}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px;}
.search-box{flex:1 1 140px;min-width:120px;position:relative;}
.search-box input{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-family:inherit;background:#fff;}
select.filt{padding:10px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:#fff;font-family:inherit;color:var(--ink);}
select.sort-sel{padding:5px 8px;border:1.5px solid var(--ink-soft);border-radius:6px;font-size:12px;background:var(--surface-2);font-family:inherit;color:var(--ink);cursor:pointer;max-width:110px;}
select.sort-sel:focus{outline:none;border-color:var(--forest);}
.btn{appearance:none;border:none;border-radius:8px;padding:10px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-primary{background:var(--forest);color:#fff;}
.btn-primary:hover{background:#163b2b;}
.btn-ghost{background:var(--surface-2);color:var(--ink);}
.btn-ghost:hover{background:#e9e0cd;}
.btn-warn{background:var(--coral-soft);color:var(--coral);}
.btn-export{background:var(--forest-soft);color:var(--forest);border:1.5px solid var(--forest);font-weight:600;}
.btn-export:hover{background:#c8ddd0;}
.online-toggle-btn{appearance:none;border:1.5px solid var(--line);border-radius:20px;padding:3px 10px;font-size:11.5px;cursor:pointer;background:var(--surface-2);color:var(--ink-soft);white-space:nowrap;font-family:inherit;transition:all .15s;flex-shrink:0;line-height:1.4;}
.online-toggle-btn.online-on{background:var(--forest-soft);color:var(--forest);border-color:var(--forest);font-weight:700;}
.online-toggle-btn:hover{opacity:.8;}
.online-export-bar{background:var(--forest-soft);border:1px solid rgba(31,77,58,.25);border-radius:var(--radius);padding:10px 14px;display:flex;align-items:center;gap:12px;margin-bottom:10px;font-size:13px;}
.online-export-bar .cnt{font-size:18px;font-weight:700;color:var(--forest);font-family:'IBM Plex Mono',monospace;}
.btn-sm{padding:7px 11px;font-size:12.5px;}
.line-group{margin-bottom:12px;}
.line-group h2{font-size:12.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-soft);margin:0 0 5px 2px;display:flex;align-items:center;gap:8px;}
.line-group h2 .dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:5px;overflow:hidden;}
.row{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;}
.row:hover{background:var(--surface-2);}
.code-badge{font-family:'IBM Plex Mono',monospace;font-size:11.5px;font-weight:600;background:var(--forest-soft);color:var(--forest);padding:3px 7px;border-radius:6px;white-space:nowrap;}
.subcode-input{font-family:'IBM Plex Mono',monospace;font-size:11.5px;font-weight:600;width:64px;padding:2px 6px;border:1.5px dashed var(--turmeric);border-radius:6px;color:var(--turmeric);background:var(--turmeric-soft);outline:none;min-width:0;flex-shrink:0;}
.subcode-input:focus{border-style:solid;background:#fff;}
.subcode-input::placeholder{color:rgba(217,140,43,.45);font-weight:400;}
.subcode-badge{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;background:var(--turmeric-soft);color:var(--turmeric);padding:2px 7px;border-radius:6px;white-space:nowrap;flex-shrink:0;border:1px solid rgba(217,140,43,.3);}
.row .name{font-size:14.5px;font-weight:500;}
.row .meta{font-size:11.5px;color:var(--ink-soft);white-space:nowrap;font-family:'IBM Plex Mono',monospace;}
.badge-retired{font-size:10.5px;background:var(--surface-2);color:var(--ink-soft);padding:2px 6px;border-radius:5px;}
.badge-incomplete{font-size:10.5px;background:var(--turmeric-soft);color:var(--turmeric);padding:2px 6px;border-radius:5px;}
.panel{padding:16px;border-top:1px solid var(--line);background:#FDFBF6;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;color:var(--ink-soft);margin-bottom:4px;font-weight:500;}
.field input[type=text],.field input[type=number],.field select,.field textarea{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:7px;font-size:14px;font-family:inherit;background:#fff;}
.field textarea{min-height:80px;resize:vertical;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ing-line{display:grid;grid-template-columns:1fr 70px 70px 30px;gap:6px;margin-bottom:6px;align-items:center;}
.ing-line input{padding:8px 9px;border:1px solid var(--line);border-radius:6px;font-size:13.5px;font-family:inherit;}
.ing-line .rm{background:var(--coral-soft);color:var(--coral);border:none;border-radius:6px;height:34px;cursor:pointer;font-size:15px;}
.unlinked-flag{font-size:10.5px;color:var(--turmeric);margin-top:-2px;margin-bottom:6px;}
.totals-box{display:flex;gap:14px;flex-wrap:wrap;background:var(--forest-soft);border-radius:8px;padding:10px 14px;margin:12px 0;}
.totals-box .t{font-size:12px;color:var(--forest);}
.totals-box .t b{font-family:'IBM Plex Mono',monospace;font-size:14.5px;display:block;}
.dup-warning{background:var(--coral-soft);border:1px solid #e0b4a6;border-radius:8px;padding:12px;margin-bottom:12px;}
.dup-warning .h{font-size:13.5px;font-weight:600;color:var(--coral);margin-bottom:8px;}
.dup-item{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:6px;padding:8px 10px;margin-bottom:6px;font-size:13px;}
.dup-item .score{font-size:11px;color:var(--ink-soft);}
.panel-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.empty{text-align:center;padding:40px 20px;color:var(--ink-soft);font-size:14px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--forest);color:#fff;padding:10px 18px;border-radius:30px;font-size:13.5px;z-index:50;box-shadow:0 4px 16px rgba(0,0,0,.2);}
.fab{position:fixed;bottom:22px;right:22px;background:var(--turmeric);color:#fff;border:none;border-radius:30px;padding:14px 20px;font-size:14.5px;font-weight:600;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.18);z-index:25;}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--radius);}
.ing-table{width:100%;min-width:780px;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
.ing-table th{text-align:left;font-size:11.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.4px;padding:9px 10px;background:var(--surface-2);}
.ing-table td{padding:8px 10px;border-top:1px solid var(--line);font-size:13.5px;}
.ing-table input{width:100%;padding:6px 7px;border:1px solid var(--line);border-radius:5px;font-size:13px;font-family:inherit;}
.banner{background:var(--turmeric-soft);color:#7a4f10;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;}
.name-wrap{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0;}
.chip-row{display:flex;flex-wrap:wrap;gap:4px;}
.cat-chip{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;background:var(--surface-2);color:var(--ink-soft);padding:2px 7px;border-radius:10px;}
.nutri-chip{background:var(--forest-soft);color:var(--forest);font-family:'IBM Plex Mono',monospace;font-weight:600;}
.quick-row{display:flex;align-items:center;gap:8px;margin-top:2px;}
.rating-row{display:flex;gap:3px;align-items:center;flex-shrink:0;}
.rating-filter-wrap{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink-soft);}
.quick-note-input{flex:1;min-width:0;font-size:11.5px;padding:4px 8px;border:1px solid var(--line);border-radius:6px;background:var(--surface-2);color:var(--ink);font-family:inherit;}
.line-calc{font-size:11px;color:var(--forest);font-family:'IBM Plex Mono',monospace;margin:-2px 0 10px 2px;}
.line-calc-warn{color:var(--coral);font-family:'IBM Plex Sans Thai',sans-serif;}
.line-calc-soft{color:var(--ink-soft);font-family:'IBM Plex Sans Thai',sans-serif;}
.sup-picker{position:relative;display:inline-block;}
.sup-picker-btn{padding:6px 9px;border:1px solid var(--line);border-radius:7px;font-size:12px;background:#fff;font-family:inherit;color:var(--ink);cursor:pointer;max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:left;}
.sup-picker-panel{position:absolute;top:calc(100% + 4px);left:0;background:#fff;border:1px solid var(--line);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.14);padding:8px;min-width:240px;max-height:260px;overflow-y:auto;z-index:30;}
.sup-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 4px;font-size:13px;border-radius:6px;cursor:pointer;}
.sup-row:hover{background:var(--surface-2);}
.sup-row input[type=checkbox]{width:auto;margin:0;}
.sup-default-btn{font-size:10px;color:var(--ink-soft);cursor:pointer;white-space:nowrap;padding:2px 7px;border-radius:10px;flex-shrink:0;}
.sup-default-btn.is-default{color:#7a4f10;background:var(--turmeric-soft);font-weight:700;}
.sup-add{display:flex;gap:6px;margin-top:6px;padding-top:8px;border-top:1px solid var(--line);}
.sup-add input{flex:1;padding:7px 8px;border:1px solid var(--line);border-radius:6px;font-size:13px;font-family:inherit;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal-card{background:#fff;border-radius:14px;padding:22px;max-width:420px;width:100%;max-height:80vh;overflow-y:auto;}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.modal-head h2{font-size:16px;color:var(--forest);margin:0;}
.modal-close{background:none;border:none;font-size:22px;color:var(--ink-soft);cursor:pointer;line-height:1;padding:0 4px;}
.cat-manage-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--line);}
.cat-manage-row input{flex:1;padding:7px 9px;border:1px solid var(--line);border-radius:6px;font-size:13.5px;font-family:inherit;min-width:0;}
.parts-wrap{display:flex;flex-direction:column;gap:14px;margin-bottom:10px;}
.part-block{border:1px solid var(--line);border-radius:10px;padding:12px;background:var(--surface-2);}
.part-head{display:flex;gap:8px;align-items:center;margin-bottom:10px;}
.part-label{flex:1;padding:8px 10px;border:1px solid var(--line);border-radius:7px;font-size:13.5px;font-family:inherit;font-weight:600;background:#fff;}
.rmPart{background:var(--coral-soft);color:var(--coral);border:none;border-radius:6px;padding:0 12px;height:36px;cursor:pointer;font-size:12.5px;white-space:nowrap;}
.part-instructions{width:100%;min-height:70px;resize:vertical;margin-top:10px;padding:9px 10px;border:1px solid var(--line);border-radius:7px;font-size:14px;font-family:inherit;background:#fff;}
.photo-box{display:flex;flex-direction:column;gap:8px;align-items:flex-start;}
.photo-preview{max-width:180px;max-height:180px;border-radius:8px;border:1px solid var(--line);object-fit:cover;display:block;}
.photo-upload-label{display:inline-flex;align-items:center;justify-content:center;width:180px;height:110px;border:1.5px dashed var(--line);border-radius:8px;color:var(--ink-soft);font-size:13px;cursor:pointer;text-align:center;padding:8px;}
.photo-upload-label:hover{background:var(--surface-2);}
.photo-loading{color:var(--ink-soft);font-size:13px;padding:10px 0;}
.photo-actions{display:flex;gap:8px;}
.photo-replace-label{cursor:pointer;}
.plan-add-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.plan-add-row select{flex:1;min-width:200px;padding:9px 10px;border:1px solid var(--line);border-radius:7px;font-size:14px;font-family:inherit;background:#fff;}
.plan-add-row input{width:90px;padding:9px 10px;border:1px solid var(--line);border-radius:7px;font-size:14px;font-family:inherit;}
.plan-list{display:flex;flex-direction:column;gap:8px;margin:16px 0;}
.plan-item-row{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:10px 12px;}
.plan-item-name{flex:1;font-size:14px;font-weight:500;}
.plan-qty-edit{width:70px;padding:6px 8px;border:1px solid var(--line);border-radius:6px;font-family:inherit;font-size:13.5px;}
.plan-unit-label{font-size:12px;color:var(--ink-soft);}
.plan-summary-head{margin-top:22px;font-size:15px;color:var(--forest);}
.plan-row-missing{background:var(--coral-soft);}
.plan-missing-tag{font-size:10px;color:var(--coral);}
.plan-enough-tag{color:var(--forest);font-weight:600;}
.cat-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0;}
.cat-picker{position:relative;flex:2 1 200px;min-width:180px;max-width:60%;}
.cat-picker-btn{padding:10px 14px;border:1px solid var(--forest);border-radius:8px;font-size:13px;background:var(--forest-soft);font-family:inherit;color:var(--forest);cursor:pointer;min-width:200px;flex:0 0 auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:left;font-weight:500;}
.cat-picker-panel{position:absolute;top:calc(100% + 4px);left:0;background:#fff;border:1px solid var(--line);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.14);padding:8px;min-width:250px;max-height:280px;overflow-y:auto;z-index:30;}
.cat-picker-panel label{display:flex;align-items:center;gap:8px;padding:9px 10px;font-size:13.5px;cursor:pointer;border-radius:6px;user-select:none;}
.cat-picker-panel label:hover{background:var(--surface-2);}
.cat-picker-panel input[type=checkbox]{width:auto;margin:0;}
.cat-picker-add{display:flex;gap:6px;margin-top:6px;padding-top:8px;border-top:1px solid var(--line);}
.cat-picker-add input{flex:1;padding:7px 8px;border:1px solid var(--line);border-radius:6px;font-size:13px;font-family:inherit;}
@media (max-width:680px){
  main{padding:14px 10px 90px;}
  .grid2{grid-template-columns:1fr;}
  .row .meta{display:none;}
  .stat-card{min-width:100px;}
  header.top h1{font-size:15px;}
}
.whoami{display:flex;align-items:center;gap:8px;font-size:12.5px;opacity:.85;}
.whoami button{appearance:none;border:1px solid rgba(255,255,255,.35);background:transparent;color:#fff;border-radius:20px;padding:5px 11px;font-size:12px;cursor:pointer;font-family:inherit;}
.gate-wrap{min-height:60vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.gate-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:28px 26px;max-width:340px;width:100%;text-align:center;}
.gate-card h2{font-size:17px;margin:0 0 6px;color:var(--forest);}
.gate-card p{font-size:13px;color:var(--ink-soft);margin:0 0 18px;}
.gate-card input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:8px;font-size:15px;font-family:inherit;margin-bottom:12px;text-align:center;}
.gate-card .btn{width:100%;}
.last-edit{font-size:11.5px;color:var(--ink-soft);margin:-4px 0 12px;}
.stock-low{color:var(--coral);font-weight:600;}
.subtab-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}

/* === name-gate (top-right identity) === */
.name-gate-input{padding:6px 9px;border:1px solid rgba(255,255,255,.4);border-radius:7px;font-size:12.5px;font-family:inherit;background:rgba(255,255,255,.12);color:#fff;width:140px;}
.name-gate-input::placeholder{color:rgba(255,255,255,.65);}
.name-gate-save{appearance:none;border:none;background:var(--turmeric);color:#fff;border-radius:7px;padding:6px 11px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
@keyframes pulseHighlight{0%{box-shadow:0 0 0 0 rgba(217,140,43,.7);}70%{box-shadow:0 0 0 8px rgba(217,140,43,0);}100%{box-shadow:0 0 0 0 rgba(217,140,43,0);}}
.pulse-highlight{animation:pulseHighlight 1s ease-out 2;border-color:var(--turmeric) !important;}

/* === pin to top / row-level toggles === */
.row{flex-wrap:wrap;}
.row-toggles{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.row-toggle-lbl{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--ink-soft);cursor:pointer;white-space:nowrap;}
.row-toggle-lbl input[type=checkbox]{width:15px;height:15px;margin:0;cursor:pointer;}
.pin-order-btns{display:flex;flex-direction:column;gap:1px;}
.pin-order-btns button{appearance:none;border:none;background:var(--surface-2);color:var(--ink-soft);width:18px;height:14px;font-size:9px;line-height:1;cursor:pointer;border-radius:3px;padding:0;}
.pin-order-btns button:hover{background:var(--turmeric-soft);color:var(--turmeric);}
.card.is-pinned{border:1px solid var(--turmeric);box-shadow:0 0 0 1px var(--turmeric) inset;}
.card.is-pinned .row{background:var(--turmeric-soft);}
.row.not-selling{opacity:.55;}
.ptt-head{display:flex;align-items:center;gap:8px;}
.ptt-pill{font-size:10.5px;font-weight:700;background:var(--turmeric);color:#fff;padding:2px 8px;border-radius:10px;letter-spacing:.4px;}

/* === stock control === */
.stock-ctrl{display:flex;align-items:center;gap:3px;flex-shrink:0;margin-left:auto;}
.stock-ctrl button{appearance:none;border:none;background:var(--surface-2);color:var(--ink);width:24px;height:24px;border-radius:6px;font-size:14px;cursor:pointer;line-height:1;}
.stock-ctrl button:hover{background:#e9e0cd;}
.stock-ctrl input{width:48px;text-align:center;padding:4px 2px;border:1px solid var(--line);border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:12.5px;}
.stock-lbl{font-size:9.5px;color:var(--ink-soft);text-align:center;}

/* === name + category combined line, compact 2-line card === */
.name-line{display:flex;align-items:baseline;flex-wrap:wrap;gap:6px;row-gap:2px;}
.quick-row{flex-wrap:wrap;}
.quick-row.incomplete{background:var(--coral-soft);border:1px solid #eccabf;border-radius:6px;padding:2px 7px;}
.quick-row.incomplete .quick-kcal{color:var(--coral);font-weight:600;font-family:'IBM Plex Sans Thai',sans-serif;}
.quick-kcal{font-size:11px;color:var(--forest);font-family:'IBM Plex Mono',monospace;white-space:nowrap;flex-shrink:0;}

/* === 3-state rating (orange / yellow / green) === */
.rating-row3{display:flex;gap:4px;align-items:center;flex-shrink:0;}
.rating-dot3{width:13px;height:13px;border-radius:50%;cursor:pointer;display:inline-block;border:1.5px solid var(--line);background:transparent;}
.rating-dot3.r1{border-color:#e6c096;}
.rating-dot3.r2{border-color:#eeddA0;}
.rating-dot3.r3{border-color:#a9c7b6;}

// ── Storage Layer: Supabase (shared) + localStorage (private) ────────────
// shared=true  → Supabase kitchen_data table
// shared=false → localStorage (user nickname etc.)
const _sb_table = 'kitchen_data';

async function getStored(key, shared){
  if(shared === false){
    try{ const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
    catch(e){ return null; }
  }
  // Supabase first
  try{
    const sb = getSB();
    const { data, error } = await sb.from(_sb_table)
      .select('data').eq('key', key).maybeSingle();
    if(!error && data){
      // Cache locally for offline use
      try{ localStorage.setItem('cache:'+key, JSON.stringify(data.data)); }catch(e){}
      return data.data;
    }
  } catch(e){}
  // Offline fallback: localStorage cache
  try{
    const v = localStorage.getItem('cache:'+key);
    if(v){
      state._offlineMode = true;
      return JSON.parse(v);
    }
  }catch(e){}
  return null;
}
async function setStored(key, value, shared){
  if(shared === false){
    try{ localStorage.setItem(key, JSON.stringify(value)); return true; }
    catch(e){ return false; }
  }
  // Always save to local cache first (offline safety)
  try{ localStorage.setItem('cache:'+key, JSON.stringify(value)); }catch(e){}
  // Try Supabase
  try{
    const sb = getSB();
    const { error } = await sb.from(_sb_table)
      .upsert({ key, data: value, updated_at: new Date().toISOString() },
               { onConflict: 'key' });
    if(!error){
      localStorage.removeItem('pending:'+key); // clear pending flag
      state._pendingSync = !!Object.keys(localStorage).filter(k=>k.startsWith('pending:')).length;
      return true;
    }
    console.error('setStored:', error);
  } catch(e){}
  // Supabase failed — mark pending sync
  localStorage.setItem('pending:'+key, new Date().toISOString());
  state.storageOk = false;
  state._offlineMode = true;
  state._pendingSync = true;
  return false;
}
async function deleteStored(key, shared){
  if(shared === false){
    try{ localStorage.removeItem(key); return true; } catch(e){ return false; }
  }
  try{
    const sb = getSB();
    await sb.from(_sb_table).delete().eq('key', key);
    return true;
  } catch(e){ return false; }
}

function compressImageFile(file, maxDim, quality){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w > h && w > maxDim){ h = Math.round(h*maxDim/w); w = maxDim; }
        else if(h >= w && h > maxDim){ w = Math.round(w*maxDim/h); h = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = ()=>reject(new Error('โหลดรูปไม่สำเร็จ'));
      img.src = e.target.result;
    };
    reader.onerror = ()=>reject(new Error('อ่านไฟล์ไม่สำเร็จ'));
    reader.readAsDataURL(file);
  });
}

function normTxt(s){ return (s||'').toString().trim(); }
function bigrams(s){
  s = normTxt(s).replace(/\s+/g,'');
  const set = new Set();
  if(s.length < 2){ if(s.length===1) set.add(s); return set; }
  for(let i=0;i<s.length-1;i++) set.add(s.substr(i,2));
  return set;
}
function diceSim(a,b){
  const A=bigrams(a), B=bigrams(b);
  if(A.size===0||B.size===0) return 0;
  let inter=0; for(const x of A) if(B.has(x)) inter++;
  return (2*inter)/(A.size+B.size);
}
function jaccardSim(setA,setB){
  if(setA.size===0||setB.size===0) return 0;
  let inter=0; for(const x of setA) if(setB.has(x)) inter++;
  const union = setA.size+setB.size-inter;
  return union===0?0:inter/union;
}

      if(!requireUser()) return;
      const key = btn.dataset.key;
      const dir = btn.dataset.dir;
      const idx = state.categories.findIndex(c=>c.key===key);
      if(idx<0) return;

      if(swap<0 || swap>=state.categories.length) return;

        state.ingredients.forEach(i=>{
          i.suppliers = (i.suppliers||[]).filter(k=>k!==btn.dataset.key);
          if(i.defaultSupplier===btn.dataset.key) i.defaultSupplier = i.suppliers[0]||null;
        });
        persistSuppliers();
        persistIngredients();
        render();
      });
    };

function showConfirm(msg, onYes){

function renderLineCalcInner(l){
  if(!l.name) return '';
  const ing = findIngredient(l.name);

  const qty = parseFloat(l.qty)||0;
  if(!qty) return `<span class="line-calc-soft">กรอกปริมาณเพื่อคำนวณ</span>`;
  const cost = qty*(parseFloat(ing.cost_per_unit)||0);

  const protein = qty*(parseFloat(ing.protein_per_unit)||0);
  const carb = qty*(parseFloat(ing.carb_per_unit)||0);
  const fat = qty*(parseFloat(ing.fat_per_unit)||0);
  return `→ ${fmtNum(kcal)} kcal · P${fmtNum(protein)} C${fmtNum(carb)} F${fmtNum(fat)} · ฿${fmtMoney(cost)}`;

function findIngredient(name){
  const n = normTxt(name).toLowerCase();
  return state.ingredients.find(i=>normTxt(i.name).toLowerCase()===n);
}
function linkedNameSet(recipe){
  const set = new Set();
  (recipe.parts||[]).forEach(part=>{
    (part.lines||[]).forEach(l=>{
      if(findIngredient(l.name)) set.add(normTxt(l.name).toLowerCase());
    });
  });
  return set;
}
function computeTotals(recipe){
  let cost=0, kcal=0, protein=0, carb=0, fat=0, allLinked=true, hasLine=false;
  (recipe.parts||[]).forEach(part=>{
    (part.lines||[]).forEach(l=>{
      hasLine = true;
      const ing = findIngredient(l.name);
      const qty = parseFloat(l.qty)||0;
      if(ing){
        cost += qty*(parseFloat(ing.cost_per_unit)||0);
        kcal += qty*(parseFloat(ing.kcal_per_unit)||0);
        protein += qty*(parseFloat(ing.protein_per_unit)||0);
        carb += qty*(parseFloat(ing.carb_per_unit)||0);
        fat += qty*(parseFloat(ing.fat_per_unit)||0);
      } else { allLinked = false; }
    });
  });
  return {cost,kcal,protein,carb,fat,complete: hasLine && allLinked};
}
function computePurchasePlan(){
  const needed = {};
  state.planItems.forEach(item=>{
    const recipe = state.recipes.find(r=>r.id===item.recipeId);
    if(!recipe) return;
    const qty = parseFloat(item.qty)||0;
    (recipe.parts||[]).forEach(part=>{
      (part.lines||[]).forEach(l=>{
        if(!l.name) return;
        const key = normTxt(l.name).toLowerCase();
        const lineQty = (parseFloat(l.qty)||0) * qty;
        if(!needed[key]) needed[key] = {displayName: l.name, totalQty: 0, unit: l.unit||''};
        needed[key].totalQty += lineQty;
      });
    });
  });
  const rows = Object.values(needed).map(n=>{
    const ing = findIngredient(n.displayName);
    const stock = ing ? (ing.stock||0) : 0;
    const toBuy = Math.max(0, n.totalQty - stock);
    const cost = ing ? toBuy*(parseFloat(ing.cost_per_unit)||0) : 0;
    return {name: ing?ing.name:n.displayName, totalQty:n.totalQty, stock, toBuy, unit: ing?ing.unit:n.unit, cost, found: !!ing};
  });
  rows.sort((a,b)=>b.toBuy-a.toBuy);
  const totalCost = rows.reduce((s,r)=>s+r.cost,0);
  return {rows, totalCost};
}

async function mpLoadAssignments(){
  const sb=getSB(); if(!sb) return;
  try{
    const today=new Date().toISOString().split('T')[0];
    const {data,error}=await sb.from('daily_menu_assignments').select('*').eq('plan_date',today);
    if(error) throw error;
    state.mpCustAssign={};
    (data||[]).forEach(row=>{
      if(!state.mpCustAssign[row.customer_id]) state.mpCustAssign[row.customer_id]=[];
      state.mpCustAssign[row.customer_id].push({code:row.menu_code,qty:row.qty||1,note:row.note||''});
    });
  }catch(e){console.error('mpLoadAssignments:',e);}
}
async function mpSaveAssign(cid,code,qty,note){
  const sb=getSB(); if(!sb) return;
  try{
    const today=new Date().toISOString().split('T')[0];
    await sb.from('daily_menu_assignments').upsert({
      plan_date:today,customer_id:cid,menu_code:code,qty:qty||1,note:note||'',
      updated_at:new Date().toISOString()
    },{onConflict:'plan_date,customer_id,menu_code'});
  }catch(e){console.error('mpSaveAssign:',e);}
}
async function mpDeleteAssign(cid,code){

    await sb.from('daily_menu_assignments').delete().eq('plan_date',today).eq('customer_id',cid).eq('menu_code',code);

  else { if(mpTotalQty(cid)>=7) return; arr.push({code,qty:1,note:""}); state.mpCustAssign[cid]=arr; mpSaveAssign(cid,code,1,""); }
  render();
}
function mpSelectCust(cid){
  state.mpSelectedCid=(state.mpSelectedCid===cid)?null:cid;
  render();
}
function mpRemoveMenu(cid,code){
  state.mpCustAssign[cid]=(state.mpCustAssign[cid]||[]).filter(e=>e.code!==code);
  mpDeleteAssign(cid,code);
  render();
}

  </div>`;

    html += `<div class="slot-editor">
      <span style="font-size:12px;font-weight:600;color:var(--ink-soft);">ชุดอาหาร:</span>
      ${state.mpSlots.map((s,i)=>`<span class="slot-tag">${escapeHtml(s)}<button class="mp-rm-slot" data-idx="${i}">×</button></span>`).join('')}
      <input type="text" id="mpNewSlotInput" placeholder="เพิ่มชุด เช่น ชุดที่ 2..." style="padding:5px 8px;border:1px solid var(--line);border-radius:6px;font-size:12.5px;width:180px;font-family:inherit;">

    </div>`;
  }

    html += `<div class="empty" style="margin-top:24px;">ยังไม่มีวันที่ — เลือกวันที่แล้วกด "+ เพิ่มวันที่" ด้านบน</div>`;
    return html + renderMpLookback();
  }

    <div class="mp-days-row">`;
  allDates.forEach(iso=>{
    const d=mpDateFromIso(iso);
    const isToday=iso===todayISO;
    html += `<div class="mp-day-col" data-iso="${iso}">
      <div class="mp-day-header${isToday?' mp-today':''}">

      <div class="mp-day-body">`;

      const isOpen=state.mpPickerCell&&state.mpPickerCell.date===iso&&state.mpPickerCell.slot===slot;
      html += `<div class="mp-slot-section">
        <div class="mp-slot-label">${escapeHtml(slot)}</div>
        <div class="mp-cell">`;
      entries.forEach(({recipeId,qty,customers},idx)=>{
        const r=state.recipes.find(x=>x.id===recipeId); if(!r) return;
        html += `<div class="mp-entry-wrap">
          <div class="mp-entry">
            <span class="mp-r-label" title="${escapeHtml(r.name)}">${escapeHtml(r.code?r.code+' '+r.name:r.name)}</span>

            <span class="mp-customer-icon">👤</span>

      if(isOpen){

            ${r.code?`<span class="mp-r-code">${escapeHtml(r.code)}</span>`:''}
            <span class="mp-r-name">${escapeHtml(r.name)}</span>
            ${r.pinSubCode?`<span style="font-size:10px;color:var(--turmeric);font-family:'IBM Plex Mono',monospace;font-weight:700;">${escapeHtml(r.pinSubCode)}</span>`:''}

        html += `<div class="mp-picker">
          <input type="text" class="mp-search-inp" placeholder="🔍 ค้นหาเมนู..." autocomplete="off">
          <div class="mp-recipe-list">
            ${pttR.length?`<div class="mp-section-hd" style="color:var(--turmeric);">📌 PTT (${pttR.length})</div>${pttR.map(r=>mpBtn(r)).join('')}`:''}
            ${activeNonPtt.length?`<div class="mp-section-hd" style="border-top:1px solid var(--line);margin-top:3px;color:var(--forest);">เปิดขายอยู่ (${activeNonPtt.length})</div>${activeNonPtt.map(r=>mpBtn(r)).join('')}`:''}

  });
  html += `</div></div>`; /* close .mp-days-row .mp-grid-wrap */

  /* summary */

  if(Object.keys(totals).length){

    html += `<div style="display:flex;align-items:center;gap:10px;margin:14px 0 8px;flex-wrap:wrap;">
      <h2 style="margin:0;">สรุปทั้งหมด ${allDates.length} วัน — ${totalQty} ชุด</h2>
      <button class="btn btn-primary btn-sm" id="mpSendToPlan">📦 ส่งไปแพลนซื้อวัตถุดิบ</button>
      <button class="btn btn-ghost btn-sm" id="mpPrintBtn">🖨 Print</button>
    </div>
    <table class="mp-summary-table"><thead><tr><th>โค้ด</th><th>ชื่อเมนู</th><th>รวม (ชุด)</th><th>ลูกค้า / ออเดอร์</th><th>ต้นทุนรวม</th></tr></thead><tbody>`;
    Object.entries(totals).sort((a,b)=>b[1]-a[1]).forEach(([rid,qty])=>{

      const tot=computeTotals(r);
      const cn=[]; allDates.forEach(iso=>{ const day=state.mpData[iso]||{}; Object.values(day).forEach(ents=>(ents||[]).forEach(e=>{ if(e.recipeId===rid&&e.customers&&e.customers.trim()) cn.push(e.customers.trim()); })); });

    });
    html += `</tbody></table>`;
  }
  html += renderMpLookback();
  return html;
}

function renderMpLookback(){
  let html = `<div style="margin-top:24px;"><h2 style="margin-bottom:10px;">📊 สรุปย้อนหลัง</h2>
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">
      ${[7,14,21].map(n=>`<button class="btn ${state.mpLookbackDays===n?'btn-primary':'btn-ghost'} btn-sm mp-lookback-btn" data-days="${n}">${n} วันที่ผ่านมา</button>`).join('')}
      ${state.mpLookbackDays?'<button class="btn btn-ghost btn-sm" id="mpClearLookback">× ปิด</button>':''}
    </div>`;
  if(state.mpLookbackDays){
    const rangeDates=mpLookbackDateRange(state.mpLookbackDays);
    const totals=mpSummaryForDates(rangeDates);
    if(!Object.keys(totals).length){
      html += `<div class="empty">ไม่มีข้อมูลย้อนหลัง ${state.mpLookbackDays} วัน</div>`;
    } else {
      const totalQty=Object.values(totals).reduce((a,b)=>a+b,0);
      html += `<div style="font-size:12px;color:var(--ink-soft);margin-bottom:8px;">ย้อนหลัง ${state.mpLookbackDays} วัน · รวม ${totalQty} ชุด · ${Object.keys(totals).length} เมนู</div>`;
      html += `<table class="mp-summary-table"><thead><tr><th>โค้ด</th><th>ชื่อเมนู</th><th>รวม (ชุด)</th><th>ต้นทุนรวม</th></tr></thead><tbody>`;
      Object.entries(totals).sort((a,b)=>b[1]-a[1]).forEach(([rid,qty])=>{
        const r=state.recipes.find(x=>x.id===rid); if(!r) return;
        const tot=computeTotals(r);
        html += `<tr><td style="font-family:'IBM Plex Mono',monospace;font-size:12px;">${escapeHtml(r.code||'—')}</td><td>${escapeHtml(r.name)}</td><td style="font-weight:700;text-align:center;">${qty}</td><td style="font-family:'IBM Plex Mono',monospace;font-size:12px;">${tot.cost>0?'฿'+fmtMoney(tot.cost*qty):'—'}</td></tr>`;
      });
      html += `</tbody></table>`;
    }
  }
  return html+'</div>';
}

function attachMealPlanHandlers(){
  const dp=document.getElementById('mpDatePicker');
  if(dp&&!dp.value) dp.value=mpIsoDate(new Date());
  const addDateBtn=document.getElementById('mpAddDateBtn');
  if(addDateBtn) addDateBtn.onclick=()=>{
    const iso=dp&&dp.value; if(!iso){ showToast('กรุณาเลือกวันที่ก่อน'); return; }
    mpAddDate(iso); render();
    setTimeout(()=>{ const el=document.querySelector(`.mp-day-col[data-iso="${iso}"]`); if(el) el.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}); },80);
  };
  const todayBtn=document.getElementById('mpTodayBtn');
  if(todayBtn) todayBtn.onclick=()=>{
    const iso=mpIsoDate(new Date());
    if(!state.mpDates.includes(iso)){ mpAddDate(iso); render(); }
    setTimeout(()=>{ const el=document.querySelector('.mp-day-header.mp-today'); if(el) el.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}); },80);
  };
  document.querySelectorAll('.mp-vd-btn').forEach(btn=>btn.onclick=()=>{
    state.mpViewDays=parseInt(btn.dataset.days); persistAppConfig(); render();
  });
  /* horizontal mouse-wheel scroll */
  const gridWrap=document.getElementById('mpGridWrap');
  if(gridWrap) gridWrap.addEventListener('wheel',(e)=>{ if(Math.abs(e.deltaY)>=Math.abs(e.deltaX)){ e.preventDefault(); gridWrap.scrollLeft+=e.deltaY*2; } },{passive:false});

  /* slot editor */
  const slotEdBtn=document.getElementById('mpSlotEditorBtn');
  if(slotEdBtn) slotEdBtn.onclick=()=>{ state.mpShowSlotEditor=!state.mpShowSlotEditor; render(); };
  document.querySelectorAll('.mp-rm-slot').forEach(btn=>btn.onclick=(e)=>{ e.stopPropagation(); state.mpSlots.splice(parseInt(btn.dataset.idx),1); mpSaveData(); render(); });
  const addSlotBtn=document.getElementById('mpAddSlotBtn');
  if(addSlotBtn) addSlotBtn.onclick=()=>{
    const inp=document.getElementById('mpNewSlotInput'); const val=inp&&inp.value.trim();
    if(!val||state.mpSlots.includes(val)) return;
    state.mpSlots.push(val); if(inp) inp.value=''; mpSaveData(); render();
  };

  /* open picker */
  document.querySelectorAll('.mp-open-picker').forEach(btn=>btn.onclick=(e)=>{
    e.stopPropagation(); state.mpPickerCell={date:btn.dataset.date,slot:btn.dataset.slot}; render();
    setTimeout(()=>{ const s=document.querySelector('.mp-search-inp'); if(s) s.focus(); },40);
  });

  /* add recipe immediately */
  function mpAddEntry(date,slot,recipeId){
    if(!requireUser()) return;
    if(!state.mpData[date]) state.mpData[date]={};
    if(!state.mpData[date][slot]) state.mpData[date][slot]=[];
    const ex=state.mpData[date][slot].find(e=>e.recipeId===recipeId);
    if(ex){ ex.qty=(parseFloat(ex.qty)||1)+1; } else { state.mpData[date][slot].push({recipeId,qty:1,customers:''}); }
    state.mpPickerCell={date,slot}; mpSaveData(); render();
  }
  document.querySelectorAll('.mp-recipe-btn').forEach(btn=>btn.onclick=(e)=>{ e.stopPropagation(); mpAddEntry(btn.dataset.date,btn.dataset.slot,btn.dataset.id); });

  /* live search */
  document.querySelectorAll('.mp-search-inp').forEach(inp=>{
    inp.onclick=e=>e.stopPropagation();
    inp.oninput=()=>{
      const q=inp.value.trim().toLowerCase();
      inp.closest('.mp-picker').querySelectorAll('.mp-all-item').forEach(item=>{
        item.style.display=(!q||item.dataset.name.includes(q)||item.dataset.code.includes(q))?'':'none';
      });
    };
    inp.onkeydown=e=>{ if(e.key==='Escape'){ state.mpPickerCell=null; render(); } };
  });

  /* qty: +/- buttons + onblur save + oninput live */
  function mpCommitQty(date,slot,idx,val){
    const entries=((state.mpData[date]||{})[slot])||[];
    if(entries[parseInt(idx)]){ entries[parseInt(idx)].qty=Math.max(1,parseFloat(val)||1); mpSaveData(); }
  }
  document.querySelectorAll('.mp-qty-minus').forEach(btn=>btn.onclick=(e)=>{
    e.stopPropagation();
    const {date,slot,idx}=btn.dataset;
    const inp=btn.parentElement.querySelector('.mp-qty');
    const newVal=Math.max(1,(parseFloat(inp.value)||1)-1);
    inp.value=newVal; mpCommitQty(date,slot,idx,newVal);
  });
  document.querySelectorAll('.mp-qty-plus').forEach(btn=>btn.onclick=(e)=>{
    e.stopPropagation();
    const {date,slot,idx}=btn.dataset;
    const inp=btn.parentElement.querySelector('.mp-qty');
    const newVal=(parseFloat(inp.value)||1)+1;
    inp.value=newVal; mpCommitQty(date,slot,idx,newVal);
  });
  document.querySelectorAll('.mp-qty').forEach(inp=>{
    inp.onclick=e=>e.stopPropagation();
    inp.oninput=()=>{ const {date,slot,idx}=inp.dataset; mpCommitQty(date,slot,idx,inp.value); };
    inp.onblur=()=>{ const {date,slot,idx}=inp.dataset; mpCommitQty(date,slot,idx,inp.value); };
  });

  /* customer field */
  document.querySelectorAll('.mp-customer-inp').forEach(inp=>{
    inp.onclick=e=>e.stopPropagation();
    inp.oninput=()=>{
      const {date,slot,idx}=inp.dataset;
      const entries=((state.mpData[date]||{})[slot])||[];
      if(entries[parseInt(idx)]){ entries[parseInt(idx)].customers=inp.value; mpSaveData(); }
    };
  });

  /* remove entry */
  document.querySelectorAll('.mp-rm').forEach(btn=>btn.onclick=(e)=>{
    e.stopPropagation(); if(!requireUser()) return;
    const {date,slot,idx}=btn.dataset;
    if(state.mpData[date]&&state.mpData[date][slot]){
      state.mpData[date][slot].splice(parseInt(idx),1);
      if(!state.mpData[date][slot].length) delete state.mpData[date][slot];
      if(!Object.keys(state.mpData[date]||{}).length) delete state.mpData[date];
    }
    mpSaveData(); render();
  });

  /* send to purchase plan */
  const sendBtn=document.getElementById('mpSendToPlan');
  if(sendBtn) sendBtn.onclick=()=>{
    const totals=mpSummaryForDates([...state.mpDates].sort());
    Object.entries(totals).forEach(([rid,qty])=>{
      const ex=state.planItems.find(p=>p.recipeId===rid);
      if(ex){ ex.qty=(ex.qty||0)+qty; } else { state.planItems.push({recipeId:rid,qty}); }
    });
    persistPlanItems(); state.tab='plan'; render();
    showToast(`ส่ง ${Object.keys(totals).length} เมนูไปหน้าแพลนซื้อแล้ว`);
  };
  document.getElementById('mpPrintBtn')?.onclick?.();
  const pb=document.getElementById('mpPrintBtn'); if(pb) pb.onclick=()=>window.print();

  /* lookback */
  document.querySelectorAll('.mp-lookback-btn').forEach(btn=>btn.onclick=()=>{
    const n=parseInt(btn.dataset.days); state.mpLookbackDays=state.mpLookbackDays===n?null:n; render();
  });
  document.getElementById('mpClearLookback')?.addEventListener?.('click',()=>{ state.mpLookbackDays=null; render(); });

  /* close picker on outside click */
  if(state.mpPickerCell) document.addEventListener('click',()=>{ if(state.mpPickerCell){ state.mpPickerCell=null; render(); } },{once:true});
}

function findDuplicates(recipe){
  const results = [];
  const mySet = linkedNameSet(recipe);
  const myCats = recipe.categories||[];
  state.recipes.forEach(other=>{
    if(other.id===recipe.id) return;
    const otherCats = other.categories||[];
    if(!myCats.some(c=>otherCats.includes(c))) return;
    const nameScore = diceSim(recipe.name, other.name);
    const otherSet = linkedNameSet(other);
    let ingScore = 0;
    if(mySet.size>=2 && otherSet.size>=2) ingScore = jaccardSim(mySet, otherSet);
    const score = Math.max(nameScore, ingScore);
    if(score >= 0.55){
      results.push({other, score, reason: nameScore>=ingScore ? 'ชื่อเมนูคล้ายกัน' : 'วัตถุดิบคล้ายกันมาก'});
    }
  });
  results.sort((a,b)=>b.score-a.score);
  return results.slice(0,5);
}

function fmtMoney(n){ return n.toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtNum(n){ return Math.round(n*10)/10; }
function fmtDateShort(iso){
  if(!iso) return '';
  try{
    const d = new Date(iso);
    return d.toLocaleDateString('th-TH',{day:'numeric',month:'short'}) + ' ' + d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
  }catch(e){ return ''; }
}

async function init(){
  // ── 4 SEQUENTIAL READS (was 9, was 16) ────────────────────────────────────
  // Large mutable data (separate keys so individual persists stay cheap)
  const rec      = await getStored('recipes',     true);
  const ing      = await getStored('ingredients', true);
  // All config/small data in one key
  const cfg      = await getStored('appConfig',   true);
  let lastName; try{ lastName = localStorage.getItem('lastNickname'); }catch(e){ lastName=null; }

  // ── UNPACK CONFIG (with migration from old separate keys) ──────────────────
  let cats, sups, plan, appSettings, initFlags, mpData, mpDates;
  if(cfg){
    cats        = cfg.categories;
    sups        = cfg.suppliers;
    plan        = cfg.planItems;
    appSettings = cfg.appSettings;
    initFlags   = cfg.initFlags || {};
    mpData      = cfg.mealPlanData  || {};
    mpDates     = cfg.mealPlanDates || [];
  } else {
    // One-time migration: read all old individual keys
    const [c,s,p,as,fl,mp,md,mb] = [
      await getStored('categories',  true),
      await getStored('suppliers',   true),
      await getStored('planItems',   true),
      await getStored('appSettings', true),
      await getStored('initFlags',   true),
      await getStored('mealPlanData',  true),
      await getStored('mealPlanDates', true),
      await getStored('mealPlanBundle',true),
    ];
    cats = c; sups = s; plan = p;
    appSettings = as || {};
    initFlags   = fl || {};
    mpData  = mp || (mb&&mb.mpData)  || {};
    mpDates = md || (mb&&mb.mpDates) || [];
    // Also migrate even older individual flag keys into initFlags
    if(!initFlags.nutriSeedImported) initFlags.nutriSeedImported = await getStored('nutriSeedImported',true);
    if(!initFlags.refPriceImported)  initFlags.refPriceImported  = await getStored('refPriceImported', true);
    if(!initFlags.ratingMigratedV2)  initFlags.ratingMigratedV2  = await getStored('ratingMigratedV2', true);
    if(!initFlags.skuSeedImported)   initFlags.skuSeedImported   = await getStored('skuSeedImported',  true);
    // Also migrate even older appSettings keys
    if(!appSettings.pinModeEnabled !== undefined || !appSettings.hideNutritionCols !== undefined){
      if(appSettings.pinModeEnabled===undefined) appSettings.pinModeEnabled = await getStored('pinModeEnabled',true);
      if(appSettings.hideNutritionCols===undefined) appSettings.hideNutritionCols = await getStored('hideNutritionCols',true);
    }
  }

  // ── APPLY DATA ─────────────────────────────────────────────────────────────
  const catsData = cats || DEFAULT_CATEGORIES.map(c=>Object.assign({}, c));
  const supsData = sups || DEFAULT_SUPPLIERS.map(s=>Object.assign({}, s));
  const recData  = rec  || JSON.parse(JSON.stringify(SEED_RECIPES));
  const ingData  = ing  || [];
  const planData = plan || [];

  let pinOrderSeq = 0;
  recData.forEach(r=>{
    if(!r.categories){ r.categories = r.product_line ? [r.product_line] : []; }
    if('product_line' in r) delete r.product_line;
    if(r.rating===undefined) r.rating = 2;
    if(r.quickNote===undefined) r.quickNote = '';
    if(r.pinned===undefined) r.pinned = false;
    if(r.pinOrder===undefined) r.pinOrder = (pinOrderSeq++);
    if(r.pinSubCode===undefined) r.pinSubCode = null;
    if(r.stock===undefined || r.stock===null) r.stock = 0;
    if(r.available_online===undefined) r.available_online = false;
    if(r.he_group===undefined) r.he_group = '';
    if(r.description===undefined) r.description = '';
    if(r.image_urls===undefined) r.image_urls = r.image_url ? [r.image_url] : [];
    if(r.selling_price===undefined) r.selling_price = 0;
    if(!r.parts){
      r.parts = [{ label:'', instructions: r.instructions||'', lines: r.lines||[] }];
      delete r.lines; delete r.instructions;
    }
  });
  ingData.forEach(i=>{
    if(!i.type) i.type = 'ingredient';
    if(i.ingCategory===undefined) i.ingCategory = guessIngCategory(i);
    if(i.stock===undefined || i.stock===null) i.stock = 0;
    if(i.market_price_kg===undefined){ i.market_price_kg = (i.unit==='g' && i.cost_per_unit) ? Math.round(i.cost_per_unit*1000*100)/100 : 0; }
    if(!i.suppliers) i.suppliers = [];
    if(i.defaultSupplier===undefined) i.defaultSupplier = null;
  });

  state.categories = catsData; state.recipes = recData; state.ingredients = ingData;

  state.suppliers = supsData; state.planItems = planData;
  if(lastName) { state.currentUser = lastName; state.nameInputDraft = lastName; }
  state.pinModeEnabled    = !!(appSettings && appSettings.pinModeEnabled);
  state.hideNutritionCols = (appSettings && appSettings.hideNutritionCols!=null) ? !!appSettings.hideNutritionCols : true;
  state.mpSlots    = (appSettings && appSettings.mpSlots && appSettings.mpSlots.length) ? appSettings.mpSlots : ['ชุดที่ 1'];
  state.mpViewDays = (appSettings && appSettings.mpViewDays) || 7;

  state.mpData  = mpData;
  state.mpDates = [...new Set([...mpDates, ...Object.keys(mpData)])].sort();

  // ── ONE-TIME SEED IMPORTS / MIGRATION ─────────────────────────────────────
  let largeDataChanged = !rec || !cats || !sups;
  if(!initFlags.nutriSeedImported){ importNutritionSeed(); largeDataChanged = true; }
  if(!initFlags.refPriceImported){  importReferencePrices(); largeDataChanged = true; }
  if(!initFlags.skuSeedImported){   importSkuSeed(); largeDataChanged = true; }
  if(!initFlags.ratingMigratedV2){  migrateRatingV2(); largeDataChanged = true; }
  // Auto-classify all ingredients (emoji + category + supplier) — runs once
  if(!initFlags.ingClassifiedV1){
    state.ingredients.forEach(i=>{
      const cls = autoClassifyIngredient(i.name);
      if(!i.ingCategory || i.ingCategory==='') i.ingCategory = cls.cat;
      if(!i.ingEmoji) i.ingEmoji = cls.emoji;
      if(!i.defaultSupplier && !i.suppliers?.length){
        const sup = state.suppliers.find(s=>s.key===cls.sup);
        if(sup){ i.suppliers=[cls.sup]; i.defaultSupplier=cls.sup; }
      }
    });
    largeDataChanged = true;
  }

  // ── WRITE BACK ────────────────────────────────────────────────────────────
  // Always write appConfig (small, contains all config + plan + mealplan)
  await setStored('appConfig', {
    categories:   state.categories,
    suppliers:    state.suppliers,
    planItems:    state.planItems,
    mealPlanData: state.mpData,
    mealPlanDates:state.mpDates,
    appSettings: {
      pinModeEnabled:   state.pinModeEnabled,
      hideNutritionCols:state.hideNutritionCols,
      mpSlots:          state.mpSlots,
      mpViewDays:       state.mpViewDays,
    },
    initFlags: {
      nutriSeedImported: true,
      refPriceImported:  true,
      skuSeedImported:   true,
      ratingMigratedV2:  true,
      ingClassifiedV1:   true,
    },
  }, true);
  // Large data: only write on first load or after migration
  if(largeDataChanged){
    await setStored('recipes',     state.recipes,     true);
    await setStored('ingredients', state.ingredients, true);
  }
  render();
}

function importNutritionSeed(){
  let added=0, updated=0;
  NUTRITION_SEED.forEach(n=>{
    const existing = state.ingredients.find(i=>i.name.trim().toLowerCase()===n.name.trim().toLowerCase());
    if(!existing){
      const cls = autoClassifyIngredient(n.name);
      const defSup = state.suppliers.find(s=>s.key===cls.sup);
      state.ingredients.push({
        id:'i'+Date.now()+Math.random().toString(36).slice(2,6),
        name:n.name, unit:'g', cost_per_unit:0, stock:0, type:'ingredient',
        ingCategory:cls.cat, ingEmoji:cls.emoji,
        suppliers: defSup?[cls.sup]:[], defaultSupplier: defSup?cls.sup:null,
        kcal_per_unit:n.kcal/100, protein_per_unit:n.protein/100, carb_per_unit:n.carb/100, fat_per_unit:n.fat/100,
        source:NUTRITION_SOURCE_LABEL
      });
      added++;
    } else if(!existing.unit || existing.unit==='g'){
      let touched=false;
      if(!existing.unit){ existing.unit='g'; touched=true; }
      if(!existing.kcal_per_unit){ existing.kcal_per_unit=n.kcal/100; touched=true; }
      if(!existing.protein_per_unit){ existing.protein_per_unit=n.protein/100; touched=true; }
      if(!existing.carb_per_unit){ existing.carb_per_unit=n.carb/100; touched=true; }
      if(!existing.fat_per_unit){ existing.fat_per_unit=n.fat/100; touched=true; }
      if(touched) updated++;
    }
  });
  return {added, updated};
}

async function migrateDefaultPricesAndVegan(){
  const FISH = ['ปลากระพง','ปลาแซลมอน','แซลมอน','กระพง'];
  let priceSet = 0, veganSet = 0;
  state.recipes.forEach(r => {
    const name = r.name || '';
    const code = r.code || '';
    // ── ตั้งราคา default ──
    if(!r.selling_price || r.selling_price === 0){
      const isFish = FISH.some(f => name.includes(f));
      const isS = name.startsWith('ข้าว') || code.startsWith('S') || code.startsWith('HP') || code.startsWith('LC') || code.startsWith('No');
      let price;
      if(isFish) price = isS ? 165 : 149;
      else price = isS ? 125 : 85;
      r.selling_price = price;
      priceSet++;
    }
    // ── จัดหมวด อาหารเจ ──
    const isVegan = name.includes('เจ') || /^J\d/i.test(code) || /\bJ\d/i.test(name);
    if(isVegan && !(r.categories||[]).includes('vegan')){
      r.categories = ['vegan'];
      veganSet++;
    }
  });
  if(priceSet > 0 || veganSet > 0){
    await persistRecipes();
    render();
    showToast('✅ ตั้งราคา ' + priceSet + ' เมนู · จัดหมวดเจ ' + veganSet + ' เมนู');
  } else {
    showToast('ℹ️ ทุกเมนูมีราคาและหมวดหมู่ครบแล้ว');
  }
}

async function migrateWindowStorageToSupabase(){
  if(!confirm('Migrate ข้อมูลจาก window.storage → Supabase?\n\nขั้นตอนนี้จะ copy ข้อมูลปัจจุบันขึ้น Supabase\nและระบบจะเริ่มใช้ Supabase เป็น storage หลัก')) return;

  let ok=0, fail=0;

    try{
      // อ่านจาก window.storage (เก่า)
      const r = await window.storage.get(key, true);
      if(!r){ console.log('skip', key, '(empty)'); continue; }

}

      r.parts[0].lines && r.parts[0].lines.length > 0 &&
      r.parts[0].lines.some(l => l.name && l.name.trim() !== '');

      label: 'สูตร',
      instructions: '',

    }];

}

async function exportOnlineMenus(){

// Debounced render — prevents re-render storm from rapid clicks
let _renderTimer = null;
function render(immediate){
  if(immediate){ _doRender(true); return; } // force=true bypasses keyboard check
  clearTimeout(_renderTimer);
  _renderTimer = setTimeout(()=>_doRender(false), 80);
}
function _doRender(force){
  // ป้องกัน keyboard เด้ง: ถ้า user พิมพ์อยู่ + ไม่ใช่ force render → skip
  if(!force){
    const active = document.activeElement;
    if(active && (active.tagName==='INPUT'||active.tagName==='TEXTAREA')){
      const safeIds = ['db-search','sortModeSelect','showRetired','showRetiredChk'];
      if(!safeIds.includes(active.id)){
        if(!_renderPending){
          _renderPending = true;
          active.addEventListener('blur', ()=>{ _renderPending=false; _doRender(false); }, {once:true});
        }
        return;
      }
    }
  }
  _renderPending = false;
  const app = document.getElementById('app');
  const who = document.getElementById('whoami');
  who.innerHTML = renderWhoami();
  document.querySelector('.tabs').style.display = 'flex';
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===state.tab));
  document.getElementById('fabNew').style.display = state.tab==='recipes' ? 'block':'none';
  if(state.tab==='recipes') app.innerHTML = renderRecipesTab();
  else if(state.tab==='ingredients') app.innerHTML = renderIngredientsTab();
  else if(state.tab==='plan') app.innerHTML = renderPlanTab();
  else if(state.tab==='mealplan') app.innerHTML = renderMealPlanTab();
  app.innerHTML += `<datalist id="ingList">${state.ingredients.map(i=>`<option value="${escapeHtml(i.name)}">`).join('')}</datalist>`;
  if(state.showCategoryManager){
    app.innerHTML += renderCategoryManager();
  }
  if(state.showSupplierManager){
    app.innerHTML += renderSupplierManager();
  }
  if(state.showNameGate){
    app.innerHTML += renderNameGateModal();
  }
  attachHandlers();
  attachWhoamiHandlers();
  if(state.tab==='mealplan') attachMealPlanHandlers();
  if(state.showCategoryManager) attachCategoryManagerHandlers();
  if(state.showSupplierManager) attachSupplierManagerHandlers();
  if(state.showNameGate) attachNameGateModalHandlers();
}

function renderWhoami(){
  if(state.currentUser){
    return `👋 กำลังใช้งานในชื่อ <b>${escapeHtml(state.currentUser)}</b> <button id="switchUserBtn">เปลี่ยนชื่อ</button>`;
  }
  return `<input type="text" id="nameGateInput" class="name-gate-input" placeholder="ใส่ชื่อเล่นของคุณ..." value="${escapeHtml(state.nameInputDraft||'')}">
    <button class="name-gate-save" id="nameGateBtn">บันทึกชื่อ</button>`;
}
function attachWhoamiHandlers(){
  const su = document.getElementById('switchUserBtn');
  if(su) su.onclick = ()=>{ state.nameInputDraft = state.currentUser; state.currentUser = null; render(); };
  const input = document.getElementById('nameGateInput');
  const btn = document.getElementById('nameGateBtn');
  if(input && btn){
    const submit = ()=>{
      const name = input.value.trim();
      if(!name){ input.focus(); return; }
      state.currentUser = name;
      state.nameInputDraft = name;
      try{ localStorage.setItem('lastNickname', name); }catch(e){}
      render();
      showToast('บันทึกชื่อแล้ว ✓ ลองทำรายการเดิมอีกครั้งได้เลย');
    };
    btn.onclick = submit;
    input.onkeydown = e=>{ if(e.key==='Enter') submit(); };
  }
}

function requireUser(){
  if(state.currentUser && state.currentUser.trim()) return true;
  state.showNameGate = true;
  render();
  return false;
}
function renderNameGateModal(){
  return `<div class="modal-overlay" id="nameGateOverlay">
    <div class="modal-card">
      <div class="modal-head"><h2>ใส่ชื่อก่อนแก้ไข</h2><button class="modal-close" id="closeNameGate">×</button></div>
      <p style="font-size:13.5px;color:var(--ink-soft);margin:0 0 16px;">ระบบต้องรู้ว่าใครเป็นคนแก้ไขข้อมูล กรุณาใส่ชื่อเล่นที่ช่องด้านขวาบนก่อน แล้วลองทำรายการนี้อีกครั้ง</p>
      <button class="btn btn-primary" id="goToNameBtn" style="width:100%;">ไปใส่ชื่อ</button>
    </div>
  </div>`;
}
function attachNameGateModalHandlers(){
  const overlay = document.getElementById('nameGateOverlay');
  const close = ()=>{ state.showNameGate=false; render(); };
  overlay.onclick = (e)=>{ if(e.target===overlay) close(); };
  document.getElementById('closeNameGate').onclick = close;
  document.getElementById('goToNameBtn').onclick = ()=>{
    state.showNameGate = false;
    render();
    setTimeout(()=>{
      const inp = document.getElementById('nameGateInput');
      if(inp){ inp.focus(); inp.classList.add('pulse-highlight'); setTimeout(()=>{ if(inp) inp.classList.remove('pulse-highlight'); }, 2000); }
    }, 50);
  };
}

function renderStatBar(){
  const total = state.recipes.length;
  const active = state.recipes.filter(r=>r.status==='active').length;
  const complete = state.recipes.filter(r=>computeTotals(r).complete).length;
  const incomplete = active - state.recipes.filter(r=>r.status==='active' && computeTotals(r).complete).length;
  return `<div class="stat-row">
    <div class="stat-card"><div class="num">${total}</div><div class="lbl">เมนูทั้งหมดในระบบ</div></div>
    <div class="stat-card"><div class="num">${active}</div><div class="lbl">ขายอยู่ตอนนี้</div></div>
    <div class="stat-card"><div class="num">${complete}</div><div class="lbl">กรอกวัตถุดิบครบ (คำนวณต้นทุนได้)</div></div>
    <div class="stat-card"><div class="num">${incomplete}</div><div class="lbl">ยังรอกรอกวัตถุดิบ</div></div>
  </div>`;
}

function renderRecipesTab(){
  let html = '';
  if(state._offlineMode){
    const pendingKeys = Object.keys(localStorage).filter(k=>k.startsWith('pending:'));
    if(pendingKeys.length){
      html += `<div class="banner" style="background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;">
        ✈️ <b>Offline Mode</b> — แก้ไขได้ตามปกติ ข้อมูลเก็บในเครื่องแล้ว
        เมื่อมีเน็ตกด <b>☁ Sync → LIFF</b> เพื่ออัพขึ้น Supabase
        (${pendingKeys.length} key รอ sync)
      </div>`;
    } else {
      html += `<div class="banner" style="background:#D1FAE5;color:#065F46;border:1px solid #6EE7B7;">
        ✅ ข้อมูล sync แล้ว ทำงาน offline ได้เลย
      </div>`;
    }
  }
  if(!state.storageOk && !state._offlineMode) html += `<div class="banner">ระบบบันทึกอัตโนมัติขัดข้องชั่วคราว ข้อมูลที่แก้ไขอาจไม่ถูกบันทึก ลองรีโหลดหน้านี้อีกครั้ง</div>`;
  if(state.showStatBar) html += renderStatBar();
  const onlineCnt = state.recipes.filter(r=>r.available_online && r.status==='active').length;
  const seedMatches = state.recipes.filter(r=>INGREDIENT_SEED&&INGREDIENT_SEED[r.code]).length;
  html += `<div class="online-export-bar">
    <button id="toggleOnlineFilterBtn" title="${state.showOnlineOnly?'แสดงทั้งหมด':'กรองเฉพาะออนไลน์'}"
      style="display:flex;align-items:center;gap:6px;background:${state.showOnlineOnly?'var(--forest)':'transparent'};
      border:${state.showOnlineOnly?'none':'none'};border-radius:8px;padding:2px 8px 2px 0;cursor:pointer;
      color:${state.showOnlineOnly?'#fff':'inherit'};">
      <span class="cnt" style="color:${state.showOnlineOnly?'#fff':'var(--forest)'}">${onlineCnt}</span>
      <span style="color:${state.showOnlineOnly?'#fff':'var(--forest)'};">ออนไลน์</span>
      ${state.showOnlineOnly?'<span style="font-size:11px;background:rgba(255,255,255,.25);border-radius:8px;padding:1px 6px;margin-left:2px;">เฉพาะออนไลน์ ✕</span>':''}
    </button>
    <div style="margin-left:auto;display:flex;gap:6px;align-items:center;">
      <button class="btn btn-export btn-sm" id="exportOnlineBtn" style="background:var(--forest);color:#fff;border:none;font-size:12px;padding:5px 12px;">☁ Sync → LIFF</button>
    </div>
  </div>`;
  html += `<div class="toolbar">
    <button class="icon-btn${state.pinModeEnabled?' active':''}" id="togglePinModeBtn" data-tip="${state.pinModeEnabled?'ปิดโหมด PTT (Pin to Top)':'เปิดโหมด PTT — ปักหมุดเมนูไว้บนสุด'}">📌</button>
    <button class="icon-btn${state.bulkMode?' active':''}" id="toggleBulkModeBtn" data-tip="${state.bulkMode?'ออกจากโหมดเลือกหลายรายการ':'เลือกหลายรายการ — เปิด/ปิดขาย, Pin, ฯลฯ'}">☑</button>
    <button class="icon-btn" id="manageCatBtn" data-tip="จัดการหมวดอาหาร — เพิ่ม/ลบ/เปลี่ยนชื่อหมวด">🏷️</button>
    <button class="icon-btn${state.showStatBar?' active':''}" id="toggleStatBarBtn" data-tip="${state.showStatBar?'ซ่อนสถิติ':'แสดงสถิติ — จำนวนเมนูและสถานะ'}">📊</button>
  </div>`;
  html += `<div class="toolbar">
    <div class="search-box"><input type="text" id="searchInput" placeholder="ค้นหาชื่อเมนูหรือโค้ด..." value="${escapeHtml(state.search)}"></div>
    ${renderCategoryPicker(state.categoryFilter, 'filter')}
    <div style="display:flex;align-items:center;gap:5px;flex-shrink:0;">
      <span style="font-size:11px;font-weight:600;color:var(--ink-soft);white-space:nowrap;letter-spacing:.5px;text-transform:uppercase;">จัดเรียง</span>
      <select class="sort-sel" id="sortModeSelect">
        <option value="category" ${state.sortMode==='category'?'selected':''}>หมวดหมู่ (ออนไลน์ก่อน)</option>
        <option value="code_asc" ${state.sortMode==='code_asc'?'selected':''}>โค้ด A→Z</option>
        <option value="name_asc" ${state.sortMode==='name_asc'?'selected':''}>ชื่อ ก→ฮ</option>
        <option value="stock_asc" ${state.sortMode==='stock_asc'?'selected':''}>สต็อก ↑</option>
        <option value="stock_desc" ${state.sortMode==='stock_desc'?'selected':''}>สต็อก ↓</option>
      </select>
    </div>
    <div class="rating-filter-wrap"><span>คะแนนขั้นต่ำ</span>${renderRatingDots3(state.ratingFilter, 'filter')}</div>
    <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink-soft);">
      <input type="checkbox" id="showRetired" ${state.showRetired?'checked':''}> แสดงเมนูที่เลิกขาย
    </label>
  </div>`;

  // ── Category Tabs ── (กดเพื่อแสดงแค่หมวดนั้น ลด render จาก 460 → ~80)
  const allCats = [...new Set(state.recipes.filter(r=>r.category).map(r=>r.category))];
  if(allCats.length){
    html += '<div class="cat-tab-strip">';
    html += `<button class="cat-tab-db${state.activeCatTab==='__all__'?' on':''}" onclick="setCatTab('__all__')">ทั้งหมด</button>`;
    html += `<button class="cat-tab-db${state.activeCatTab==='__ptt__'?' on':''}" onclick="setCatTab('__ptt__')">📌 PTT</button>`;
    allCats.forEach(cat=>{
      const label = getCategory(cat)?.label || cat;
      const cnt = state.recipes.filter(r=>r.category===cat&&(r.status==='active'||state.showRetired)).length;
      if(!cnt) return;
      html += `<button class="cat-tab-db${state.activeCatTab===cat?' on':''}" onclick="setCatTab('${escapeHtml(cat)}')">${escapeHtml(label)} <span class="cnt">${cnt}</span></button>`;
    });
    html += '</div>';
  }

  const q = state.search.trim().toLowerCase();
  let filtered = state.recipes.filter(r=>{
    // Category tab pre-filter (fastest)
    if(state.activeCatTab === '__ptt__'){ if(!r.pinned) return false; }
    else if(state.activeCatTab !== '__all__'){ if(r.category!==state.activeCatTab) return false; }
    if(!state.showRetired && r.status!=='active') return false;
    if(state.showOnlineOnly && !r.available_online) return false;  // กรองเฉพาะออนไลน์
    if(state.categoryFilter.length && !(r.categories||[]).some(c=>state.categoryFilter.includes(c))) return false;
    if(state.ratingFilter && (r.rating||0) < state.ratingFilter) return false;
    if(q && !(r.name.toLowerCase().includes(q) || (r.code||'').toLowerCase().includes(q))) return false;
    return true;
  });

  if(filtered.length===0){
    let otherHint = '';
    if(q && state.categoryFilter.length){
      const inOther = state.recipes.filter(r=>(r.status==='active'||!r.status)&&(r.name.toLowerCase().includes(q)||(r.code||'').toLowerCase().includes(q)));
      if(inOther.length) otherHint = ` <span style="font-size:12px;color:var(--forest);cursor:pointer;text-decoration:underline;" onclick="state.categoryFilter=[];render()">💡 พบ ${inOther.length} เมนูในหมวดอื่น — คลิกเพื่อดู</span>`;
    }
    html += `<div class="empty">ไม่พบเมนูที่ตรงกับเงื่อนไข ลองล้างคำค้นหรือกด "+ เมนูใหม่"${otherHint}</div>`;
    return html;
  }

  // PTT section แสดงเสมอเมื่ออยู่ใน PTT tab หรือเปิด pin mode
  const showPTT = state.pinModeEnabled || state.activeCatTab === '__ptt__';
  const pinnedItems = showPTT ? filtered.filter(r=>r.pinned).sort((a,b)=>(a.pinOrder||0)-(b.pinOrder||0)) : [];
  const pinnedIds = new Set(pinnedItems.map(r=>r.id));
  const restItems = filtered.filter(r=>!pinnedIds.has(r.id));

  // Bulk bar — shows as soon as bulk mode is on; no need to select anything first
  if(state.bulkMode){
    const sel = state.selectedIds.size;
    const total = filtered.length;
    const allSelected = total>0 && filtered.every(r=>state.selectedIds.has(r.id));
    const someSelected = sel>0 && !allSelected;
    html = `<div class="bulk-bar" id="bulkBar">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;flex-shrink:0;">
        <input type="checkbox" id="bulkMasterChk" ${allSelected?'checked':''} ${someSelected?'data-indeterminate="true"':''} style="width:17px;height:17px;cursor:pointer;">
        <span>${sel>0?`เลือก <b>${sel}</b> / ${total} รายการ`:'เลือก 0 / '+total+' รายการ'}</span>
      </label>
      ${sel>0?`
        <button class="btn btn-ghost btn-sm" id="bulkDeselectAll">✕ ยกเลิก</button>
        <div style="width:1px;background:rgba(255,255,255,.3);height:18px;flex-shrink:0;"></div>
        <button class="btn btn-ghost btn-sm" id="bulkOpenSell">✓ เปิดขาย</button>
        <button class="btn btn-ghost btn-sm" id="bulkCloseSell">✗ ปิดขาย</button>
        <button class="btn btn-ghost btn-sm" id="bulkPin">📌 Pin</button>
        <button class="btn btn-ghost btn-sm" id="bulkUnpin">Unpin</button>
      `:'<span style="font-size:12px;opacity:.65;margin-left:4px;">ติ๊กรายการที่ต้องการ หรือกด checkbox ซ้ายเพื่อเลือกทั้งหมด</span>'}
    </div>` + html;
  }

  if(pinnedItems.length){
    html += `<div class="line-group ptt-group"><h2 class="ptt-head"><span class="ptt-pill">PTT</span>ปักหมุดไว้บนสุด (${pinnedItems.length}) <span style="font-size:11px;color:var(--ink-soft);font-weight:400;">— ลากเพื่อเรียงลำดับ</span></h2>`;
    pinnedItems.forEach((r,idx)=>{ html += renderRecipeCard(r, computeTotals(r), {pinIdx:idx, pinTotal:pinnedItems.length, draggable:false}); });
    html += `</div>`;
  }

  if(restItems.length===0) return html;

  if(state.sortMode && state.sortMode!=='category'){
    let sorted = [...restItems];
    if(state.sortMode==='online_first'){
      // PTT already shown above; within rest: online → offline active → retired
      // also hide duplicates (same name) that are already in PTT
      const pttNames = new Set(pinnedItems.map(r=>(r.name||'').trim().toLowerCase()));
      const onlineItems   = sorted.filter(r=>r.available_online && r.status==='active' && !pttNames.has((r.name||'').trim().toLowerCase()));
      const offlineItems  = sorted.filter(r=>!r.available_online && r.status==='active' && !pttNames.has((r.name||'').trim().toLowerCase()));
      const retiredItems  = sorted.filter(r=>r.status!=='active');
      const _collOnline  = !q && state.collapsedCats['_online']  !== false;
      const _collOffline = !q && state.collapsedCats['_offline'] !== false;
      const _collRetired = !q && state.collapsedCats['_retired'] !== false;
      if(onlineItems.length){
        html += `<div class="line-group"><h2 onclick="toggleCatCollapse('_online')" style="cursor:pointer;user-select:none;display:flex;align-items:center;gap:7px;"><span style="font-size:12px;color:#666;display:inline-block;transform:${_collOnline?'rotate(-90deg)':'rotate(0deg)'};transition:transform .2s;">▼</span><span class="dot" style="background:var(--forest)"></span>🛒 ออนไลน์ (${onlineItems.length})</h2>`;
        if(!_collOnline) onlineItems.forEach(r=>{ html += renderRecipeCard(r, computeTotals(r)); });
        html += `</div>`;
      }
      if(offlineItems.length){
        html += `<div class="line-group"><h2 onclick="toggleCatCollapse('_offline')" style="cursor:pointer;user-select:none;display:flex;align-items:center;gap:7px;"><span style="font-size:12px;color:#666;display:inline-block;transform:${_collOffline?'rotate(-90deg)':'rotate(0deg)'};transition:transform .2s;">▼</span><span class="dot" style="background:var(--ink-soft)"></span>○ ออฟไลน์ (${offlineItems.length})</h2>`;
        if(!_collOffline) offlineItems.forEach(r=>{ html += renderRecipeCard(r, computeTotals(r)); });
        html += `</div>`;
      }
      if(retiredItems.length && state.showRetired){
        html += `<div class="line-group"><h2 onclick="toggleCatCollapse('_retired')" style="cursor:pointer;user-select:none;display:flex;align-items:center;gap:7px;"><span style="font-size:12px;color:#666;display:inline-block;transform:${_collRetired?'rotate(-90deg)':'rotate(0deg)'};transition:transform .2s;">▼</span><span class="dot" style="background:#ccc"></span>เลิกผลิต (${retiredItems.length})</h2>`;
        if(!_collRetired) retiredItems.forEach(r=>{ html += renderRecipeCard(r, computeTotals(r)); });
        html += `</div>`;
      }
      return html;
    }
    if(state.sortMode==='code_asc') sorted.sort((a,b)=>(a.code||'').localeCompare(b.code||''));
    else if(state.sortMode==='name_asc') sorted.sort((a,b)=>(a.name||'').localeCompare(b.name||'','th'));
    else if(state.sortMode==='stock_asc') sorted.sort((a,b)=>(a.stock||0)-(b.stock||0));
    else if(state.sortMode==='stock_desc') sorted.sort((a,b)=>(b.stock||0)-(a.stock||0));
    html += `<div class="line-group">`;
    sorted.forEach(r=>{ html += renderRecipeCard(r, computeTotals(r)); });
    html += `</div>`;
    return html;
  }

  const grouped = {};
  restItems.forEach(r=>{
    const cats = (r.categories&&r.categories.length) ? r.categories : ['_none'];
    cats.forEach(ck=>{ (grouped[ck] = grouped[ck]||[]).push(r); });
  });

  const orderedKeys = [...state.categories.map(c=>c.key), '_none'];
  orderedKeys.forEach(key=>{
    const items = grouped[key];
    if(!items || items.length===0) return;
    // ออนไลน์ขึ้นก่อนเสมอ ภายในแต่ละหมวด
    items.sort((a,b)=>{
      const aOn = a.available_online && a.status==='active' ? 0 : 1;
      const bOn = b.available_online && b.status==='active' ? 0 : 1;
      return aOn - bOn;
    });
    const cat = key==='_none' ? {label:'ไม่ระบุหมวด', color:'#999'} : getCategory(key);
    const _isColl = !q && state.collapsedCats[key] !== false;
    const safeKey = escapeHtml(key);
    const catContentId = 'cc-' + key.replace(/[^a-z0-9]/gi,'_');
    // ใส่ ID บน arrow + content div → toggle ด้วย CSS ไม่ต้อง re-render
    html += `<div class="line-group">
      <h2 onclick="toggleCatCollapse('${safeKey}')" style="cursor:pointer;user-select:none;display:flex;align-items:center;gap:7px;">
        <span id="arr-${catContentId}" style="font-size:12px;color:#666;display:inline-block;transform:${_isColl?'rotate(-90deg)':'rotate(0deg)'};transition:transform .2s;">▼</span>
        <span class="dot" style="background:${cat.color};flex-shrink:0;"></span>
        <span>${escapeHtml(cat.label)}</span>
        <span style="font-size:12px;color:#999;margin-left:2px">(${items.length})</span>
      </h2>
      <div id="${catContentId}" style="display:${_isColl?'none':'block'}">`;
    // Pagination สำหรับ uncategorized หรือ category ที่มีเยอะ
    const pageKey = 'page_'+key;
    const pageSize = 25;
    const page = state.catPages && state.catPages[pageKey] ? state.catPages[pageKey] : 1;
    const showItems = items.slice(0, page * pageSize);
    showItems.forEach(r=>{
      const tot = computeTotals(r);
      html += renderRecipeCard(r, tot);
    });
    if(items.length > showItems.length){
      html += `<div style="text-align:center;padding:12px"><button onclick="loadMoreCat('${safeKey}')" 
        style="padding:8px 20px;border-radius:20px;border:1.5px solid var(--forest);color:var(--forest);background:#fff;font-size:13px;font-weight:700;cursor:pointer">
        โหลดเพิ่ม ${Math.min(pageSize, items.length-showItems.length)} รายการ (เหลือ ${items.length-showItems.length})
      </button></div>`;
    }
    html += `</div></div>`;
  });
  return html;
}



function setCatTab(cat) {
  state.activeCatTab = cat;
  render();
}

function toggleCatCollapse(key){
  // undefined/true=collapsed → false (expand); false=expanded → true (collapse)
  state.collapsedCats[key] = state.collapsedCats[key] === false ? true : false;
  const isCollapsed = state.collapsedCats[key] !== false;
  // ← Direct DOM toggle: ไม่ต้อง re-render ทั้งหน้า
  const cid = 'cc-' + key.replace(/[^a-z0-9]/gi,'_');
  const content = document.getElementById(cid);
  const arrow   = document.getElementById('arr-' + cid);
  if(content) content.style.display = isCollapsed ? 'none' : 'block';
  if(arrow)   arrow.style.transform  = isCollapsed ? 'rotate(-90deg)' : 'rotate(0deg)';
}

function renderPttCard(r){
  const isOpen = state.openId === r.id;
  const isOnline = r.available_online && r.status === 'active';
  const subcode = r.pinSubCode || '';
  return `<div class="ptt-row" draggable="true" data-id="${r.id}" data-ptt="1">
    <span class="ptt-drag">⠿</span>
    <div class="ptt-online-dot ${isOnline?'on':'off'}" title="${isOnline?'ออนไลน์':'ออฟไลน์'}"></div>
    <span class="ptt-code">${escapeHtml(r.code||'-')}</span>
    <input type="text" class="ptt-sub subcode-input" data-id="${r.id}" value="${escapeHtml(subcode)}"
      placeholder="subcode" maxlength="12" style="width:64px">
    <span class="ptt-name" onclick="state.openId=(state.openId==='${r.id}'?null:'${r.id}'); render()">
      ${escapeHtml(r.name||'(ยังไม่มีชื่อ)')}
    </span>
    <div class="ptt-stock-ctrl">
      <button class="ptt-qb" onclick="chgStockFast('${r.id}',-1)">−</button>
      <input type="number" class="ptt-stock-num" data-stock-id="${r.id}"
        value="${r.stock||0}" oninput="saveStockInline('${r.id}',this.value)">
      <button class="ptt-qb plus" onclick="chgStockFast('${r.id}',1)">+</button>
    </div>
    <button class="ptt-open-btn" onclick="state.openId=(state.openId==='${r.id}'?null:'${r.id}'); render()">
      ${isOpen?'▲':'แก้ไข'}
    </button>
  </div>
  ${isOpen ? renderRecipeCard(r, computeTotals(r)) : ''}`;
}

function chgStockFast(id, delta){
  const r = state.recipes.find(r=>r.id===id);
  if(!r) return;
  r.stock = Math.max(0, (r.stock||0) + delta);
  // อัพเดท input ตรงๆ ไม่ re-render
  const inp = document.querySelector('[data-stock-id="'+id+'"]');
  if(inp) inp.value = r.stock;
  persistRecipesDebounced();
}

function renderRecipeCard(r, tot, pinInfo){
  const isOpen = state.openId === r.id;
  const chips = (r.categories||[]).map(ck=>{
    const c = getCategory(ck);
    return `<span class="cat-chip"><span class="cat-dot" style="background:${c?c.color:'#999'}"></span>${escapeHtml(c?c.label:ck)}</span>`;
  }).join('');
  const isSelling = r.status==='active';
  const isPinned = !!r.pinned;
  const stockVal = r.stock||0;
  const isDraggable = !!(pinInfo && pinInfo.draggable);
  const isSelected = state.bulkMode && state.selectedIds.has(r.id);

  let toggles = '';
  if(state.bulkMode){
    toggles += `<input type="checkbox" class="row-select-chk" data-id="${r.id}" ${isSelected?'checked':''}>`;
  }
  if(state.pinModeEnabled){
    toggles += `<label class="row-toggle-lbl" title="ปักหมุด PTT"><input type="checkbox" class="pin-toggle" data-id="${r.id}" ${isPinned?'checked':''}>📌</label>`;
    if(isDraggable){
      toggles += `<span class="ptt-drag-handle" title="ลากเพื่อเรียงลำดับ">⠿</span>`;
    }
  }
  toggles += `<label class="row-toggle-lbl" title="เปิดขายอยู่ตอนนี้"><input type="checkbox" class="selling-toggle" data-id="${r.id}" ${isSelling?'checked':''}>เปิดขาย</label>`;

  let row = `<div class="card${isPinned?' is-pinned':''}${isOpen?' is-open':''}" data-id="${r.id}">
    <div class="row recipe-row${!isSelling?' not-selling':''}" data-id="${r.id}">
      <div class="row-toggles">${toggles}</div>
      <div class="code-col">
        <span class="code-badge">${escapeHtml(r.code||'-')}</span>
        ${isPinned
          ? `<input type="text" class="subcode-input" data-id="${r.id}" value="${escapeHtml(r.pinSubCode||'')}" placeholder="sub code..." maxlength="12" title="Sub code">`
          : ''  /* subcode เฉพาะรายการที่ pin เท่านั้น */
        }
      </div>
      <div class="name-wrap">
        <div class="name-line">
          <span class="name">${escapeHtml(r.name||'(ไม่มีชื่อ)')}</span>
          ${chips ? `<div class="chip-row">${chips}</div>` : ''}
        </div>
        <div class="quick-row${!tot.complete?' incomplete':''}">
          ${renderRatingDots3(r.rating===undefined?2:r.rating, 'row', r.id)}
          <input type="text" class="quick-note-input" data-id="${r.id}" placeholder="โน้ตสั้นๆ..." value="${escapeHtml(r.quickNote||'')}">
          <span class="quick-kcal">${!tot.complete ? '⚠ สูตรยังไม่ครบ' : (tot.kcal>0 ? fmtNum(tot.kcal)+' kcal' : '—')}</span>
        </div>
      </div>
      <div class="stock-ctrl" data-id="${r.id}">
        <button type="button" class="stock-minus" data-id="${r.id}">−</button>
        <div><input type="number" class="stock-val" data-id="${r.id}" value="${stockVal}" step="1"><div class="stock-lbl">สต็อก</div></div>
        <button type="button" class="stock-plus" data-id="${r.id}">+</button>
      </div>
      <button class="online-toggle-btn${r.available_online?' online-on':''}" data-id="${r.id}" title="${r.available_online?'คลิกเพื่อปิดสั่งออนไลน์':'คลิกเพื่อเปิดให้สั่งออนไลน์ผ่าน LIFF'}">
        ${r.available_online?'🛒 ออนไลน์':'○ ออฟไลน์'}</button>
      <span class="meta">${tot.cost>0?'฿'+fmtMoney(tot.cost):'—'}${r.selling_price?' · ขาย ฿'+r.selling_price:''}</span>
      <button type="button" class="expand-btn" data-id="${r.id}" title="${isOpen?'ปิดแผงแก้ไข':'เปิดแผงแก้ไข'}">${isOpen?'▲':'▼'}</button>
    </div>`;
  if(isOpen) row += renderEditPanel(r);
  row += `</div>`;
  return row;
}

function renderCategoryPicker(selectedKeys, mode){
  const isOpen = mode==='filter' ? state.filterPickerOpen : state.recipePickerOpen;
  const summary = selectedKeys.length ? selectedKeys.map(k=>categoryLabel(k)).join(', ') : (mode==='filter' ? 'ทุกหมวด' : 'เลือกหมวด...');
  let html = `<div class="cat-picker" data-mode="${mode}">
    <button type="button" class="cat-picker-btn">${escapeHtml(summary)} ▾</button>`;
  if(isOpen){
    html += `<div class="cat-picker-panel">`;
    state.categories.forEach(c=>{
      const checked = selectedKeys.includes(c.key) ? 'checked' : '';
      html += `<label><input type="checkbox" class="cat-check" value="${c.key}" ${checked}><span class="cat-dot" style="background:${c.color}"></span>${escapeHtml(c.label)}</label>`;
    });
    html += `<div class="cat-picker-add"><input type="text" class="cat-new-input" placeholder="เพิ่มหมวดใหม่..."><button type="button" class="btn btn-ghost btn-sm cat-add-btn">+</button></div>`;

    html += `</div>`;
  }
  html += `</div>`;
  return html;
}
