    // (ปุ่ม import/migrate ครั้งเดียวถูกลบไปแล้ว v0.4.7 — ดู CLAUDE.md "Optimize main_database_v2.html")
    // drag-drop handles pin ordering now

    document.querySelectorAll('.stock-ctrl').forEach(ctrl=>{
      const id = ctrl.dataset.id;
      const valInput = ctrl.querySelector('.stock-val');
      const commitStock = (newVal)=>{
        if(!requireUser()) return;
        const r = state.recipes.find(x=>x.id===id);
        const delta = newVal - (r.stock||0);
        r.stock = newVal;
        r.updated_by = state.currentUser;
        r.updated_at = new Date().toISOString();
        persistRecipes();
        syncStockDebounced(r);
        if(delta!==0) logActivity('stock', r.code||r.name||'(ไม่มีชื่อ)', delta);
        render();
      };
      ctrl.querySelector('.stock-minus').onclick = (e)=>{ e.stopPropagation(); const r=state.recipes.find(x=>x.id===id); commitStock(Math.max(0,(r.stock||0)-1)); };
      ctrl.querySelector('.stock-plus').onclick = (e)=>{ e.stopPropagation(); const r=state.recipes.find(x=>x.id===id); commitStock((r.stock||0)+1); };
      ctrl.querySelector('.stock-plus10').onclick = (e)=>{ e.stopPropagation(); const r=state.recipes.find(x=>x.id===id); commitStock((r.stock||0)+10); };
      valInput.onclick = e=>e.stopPropagation();
      valInput.onkeydown = e=>{ if(e.key==='Enter') e.target.blur(); };
      valInput.onblur = ()=>{
        const r = state.recipes.find(x=>x.id===id);
        const newVal = parseFloat(valInput.value)||0;
        if(newVal !== (r.stock||0)) commitStock(newVal);
      };
    });

    document.querySelectorAll('.cat-picker').forEach(picker=>{
      const mode = picker.dataset.mode;
      picker.querySelector('.cat-picker-btn').onclick = (e)=>{
        e.stopPropagation();
        if(mode==='filter') state.filterPickerOpen = !state.filterPickerOpen;
        else state.recipePickerOpen = !state.recipePickerOpen;
        render();
      };
      // กัน panel ปิดเมื่อคลิกข้างใน
      const panel_ = picker.querySelector('.cat-picker-panel');
      if(panel_) panel_.onclick = e => e.stopPropagation();
      picker.querySelectorAll('.cat-check').forEach(chk=>{
        chk.onclick = e=>e.stopPropagation();
        chk.onchange = ()=>{
          const key = chk.value;
          if(mode==='filter'){
            const i = state.categoryFilter.indexOf(key);
            if(chk.checked && i===-1) state.categoryFilter.push(key);
            if(!chk.checked && i!==-1) state.categoryFilter.splice(i,1);
          } else {
            const rid = picker.closest('[data-edit]').dataset.edit;
            const r = state.recipes.find(x=>x.id===rid);
            r.categories = r.categories||[];
            const i = r.categories.indexOf(key);
            if(chk.checked && i===-1) r.categories.push(key);
            if(!chk.checked && i!==-1) r.categories.splice(i,1);
          }
          render();
        };
      });
      const catAddBtn = picker.querySelector('.cat-add-btn');
      if(catAddBtn) catAddBtn.onclick = (e)=>{
        e.stopPropagation();
        if(!requireUser()) return;
        const input = picker.querySelector('.cat-new-input');
        const label = input.value.trim();
        if(!label) return;
        const key = addCategory(label);
        if(mode==='filter'){ if(!state.categoryFilter.includes(key)) state.categoryFilter.push(key); }
        else {
          const rid = picker.closest('[data-edit]').dataset.edit;
          const r = state.recipes.find(x=>x.id===rid);
          r.categories = r.categories||[];
          if(!r.categories.includes(key)) r.categories.push(key);
        }
        render();
      };
      const manageBtn = picker.querySelector('.cat-manage-trigger');
      if(manageBtn) manageBtn.onclick = (e)=>{
        e.stopPropagation();
        state.showCategoryManager = true;
        render();
      };
    });

    document.querySelectorAll('.recipe-row').forEach(row=>{
      row.onclick = ()=>{
        const wasOpen = state.openId===row.dataset.id;
        state.openId = wasOpen ? null : row.dataset.id;
        state.recipePickerOpen=false;
        render(true);
        if(!wasOpen){
          loadPhotoIfNeeded(row.dataset.id);
          setTimeout(()=>{
            const panel = document.querySelector('[data-edit="'+row.dataset.id+'"]');
            if(panel) panel.scrollIntoView({behavior:'smooth', block:'nearest'});
          }, 60);
        }
      };
    });
    // ▼ expand button — จุดกดชัดบนมือถือ
    document.querySelectorAll('.expand-btn').forEach(btn=>{
      btn.onclick = (e)=>{
        e.stopPropagation();
        const row = btn.closest('.recipe-row');
        if(!row) return;
        const wasOpen = state.openId === row.dataset.id;
        state.openId = wasOpen ? null : row.dataset.id;
        render(true);
        if(!wasOpen){
          loadPhotoIfNeeded(btn.dataset.id);
          setTimeout(()=>{
            const panel = document.querySelector('[data-edit="'+btn.dataset.id+'"]');
            if(panel) panel.scrollIntoView({behavior:'smooth', block:'nearest'});
          }, 60);
        }
      };
    });
    // Mobile fix: กดที่ชื่อเมนูโดยตรง (พื้นที่ไม่มี stopPropagation ชัดเจน)
    document.querySelectorAll('.recipe-row .name-line').forEach(nl=>{
      const doExpand = (e)=>{
        e.preventDefault();
        e.stopPropagation();
        const row = nl.closest('.recipe-row');
        if(!row) return;
        const wasOpen = state.openId === row.dataset.id;
        state.openId = wasOpen ? null : row.dataset.id;
        render(true);
        if(!wasOpen){
          loadPhotoIfNeeded(row.dataset.id);
          // Scroll ไปที่ panel ที่เพิ่งเปิด
          setTimeout(()=>{
            const panel = document.querySelector('[data-edit="'+row.dataset.id+'"]');
            if(panel) panel.scrollIntoView({behavior:'smooth', block:'nearest'});
          }, 60);
        }
      };
      nl.onclick = doExpand;
      nl.ontouchend = doExpand;  // Explicit mobile tap handler
    });

    document.querySelectorAll('[data-edit]').forEach(panel=>{
      const id = panel.dataset.edit;
      panel.addEventListener('input', ()=>{
        const r = state.recipes.find(x=>x.id===id);
        const idx = state.recipes.indexOf(r);
        const updated = getRecipeFromPanel(panel, id);
        state.recipes[idx] = updated;
        const totalsBox = panel.querySelector('.totals-box');
        if(totalsBox) totalsBox.outerHTML = renderTotalsLive(updated);
        panel.querySelectorAll('.line-calc').forEach(calcEl=>{
          const pIdx = parseInt(calcEl.dataset.partIdx);
          const lIdx = parseInt(calcEl.dataset.calcIdx);
          const part = (updated.parts||[])[pIdx];
          const line = part && part.lines && part.lines[lIdx];
          if(line) calcEl.innerHTML = renderLineCalcInner(line);
        });
      });
      panel.querySelectorAll('.addLine').forEach(btn=>{
        btn.onclick = ()=>{
          const r = state.recipes.find(x=>x.id===id);
          const pIdx = parseInt(btn.dataset.partIdx);
          r.parts[pIdx].lines = r.parts[pIdx].lines||[];
          const newIdx = r.parts[pIdx].lines.length;
          r.parts[pIdx].lines.push({name:'',qty:'',unit:'g'});
          // inject แถวใหม่โดยตรง ไม่ render ทั้งหน้า
          const container = panel.querySelector(`.ing-lines[data-part-idx="${pIdx}"]`);
          if(container){
            const tmp = document.createElement('div');
            tmp.innerHTML = renderIngLine({name:'',qty:'',unit:'g'}, pIdx, newIdx);
            while(tmp.firstChild) container.appendChild(tmp.firstChild);
            // attach handlers บนแถวใหม่
            const newRows = container.querySelectorAll(`.ing-line[data-idx="${newIdx}"]`);
            const newRow = newRows[newRows.length-1];
            if(newRow){
              attachIngLineHandlers(panel, newRow, id);
              newRow.querySelector('.ln-name')?.focus();
            }
          } else {
            render(true);
            setTimeout(()=>{
              const lines = document.querySelectorAll(`[data-part-idx="${pIdx}"] .ln-name`);
              if(lines.length) lines[lines.length-1].focus();
            },50);
          }
        };
      });
      // Enter บน name → เพิ่มแถวใหม่ทันที (workflow: พิมชื่อทั้งหมดก่อน)
      panel.querySelectorAll('.ln-name').forEach(inp=>{
        inp.onkeydown = (e)=>{
          if(e.key==='Enter'){
            e.preventDefault();
            const pIdx = inp.closest('.ing-line')?.dataset.partIdx||inp.closest('[data-part-idx]')?.dataset.partIdx;
            const btn = panel.querySelector(`.addLine[data-part-idx="${pIdx}"]`);
            if(btn) btn.click();
          }
        };
      });
      // Enter บน qty → focus unit
      panel.querySelectorAll('.ln-qty').forEach(inp=>{
        inp.onkeydown = (e)=>{
          if(e.key==='Enter'){ e.preventDefault(); inp.closest('.ing-line')?.querySelector('.ln-unit')?.focus(); }
        };
      });
      // Enter บน unit → เพิ่มแถวใหม่
      panel.querySelectorAll('.ln-unit').forEach(inp=>{
        inp.onkeydown = (e)=>{
          if(e.key==='Enter'){
            e.preventDefault();
            const pIdx = inp.closest('.ing-lines')?.dataset.partIdx||inp.closest('[data-part-idx]')?.dataset.partIdx;
            const btn = panel.querySelector(`.addLine[data-part-idx="${pIdx}"]`);
            if(btn) btn.click();
          }
        };
      });
      // helper: attach handlers on a single ing-line row (ใช้ตอน inject แถวใหม่)
      function attachIngLineHandlers(panel, row, recipeId){
        const nameInp = row.querySelector('.ln-name');
        const qtyInp  = row.querySelector('.ln-qty');
        const unitInp = row.querySelector('.ln-unit');
        const rmBtn   = row.querySelector('.rmLine');
        if(nameInp){
          nameInp.oninput = e=>{ const r=state.recipes.find(x=>x.id===recipeId); if(!r)return; const pIdx=parseInt(row.dataset.partIdx); const idx=parseInt(row.dataset.idx); r.parts[pIdx].lines[idx].name=e.target.value; render(); };
          nameInp.onkeydown = e=>{ if(e.key==='Enter'){ e.preventDefault(); const pIdx=row.dataset.partIdx; const btn=panel.querySelector(`.addLine[data-part-idx="${pIdx}"]`); if(btn)btn.click(); } };
        }
        if(qtyInp){
          qtyInp.oninput = e=>{ const r=state.recipes.find(x=>x.id===recipeId); if(!r)return; const pIdx=parseInt(row.dataset.partIdx); const idx=parseInt(row.dataset.idx); r.parts[pIdx].lines[idx].qty=e.target.value; render(); };
          qtyInp.onkeydown = e=>{ if(e.key==='Enter'){ e.preventDefault(); unitInp?.focus(); } };
        }
        if(unitInp){
          unitInp.oninput = e=>{ const r=state.recipes.find(x=>x.id===recipeId); if(!r)return; const pIdx=parseInt(row.dataset.partIdx); const idx=parseInt(row.dataset.idx); r.parts[pIdx].lines[idx].unit=e.target.value; render(); };
          unitInp.onkeydown = e=>{ if(e.key==='Enter'){ e.preventDefault(); const pIdx=row.dataset.partIdx; const btn=panel.querySelector(`.addLine[data-part-idx="${pIdx}"]`); if(btn)btn.click(); } };
        }
        if(rmBtn) rmBtn.onclick = ()=>{ const r=state.recipes.find(x=>x.id===recipeId); if(!r)return; const pIdx=parseInt(row.dataset.partIdx); r.parts[pIdx].lines.splice(parseInt(row.dataset.idx),1); render(true); };
      }

      panel.querySelectorAll('.rmLine').forEach(btn=>btn.onclick=()=>{
        const r = state.recipes.find(x=>x.id===id);
        const pIdx = parseInt(btn.dataset.partIdx);
        r.parts[pIdx].lines.splice(parseInt(btn.dataset.idx),1);
        render();
      });
      const addPartBtn = panel.querySelector('.addPart');
      if(addPartBtn) addPartBtn.onclick = ()=>{
        const r = state.recipes.find(x=>x.id===id);
        r.parts = r.parts||[];
        r.parts.push({label:'', instructions:'', lines:[{name:'',qty:'',unit:'g'}]});
        render();
      };
      panel.querySelectorAll('.rmPart').forEach(btn=>btn.onclick=(e)=>{
        e.stopPropagation();
        const r = state.recipes.find(x=>x.id===id);
        r.parts.splice(parseInt(btn.dataset.partIdx),1);
        render();
      });
      panel.querySelectorAll('.photo-upload-input').forEach(inp=>{
        inp.onchange = async ()=>{
          if(!requireUser()) return;
          const file = inp.files[0];
          if(!file) return;
          if(!file.type.startsWith('image/')){ showToast('กรุณาเลือกไฟล์รูปภาพ'); return; }
          showToast('กำลังประมวลผลรูป...');
          try{
            const dataUrl = await compressImageFile(file, 640, 0.7);
            const ok = await setStored('photo:'+inp.dataset.id, dataUrl, true);
            if(ok){
              state.photoCache[inp.dataset.id] = dataUrl;
              showToast('บันทึกรูปแล้ว');
              render();
            } else {
              showToast('บันทึกรูปไม่สำเร็จ ไฟล์อาจใหญ่เกินไป ลองรูปอื่น');
            }
          }catch(e){
            showToast('เกิดข้อผิดพลาดในการอัพโหลดรูป');
          }
        };
      });
      panel.querySelectorAll('.rmPhoto').forEach(btn=>{
        btn.onclick = async ()=>{
          if(!requireUser()) return;
          showConfirm('ลบรูปนี้?', async ()=>{
            await deleteStored('photo:'+btn.dataset.id, true);
            state.photoCache[btn.dataset.id] = null;
            render();
          });
        };
      });
      // Multi-image slots (4 slots, Supabase menu-images bucket)
      panel.querySelectorAll('.img-slot-input').forEach(inp=>{
        inp.onchange = async ()=>{
          if(!requireUser()) return;
          const file = inp.files[0];
          if(!file||!file.type.startsWith('image/')){ showToast('เลือกไฟล์รูปภาพ'); return; }
          showToast('⏳ กำลังอัพโหลด...');
          try{
            const dataUrl = await compressImageFile(file, 800, 0.85);
            const res = await fetch(dataUrl); const blob = await res.blob();
            const ext = file.type==='image/png'?'png':'jpg';
            const fileName = `${inp.dataset.id}/${inp.dataset.idx}_${Date.now()}.${ext}`;
            const sb = getSB();
            const {error} = await sb.storage.from('menu-images').upload(fileName, blob, {contentType:file.type, upsert:true});
            if(error) throw error;
            const publicUrl = sb.storage.from('menu-images').getPublicUrl(fileName).data.publicUrl;
            const r = state.recipes.find(x=>x.id===inp.dataset.id);
            if(r){
              const imgs = [...(r.image_urls||[])];
              imgs[parseInt(inp.dataset.idx)] = publicUrl;
              r.image_urls = imgs.filter(Boolean);
              r.updated_by=state.currentUser; r.updated_at=new Date().toISOString();
              persistRecipes(); render();
              showToast('✅ อัพโหลดรูปแล้ว');
            }
          }catch(e){ console.error(e); showToast('❌ อัพโหลดไม่สำเร็จ: '+(e.message||'')); }
        };
      });
      panel.querySelectorAll('.img-slot-rm').forEach(btn=>{
        btn.onclick = (e)=>{
          e.stopPropagation();
          if(!requireUser()) return;
          showConfirm('ลบรูปนี้?', ()=>{
            const r = state.recipes.find(x=>x.id===btn.dataset.id);
            if(r){
              const imgs = [...(r.image_urls||[])];
              imgs[parseInt(btn.dataset.idx)] = '';
              r.image_urls = imgs.filter(Boolean);
              r.updated_by=state.currentUser; r.updated_at=new Date().toISOString();
              persistRecipes(); render();
              showToast('ลบรูปแล้ว');
            }
          });
        };
      });
      panel.querySelector('.closePanel').onclick = ()=>{ state.openId=null; state.recipePickerOpen=false; render(); };
      panel.querySelector('.deleteRecipe').onclick = ()=>{
        if(!requireUser()) return;
        showConfirm('ลบเมนูนี้ถาวร? แนะนำให้ใช้ปิดขายแทนถ้าอาจเอากลับมา', ()=>{
          state.recipes = state.recipes.filter(x=>x.id!==id);
          state.openId = null;
          persistRecipes();
          render();
          showToast('ลบเมนูแล้ว');
        });
      };
      panel.querySelector('.duplicateRecipe').onclick = ()=>{
        if(!requireUser()) return;
        const src = state.recipes.find(x=>x.id===id);
        if(!src) return;
        const copy = JSON.parse(JSON.stringify(src));
        copy.id   = 'r'+Date.now();
        copy.name = (copy.name||'') + ' (copy)';
        copy.code = '';           // ล้าง code ให้ตั้งใหม่
        copy.available_online = false;
        copy.pinned = false;
        copy.updated_at = new Date().toISOString();
        copy.updated_by = state.currentUser;
        const idx = state.recipes.findIndex(x=>x.id===id);
        state.recipes.splice(idx+1, 0, copy); // แทรกต่อจากต้นฉบับ
        state.openId = copy.id;
        persistRecipes();
        render(true);
        showToast('Duplicate แล้ว — แก้ชื่อ/รหัสได้เลย');
        setTimeout(()=>{
          const p = document.querySelector('[data-edit="'+copy.id+'"]');
          if(p) p.scrollIntoView({behavior:'smooth', block:'start'});
        }, 60);
      };
      panel.querySelector('.saveRecipe').onclick = ()=>{
        if(!requireUser()) return;
        const r = getRecipeFromPanel(panel, id);
        const idx = state.recipes.findIndex(x=>x.id===id);
        const dups = findDuplicates(r);
        if(dups.length && !state.compactMode){
          r._dupCheck = dups;
          state.recipes[idx] = r;
          render();
          showToast(`⚠️ พบเมนูที่อาจซ้ำ ${dups.length} รายการ — ตรวจสอบก่อนบันทึก`);
        } else {
          r.updated_at = new Date().toISOString();
          r.updated_by = state.currentUser;
          delete r._dupCheck;
          state.recipes[idx] = r;
          persistRecipes();
          render();
          showToast('บันทึกแล้ว');
        }
      };
      const dupBox = panel.querySelector('.dup-warning');
      if(dupBox){
        panel.querySelectorAll('.openOther').forEach(btn=>btn.onclick=(e)=>{
          e.stopPropagation();
          state.openId = btn.dataset.id;
          state.recipePickerOpen=false;
          render(true);  // immediate — ไม่ defer เมื่อ keyboard ขึ้น
          setTimeout(()=>{
            const p = document.querySelector('[data-edit="'+btn.dataset.id+'"]');
            if(p) p.scrollIntoView({behavior:'smooth', block:'start'});
          }, 60);
        });
        const fs = panel.querySelector('.forceSave');
        if(fs) fs.onclick = ()=>{
          if(!requireUser()) return;
          const r = state.recipes.find(x=>x.id===id);
          r.updated_at = new Date().toISOString();
          r.updated_by = state.currentUser;
          delete r._dupCheck;
          persistRecipes();
          render();
          showToast('บันทึกแล้ว');
        };
        const cd = panel.querySelector('.cancelDup');
        if(cd) cd.onclick = ()=>{
          const r = state.recipes.find(x=>x.id===id);
          delete r._dupCheck;
          render();
        };
      }
    });
  } else if(state.tab==='plan'){
    const planInput = document.getElementById('planRecipeInput');
    if(planInput){
      planInput.oninput = e=>{
        state.planQuery = e.target.value;
        // Filter dropdown items in-place (no re-render = input stays focused)
        const q = e.target.value.trim().toLowerCase();
        document.querySelectorAll('.plan-dd-item').forEach(item=>{
          const name = (item.dataset.name||'').toLowerCase();
          const code = (item.dataset.code||'').toLowerCase();
          item.style.display = (!q || name.includes(q) || code.includes(q)) ? '' : 'none';
        });
        // Show/hide section headers based on whether any items visible under them
        document.querySelectorAll('.plan-dd-section-hd').forEach(hd=>{
          let sib = hd.nextElementSibling;
          let hasVisible = false;
          while(sib && !sib.classList.contains('plan-dd-section-hd')){
            if(sib.style.display !== 'none') hasVisible = true;
            sib = sib.nextElementSibling;
          }
          hd.style.display = hasVisible ? '' : 'none';
        });
      };
      planInput.onfocus = ()=>{
        if(!state.planDropdownOpen){ state.planDropdownOpen=true; render(); }
        // Re-focus after render
        setTimeout(()=>{ const el=document.getElementById('planRecipeInput'); if(el) el.focus(); }, 10);
      };
      planInput.onclick = e=>e.stopPropagation();
      planInput.onkeydown = e=>{
        if(e.key==='Escape'){ state.planDropdownOpen=false; render(); return; }
        if(e.key==='Enter'){
          const first = document.querySelector('.plan-dd-item:not([style*="display: none"]),.plan-dd-item:not([style])');
          if(first){ first.click(); }
        }
      };
    }

    // Custom dropdown item click → add to plan
    document.querySelectorAll('.plan-dd-item').forEach(item=>{
      item.onclick = (e)=>{
        e.stopPropagation();
        const r = state.recipes.find(x=>x.id===item.dataset.id);
        if(!r) return;
        const qtyInp = document.getElementById('planQtyInput');
        const qty = parseFloat(qtyInp?qtyInp.value:1)||1;
        const existing = state.planItems.find(p=>p.recipeId===r.id);
        if(existing){ existing.qty=(parseFloat(existing.qty)||0)+qty; }
        else { state.planItems.push({recipeId:r.id, qty}); }
        state.planQuery=''; state.planDropdownOpen=false;
        persistPlanItems(); render();
        showToast(`เพิ่ม ${r.name} ×${qty} แล้ว`);
      };
    });

    const planClearBtn = document.getElementById('planClearBtn');
    if(planClearBtn) planClearBtn.onclick = ()=>{
      if(state.planItems.length===0){ showToast('รายการว่างอยู่แล้ว'); return; }
      showConfirm(`ล้างรายการทั้งหมด ${state.planItems.length} รายการ?`, ()=>{
        state.planItems = [];
        persistPlanItems();
        render();
        showToast('ล้างรายการแล้ว');
      });
    };

    const planAddBtn = document.getElementById('planAddBtn');
    if(planAddBtn) planAddBtn.onclick = ()=>{
      const inp = document.getElementById('planRecipeInput');
      const q = (inp?inp.value:'').trim().toLowerCase();
      if(!q){ showToast('กรุณาพิมพ์ชื่อเมนูก่อน'); return; }
      // Try to resolve — match any status
      const recipe = state.recipes.find(r=>{
        const full = ((r.code?r.code+' — ':'')+r.name).toLowerCase();
        return full===q || (r.name||'').toLowerCase()===q || (r.code||'').toLowerCase()===q || (r.name||'').toLowerCase().includes(q);
      });
      if(!recipe){ showToast('ไม่พบเมนู — ลองพิมพ์หรือเลือกจาก dropdown'); return; }
      const qtyInp = document.getElementById('planQtyInput');
      const qty = parseFloat(qtyInp?qtyInp.value:1)||1;
      const existing = state.planItems.find(p=>p.recipeId===recipe.id);
      if(existing){ existing.qty=(parseFloat(existing.qty)||0)+qty; }
      else { state.planItems.push({recipeId:recipe.id, qty}); }
      state.planQuery=''; state.planDropdownOpen=false;
      if(inp) inp.value='';
      persistPlanItems(); render();
    };

    const planHideStockedChk = document.getElementById('planHideStocked');
    if(planHideStockedChk) planHideStockedChk.onchange = ()=>{ state.planHideStocked = planHideStockedChk.checked; render(); };
    const planSupFilt = document.getElementById('planSupplierFilter');
    if(planSupFilt) planSupFilt.onchange = ()=>{ state.planSupplierFilter = planSupFilt.value; render(); };

    document.querySelectorAll('.plan-qty-edit').forEach(inp=>{
      inp.onchange = ()=>{
        const idx = parseInt(inp.dataset.idx);
        state.planItems[idx].qty = parseFloat(inp.value)||1;
        persistPlanItems();
        render();
      };
    });
    document.querySelectorAll('.planRemoveBtn').forEach(btn=>{
      btn.onclick = ()=>{
        const idx = parseInt(btn.dataset.idx);
        state.planItems.splice(idx,1);
        persistPlanItems();
        render();
      };
    });
  } else {
    const isS = document.getElementById('ingSearch');
    if(isS){
      isS.onclick = e=>e.stopPropagation();
      isS.oninput = ()=>{
        const q = isS.value.trim().toLowerCase();
        state.search = isS.value;
        // Filter rows in-place (no re-render = input stays focused, cursor stays)
        document.querySelectorAll('#ingBody tr[data-id]').forEach(tr=>{
          const name = (tr.querySelector('.ing-f-name')?.value||'').toLowerCase();
          tr.style.display = (!q || name.includes(q)) ? '' : 'none';
        });
      };
      isS.onkeydown = e=>{ if(e.key==='Escape'){ isS.value=''; isS.oninput(); } };
    }

    // Category filter chips
    document.querySelectorAll('.ing-cat-btn[data-cat]').forEach(btn=>{
      btn.onclick = ()=>{
        const cat = btn.dataset.cat;
        state.ingCategoryFilter = (state.ingCategoryFilter===cat && cat!=='') ? '' : cat;
        render();
      };
    });
    document.querySelectorAll('.ing-cat-btn[data-unitf]').forEach(btn=>{
      btn.onclick = ()=>{ state.ingUnitFilter = btn.dataset.unitf; render(); };
    });
    document.querySelectorAll('.sup-picker').forEach(picker=>{
      const ingId = picker.dataset.id;
      picker.querySelector('.sup-picker-btn').onclick = (e)=>{
        e.stopPropagation();
        state.supplierPickerOpenFor = (state.supplierPickerOpenFor===ingId) ? null : ingId;
        render();
      };
      picker.querySelectorAll('.sup-check').forEach(chk=>{
        chk.onclick = e=>e.stopPropagation();
        chk.onchange = ()=>{
          if(!requireUser()) return;
          const ing = state.ingredients.find(x=>x.id===ingId);
          ing.suppliers = ing.suppliers||[];
          const key = chk.value;
          const idx2 = ing.suppliers.indexOf(key);
          if(chk.checked && idx2===-1) ing.suppliers.push(key);
          if(!chk.checked && idx2!==-1){
            ing.suppliers.splice(idx2,1);
            if(ing.defaultSupplier===key) ing.defaultSupplier = ing.suppliers[0]||null;
          }
          if(chk.checked && !ing.defaultSupplier) ing.defaultSupplier = key;
          persistIngredients();
          render();
        };
      });
      picker.querySelectorAll('.sup-default-btn').forEach(btn=>{
        btn.onclick = (e)=>{
          e.stopPropagation();
          if(!requireUser()) return;
          const ing = state.ingredients.find(x=>x.id===ingId);
          ing.defaultSupplier = btn.dataset.key;
          persistIngredients();
          render();
        };
      });
      const supAddBtn = picker.querySelector('.sup-add-btn');
      if(supAddBtn) supAddBtn.onclick = (e)=>{
        e.stopPropagation();
        if(!requireUser()) return;
        const input = picker.querySelector('.sup-new-input');
        const label = input.value.trim();
        if(!label) return;
        let s = state.suppliers.find(x=>x.label.trim().toLowerCase()===label.toLowerCase());
        if(!s){ s = {key:'sup_'+Date.now().toString(36)+Math.random().toString(36).slice(2,5), label}; state.suppliers.push(s); persistSuppliers(); }
        const ing = state.ingredients.find(x=>x.id===ingId);
        ing.suppliers = ing.suppliers||[];
        if(!ing.suppliers.includes(s.key)) ing.suppliers.push(s.key);
        if(!ing.defaultSupplier) ing.defaultSupplier = s.key;
        persistIngredients();
        render();
      };
    });
    const toggleNutriColsBtn = document.getElementById('toggleNutriColsBtn');
    if(toggleNutriColsBtn) toggleNutriColsBtn.onclick = ()=>{
      state.hideNutritionCols = !state.hideNutritionCols;
      persistAppConfig();
      render();
    };
    const manageSupBtn = document.getElementById('manageSupBtn');
    if(manageSupBtn) manageSupBtn.onclick = ()=>{ state.showSupplierManager=true; render(); };
    document.querySelectorAll('.ing-subtab-btn').forEach(btn=>{
      btn.onclick = ()=>{ state.ingSubtab = btn.dataset.subtab; render(); };
    });
    const mpSubPlanBtn = document.getElementById('mpSubPlan');
    if(mpSubPlanBtn) mpSubPlanBtn.onclick = ()=>{ state.mpSubView='plan'; render(); };
    const mpSubAssignBtn = document.getElementById('mpSubAssign');
    if(mpSubAssignBtn) mpSubAssignBtn.onclick = ()=>{
      state.mpSubView='assign';
      if(!state.mpProdDate) state.mpProdDate=mpProdTodayIso();
      mpProdLoad(state.mpProdDate);
      render();
    };
    const mpSubOffersBtn = document.getElementById('mpSubOffers');
    if(mpSubOffersBtn) mpSubOffersBtn.onclick = ()=>{ state.mpSubView='offers'; loadMpOffers().then(render); render(); };
    const newMpOfferBtn = document.getElementById('newMpOfferBtn');
    if(newMpOfferBtn) newMpOfferBtn.onclick = newMpOffer;
    document.querySelectorAll('.mpo-save-btn').forEach(btn=>{
      btn.onclick = ()=>{ const tr=btn.closest('tr[data-offer-id]'); if(tr) saveMpOffer(tr.dataset.offerId); };
    });
    document.querySelectorAll('.mpo-del-btn').forEach(btn=>{
      btn.onclick = ()=>{ const tr=btn.closest('tr[data-offer-id]'); if(tr) deleteMpOffer(tr.dataset.offerId); };
    });
    const mpProdPrevDay = document.getElementById('mpProdPrevDay');
    if(mpProdPrevDay) mpProdPrevDay.onclick = ()=>{ mpProdSetDate(mpProdAddDays(state.mpProdDate,-1)); render(); };
    const mpProdNextDay = document.getElementById('mpProdNextDay');
    if(mpProdNextDay) mpProdNextDay.onclick = ()=>{ mpProdSetDate(mpProdAddDays(state.mpProdDate,1)); render(); };
    const mpProdTodayBtn = document.getElementById('mpProdTodayBtn');
    if(mpProdTodayBtn) mpProdTodayBtn.onclick = ()=>{ mpProdSetDate(mpProdTodayIso()); render(); };
    const mpProdRefreshBtn = document.getElementById('mpProdRefreshBtn');
    if(mpProdRefreshBtn) mpProdRefreshBtn.onclick = ()=>{ mpProdLoad(state.mpProdDate); };
    const mpProdDateInput = document.getElementById('mpProdDateInput');
    if(mpProdDateInput) mpProdDateInput.onchange = ()=>{ if(mpProdDateInput.value) { mpProdSetDate(mpProdDateInput.value); render(); } };
    document.querySelectorAll('.mp-prod-note-input').forEach(inp=>{
      inp.oninput = ()=>{ mpProdSaveNote(inp.dataset.row, inp.dataset.code, inp.value); };
    });
    document.querySelectorAll('#ingBody tr[data-id]').forEach(tr=>{
      const id = tr.dataset.id;
      const marketInp = tr.querySelector('.ing-f-market');
      if(marketInp) marketInp.oninput = ()=>{
        const val = parseFloat(marketInp.value);
        const calcSpan = marketInp.closest('tr').querySelector('.cost-calc');
        if(calcSpan){
          const costPerG = !isNaN(val) && val>0 ? Math.round(val/1000*100000)/100000 : 0;
          calcSpan.textContent = costPerG>0 ? '฿'+fmtNum(costPerG) : '—';
        }
      };
      // stock +/- inline buttons
      const plusBtn = tr.querySelector('.ing-stock-plus');
      const minusBtn = tr.querySelector('.ing-stock-minus');
      const stockInp = tr.querySelector('.ing-f-stock');
      if(plusBtn) plusBtn.onclick = (e)=>{
        e.stopPropagation();
        if(!stockInp) return;
        stockInp.value = Math.round(((parseFloat(stockInp.value)||0)+0.1)*100)/100;
      };
      if(minusBtn) minusBtn.onclick = (e)=>{
        e.stopPropagation();
        if(!stockInp) return;
        stockInp.value = Math.max(0, Math.round(((parseFloat(stockInp.value)||0)-0.1)*100)/100);
      };
      tr.querySelector('.saveIngRow').onclick = ()=>{
        if(!requireUser()) return;
        const i = state.ingredients.find(x=>x.id===id);
        i.name = tr.querySelector('.ing-f-name').value.trim();
        // Auto-assign emoji/category if blank
        if(!i.ingEmoji){ const cls=autoClassifyIngredient(i.name); i.ingEmoji=cls.emoji; if(!i.ingCategory) i.ingCategory=cls.cat; }
        i.unit = tr.querySelector('.ing-f-unit').value.trim();
        const fIngCat = tr.querySelector('.ing-f-ingcat');
        if(fIngCat) i.ingCategory = fIngCat.value;
        const fMarket = tr.querySelector('.ing-f-market');
        if(fMarket){
          const mkt = parseFloat(fMarket.value)||0;
          i.market_price_kg = mkt;
          i.cost_per_unit = mkt>0 ? Math.round(mkt/1000*100000)/100000 : (i.cost_per_unit||0);
        }
        i.stock = parseFloat(tr.querySelector('.ing-f-stock').value)||0;
        const fKcal = tr.querySelector('.ing-f-kcal'), fProtein = tr.querySelector('.ing-f-protein'), fCarb = tr.querySelector('.ing-f-carb'), fFat = tr.querySelector('.ing-f-fat');
        if(fKcal) i.kcal_per_unit = parseFloat(fKcal.value)||0;
        if(fProtein) i.protein_per_unit = parseFloat(fProtein.value)||0;
        if(fCarb) i.carb_per_unit = parseFloat(fCarb.value)||0;
        if(fFat) i.fat_per_unit = parseFloat(fFat.value)||0;
        i.updated_by = state.currentUser;
        i.updated_at = new Date().toISOString();
        persistIngredients();
        showToast('บันทึกแล้ว');
        render();
      };
      tr.querySelector('.delIngRow').onclick = ()=>{
        if(!requireUser()) return;
        showConfirm('ลบวัตถุดิบนี้ถาวร?', ()=>{
          state.ingredients = state.ingredients.filter(x=>x.id!==id);
          persistIngredients();
          render();
        });
      };
    });
    const newMarketInp = document.querySelector('.new-market');
    if(newMarketInp) newMarketInp.oninput = ()=>{
      const val = parseFloat(newMarketInp.value);
      const calcEl = document.getElementById('newCostCalc');
      if(calcEl){
        const costPerG = !isNaN(val) && val>0 ? Math.round(val/1000*100000)/100000 : 0;
        calcEl.textContent = costPerG>0 ? '฿'+fmtNum(costPerG) : '—';
      }
    };
    const addBtn = document.querySelector('.addIngBtn');
    if(addBtn) addBtn.onclick = ()=>{
      if(!requireUser()) return;
      const name = document.querySelector('.new-name').value.trim();
      if(!name){ showToast('กรุณาพิมพ์ชื่อ'); return; }
      const fKcal = document.querySelector('.new-kcal'), fProtein = document.querySelector('.new-protein'), fCarb = document.querySelector('.new-carb'), fFat = document.querySelector('.new-fat');
      const fMarketNew = document.querySelector('.new-market');
      const fCatNew = document.querySelector('.new-ingcat');
      const mktVal = fMarketNew ? (parseFloat(fMarketNew.value)||0) : 0;
      state.ingredients.push({
        id: 'i'+Date.now(),
        name,
        type: 'ingredient',
        ingCategory: fCatNew ? fCatNew.value : (state.ingCategoryFilter||''),
        unit: document.querySelector('.new-unit').value.trim()||'g',
        market_price_kg: mktVal,
        cost_per_unit: mktVal>0 ? Math.round(mktVal/1000*100000)/100000 : 0,
        stock: parseFloat(document.querySelector('.new-stock').value)||0,
        kcal_per_unit: fKcal ? (parseFloat(fKcal.value)||0) : 0,
        protein_per_unit: fProtein ? (parseFloat(fProtein.value)||0) : 0,
        carb_per_unit: fCarb ? (parseFloat(fCarb.value)||0) : 0,
        fat_per_unit: fFat ? (parseFloat(fFat.value)||0) : 0,
        suppliers: [], defaultSupplier: null,
        updated_by: state.currentUser,
        updated_at: new Date().toISOString(),
      });
      persistIngredients();
      render();
      showToast('เพิ่มแล้ว');
    };
  }
}

init();
</script>
</body>
</html>
