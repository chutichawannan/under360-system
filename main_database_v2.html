<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Main Database — Under360</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FAF6EF;
  --surface:#FFFFFF;
  --surface-2:#F2ECE0;
  --ink:#2B2925;
  --ink-soft:#7A7468;
  --line:#E7DFD0;
  --forest:#1F4D3A;
  --forest-soft:#E3ECE6;
  --turmeric:#D98C2B;
  --turmeric-soft:#FBEDD8;
  --coral:#C9573F;
  --coral-soft:#F8E4DD;
  --saffron:#E8B339;
  --saffron-soft:#FBF1D9;
  --leaf:#3C7A5C;
  --leaf-soft:#E7EFE9;
  --radius:10px;
  /* aliases used in v2 components */
  --brd:#E7DFD0;
  --cream:#FAF6EF;
  --gl:#E3ECE6;
}
@keyframes spin{to{transform:rotate(360deg);}}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:'IBM Plex Sans Thai',sans-serif;-webkit-font-smoothing:antialiased;}
.mono{font-family:'IBM Plex Mono',monospace;}
header.top{position:sticky;top:0;z-index:20;background:var(--forest);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
header.top h1{font-size:17px;font-weight:600;margin:0;letter-spacing:.2px;}
header.top .sub{font-size:12px;opacity:.75;margin-top:2px;}
.tabs{display:flex;gap:6px;background:#fff;border-bottom:1px solid var(--line);padding:0 16px;position:sticky;top:56px;z-index:19;overflow-x:auto;}
.tab-btn{appearance:none;border:none;background:transparent;padding:13px 14px;font-size:14px;font-weight:500;color:var(--ink-soft);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;}
.tab-btn.active{color:var(--forest);border-bottom-color:var(--forest);font-weight:600;}
main{max-width:1120px;margin:0 auto;padding:10px 14px 80px;}
.stat-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.stat-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:10px 14px;flex:1;min-width:130px;}
.stat-card .num{font-size:20px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:var(--forest);}
.stat-card .lbl{font-size:11.5px;color:var(--ink-soft);margin-top:2px;}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px;}
.search-box{flex:1 1 140px;min-width:120px;position:relative;}
.search-box input{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-family:inherit;background:#fff;}
select.filt{padding:10px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:#fff;font-family:inherit;color:var(--ink);}
select.sort-sel{padding:5px 8px;border:1.5px solid var(--ink-soft);border-radius:6px;font-size:12px;background:var(--surface-2);font-family:inherit;color:var(--ink);cursor:pointer;max-width:110px;}
select.sort-sel:focus{outline:none;border-color:var(--forest);}
.btn{appearance:none;border:none;border-radius:8px;padding:10px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-primary{background:var(--forest);color:#fff;}
.btn-primary:hover{background:#163b2b;}
.btn-ghost{background:var(--surface-2);color:var(--ink);}
.btn-ghost:hover{background:#e9e0cd;}
.btn-warn{background:var(--coral-soft);color:var(--coral);}
.btn-export{background:var(--forest-soft);color:var(--forest);border:1.5px solid var(--forest);font-weight:600;}
.btn-export:hover{background:#c8ddd0;}
.online-toggle-btn{appearance:none;border:1.5px solid var(--line);border-radius:20px;padding:3px 10px;font-size:11.5px;cursor:pointer;background:var(--surface-2);color:var(--ink-soft);white-space:nowrap;font-family:inherit;transition:all .15s;flex-shrink:0;line-height:1.4;}
.online-toggle-btn.online-on{background:var(--forest-soft);color:var(--forest);border-color:var(--forest);font-weight:700;}
.online-toggle-btn:hover{opacity:.8;}
.online-export-bar{background:var(--forest-soft);border:1px solid rgba(31,77,58,.25);border-radius:var(--radius);padding:10px 14px;display:flex;align-items:center;gap:12px;margin-bottom:10px;font-size:13px;}
.online-export-bar .cnt{font-size:18px;font-weight:700;color:var(--forest);font-family:'IBM Plex Mono',monospace;}
.btn-sm{padding:7px 11px;font-size:12.5px;}
.line-group{margin-bottom:12px;}
.line-group h2{font-size:12.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-soft);margin:0 0 5px 2px;display:flex;align-items:center;gap:8px;}
.line-group h2 .dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:5px;overflow:hidden;}
.row{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;}
.row:hover{background:var(--surface-2);}
.code-badge{font-family:'IBM Plex Mono',monospace;font-size:11.5px;font-weight:600;background:var(--forest-soft);color:var(--forest);padding:3px 7px;border-radius:6px;white-space:nowrap;}
.subcode-input{font-family:'IBM Plex Mono',monospace;font-size:11.5px;font-weight:600;width:64px;padding:2px 6px;border:1.5px dashed var(--turmeric);border-radius:6px;color:var(--turmeric);background:var(--turmeric-soft);outline:none;min-width:0;flex-shrink:0;}
.subcode-input:focus{border-style:solid;background:#fff;}
.subcode-input::placeholder{color:rgba(217,140,43,.45);font-weight:400;}
.subcode-badge{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;background:var(--turmeric-soft);color:var(--turmeric);padding:2px 7px;border-radius:6px;white-space:nowrap;flex-shrink:0;border:1px solid rgba(217,140,43,.3);}
.row .name{font-size:14.5px;font-weight:500;}
.row .meta{font-size:11.5px;color:var(--ink-soft);white-space:nowrap;font-family:'IBM Plex Mono',monospace;}
.badge-retired{font-size:10.5px;background:var(--surface-2);color:var(--ink-soft);padding:2px 6px;border-radius:5px;}
.badge-incomplete{font-size:10.5px;background:var(--turmeric-soft);color:var(--turmeric);padding:2px 6px;border-radius:5px;}
.panel{padding:16px;border-top:1px solid var(--line);background:#FDFBF6;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;color:var(--ink-soft);margin-bottom:4px;font-weight:500;}
.field input[type=text],.field input[type=number],.field select,.field textarea{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:7px;font-size:14px;font-family:inherit;background:#fff;}
.field textarea{min-height:80px;resize:vertical;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ing-line{display:grid;grid-template-columns:1fr 70px 70px 30px;gap:6px;margin-bottom:6px;align-items:center;}
.ing-line input{padding:8px 9px;border:1px solid var(--line);border-radius:6px;font-size:13.5px;font-family:inherit;}
.ing-line .rm{background:var(--coral-soft);color:var(--coral);border:none;border-radius:6px;height:34px;cursor:pointer;font-size:15px;}
.unlinked-flag{font-size:10.5px;color:var(--turmeric);margin-top:-2px;margin-bottom:6px;}
.totals-box{display:flex;gap:14px;flex-wrap:wrap;background:var(--forest-soft);border-radius:8px;padding:10px 14px;margin:12px 0;}
.totals-box .t{font-size:12px;color:var(--forest);}
.totals-box .t b{font-family:'IBM Plex Mono',monospace;font-size:14.5px;display:block;}
.dup-warning{background:var(--coral-soft);border:1px solid #e0b4a6;border-radius:8px;padding:12px;margin-bottom:12px;}
.dup-warning .h{font-size:13.5px;font-weight:600;color:var(--coral);margin-bottom:8px;}
.dup-item{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:6px;padding:8px 10px;margin-bottom:6px;font-size:13px;}
.dup-item .score{font-size:11px;color:var(--ink-soft);}
.panel-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.empty{text-align:center;padding:40px 20px;color:var(--ink-soft);font-size:14px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--forest);color:#fff;padding:10px 18px;border-radius:30px;font-size:13.5px;z-index:50;box-shadow:0 4px 16px rgba(0,0,0,.2);}
.fab{position:fixed;bottom:22px;right:22px;background:var(--turmeric);color:#fff;border:none;border-radius:30px;padding:14px 20px;font-size:14.5px;font-weight:600;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.18);z-index:25;}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--radius);}
.ing-table{width:100%;min-width:780px;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
.ing-table th{text-align:left;font-size:11.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.4px;padding:9px 10px;background:var(--surface-2);}
.ing-table td{padding:8px 10px;border-top:1px solid var(--line);font-size:13.5px;}
.ing-table input{width:100%;padding:6px 7px;border:1px solid var(--line);border-radius:5px;font-size:13px;font-family:inherit;}
.banner{background:var(--turmeric-soft);color:#7a4f10;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;}
.name-wrap{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0;}
.chip-row{display:flex;flex-wrap:wrap;gap:4px;}
.cat-chip{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;background:var(--surface-2);color:var(--ink-soft);padding:2px 7px;border-radius:10px;}
.nutri-chip{background:var(--forest-soft);color:var(--forest);font-family:'IBM Plex Mono',monospace;font-weight:600;}
.quick-row{display:flex;align-items:center;gap:8px;margin-top:2px;}
.rating-row{display:flex;gap:3px;align-items:center;flex-shrink:0;}
.rating-filter-wrap{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink-soft);}
.quick-note-input{flex:1;min-width:0;font-size:11.5px;padding:4px 8px;border:1px solid var(--line);border-radius:6px;background:var(--surface-2);color:var(--ink);font-family:inherit;}
.line-calc{font-size:11px;color:var(--forest);font-family:'IBM Plex Mono',monospace;margin:-2px 0 10px 2px;}
.line-calc-warn{color:var(--coral);font-family:'IBM Plex Sans Thai',sans-serif;}
.line-calc-soft{color:var(--ink-soft);font-family:'IBM Plex Sans Thai',sans-serif;}
.sup-picker{position:relative;display:inline-block;}
.sup-picker-btn{padding:6px 9px;border:1px solid var(--line);border-radius:7px;font-size:12px;background:#fff;font-family:inherit;color:var(--ink);cursor:pointer;max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:left;}
.sup-picker-panel{position:absolute;top:calc(100% + 4px);left:0;background:#fff;border:1px solid var(--line);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.14);padding:8px;min-width:240px;max-height:260px;overflow-y:auto;z-index:30;}
.sup-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 4px;font-size:13px;border-radius:6px;cursor:pointer;}
.sup-row:hover{background:var(--surface-2);}
.sup-row input[type=checkbox]{width:auto;margin:0;}
.sup-default-btn{font-size:10px;color:var(--ink-soft);cursor:pointer;white-space:nowrap;padding:2px 7px;border-radius:10px;flex-shrink:0;}
.sup-default-btn.is-default{color:#7a4f10;background:var(--turmeric-soft);font-weight:700;}
.sup-add{display:flex;gap:6px;margin-top:6px;padding-top:8px;border-top:1px solid var(--line);}
.sup-add input{flex:1;padding:7px 8px;border:1px solid var(--line);border-radius:6px;font-size:13px;font-family:inherit;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal-card{background:#fff;border-radius:14px;padding:22px;max-width:420px;width:100%;max-height:80vh;overflow-y:auto;}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.modal-head h2{font-size:16px;color:var(--forest);margin:0;}
.modal-close{background:none;border:none;font-size:22px;color:var(--ink-soft);cursor:pointer;line-height:1;padding:0 4px;}
.cat-manage-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--line);}
.cat-manage-row input{flex:1;padding:7px 9px;border:1px solid var(--line);border-radius:6px;font-size:13.5px;font-family:inherit;min-width:0;}
.parts-wrap{display:flex;flex-direction:column;gap:14px;margin-bottom:10px;}
.part-block{border:1px solid var(--line);border-radius:10px;padding:12px;background:var(--surface-2);}
.part-head{display:flex;gap:8px;align-items:center;margin-bottom:10px;}
.part-label{flex:1;padding:8px 10px;border:1px solid var(--line);border-radius:7px;font-size:13.5px;font-family:inherit;font-weight:600;background:#fff;}
.rmPart{background:var(--coral-soft);color:var(--coral);border:none;border-radius:6px;padding:0 12px;height:36px;cursor:pointer;font-size:12.5px;white-space:nowrap;}
.part-instructions{width:100%;min-height:70px;resize:vertical;margin-top:10px;padding:9px 10px;border:1px solid var(--line);border-radius:7px;font-size:14px;font-family:inherit;background:#fff;}
.photo-box{display:flex;flex-direction:column;gap:8px;align-items:flex-start;}
.photo-preview{max-width:180px;max-height:180px;border-radius:8px;border:1px solid var(--line);object-fit:cover;display:block;}
.photo-upload-label{display:inline-flex;align-items:center;justify-content:center;width:180px;height:110px;border:1.5px dashed var(--line);border-radius:8px;color:var(--ink-soft);font-size:13px;cursor:pointer;text-align:center;padding:8px;}
.photo-upload-label:hover{background:var(--surface-2);}
.photo-loading{color:var(--ink-soft);font-size:13px;padding:10px 0;}
.photo-actions{display:flex;gap:8px;}
.photo-replace-label{cursor:pointer;}
.plan-add-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.plan-add-row select{flex:1;min-width:200px;padding:9px 10px;border:1px solid var(--line);border-radius:7px;font-size:14px;font-family:inherit;background:#fff;}
.plan-add-row input{width:90px;padding:9px 10px;border:1px solid var(--line);border-radius:7px;font-size:14px;font-family:inherit;}
.plan-list{display:flex;flex-direction:column;gap:8px;margin:16px 0;}
.plan-item-row{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:10px 12px;}
.plan-item-name{flex:1;font-size:14px;font-weight:500;}
.plan-qty-edit{width:70px;padding:6px 8px;border:1px solid var(--line);border-radius:6px;font-family:inherit;font-size:13.5px;}
.plan-unit-label{font-size:12px;color:var(--ink-soft);}
.plan-summary-head{margin-top:22px;font-size:15px;color:var(--forest);}
.plan-row-missing{background:var(--coral-soft);}
.plan-missing-tag{font-size:10px;color:var(--coral);}
.plan-enough-tag{color:var(--forest);font-weight:600;}
.cat-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0;}
.cat-picker{position:relative;flex:2 1 200px;min-width:180px;max-width:60%;}
.cat-picker-btn{padding:10px 14px;border:1px solid var(--forest);border-radius:8px;font-size:13px;background:var(--forest-soft);font-family:inherit;color:var(--forest);cursor:pointer;min-width:200px;flex:0 0 auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:left;font-weight:500;}
.cat-picker-panel{position:absolute;top:calc(100% + 4px);left:0;background:#fff;border:1px solid var(--line);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.14);padding:8px;min-width:250px;max-height:280px;overflow-y:auto;z-index:30;}
.cat-picker-panel label{display:flex;align-items:center;gap:8px;padding:9px 10px;font-size:13.5px;cursor:pointer;border-radius:6px;user-select:none;}
.cat-picker-panel label:hover{background:var(--surface-2);}
.cat-picker-panel input[type=checkbox]{width:auto;margin:0;}
.cat-picker-add{display:flex;gap:6px;margin-top:6px;padding-top:8px;border-top:1px solid var(--line);}
.cat-picker-add input{flex:1;padding:7px 8px;border:1px solid var(--line);border-radius:6px;font-size:13px;font-family:inherit;}
@media (max-width:680px){
  main{padding:14px 10px 90px;}
  .grid2{grid-template-columns:1fr;}
  .row .meta{display:none;}
  .stat-card{min-width:100px;}
  header.top h1{font-size:15px;}
}
.whoami{display:flex;align-items:center;gap:8px;font-size:12.5px;opacity:.85;}
.whoami button{appearance:none;border:1px solid rgba(255,255,255,.35);background:transparent;color:#fff;border-radius:20px;padding:5px 11px;font-size:12px;cursor:pointer;font-family:inherit;}
/* === Activity log bar === */
.act-log-bar{display:flex;align-items:center;gap:10px;padding:6px 20px;background:var(--surface-2);border-bottom:1px solid var(--line);font-size:12px;color:var(--ink-soft);}
.act-log-latest{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.act-log-latest b{color:var(--ink);}
.act-log-time{color:var(--ink-xsoft);}
.act-log-toggle{appearance:none;border:1px solid var(--line);background:#fff;color:var(--ink-soft);border-radius:14px;padding:3px 10px;font-size:11px;cursor:pointer;font-family:inherit;flex-shrink:0;}
.act-log-toggle:hover{border-color:var(--forest);color:var(--forest);}
.act-log-panel{max-height:280px;overflow-y:auto;background:#fff;border-bottom:1px solid var(--line);}
.act-log-row{display:flex;align-items:flex-start;gap:9px;padding:8px 20px;border-top:1px solid var(--line);}
.act-log-row:first-child{border-top:none;}
.act-log-icon{font-size:14px;flex-shrink:0;margin-top:1px;}
.act-log-body{flex:1;min-width:0;}
.act-log-summary{font-size:12.5px;color:var(--ink);word-break:break-word;}
.act-log-meta{font-size:10.5px;color:var(--ink-xsoft);margin-top:1px;}
@media (max-width:640px){
  .act-log-bar{padding:6px 12px;}
  .act-log-row{padding:8px 12px;}
}
.gate-wrap{min-height:60vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.gate-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:28px 26px;max-width:340px;width:100%;text-align:center;}
.gate-card h2{font-size:17px;margin:0 0 6px;color:var(--forest);}
.gate-card p{font-size:13px;color:var(--ink-soft);margin:0 0 18px;}
.gate-card input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:8px;font-size:15px;font-family:inherit;margin-bottom:12px;text-align:center;}
.gate-card .btn{width:100%;}
.last-edit{font-size:11.5px;color:var(--ink-soft);margin:-4px 0 12px;}
.stock-low{color:var(--coral);font-weight:600;}
.subtab-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}

/* === name-gate (top-right identity) === */
.name-gate-input{padding:6px 9px;border:1px solid rgba(255,255,255,.4);border-radius:7px;font-size:12.5px;font-family:inherit;background:rgba(255,255,255,.12);color:#fff;width:140px;}
.name-gate-input::placeholder{color:rgba(255,255,255,.65);}
.name-gate-save{appearance:none;border:none;background:var(--turmeric);color:#fff;border-radius:7px;padding:6px 11px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
@keyframes pulseHighlight{0%{box-shadow:0 0 0 0 rgba(217,140,43,.7);}70%{box-shadow:0 0 0 8px rgba(217,140,43,0);}100%{box-shadow:0 0 0 0 rgba(217,140,43,0);}}
.pulse-highlight{animation:pulseHighlight 1s ease-out 2;border-color:var(--turmeric) !important;}

/* === pin to top / row-level toggles === */
.row{flex-wrap:wrap;}
.row-toggles{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.row-toggle-lbl{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--ink-soft);cursor:pointer;white-space:nowrap;}
.row-toggle-lbl input[type=checkbox]{width:15px;height:15px;margin:0;cursor:pointer;}
.pin-order-btns{display:flex;flex-direction:column;gap:1px;}
.pin-order-btns button{appearance:none;border:none;background:var(--surface-2);color:var(--ink-soft);width:18px;height:14px;font-size:9px;line-height:1;cursor:pointer;border-radius:3px;padding:0;}
.pin-order-btns button:hover{background:var(--turmeric-soft);color:var(--turmeric);}
.card.is-pinned{border:1px solid var(--turmeric);box-shadow:0 0 0 1px var(--turmeric) inset;}
.card.is-pinned .row{background:var(--turmeric-soft);}
.row.not-selling{opacity:.55;}
.ptt-head{display:flex;align-items:center;gap:8px;}
.ptt-pill{font-size:10.5px;font-weight:700;background:var(--turmeric);color:#fff;padding:2px 8px;border-radius:10px;letter-spacing:.4px;}

/* === stock control === */
.stock-ctrl{display:flex;align-items:center;gap:3px;flex-shrink:0;margin-left:auto;}
.stock-ctrl button{appearance:none;border:none;background:var(--surface-2);color:var(--ink);width:24px;height:24px;border-radius:6px;font-size:14px;cursor:pointer;line-height:1;}
.stock-ctrl button:hover{background:#e9e0cd;}
.stock-ctrl input{width:48px;text-align:center;padding:4px 2px;border:1px solid var(--line);border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:12.5px;}
.stock-lbl{font-size:9.5px;color:var(--ink-soft);text-align:center;}
.stock-plus10{width:auto!important;padding:0 7px;font-size:11px!important;font-weight:700;background:var(--turmeric-soft)!important;color:var(--turmeric)!important;}
.stock-plus10:hover{background:var(--turmeric)!important;color:#fff!important;}

/* === name + category combined line, compact 2-line card === */
.name-line{display:flex;align-items:baseline;flex-wrap:wrap;gap:6px;row-gap:2px;}
.quick-row{flex-wrap:wrap;}
.quick-row.incomplete{background:var(--coral-soft);border:1px solid #eccabf;border-radius:6px;padding:2px 7px;}
.quick-row.incomplete .quick-kcal{color:var(--coral);font-weight:600;font-family:'IBM Plex Sans Thai',sans-serif;}
.quick-kcal{font-size:11px;color:var(--forest);font-family:'IBM Plex Mono',monospace;white-space:nowrap;flex-shrink:0;}

/* === 3-state rating (orange / yellow / green) === */
.rating-row3{display:flex;gap:4px;align-items:center;flex-shrink:0;}
.rating-dot3{width:13px;height:13px;border-radius:50%;cursor:pointer;display:inline-block;border:1.5px solid var(--line);background:transparent;}
.rating-dot3.r1{border-color:#e6c096;}
.rating-dot3.r2{border-color:#eeddA0;}
.rating-dot3.r3{border-color:#a9c7b6;}
.rating-dot3.r1.active{background:var(--turmeric);border-color:var(--turmeric);}
.rating-dot3.r2.active{background:var(--saffron);border-color:var(--saffron);}
.rating-dot3.r3.active{background:var(--leaf);border-color:var(--leaf);}

/* === drag-drop PTT === */
.ptt-drag-handle{cursor:grab;color:var(--ink-soft);font-size:16px;padding:0 4px;user-select:none;flex-shrink:0;}
.ptt-drag-handle:active{cursor:grabbing;}
.card.drag-over{outline:2px dashed var(--turmeric);outline-offset:-2px;}
.card[draggable="true"]{cursor:default;}

/* === bulk select === */
.bulk-bar{display:flex;align-items:center;gap:10px;background:var(--forest);color:#fff;border-radius:10px;padding:10px 16px;margin-bottom:12px;flex-wrap:wrap;}
.bulk-bar span{font-size:13px;flex:1;}
.bulk-bar .btn{font-size:12px;padding:7px 12px;}
.bulk-bar .btn-ghost{background:rgba(255,255,255,.18);color:#fff;}
.bulk-bar .btn-ghost:hover{background:rgba(255,255,255,.28);}
.row-select-chk{width:16px;height:16px;margin:0;cursor:pointer;flex-shrink:0;}

/* === stock ctrl bigger === */
.stock-ctrl button{width:27px;height:27px;font-size:15px;}
.stock-ctrl input{width:54px;font-size:13.5px;}

/* === ingredients tab === */
.ing-table td:first-child,.ing-table th:first-child{min-width:210px;max-width:210px;}
.ing-subtab-row{display:flex;gap:0;margin-bottom:10px;border:1px solid var(--line);border-radius:8px;overflow:hidden;width:fit-content;}
.ing-subtab-btn{appearance:none;border:none;background:var(--surface);padding:8px 18px;font-size:13px;font-weight:500;color:var(--ink-soft);cursor:pointer;font-family:inherit;}
.ing-subtab-btn.active{background:var(--forest);color:#fff;}
.cost-calc{font-size:11.5px;color:var(--forest);font-family:'IBM Plex Mono',monospace;padding:4px 6px;background:var(--forest-soft);border-radius:5px;white-space:nowrap;cursor:default;}
.nutri-col-w{width:64px;min-width:64px;}
.nutri-col-w input{width:60px;padding:4px 4px;font-size:12px;}

/* === meal plan === */
.mp-nav{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.mp-vd-group{display:flex;gap:0;border:1px solid var(--line);border-radius:7px;overflow:hidden;}
.mp-vd-btn{appearance:none;border:none;background:var(--surface);color:var(--ink-soft);padding:7px 11px;font-size:12.5px;font-weight:500;cursor:pointer;font-family:inherit;border-right:1px solid var(--line);}
.mp-vd-btn:last-child{border-right:none;}
.mp-vd-btn.active{background:var(--forest);color:#fff;}
/* grid — flex-based, horizontal scroll */
.mp-grid-wrap{overflow-x:auto;overflow-y:visible;margin-bottom:20px;border:1px solid var(--line);border-radius:10px;background:#fff;}
.mp-days-row{display:flex;min-height:200px;}
.mp-day-col{flex:0 0 var(--mp-col-w,180px);display:flex;flex-direction:column;border-right:1px solid var(--line);}
.mp-day-col:last-child{border-right:none;}
.mp-day-header{padding:9px 10px;text-align:center;background:var(--surface-2);border-bottom:1px solid var(--line);flex-shrink:0;}
.mp-day-header.mp-today{background:var(--turmeric-soft);}
.mp-day-header .mp-dh-day{font-size:10.5px;color:var(--ink-soft);margin-bottom:1px;}
.mp-day-header .mp-dh-num{font-size:18px;font-weight:800;line-height:1;color:var(--forest);}
.mp-day-header .mp-dh-ym{font-size:11px;color:var(--ink-soft);margin-top:2px;}
.mp-slot-section{padding:8px 8px;border-bottom:1px solid var(--line);}
.mp-slot-section:last-child{border-bottom:none;flex:1;}
.mp-slot-label{font-size:10.5px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.mp-cell{display:flex;flex-direction:column;gap:5px;}
.mp-entry-wrap{background:var(--surface);border-radius:7px;padding:5px 7px;display:flex;flex-direction:column;gap:4px;}
.mp-entry{display:flex;align-items:center;gap:4px;}
.mp-r-label{flex:1;min-width:0;white-space:normal;word-break:break-word;line-height:1.4;font-size:12.5px;font-weight:500;}
/* qty +/- control */
.mp-qty-ctrl{display:flex;align-items:center;gap:2px;flex-shrink:0;}
.mp-qty-ctrl button{appearance:none;border:1px solid var(--line);background:var(--surface-2);color:var(--ink);width:22px;height:22px;border-radius:5px;cursor:pointer;font-size:13px;padding:0;line-height:1;flex-shrink:0;}
.mp-qty-ctrl button:hover{background:var(--turmeric-soft);border-color:var(--turmeric);color:var(--turmeric);}
.mp-qty{width:38px;padding:3px 2px;border:1px solid var(--line);border-radius:5px;font-size:12px;text-align:center;font-family:'IBM Plex Mono',monospace;}
.mp-rm{background:none;border:none;color:var(--ink-soft);cursor:pointer;font-size:14px;padding:0 2px;line-height:1;flex-shrink:0;}
.mp-customer-row{display:flex;align-items:center;gap:4px;}
.mp-customer-icon{font-size:11px;flex-shrink:0;opacity:.55;}
.mp-customer-inp{flex:1;min-width:0;padding:3px 6px;border:1px solid var(--line);border-radius:5px;font-size:11.5px;font-family:inherit;background:var(--surface-2);color:var(--ink-soft);}
.mp-customer-inp:focus{outline:none;border-color:var(--turmeric);background:#fff;color:var(--ink);}
.mp-open-picker{appearance:none;border:1px dashed var(--line);background:transparent;color:var(--ink-soft);border-radius:6px;width:100%;padding:6px 0;font-size:12px;cursor:pointer;font-family:inherit;margin-top:4px;}
.mp-open-picker:hover{border-color:var(--turmeric);color:var(--turmeric);}
.mp-picker{background:#fff;border:1px solid var(--line);border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.14);margin-top:4px;overflow:hidden;z-index:20;position:relative;}
.mp-search-inp{width:100%;box-sizing:border-box;padding:9px 10px;border:none;border-bottom:1px solid var(--line);font-size:13px;font-family:inherit;outline:none;}
.mp-recipe-list{max-height:250px;overflow-y:auto;padding:4px;}
.mp-section-hd{font-size:10.5px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.5px;padding:4px 6px 2px;}
.mp-recipe-btn{display:flex;align-items:center;gap:6px;width:100%;background:none;border:none;padding:7px 8px;border-radius:5px;cursor:pointer;text-align:left;font-family:inherit;font-size:12.5px;}
.mp-recipe-btn:hover{background:var(--turmeric-soft);}
.mp-recipe-btn.mp-ptt-item{border-left:3px solid var(--turmeric);background:var(--turmeric-soft);}
.mp-recipe-btn.mp-ptt-item:hover{background:#f0e0a8;}
.mp-recipe-btn.mp-active-item{border-left:3px solid var(--forest);}
.mp-recipe-btn.mp-active-item:hover{background:var(--forest-soft);}
.mp-recipe-btn.mp-retired-item{opacity:.5;border-left:3px solid var(--line);}
.mp-r-code{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-soft);flex-shrink:0;background:var(--surface-2);padding:1px 5px;border-radius:3px;}
.mp-r-name{flex:1;white-space:normal;word-break:break-word;line-height:1.3;}
.mp-summary-table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-top:14px;}
.mp-summary-table th{background:var(--surface-2);font-size:12px;color:var(--ink-soft);padding:8px 10px;text-align:left;}
.mp-summary-table td{padding:7px 10px;border-top:1px solid var(--line);font-size:13px;}
.mp-history-list{display:flex;flex-direction:column;gap:6px;max-height:380px;overflow-y:auto;}
.mp-history-row{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--surface);border-radius:7px;}
.mp-hw{font-size:13px;font-weight:600;color:var(--forest);min-width:170px;}
.mp-hd{font-size:12px;color:var(--ink-soft);flex:1;}
.slot-editor{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:14px;padding:10px 12px;background:var(--surface-2);border-radius:8px;}
.slot-tag{display:flex;align-items:center;gap:4px;background:#fff;border:1px solid var(--line);border-radius:20px;padding:4px 10px;font-size:12.5px;}
.slot-tag button{background:none;border:none;color:var(--ink-soft);cursor:pointer;font-size:13px;padding:0;line-height:1;}
/* === ingredient category filter chips === */
.ing-cat-btn{appearance:none;border:1px solid var(--line);background:var(--surface);color:var(--ink-soft);padding:4px 9px;border-radius:20px;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:background .1s,color .1s;}
.ing-cat-btn:hover{border-color:var(--turmeric);color:var(--turmeric);}
.ing-cat-btn.active{background:var(--forest);color:#fff;border-color:var(--forest);}
.ing-type-col{min-width:90px;max-width:100px;}
/* compact table rows */
.ing-compact th,.ing-compact td{padding:4px 5px !important;vertical-align:middle;}
.ing-compact input[type=text],.ing-compact input[type=number]{padding:3px 5px;font-size:12px;}
.ing-compact .saveIngRow,.ing-compact .delIngRow{padding:3px 7px;font-size:11.5px;}
/* stock +/- inline */
.ing-stock-minus,.ing-stock-plus{appearance:none;border:none;background:var(--surface-2);color:var(--ink);width:20px;height:20px;border-radius:4px;font-size:12px;cursor:pointer;line-height:1;flex-shrink:0;}
.ing-stock-minus:hover,.ing-stock-plus:hover{background:var(--turmeric-soft);color:var(--turmeric);}
/* === plan recipe custom dropdown === */
.plan-recipe-wrap{flex:1;min-width:260px;position:relative;}
#planRecipeInput{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:7px;font-size:14px;font-family:inherit;box-sizing:border-box;}
#planRecipeInput:focus{outline:none;border-color:var(--forest);box-shadow:0 0 0 2px rgba(42,92,61,.12);}
.plan-dropdown{position:absolute;top:calc(100%+4px);left:0;right:0;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,.13);z-index:50;max-height:380px;overflow-y:auto;}
.plan-dd-section-hd{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:8px 12px 4px;color:var(--ink-soft);position:sticky;top:0;background:#fff;}
.plan-dd-item{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;border-left:3px solid transparent;transition:background .1s;}
.plan-dd-item:hover{background:var(--surface);}
.plan-dd-item.dd-ptt{border-left-color:var(--turmeric);background:var(--turmeric-soft);}
.plan-dd-item.dd-ptt:hover{background:#f5e8c0;}
.plan-dd-item.dd-active{border-left-color:var(--forest);}
.plan-dd-item.dd-active:hover{background:var(--forest-soft);}
.plan-dd-item.dd-retired{opacity:.5;}
.plan-dd-code{font-family:'IBM Plex Mono',monospace;font-size:11px;background:var(--surface-2);padding:1px 5px;border-radius:4px;flex-shrink:0;color:var(--ink-soft);}
.plan-dd-name{flex:1;font-size:13.5px;}
.plan-dd-sub{font-size:11px;font-family:'IBM Plex Mono',monospace;font-weight:700;color:var(--turmeric);flex-shrink:0;}
.plan-dd-empty{padding:12px;text-align:center;color:var(--ink-soft);font-size:13px;}
/* === icon-only toolbar buttons with hover tooltip === */
.icon-btn{position:relative;appearance:none;border:1px solid var(--line);background:var(--surface);color:var(--ink);width:36px;height:36px;border-radius:8px;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .12s,border-color .12s;}
.icon-btn:hover{background:var(--turmeric-soft);border-color:var(--turmeric);}
.icon-btn.active{background:var(--forest);color:#fff;border-color:var(--forest);}
.icon-btn::after{content:attr(data-tip);position:absolute;top:calc(100%+6px);left:50%;transform:translateX(-50%);background:rgba(25,25,25,.9);color:#fff;font-size:11.5px;font-family:'IBM Plex Sans Thai',sans-serif;padding:5px 10px;border-radius:6px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:200;font-weight:400;}
.icon-btn:hover::after{opacity:1;}

/* === Meal Plan: Production View (🍳 ผลิตวันนี้) === */
.customer-tag{display:inline-block;padding:2px 7px;border-radius:5px;font-weight:700;}
.customer-tag.tag-lc{background:#D1FAE5;color:#065F46;}
.customer-tag.tag-hp{background:#FEF3C7;color:#92400E;}
.mp-prod-stat{display:flex;flex-direction:column;align-items:center;gap:1px;background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:8px 16px;min-width:70px;}
.mp-prod-stat b{font-size:19px;font-weight:800;color:var(--ink);line-height:1;}
.mp-prod-stat span{font-size:10.5px;color:var(--ink-soft);}
.mp-prod-stat.hp b{color:#92400E;}
.mp-prod-stat.lc b{color:#065F46;}
.mp-prod-stat.warn b{color:#B45309;}
.mp-prod-stat.danger{border-color:#FCA5A5;background:#FEF2F2;}
.mp-prod-stat.danger b{color:#DC2626;}
.mp-prod-menu-card{background:#fff;border:1px solid var(--line);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.mp-prod-menu-head{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--surface-2);border-bottom:1px solid var(--line);}
.mp-prod-code{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;color:var(--ink-soft);background:#fff;padding:2px 6px;border-radius:4px;}
.mp-prod-name{flex:1;font-size:13px;font-weight:600;color:var(--ink);}
.mp-prod-total{font-size:15px;font-weight:800;color:var(--forest);}
.mp-prod-cust-list{display:flex;flex-direction:column;}
.mp-prod-cust-row{display:flex;align-items:center;gap:8px;padding:7px 12px;border-top:1px solid var(--line);}
.mp-prod-cust-name{font-size:12.5px;font-weight:600;min-width:90px;}
.mp-prod-round{font-size:11px;color:var(--ink-soft);white-space:nowrap;}
.mp-prod-note-input{flex:1;min-width:0;padding:4px 8px;border:1px solid var(--line);border-radius:6px;font-size:12px;font-family:inherit;background:var(--surface);}
.mp-prod-note-input:focus{outline:none;border-color:var(--turmeric);background:#fff;}
.mp-prod-note-input:not(:placeholder-shown){border-color:#F59E0B;background:#FFFBEB;}

/* ═══ MOBILE COMPACT (≤520px) ═══ */
@media (max-width:520px){
  main{padding:6px 6px 80px;}
  header.top{padding:10px 12px;}
  header.top h1{font-size:14px;}
  .tabs{top:50px;padding:0 6px;overflow-x:auto;}
  .tab-btn{padding:10px 8px;font-size:12px;white-space:nowrap;}
  .online-export-bar{padding:6px 10px;gap:6px;font-size:12px;}
  .toolbar{gap:5px;padding:4px 8px;flex-wrap:wrap;}
  .search-box{width:100%;min-width:unset;}
  .search-box input{padding:8px 10px;font-size:13px;width:100%;}
  .cat-picker{flex:unset;min-width:unset;width:100%;}
  .cat-picker-btn{min-width:unset;width:100%;}
  .rating-filter-wrap{display:none;}

  /* ── Card: 3-row flex ──
     Row 1: pin drag เปิดขาย | code | subcode ──── [●dot]
     Row 2: ชื่อเมนู (full width)
     Row 3:                              [− N สต็อก +]
  ── */
  .recipe-row{
    display:flex!important;
    flex-wrap:wrap;
    padding:8px 10px;
    gap:3px 6px;
    align-items:center;
  }
  /* Row 1 left: toggles */
  .row-toggles{order:1;flex-shrink:0;display:flex;align-items:center;gap:5px;}
  /* Row 1 middle: code + subcode */
  .code-col{order:2;flex-shrink:0;display:flex;align-items:center;gap:4px;}
  /* Row 1 right: online dot (margin-left:auto pushes right) */
  .online-toggle-btn{
    order:3;margin-left:auto;flex-shrink:0;
    width:14px;height:14px;border-radius:50%;
    border:none;padding:0;font-size:0;cursor:pointer;
    background:#D1D5DB;transition:background .2s;
  }
  .online-toggle-btn.online-on{background:#34D399;}

  /* Row 2: name — width:100% forces new row */
  .name-wrap{order:10;width:100%;min-width:100%;overflow:hidden;}
  .name-line{flex-wrap:nowrap;}
  .row .name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;}
  .chip-row{display:none;}
  .quick-row{display:none;}

  /* Row 1 right: stock — pushed right with margin-left:auto */
  .stock-ctrl{
    order:3;margin-left:auto;flex-shrink:0;
    flex-direction:row!important;align-items:center;gap:3px;
  }
  .stock-ctrl button{width:22px;height:22px;font-size:15px;border-radius:5px;}
  .stock-ctrl input{width:32px;height:22px;font-size:12px;padding:1px 2px;text-align:center;}
  .stock-ctrl>div{display:flex;flex-direction:column;align-items:center;}
  .stock-lbl{display:none;}

  .meta{display:none!important;}
  .subcode-input{width:50px;font-size:10px;padding:2px 4px;}
  .code-badge{font-size:11px;padding:2px 5px;}
  .row-toggle-lbl{font-size:11px;}
  .line-group h2{font-size:13px;padding:8px 10px 4px;}
  .card{margin-bottom:3px;}
  .ptt-group .card{margin-bottom:5px;}

  /* Edit panel */
  .panel{padding:12px;}
  .grid2{grid-template-columns:1fr!important;}
  .panel-actions{flex-wrap:wrap;gap:6px;}
  .panel-actions button{flex:1;min-width:110px;}
}


/* ── Category Tabs (DB page) ── */
.cat-tab-strip{overflow-x:auto;display:flex;align-items:center;gap:6px;padding:8px 14px;
  background:var(--cream);border-bottom:1px solid var(--brd);scrollbar-width:none;cursor:grab;}
.cat-tab-strip:active{cursor:grabbing;}
.cat-tab-strip::-webkit-scrollbar{display:none;}
.cat-tab-db{padding:6px 14px;border-radius:20px;border:1.5px solid var(--brd);
  background:#fff;font-size:13px;font-weight:600;color:var(--ink-soft);
  cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;}
.cat-tab-db.on{background:var(--forest);color:#fff;border-color:var(--forest);}
.cat-tab-db .cnt{font-size:10px;opacity:.75;margin-left:3px;}


/* ── PTT Compact Row ── */
.ptt-row{display:flex;align-items:center;gap:8px;padding:8px 12px;
  border-bottom:0.5px solid var(--brd);background:#fff;min-height:44px;}
.ptt-row:last-child{border-bottom:none;}
.ptt-code{font-size:11px;font-weight:700;color:var(--forest);background:var(--gl);
  padding:2px 7px;border-radius:6px;flex-shrink:0;font-family:'IBM Plex Mono',monospace;}
.ptt-sub{font-size:10px;font-weight:700;color:var(--turmeric);background:var(--turmeric-soft);
  padding:2px 6px;border-radius:6px;border:1px dashed var(--turmeric);flex-shrink:0;
  font-family:'IBM Plex Mono',monospace;min-width:54px;text-align:center;}
.ptt-name{flex:1;font-size:13px;font-weight:700;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}
.ptt-name:hover{color:var(--forest);}
.ptt-stock-ctrl{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.ptt-stock-num{width:36px;height:28px;border:1px solid var(--brd);border-radius:6px;
  text-align:center;font-size:13px;font-weight:700;}
.ptt-qb{width:24px;height:28px;border-radius:6px;border:1px solid var(--brd);
  background:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.ptt-qb.plus{background:var(--forest);color:#fff;border-color:var(--forest);}
.ptt-online-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ptt-online-dot.on{background:var(--forest);}
.ptt-online-dot.off{background:#ccc;}

// ── Storage Layer: Supabase (shared) + localStorage (private) ────────────
// shared=true  → Supabase kitchen_data table
// shared=false → localStorage (user nickname etc.)
const _sb_table = 'kitchen_data';

async function getStored(key, shared){
  if(shared === false){
    try{ const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
    catch(e){ return null; }
  }
  // Supabase first
  try{
    const sb = getSB();
    const { data, error } = await sb.from(_sb_table)
      .select('data').eq('key', key).maybeSingle();
    if(!error && data){
      // Cache locally for offline use
      try{ localStorage.setItem('cache:'+key, JSON.stringify(data.data)); }catch(e){}
      return data.data;
    }
  } catch(e){}
  // Offline fallback: localStorage cache
  try{
    const v = localStorage.getItem('cache:'+key);
    if(v){
      state._offlineMode = true;
      return JSON.parse(v);
    }
  }catch(e){}
  return null;
}
async function setStored(key, value, shared){
  if(shared === false){
    try{ localStorage.setItem(key, JSON.stringify(value)); return true; }
    catch(e){ return false; }
  }
  // Always save to local cache first (offline safety)
  try{ localStorage.setItem('cache:'+key, JSON.stringify(value)); }catch(e){}
  // Try Supabase
  try{
    const sb = getSB();
    const { error } = await sb.from(_sb_table)
      .upsert({ key, data: value, updated_at: new Date().toISOString() },
               { onConflict: 'key' });
    if(!error){
      localStorage.removeItem('pending:'+key); // clear pending flag
      state._pendingSync = !!Object.keys(localStorage).filter(k=>k.startsWith('pending:')).length;
      return true;
    }
    console.error('setStored:', error);
  } catch(e){}
  // Supabase failed — mark pending sync
  localStorage.setItem('pending:'+key, new Date().toISOString());
  state.storageOk = false;
  state._offlineMode = true;
  state._pendingSync = true;
  return false;
}
async function deleteStored(key, shared){
  if(shared === false){
    try{ localStorage.removeItem(key); return true; } catch(e){ return false; }
  }
  try{
    const sb = getSB();
    await sb.from(_sb_table).delete().eq('key', key);
    return true;
  } catch(e){ return false; }
}

  if(state.photoCache[id] !== undefined) return;
  state.photoCache[id] = '__loading__';
  const photo = await getStored('photo:'+id, true);
  state.photoCache[id] = photo;
  render();
}
function compressImageFile(file, maxDim, quality){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w > h && w > maxDim){ h = Math.round(h*maxDim/w); w = maxDim; }
        else if(h >= w && h > maxDim){ w = Math.round(w*maxDim/h); h = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = ()=>reject(new Error('โหลดรูปไม่สำเร็จ'));
      img.src = e.target.result;
    };
    reader.onerror = ()=>reject(new Error('อ่านไฟล์ไม่สำเร็จ'));
    reader.readAsDataURL(file);
  });
}

function normTxt(s){ return (s||'').toString().trim(); }
function bigrams(s){
  s = normTxt(s).replace(/\s+/g,'');
  const set = new Set();
  if(s.length < 2){ if(s.length===1) set.add(s); return set; }
  for(let i=0;i<s.length-1;i++) set.add(s.substr(i,2));
  return set;
}
function diceSim(a,b){
  const A=bigrams(a), B=bigrams(b);
  if(A.size===0||B.size===0) return 0;
  let inter=0; for(const x of A) if(B.has(x)) inter++;
  return (2*inter)/(A.size+B.size);
}
function jaccardSim(setA,setB){
  if(setA.size===0||setB.size===0) return 0;
  let inter=0; for(const x of setA) if(setB.has(x)) inter++;
  const union = setA.size+setB.size-inter;
  return union===0?0:inter/union;
}

function mergeCategoryInto(fromKey, toKey){
  const fromLabel = categoryLabel(fromKey), toLabel = categoryLabel(toKey);
  state.recipes.forEach(r=>{

  });
  deleteCategoryEverywhere(fromKey);

}

function renderLineCalcInner(l){

  const exact = normTxt(ing.name).toLowerCase()===normTxt(l.name).toLowerCase();
  const baseHint = exact ? '' : ` <span class="line-calc-soft">· ใช้ราคาฐาน “${escapeHtml(ing.name)}”</span><button type="button" class="line-add-ing" data-name="${escapeHtml(l.name)}" data-unit="${escapeHtml(l.unit||'')}" onclick="quickAddIngredient(this)" title="ถ้าราคาต่างจาก ${escapeHtml(ing.name)} กดเพื่อแยกเป็นวัตถุดิบใหม่" style="margin-left:6px;font-size:10.5px;padding:1px 7px;border:1px solid var(--line);color:var(--ink-soft);background:var(--surface-2);border-radius:5px;cursor:pointer;font-family:'IBM Plex Sans Thai',sans-serif;">➕ แยกเป็นตัวใหม่</button>`;
  const qty = parseFloat(l.qty)||0;
  if(!qty) return `<span class="line-calc-soft">กรอกปริมาณเพื่อคำนวณ</span>${baseHint}`;
  const cost = qty*(parseFloat(ing.cost_per_unit)||0);

  return `→ ${fmtNum(kcal)} kcal · P${fmtNum(protein)} C${fmtNum(carb)} F${fmtNum(fat)} · ฿${fmtMoney(cost)}${baseHint}`;
}

function findIngredient(name){
  const n = normTxt(name).toLowerCase();
  if(!n) return null;
  // 1) ตรงเป๊ะ
  const exact = state.ingredients.find(i=>normTxt(i.name).toLowerCase()===n);
  if(exact) return exact;
  // 2) variant — ชื่อในสูตรขึ้นต้นด้วยชื่อวัตถุดิบฐาน เช่น "กระเทียมสับ" → "กระเทียม"
  //    เลือก prefix ที่ยาว/เจาะจงสุด เพื่อกันจับผิด (เช่น "น้ำมันมะกอก" ไม่ไปเหมา "น้ำมัน" ถ้ามีตัวเจาะจงกว่า)
  let best=null, bestLen=0;
  for(const i of state.ingredients){
    const m = normTxt(i.name).toLowerCase();
    if(m.length>=2 && n.startsWith(m) && m.length>bestLen){ best=i; bestLen=m.length; }
  }
  return best;
}
// เพิ่มวัตถุดิบเข้าลิสต์ทันทีจากบรรทัดในสูตร (ราคา 0 ไว้ไปใส่ทีหลังที่แท็บวัตถุดิบ)

  const set = new Set();
  (recipe.parts||[]).forEach(part=>{
    (part.lines||[]).forEach(l=>{

function computeTotals(recipe){
  let cost=0, kcal=0, protein=0, carb=0, fat=0, allLinked=true, hasLine=false, unmatched=0;
  (recipe.parts||[]).forEach(part=>{
    (part.lines||[]).forEach(l=>{
      if(!l.name) return;  // ข้ามบรรทัดว่าง (ไม่ให้ทำให้สูตรขึ้น "ไม่ครบ" เปล่าๆ)
      hasLine = true;
      const ing = findIngredient(l.name);
      const qty = parseFloat(l.qty)||0;
      if(ing){
        cost += qty*(parseFloat(ing.cost_per_unit)||0);
        kcal += qty*(parseFloat(ing.kcal_per_unit)||0);
        protein += qty*(parseFloat(ing.protein_per_unit)||0);
        carb += qty*(parseFloat(ing.carb_per_unit)||0);
        fat += qty*(parseFloat(ing.fat_per_unit)||0);
      } else { allLinked = false; unmatched++; }
    });
  });
  return {cost,kcal,protein,carb,fat,complete: hasLine && allLinked, unmatched};
}
function computePurchasePlan(){
  const needed = {};
  state.planItems.forEach(item=>{
    const recipe = state.recipes.find(r=>r.id===item.recipeId);
    if(!recipe) return;
    const qty = parseFloat(item.qty)||0;
    (recipe.parts||[]).forEach(part=>{
      (part.lines||[]).forEach(l=>{
        if(!l.name) return;
        const key = normTxt(l.name).toLowerCase();
        const lineQty = (parseFloat(l.qty)||0) * qty;
        if(!needed[key]) needed[key] = {displayName: l.name, totalQty: 0, unit: l.unit||''};
        needed[key].totalQty += lineQty;
      });
    });
  });
  const rows = Object.values(needed).map(n=>{
    const ing = findIngredient(n.displayName);
    const stock = ing ? (ing.stock||0) : 0;
    const toBuy = Math.max(0, n.totalQty - stock);
    const cost = ing ? toBuy*(parseFloat(ing.cost_per_unit)||0) : 0;
    return {name: ing?ing.name:n.displayName, totalQty:n.totalQty, stock, toBuy, unit: ing?ing.unit:n.unit, cost, found: !!ing};
  });
  rows.sort((a,b)=>b.toBuy-a.toBuy);
  const totalCost = rows.reduce((s,r)=>s+r.cost,0);
  return {rows, totalCost};
}

      <option value="">แสดงทุกแหล่งซื้อ</option>

  html += `<div class="stat-row"><div class="stat-card"><div class="num">฿${fmtMoney(plan.totalCost)}</div><div class="lbl">ต้นทุนรวมที่ต้องซื้อเพิ่ม (โดยประมาณ)</div></div></div>`;

  let displayRows = plan.rows;
  if(state.planHideStocked) displayRows = displayRows.filter(r=>r.toBuy>0);
  if(state.planSupplierFilter){
    displayRows = displayRows.filter(r=>{
      if(!r.found) return true;

  if(displayRows.length===0){
    html += `<div class="empty">ไม่มีรายการที่ตรงกับตัวกรองที่เลือก</div>`;
    return html;
  }

  html += `<div class="table-scroll"><table class="ing-table"><thead><tr>
    <th>วัตถุดิบ</th><th>ต้องใช้ทั้งหมด</th><th>มีในสต็อก</th><th>ต้องซื้อเพิ่ม</th><th>แหล่งซื้อ</th><th>ต้นทุนที่ต้องซื้อเพิ่ม</th>
  </tr></thead><tbody>`;
  displayRows.forEach(r=>{
    const ing = r.found ? findIngredient(r.name) : null;
    const defSup = ing && ing.defaultSupplier ? state.suppliers.find(s=>s.key===ing.defaultSupplier) : null;
    html += `<tr ${!r.found?'class="plan-row-missing"':''}>
      <td>${escapeHtml(r.name)}${!r.found?' <span class="plan-missing-tag">(ไม่พบในฐานข้อมูล)</span>':''}</td>

      <td style="font-size:12px;color:var(--ink-soft);">${defSup?escapeHtml(defSup.label):'—'}</td>
      <td>${r.cost>0?'฿'+fmtMoney(r.cost):'—'}</td>
    </tr>`;
  });
  html += `</tbody></table></div>`;
  return html;
}

const MONTH_TH = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

function mpIsoDate(d){ return d.toISOString().split('T')[0]; }
function mpDateFromIso(s){ return new Date(s+'T00:00:00'); }
function mpShortDate(d){ return d.getDate()+' '+MONTH_TH[d.getMonth()]+' '+(d.getFullYear()+543); }
function mpAddDays(iso,n){ const d=mpDateFromIso(iso); d.setDate(d.getDate()+n); return mpIsoDate(d); }

async function mpSaveData(){ await persistAppConfig(); }
async function mpInitLoad(){
  // Data is now loaded in init() via Promise.all batch read — this is kept as stub
}

function mpAddDate(iso){
  if(!state.mpDates.includes(iso)){
    state.mpDates = [...state.mpDates, iso].sort();
    mpSaveData();
  }
}

function mpSummaryForDates(dates){
  const totals={};
  dates.forEach(iso=>{
    const day=state.mpData[iso]||{};
    Object.values(day).forEach(entries=>(entries||[]).forEach(e=>{
      totals[e.recipeId]=(totals[e.recipeId]||0)+(parseFloat(e.qty)||1);
    }));
  });
  return totals;
}
function mpLookbackDateRange(days){
  const today=new Date(); today.setHours(0,0,0,0);
  const dates=[];
  for(let i=days;i>0;i--){
    const d=new Date(today); d.setDate(d.getDate()-i); dates.push(mpIsoDate(d));
  }
  return dates;
}

// ── Meal Plan: Production View (ครัวดูวันนี้ต้องผลิต/แพ็คอะไรบ้าง — อ่านจาก mp_deliveries จริง) ──
let mpProdRows = [];
let mpProdLoadedIso = null;
let _mpProdNoteTimers = {};

function mpProdTodayIso(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function mpProdAddDays(iso,n){
  const d=new Date(iso+'T00:00:00'); d.setDate(d.getDate()+n);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
async function mpProdLoad(iso){
  const sb=getSB(); if(!sb) return;
  try{
    const {data,error}=await sb.from('mp_deliveries').select('*').eq('delivery_date',iso)
      .not('status','in','(skipped,cancelled)');
    if(error) throw error;
    mpProdRows=data||[];
  }catch(e){ console.error('mpProdLoad:',e); mpProdRows=[]; }
  mpProdLoadedIso=iso;
  if(state.tab==='mealplan'&&state.mpSubView==='assign') render();
}
function mpProdSetDate(iso){
  state.mpProdDate=iso;
  mpProdLoad(iso);
}
function mpProdSaveNote(rowId,code,val){
  const r=mpProdRows.find(x=>x.id===rowId); if(!r) return;
  const items=(r.menu_items||[]).slice();
  const entry=items.find(e=>e.code===code);
  if(entry) entry.note=val;
  r.menu_items=items;
  const key=rowId+'|'+code;
  clearTimeout(_mpProdNoteTimers[key]);
  _mpProdNoteTimers[key]=setTimeout(async ()=>{
    const sb=getSB(); if(!sb) return;
    try{ await sb.from('mp_deliveries').update({menu_items:items,updated_at:new Date().toISOString()}).eq('id',rowId); }
    catch(e){ console.error('mpProdSaveNote:',e); }
  },600);
}

async function saveMpOffer(id){
  if(!requireUser()) return;
  const sb = getSB(); if(!sb) return;
  const tr = document.querySelector('tr[data-offer-id="'+id+'"]'); if(!tr) return;
  const row = {
    label: tr.querySelector('.mpo-f-label').value.trim(),
    boxes: parseInt(tr.querySelector('.mpo-f-boxes').value)||1,
    price_hp: parseInt(tr.querySelector('.mpo-f-hp').value)||0,
    price_lc: parseInt(tr.querySelector('.mpo-f-lc').value)||0,
    show_in_default_picker: tr.querySelector('.mpo-f-default').checked,
    is_active: tr.querySelector('.mpo-f-active').checked,
    updated_at: new Date().toISOString()
  };
  if(!row.label){ showToast('ใส่ชื่อชุดก่อน'); return; }
  try{
    await sb.from('mp_offer_sets').update(row).eq('id', id);
    const o = state.mpOffers.find(x=>x.id===id);
    if(o) Object.assign(o, row);
    logActivity('mp_offer', `แก้ชุด "${row.label}"`);
    showToast('บันทึกแล้ว ✓');
  }catch(e){ showToast('บันทึกไม่ได้: '+(e.message||e)); }
}
async function deleteMpOffer(id){
  if(!requireUser()) return;
  const o = state.mpOffers.find(x=>x.id===id); if(!o) return;
  showConfirm(`ลบชุด "${o.label}" ถาวร?`, async ()=>{
    const sb = getSB(); if(!sb) return;
    try{
      await sb.from('mp_offer_sets').delete().eq('id', id);
      state.mpOffers = state.mpOffers.filter(x=>x.id!==id);
      logActivity('mp_offer', `ลบชุด "${o.label}"`);
      render();
    }catch(e){ showToast('ลบไม่ได้: '+(e.message||e)); }
  });
}
async function newMpOffer(){
  if(!requireUser()) return;
  const sb = getSB(); if(!sb) return;
  const setKey = 'set_'+Date.now().toString(36);

    const { data, error } = await sb.from('mp_offer_sets').insert({

function attachMealPlanHandlers(){
  const dp=document.getElementById('mpDatePicker');
  if(dp&&!dp.value) dp.value=mpIsoDate(new Date());
  const addDateBtn=document.getElementById('mpAddDateBtn');
  if(addDateBtn) addDateBtn.onclick=()=>{
    const iso=dp&&dp.value; if(!iso){ showToast('กรุณาเลือกวันที่ก่อน'); return; }
    mpAddDate(iso); render();
    setTimeout(()=>{ const el=document.querySelector(`.mp-day-col[data-iso="${iso}"]`); if(el) el.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}); },80);
  };
  const todayBtn=document.getElementById('mpTodayBtn');
  if(todayBtn) todayBtn.onclick=()=>{
    const iso=mpIsoDate(new Date());
    if(!state.mpDates.includes(iso)){ mpAddDate(iso); render(); }
    setTimeout(()=>{ const el=document.querySelector('.mp-day-header.mp-today'); if(el) el.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}); },80);
  };
  document.querySelectorAll('.mp-vd-btn').forEach(btn=>btn.onclick=()=>{
    state.mpViewDays=parseInt(btn.dataset.days); persistAppConfig(); render();
  });
  /* horizontal mouse-wheel scroll */
  const gridWrap=document.getElementById('mpGridWrap');
  if(gridWrap) gridWrap.addEventListener('wheel',(e)=>{ if(Math.abs(e.deltaY)>=Math.abs(e.deltaX)){ e.preventDefault(); gridWrap.scrollLeft+=e.deltaY*2; } },{passive:false});

  /* slot editor */
  const slotEdBtn=document.getElementById('mpSlotEditorBtn');
  if(slotEdBtn) slotEdBtn.onclick=()=>{ state.mpShowSlotEditor=!state.mpShowSlotEditor; render(); };
  document.querySelectorAll('.mp-rm-slot').forEach(btn=>btn.onclick=(e)=>{ e.stopPropagation(); state.mpSlots.splice(parseInt(btn.dataset.idx),1); mpSaveData(); render(); });
  const addSlotBtn=document.getElementById('mpAddSlotBtn');
  if(addSlotBtn) addSlotBtn.onclick=()=>{
    const inp=document.getElementById('mpNewSlotInput'); const val=inp&&inp.value.trim();
    if(!val||state.mpSlots.includes(val)) return;
    state.mpSlots.push(val); if(inp) inp.value=''; mpSaveData(); render();
  };

  /* open picker */
  document.querySelectorAll('.mp-open-picker').forEach(btn=>btn.onclick=(e)=>{
    e.stopPropagation(); state.mpPickerCell={date:btn.dataset.date,slot:btn.dataset.slot}; render();
    setTimeout(()=>{ const s=document.querySelector('.mp-search-inp'); if(s) s.focus(); },40);
  });

  /* add recipe immediately */
  function mpAddEntry(date,slot,recipeId){
    if(!requireUser()) return;
    if(!state.mpData[date]) state.mpData[date]={};
    if(!state.mpData[date][slot]) state.mpData[date][slot]=[];
    const ex=state.mpData[date][slot].find(e=>e.recipeId===recipeId);
    if(ex){ ex.qty=(parseFloat(ex.qty)||1)+1; } else { state.mpData[date][slot].push({recipeId,qty:1,customers:''}); }
    state.mpPickerCell={date,slot}; mpSaveData(); render();
  }
  document.querySelectorAll('.mp-recipe-btn').forEach(btn=>btn.onclick=(e)=>{ e.stopPropagation(); mpAddEntry(btn.dataset.date,btn.dataset.slot,btn.dataset.id); });

  /* live search */
  document.querySelectorAll('.mp-search-inp').forEach(inp=>{
    inp.onclick=e=>e.stopPropagation();
    inp.oninput=()=>{
      const q=inp.value.trim().toLowerCase();
      inp.closest('.mp-picker').querySelectorAll('.mp-all-item').forEach(item=>{
        item.style.display=(!q||item.dataset.name.includes(q)||item.dataset.code.includes(q))?'':'none';
      });
    };
    inp.onkeydown=e=>{ if(e.key==='Escape'){ state.mpPickerCell=null; render(); } };
  });

  /* qty: +/- buttons + onblur save + oninput live */
  function mpCommitQty(date,slot,idx,val){
    const entries=((state.mpData[date]||{})[slot])||[];
    if(entries[parseInt(idx)]){ entries[parseInt(idx)].qty=Math.max(1,parseFloat(val)||1); mpSaveData(); }
  }
  document.querySelectorAll('.mp-qty-minus').forEach(btn=>btn.onclick=(e)=>{
    e.stopPropagation();
    const {date,slot,idx}=btn.dataset;
    const inp=btn.parentElement.querySelector('.mp-qty');
    const newVal=Math.max(1,(parseFloat(inp.value)||1)-1);
    inp.value=newVal; mpCommitQty(date,slot,idx,newVal);
  });
  document.querySelectorAll('.mp-qty-plus').forEach(btn=>btn.onclick=(e)=>{
    e.stopPropagation();
    const {date,slot,idx}=btn.dataset;
    const inp=btn.parentElement.querySelector('.mp-qty');
    const newVal=(parseFloat(inp.value)||1)+1;
    inp.value=newVal; mpCommitQty(date,slot,idx,newVal);
  });
  document.querySelectorAll('.mp-qty').forEach(inp=>{
    inp.onclick=e=>e.stopPropagation();
    inp.oninput=()=>{ const {date,slot,idx}=inp.dataset; mpCommitQty(date,slot,idx,inp.value); };
    inp.onblur=()=>{ const {date,slot,idx}=inp.dataset; mpCommitQty(date,slot,idx,inp.value); };
  });

  /* customer field */
  document.querySelectorAll('.mp-customer-inp').forEach(inp=>{
    inp.onclick=e=>e.stopPropagation();
    inp.oninput=()=>{
      const {date,slot,idx}=inp.dataset;
      const entries=((state.mpData[date]||{})[slot])||[];
      if(entries[parseInt(idx)]){ entries[parseInt(idx)].customers=inp.value; mpSaveData(); }
    };
  });

  /* remove entry */
  document.querySelectorAll('.mp-rm').forEach(btn=>btn.onclick=(e)=>{
    e.stopPropagation(); if(!requireUser()) return;
    const {date,slot,idx}=btn.dataset;
    if(state.mpData[date]&&state.mpData[date][slot]){
      state.mpData[date][slot].splice(parseInt(idx),1);
      if(!state.mpData[date][slot].length) delete state.mpData[date][slot];
      if(!Object.keys(state.mpData[date]||{}).length) delete state.mpData[date];
    }
    mpSaveData(); render();
  });

  /* send to purchase plan */
  const sendBtn=document.getElementById('mpSendToPlan');
  if(sendBtn) sendBtn.onclick=()=>{
    const totals=mpSummaryForDates([...state.mpDates].sort());
    Object.entries(totals).forEach(([rid,qty])=>{
      const ex=state.planItems.find(p=>p.recipeId===rid);
      if(ex){ ex.qty=(ex.qty||0)+qty; } else { state.planItems.push({recipeId:rid,qty}); }
    });
    persistPlanItems(); state.tab='plan'; render();
    showToast(`ส่ง ${Object.keys(totals).length} เมนูไปหน้าแพลนซื้อแล้ว`);
  };
  document.getElementById('mpPrintBtn')?.onclick?.();
  const pb=document.getElementById('mpPrintBtn'); if(pb) pb.onclick=()=>window.print();

  /* lookback */
  document.querySelectorAll('.mp-lookback-btn').forEach(btn=>btn.onclick=()=>{
    const n=parseInt(btn.dataset.days); state.mpLookbackDays=state.mpLookbackDays===n?null:n; render();
  });
  document.getElementById('mpClearLookback')?.addEventListener?.('click',()=>{ state.mpLookbackDays=null; render(); });

  /* close picker on outside click */
  if(state.mpPickerCell) document.addEventListener('click',()=>{ if(state.mpPickerCell){ state.mpPickerCell=null; render(); } },{once:true});
}

function findDuplicates(recipe){
  const results = [];
  const mySet = linkedNameSet(recipe);
  const myCats = recipe.categories||[];
  state.recipes.forEach(other=>{
    if(other.id===recipe.id) return;
    const otherCats = other.categories||[];
    if(!myCats.some(c=>otherCats.includes(c))) return;
    const nameScore = diceSim(recipe.name, other.name);
    const otherSet = linkedNameSet(other);
    let ingScore = 0;
    if(mySet.size>=2 && otherSet.size>=2) ingScore = jaccardSim(mySet, otherSet);
    const score = Math.max(nameScore, ingScore);
    if(score >= 0.55){
      results.push({other, score, reason: nameScore>=ingScore ? 'ชื่อเมนูคล้ายกัน' : 'วัตถุดิบคล้ายกันมาก'});
    }
  });
  results.sort((a,b)=>b.score-a.score);
  return results.slice(0,5);
}

function fmtMoney(n){ return n.toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtNum(n){ return Math.round(n*10)/10; }
function fmtDateShort(iso){
  if(!iso) return '';
  try{
    const d = new Date(iso);
    return d.toLocaleDateString('th-TH',{day:'numeric',month:'short'}) + ' ' + d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
  }catch(e){ return ''; }
}

async function loadPackages(){
  if(state.pkgLoading) return;
  state.pkgLoading = true;
  render();
  try {
    const sb = getSB(); if(!sb) throw new Error('no sb');
    const pkgsRes  = await sb.from('packages').select('*').order('display_order');
    const itemsRes = await sb.from('package_items').select('*');
    if(pkgsRes.error)  throw pkgsRes.error;
    if(itemsRes.error) throw itemsRes.error;
    state.packages = pkgsRes.data || [];
    state.pkgItems = {};
    (itemsRes.data || []).forEach(it => {
      (state.pkgItems[it.package_id] = state.pkgItems[it.package_id] || []).push(it);
    });
    state.pkgLoaded = true;
  } catch(e){
    showToast('โหลดแพคเกจไม่สำเร็จ');
    console.error('loadPackages error:', e);
  }
  state.pkgLoading = false;
  render();
}
