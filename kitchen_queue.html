<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Under360 — ครัว</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--g:#1F4D3A;--gs:#EBF3EF;--gold:#C9973F;--golds:#FFF8EC;--r:#DC2626;--rs:#FEF2F2;--blue:#1D4ED8;--blues:#EFF6FF;--ink:#1A1A1A;--soft:#6B7280;--xsoft:#D1D5DB;--bg:#F7F8F6;--w:#fff;--mono:'IBM Plex Mono';--sans:'IBM Plex Sans Thai',sans-serif;--rad:12px;}
body{font-family:var(--sans);background:var(--bg);min-height:100vh;}

/* HEADER */
.hdr{background:var(--g);padding:10px 14px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:100;flex-wrap:wrap;}
.hdr-title{font-size:15px;font-weight:700;color:#fff;flex:1;}
.hdr-btn{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;padding:5px 11px;font-size:12px;cursor:pointer;font-family:var(--sans);text-decoration:none;white-space:nowrap;}
.hdr-btn.active{background:rgba(255,255,255,.35);}
.live-dot{width:8px;height:8px;border-radius:50%;background:#22C55E;box-shadow:0 0 0 3px rgba(34,197,94,.2);animation:blink 2s infinite;flex-shrink:0;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* TABS */
.tab-bar{display:flex;background:var(--w);border-bottom:2px solid var(--xsoft);overflow-x:auto;}
.tab-btn{flex:1;padding:11px 8px;font-size:13px;font-weight:600;color:var(--soft);border:none;background:none;cursor:pointer;font-family:var(--sans);border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s;white-space:nowrap;}
.tab-btn.active{color:var(--g);border-bottom-color:var(--g);}

/* DATE + SLOT BAR */
.ctrl-bar{background:var(--w);border-bottom:1px solid var(--xsoft);padding:8px 12px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.chip{flex-shrink:0;padding:5px 13px;border-radius:20px;border:1px solid var(--xsoft);font-size:12px;font-weight:500;cursor:pointer;background:var(--w);color:var(--soft);}
.chip.on{background:var(--g);color:#fff;border-color:var(--g);}
.sep{width:1px;height:20px;background:var(--xsoft);flex-shrink:0;}
.date-sel{padding:5px 10px;border-radius:20px;border:1px solid var(--xsoft);font-size:12px;cursor:pointer;background:var(--w);font-family:var(--sans);color:var(--soft);}

/* MAIN */
.main{padding:12px;max-width:940px;margin:0 auto;}

/* PROD TABLE */
.prod-wrap{background:var(--w);border-radius:var(--rad);border:1px solid var(--xsoft);overflow:hidden;margin-bottom:12px;}
.pt-head{display:grid;grid-template-columns:1fr 52px 52px 62px;gap:4px;padding:7px 12px;background:var(--gs);border-bottom:2px solid var(--xsoft);}
.pt-head span{font-size:10px;font-weight:700;color:var(--soft);text-transform:uppercase;letter-spacing:.4px;text-align:center;}
.pt-head span:first-child{text-align:left;}
.pt-row{display:grid;grid-template-columns:1fr 52px 52px 62px;gap:4px;padding:7px 12px;border-bottom:1px solid var(--xsoft);align-items:center;}
.pt-row:last-child{border-bottom:none;}
.pt-row.warn{background:#FFFBEB;}
.pt-row.danger{background:#FFF1F1;}
.code-tag{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--g);background:var(--gs);padding:2px 5px;border-radius:4px;white-space:nowrap;flex-shrink:0;}
.pt-n{font-family:var(--mono);font-size:13px;font-weight:700;text-align:center;}
.mp-wrap{background:var(--w);border-radius:var(--rad);border:1px solid var(--xsoft);border-left:4px solid #7C3AED;overflow:hidden;margin-bottom:12px;}
.mp-head{padding:9px 12px;background:#F5F3FF;border-bottom:2px solid var(--xsoft);font-size:12px;font-weight:700;color:#5B21B6;}
.mp-row{padding:8px 12px;border-bottom:1px solid var(--xsoft);}
.mp-row:last-child{border-bottom:none;}
.mp-row-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.mp-name{font-size:13px;font-weight:700;}
.mp-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;}
.mp-tag.hp{background:#FEF3C7;color:#92400E;}
.mp-tag.lc{background:#D1FAE5;color:#065F46;}
.mp-round{font-size:11px;color:var(--soft);font-weight:600;}
.mp-meta{font-size:11px;color:var(--soft);margin-top:3px;}
.mp-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.mp-chip{font-family:var(--mono);font-size:10px;font-weight:700;color:#5B21B6;background:#EDE9FE;padding:2px 6px;border-radius:4px;}
.mp-chip.empty{font-family:inherit;font-style:italic;font-weight:400;color:var(--xsoft);background:none;padding:0;}
.btn-mp-done{margin-top:6px;font-size:11px;font-weight:700;color:var(--g);background:var(--gs);border:1px solid var(--g);border-radius:6px;padding:4px 10px;cursor:pointer;}
.actual-input{width:44px;border:1.5px solid var(--g);border-radius:6px;text-align:center;font-family:var(--mono);font-size:13px;font-weight:700;color:var(--g);padding:2px 0;background:var(--gs);}

/* SLOT SECTION */
.slot-sec{margin-bottom:14px;}
.slot-hdr{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--g);border-radius:10px 10px 0 0;color:#fff;}
.slot-hdr-label{font-size:13px;font-weight:700;flex:1;}
.slot-hdr-count{font-size:12px;background:rgba(255,255,255,.2);padding:2px 9px;border-radius:10px;}
.slot-body{background:var(--w);border:1px solid var(--xsoft);border-top:none;border-radius:0 0 10px 10px;padding:8px;}

/* ORDER CARD */
.oc{border:1px solid var(--xsoft);border-radius:10px;padding:10px 12px;margin-bottom:8px;background:var(--w);}
.oc:last-child{margin-bottom:0;}
.oc.pkg{border-color:var(--gold);background:var(--golds);}
.oc.mealplan{border-color:var(--g);background:var(--gs);}
.oc-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;}
.oc-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;flex-shrink:0;margin-top:2px;}
.oc-badge.hp{background:#FEF3C7;color:#92400E;}
.oc-badge.lc{background:#D1FAE5;color:#065F46;}
.oc-badge.pkg{background:var(--golds);color:var(--gold);border:1px solid var(--gold);}
.oc-badge.mp{background:var(--gs);color:var(--g);}
.oc-name{font-size:13px;font-weight:700;}
.oc-meta{font-size:11px;color:var(--soft);margin-top:1px;}
.oc-order-num{font-family:var(--mono);font-size:11px;color:var(--soft);}
.items-grid{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.item-chip{font-size:11px;background:var(--bg);border:1px solid var(--xsoft);border-radius:6px;padding:2px 8px;display:flex;align-items:center;gap:4px;}
.item-chip .ic-code{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--g);}
.item-chip .ic-qty{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--ink);}
.oc-note{font-size:11px;color:var(--r);background:var(--rs);border-radius:6px;padding:4px 8px;margin-top:6px;}
.oc-utensil{font-size:12px;font-weight:700;color:#065F46;background:#D1FAE5;border-radius:6px;padding:4px 8px;margin-top:6px;display:inline-block;}
.oc-utensil.oc-utensil-no{color:var(--soft);background:var(--bg);font-weight:600;}
.oc-utensil.oc-utensil-lg{font-size:18px;padding:8px 14px;border-radius:8px;border:2px solid #065F46;}
.oc-actions{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;}
.btn-pack{background:var(--g);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--sans);}
.btn-undo{background:var(--bg);color:var(--soft);border:1px solid var(--xsoft);border-radius:8px;padding:7px 12px;font-size:12px;cursor:pointer;font-family:var(--sans);}
.btn-done{background:#E5F3ED;color:var(--g);border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--sans);}
.empty-slot{text-align:center;padding:16px;color:var(--xsoft);font-size:12px;}

/* PRINT MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;}
.modal{background:var(--w);border-radius:16px;padding:20px;width:320px;max-width:90vw;}
.modal h3{font-size:15px;font-weight:700;margin-bottom:14px;}
.print-opt{display:block;padding:12px 14px;border:1.5px solid var(--xsoft);border-radius:10px;margin-bottom:8px;cursor:pointer;font-size:13px;font-weight:500;background:var(--w);width:100%;text-align:left;font-family:var(--sans);}
.print-opt:hover{border-color:var(--g);background:var(--gs);}
.modal-close{width:100%;padding:10px;border:none;background:var(--bg);border-radius:8px;cursor:pointer;font-size:13px;font-family:var(--sans);margin-top:4px;}

/* PRINT CSS */
@media print{
  .hdr,.tab-bar,.ctrl-bar,.oc-actions,.no-print{display:none!important;}
  body{background:#fff;font-size:11px;}
  .main{padding:0;max-width:100%;}
  .slot-hdr{background:#1F4D3A!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .oc{break-inside:avoid;border:1px solid #ccc;}
  @page{margin:6mm;size:80mm auto;}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">🍳 ครัว Under360</div>
  <div class="live-dot"></div>
  <!-- code toggle -->
  <button class="hdr-btn" id="codeToggleBtn" onclick="cycleCodeMode()">🏷️ Code</button>
  <!-- ชื่อผู้ใช้ — ผูกกับปุ่มกดสถานะ (จัดกล่องเสร็จ/ส่งแล้ว) เพื่อเก็บ log ว่าใครกด กันมือลั่นแล้วหาไม่เจอ -->
  <button class="hdr-btn no-print" id="whoamiBtn" onclick="promptNickname()">👋 ตั้งชื่อ</button>
  <!-- print -->
  <button class="hdr-btn no-print" onclick="openPrint()">🖨️ พิมพ์</button>
  <button class="hdr-btn no-print" onclick="loadAll()">🔄</button>
  <a href="main_database_v2.html" target="_blank" class="hdr-btn no-print">📖 สูตร</a>
</div>

<div class="tab-bar">
  <button class="tab-btn active" id="tab1" onclick="switchTab(1)">📋 รายสินค้า</button>
  <button class="tab-btn" id="tab2" onclick="switchTab(2)">📦 รายออเดอร์</button>
</div>

<!-- DATE + SLOT FILTER -->
<div class="ctrl-bar" id="ctrlBar">
  <button class="chip on" id="d-today" onclick="setDate('today',this)">วันนี้</button>
  <button class="chip" id="d-tomorrow" onclick="setDate('tomorrow',this)">พรุ่งนี้</button>
  <button class="chip" id="d-all" onclick="setDate('all',this)">ทั้งหมด</button>
  <select class="date-sel" id="calPicker" onchange="setDate('custom',this)"><option value="">📅 เลือกวัน...</option></select>
  <div class="sep"></div>
  <button class="chip on" id="s-all" onclick="setSlot('all',this)">ทุกช่วง</button>
  <button class="chip" id="s-all_day" onclick="setSlot('all_day',this)">ตลอดวัน</button>
  <button class="chip" id="s-morning" onclick="setSlot('morning',this)">เช้า</button>
  <button class="chip" id="s-afternoon" onclick="setSlot('afternoon',this)">บ่าย</button>
  <button class="chip" id="s-express" onclick="setSlot('express',this)">ด่วน</button>
</div>

<!-- TAB 1: รายสินค้า -->
<div class="main" id="tabContent1">
  <div id="prodView"><div style="text-align:center;padding:40px;color:var(--soft)">กำลังโหลด...</div></div>
  <div id="mpQueueView"></div>
</div>

<!-- TAB 2: รายออเดอร์ -->
<div class="main" id="tabContent2" style="display:none">
  <div id="orderView"><div style="text-align:center;padding:40px;color:var(--soft)">กำลังโหลด...</div></div>
</div>

<!-- PRINT MODAL -->
<div class="modal-bg" id="printModal" style="display:none">
  <div class="modal">
    <h3>🖨️ พิมพ์เอกสาร</h3>
    <button class="print-opt" onclick="doPrint('daily')">📋 สรุปรายสินค้าวันนี้</button>
    <button class="print-opt" onclick="doPrint('orders')">📦 ใบจัดกล่องรายออเดอร์</button>
    <div style="font-size:11px;color:var(--soft);margin:8px 0 4px;line-height:1.6">
      🖨️ รองรับ: HT400 (Hprt) และเครื่องพิมพ์ทุกรุ่นที่ผ่าน browser<br>
      ตั้งค่า: กระดาษ 80mm · ไม่มีขอบ · แนวตั้ง
    </div>
    <button class="modal-close" onclick="closePrint()">ยกเลิก</button>
  </div>
</div>

<script>
const SB_URL="https://zdartbvhbvqlwzwyyiia.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkYXJ0YnZoYnZxbHd6d3l5aWlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MTY3OTksImV4cCI6MjA5NzM5Mjc5OX0.D41YGH-CuWrVFqcAgXEuhfVTxJ7WY26Xu-PeXBF6LB8";
var sb=null;
function getSB(){try{if(!sb&&typeof supabase!=="undefined")sb=supabase.createClient(SB_URL,SB_KEY);return sb;}catch(e){return null;}}
// d.toISOString() แปลงเป็น UTC ก่อนตัด — เที่ยงคืนเวลาไทย (UTC+7) = 17:00 UTC เมื่อวาน ทำให้วันที่ผิดไป 1 วันตอนเช้ามืด
function toISO(d){var y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),dd=String(d.getDate()).padStart(2,"0");return y+"-"+m+"-"+dd;}
function today(){return toISO(new Date());}
function tomorrow(){var d=new Date();d.setDate(d.getDate()+1);return toISO(d);}
function fmtDate(iso){var d=new Date(iso+"T00:00:00");return d.toLocaleDateString("th-TH",{weekday:"short",day:"numeric",month:"short"});}
// created_at เป็น timestamp เต็ม (มี T อยู่แล้ว) ต้องแยกจาก fmtDate ที่รับแค่วันที่เปล่า
function fmtOrderPlaced(iso){
  if(!iso)return "—";
  var d=new Date(iso);
  return d.toLocaleDateString("th-TH",{day:"numeric",month:"short"})+" "+d.toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"});
}

// ── ชื่อผู้ใช้ + Activity Log (ใครกดปุ่มสถานะ เมื่อไหร่ — กันมือลั่นแล้วหาไม่เจอ) ──
var kqCurrentUser=null;
function loadNickname(){
  try{ kqCurrentUser=localStorage.getItem("lastNickname")||null; }catch(e){ kqCurrentUser=null; }
  updateWhoamiBtn();
}
function updateWhoamiBtn(){
  var btn=document.getElementById("whoamiBtn");
  if(btn)btn.textContent=kqCurrentUser?("👋 "+kqCurrentUser):"👋 ตั้งชื่อ";
}
function promptNickname(){
  var name=prompt("ใส่ชื่อเล่นของคุณ (ระบบจะจำไว้ใช้ตอนกดปุ่มสถานะต่างๆ เช่น จัดกล่องเสร็จ/ส่งแล้ว)",kqCurrentUser||"");
  if(name===null)return;
  name=name.trim();
  if(!name)return;
  kqCurrentUser=name;
  try{ localStorage.setItem("lastNickname",name); }catch(e){}
  updateWhoamiBtn();
}
// ต้องมีชื่อก่อนถึงกดปุ่มสถานะได้ — ถ้ายังไม่มี เด้ง prompt ให้กรอกทันที (prompt เป็น blocking ทำให้กดปุ่มเดิมซ้ำได้เลยไม่ต้องกด 2 รอบ)
function requireKqUser(){
  if(kqCurrentUser&&kqCurrentUser.trim())return true;
  promptNickname();
  return !!(kqCurrentUser&&kqCurrentUser.trim());
}
// เขียนทุกครั้งที่กด ไม่ debounce/รวมแถว (ต่างจาก DB) เพราะเป็นการกดที่มีผลจริงต่อออเดอร์ ไม่ใช่ปรับตัวเลขรัวๆ — ต้องมี record แยกทุกครั้งเพื่อสอบย้อนหลังได้
async function logKqActivity(summary){
  var sb_=getSB(); if(!sb_)return;
  try{
    await sb_.from("activity_log").insert({
      session_id:"kq_"+Date.now()+"_"+Math.random().toString(36).slice(2,8),
      actor:kqCurrentUser||"ไม่ทราบชื่อ",
      source:"kq",
      action_type:"kq_status",
      summary:summary,
      detail:{}
    });
  }catch(e){ console.warn("logKqActivity failed:",e); }
}

// ── STATE ────────────────────────────────────────────────
var allOrders=[], allItems=[], allMenus=[], allMpDeliveries=[];
var dateMode="today", slotMode="all", tabMode=1;
var codeMode="code"; // code | name | subcode
var SLOT_LABELS={all_day:"🕐 รับได้ตลอดวัน", morning:"🌅 ช่วงเช้า", afternoon:"🌇 ช่วงบ่าย", express:"🚗 ด่วน"};

// ── DATE / SLOT / TAB ────────────────────────────────────
function getTargetDate(){
  if(dateMode==="today")return today();
  if(dateMode==="tomorrow")return tomorrow();
  if(dateMode==="custom"){var s=document.getElementById("calPicker");return s?s.value:null;}
  return null; // all
}
function setDate(mode,el){
  dateMode=mode;
  document.querySelectorAll("#ctrlBar .chip[id^='d-']").forEach(function(b){b.classList.remove("on");});
  if(el&&el.classList)el.classList.add("on");
  render();
}
function setSlot(mode,el){
  slotMode=mode;
  document.querySelectorAll("#ctrlBar .chip[id^='s-']").forEach(function(b){b.classList.remove("on");});
  if(el&&el.classList)el.classList.add("on");
  render();
}
function switchTab(n){
  tabMode=n;
  [1,2].forEach(function(i){
    document.getElementById("tab"+i).classList.toggle("active",i===n);
    document.getElementById("tabContent"+i).style.display=i===n?"block":"none";
  });
  render();
}

// ── CODE TOGGLE ──────────────────────────────────────────
var CODE_MODES=["code","name","subcode"];
var CODE_LABELS={"code":"🏷️ Code","name":"📝 ชื่อ","subcode":"#️⃣ Sub"};
function cycleCodeMode(){
  var idx=CODE_MODES.indexOf(codeMode);
  codeMode=CODE_MODES[(idx+1)%CODE_MODES.length];
  document.getElementById("codeToggleBtn").textContent=CODE_LABELS[codeMode];
  render();
}
function getCodeDisplay(code,name){
  if(codeMode==="name")return name;
  if(codeMode==="subcode")return (code||"").replace(/^[A-Za-z]+/,"") || code;
  return code||"—";
}

// ── LOAD ─────────────────────────────────────────────────
var kitchenUtensilSize="normal";
async function loadAll(){
  var sb_=getSB();
  if(!sb_){render();return;}
  try{
    var r=await Promise.all([
      sb_.from("orders").select("*").order("delivery_date").order("time_slot"),
      sb_.from("order_items").select("*"),
      sb_.from("menu_items").select("id,code,name,stock_total,actual_stock,is_available,no_morning,category").eq("is_available",true),
      sb_.from("mp_deliveries").select("*"),
      sb_.from("kitchen_data").select("data").eq("key","globalSettings").maybeSingle()
    ]);
    allOrders=r[0].data||[]; allItems=r[1].data||[]; allMenus=r[2].data||[]; allMpDeliveries=r[3].data||[];
    kitchenUtensilSize=(r[4].data&&r[4].data.data&&r[4].data.data.kitchenUtensilSize)||"normal";
  }catch(e){console.error(e);}
  render();
}

// ── FILTER ───────────────────────────────────────────────
function filteredOrders(){
  var tgt=getTargetDate();
  return allOrders.filter(function(o){
    if(tgt&&o.delivery_date!==tgt)return false;
    if(slotMode!=="all"&&o.time_slot!==slotMode)return false;
    return o.status!=="delivered";
  });
}
function getOrderItems(orderId){
  return allItems.filter(function(i){return i.order_id===orderId;}).map(function(i){
    var m=allMenus.find(function(x){return x.id===i.menu_item_id;});
    return {
      code: i.menu_code || (m&&m.code) || "—",
      name: i.menu_name || (m&&m.name) || "—",
      qty: i.quantity||1,
      menu_item_id: i.menu_item_id
    };
  });
}
function detectBadge(items){
  if(items.some(function(i){return (i.code||"").match(/^HP/i);}))return "hp";
  if(items.some(function(i){return (i.code||"").match(/^LC/i);}))return "lc";
  return "normal";
}

// ── RENDER ───────────────────────────────────────────────
function render(){
  if(tabMode===1)renderProd();
  else renderOrders();
}

// TAB 1: รายสินค้า aggregated
var saveTimers={};
function renderProd(){
  var orders=filteredOrders();
  var tgt=getTargetDate();
  var agg={};
  orders.forEach(function(o){
    getOrderItems(o.id).forEach(function(i){
      if(!agg[i.menu_item_id])agg[i.menu_item_id]={code:i.code,name:i.name,qty:0,id:i.menu_item_id};
      agg[i.menu_item_id].qty+=i.qty;
    });
  });
  var rows=Object.values(agg).sort(function(a,b){return (a.code||"").localeCompare(b.code||"");});
  if(!rows.length){
    document.getElementById("prodView").innerHTML="<div style='text-align:center;padding:40px;color:var(--soft)'>ไม่มีออเดอร์"+(tgt?" วันที่ "+fmtDate(tgt):"")+"</div>";
    renderMpQueue();
    return;
  }
  var html="<div class='prod-wrap'>"
    +"<div class='pt-head'><span>สินค้า</span><span>สั่ง</span><span style='color:var(--g)'>ของจริง</span><span>เหลือ</span></div>";
  rows.forEach(function(r){
    var m=allMenus.find(function(x){return x.id===r.id;})||{};
    var actual=m.actual_stock!=null?m.actual_stock:(m.stock_total||0);
    var rem=actual-r.qty;
    var rowCls=rem<0?"danger":rem<3?"warn":"";
    html+="<div class='pt-row "+rowCls+"'>"
      +"<div style='display:flex;align-items:center;gap:6px;min-width:0'>"
      +"<span class='code-tag'>"+escH(getCodeDisplay(r.code,r.name))+"</span>"
      +(codeMode!=="name"?"<span style='font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap'>"+escH(r.name)+"</span>":"")
      +"</div>"
      +"<div class='pt-n' style='color:var(--gold)'>"+r.qty+"</div>"
      +"<div class='pt-n'><input class='actual-input' type='number' min='0' value='"+actual+"' data-menu-id='"+r.id+"' oninput='schedSave(this)'></div>"
      +"<div class='pt-n' style='color:"+(rem<0?"var(--r)":"var(--g)")+"'>"+rem+"</div>"
      +"</div>";
  });
  html+="<div style='padding:8px 12px;font-size:11px;color:var(--soft);border-top:1px solid var(--xsoft)'>"
    +"รวม "+orders.length+" ออเดอร์ · "+rows.length+" รายการ"
    +"<span style='float:right;color:var(--g);font-weight:600'>✏️ แก้ตัวเลข ของจริง ได้เลย</span></div></div>";
  document.getElementById("prodView").innerHTML=html;
  renderMpQueue();
}

// MEAL PLAN QUEUE (คิวส่งระยะยาว)
function renderMpQueue(){
  var tgt=getTargetDate();
  var rows=allMpDeliveries.filter(function(x){
    if(x.status==="skipped"||x.status==="cancelled")return false;
    if(!tgt)return false; // ไม่แสดงถ้าเลือก "ทั้งหมด" — คิวนี้ผูกกับวันเดียว
    if(x.delivery_date!==tgt)return false;
    return true;
  }).sort(function(a,b){return (a.round_no||0)-(b.round_no||0);});
  var el=document.getElementById("mpQueueView");
  if(!el)return;
  if(!rows.length){el.innerHTML="";return;}
  var html="<div class='mp-wrap'>"
    +"<div class='mp-head'>📦 Meal Plan ระยะยาว — คิวส่ง"+(tgt?"วันที่ "+fmtDate(tgt):"วันนี้")+"</div>";
  rows.forEach(function(r){
    var tagCls=(r.mp_type||"").toLowerCase()==="hp"?"hp":"lc";
    var tagLabel=(r.mp_type||"").toUpperCase();
    var menuItems=r.menu_items||[];
    var chipsHtml=menuItems.length
      ?menuItems.map(function(m){return "<span class='mp-chip'>"+escH(m.code||m.name||"—")+"</span>";}).join("")
      :"<span class='mp-chip empty'>ยังไม่กำหนดเมนู</span>";
    html+="<div class='mp-row'>"
      +"<div class='mp-row-top'>"
      +"<span class='mp-name'>"+escH(r.customer_name||"ลูกค้า")+"</span>"+lineTag(r)
      +"<span class='mp-tag "+tagCls+"'>"+escH(tagLabel)+"</span>"
      +"<span class='mp-round'>รอบ "+(r.round_no||"—")+"/"+(r.total_rounds||"—")+"</span>"
      +"<span class='mp-round'>📦 "+(r.box_count||7)+" กล่อง</span>"
      +"</div>"
      +"<div class='mp-chips'>"+chipsHtml+"</div>"
      +"<div class='mp-meta'>📍 "+escH(r.delivery_address||"—")+"</div>"
      +"<div class='mp-meta'>⏰ "+escH(r.time_slot_label||r.time_slot||"—")+"</div>"
      +(r.status==="delivered"
        ?"<span style='font-size:11px;color:var(--g);font-weight:700'>✅ ส่งแล้ว</span><button class='btn-undo' onclick='markMpUndelivered(\""+r.id+"\")'>↩ ยกเลิก</button>"
        :"<button class='btn-mp-done' onclick='markMpDelivered(\""+r.id+"\")'>✅ ส่งแล้ว</button>")
      +"</div>";
  });
  html+="</div>";
  el.innerHTML=html;
}
async function markMpDelivered(id){
  if(!requireKqUser())return;
  var sb_=getSB(); if(!sb_)return;
  await sb_.from("mp_deliveries").update({status:"delivered",updated_at:new Date().toISOString()}).eq("id",id);
  var r=allMpDeliveries.find(function(x){return x.id===id;}); if(r)r.status="delivered";
  logKqActivity((r?r.customer_name+" — ":"")+"Meal Plan รอบ "+(r?r.round_no:"?")+"/"+(r?r.total_rounds:"?")+" ✅ ส่งแล้ว");
  renderMpQueue();
}
async function markMpUndelivered(id){
  if(!requireKqUser())return;
  if(!confirm("ยกเลิกสถานะ \"ส่งแล้ว\" ใช่ไหม? (เผื่อกดพลาด)"))return;
  var sb_=getSB(); if(!sb_)return;
  await sb_.from("mp_deliveries").update({status:"menu_assigned",updated_at:new Date().toISOString()}).eq("id",id);
  var r=allMpDeliveries.find(function(x){return x.id===id;}); if(r)r.status="menu_assigned";
  logKqActivity((r?r.customer_name+" — ":"")+"Meal Plan รอบ "+(r?r.round_no:"?")+"/"+(r?r.total_rounds:"?")+" ↩ ยกเลิกส่งแล้ว");
  renderMpQueue();
}

// debounce save 600ms หลังพิมเสร็จ
function schedSave(inp){
  var menuId=inp.dataset.menuId;
  var val=parseInt(inp.value)||0;
  // update local ให้ rem re-calc
  var m=allMenus.find(function(x){return x.id===menuId;});
  if(m)m.actual_stock=val;
  // update rem display ทันที
  var row=inp.closest(".pt-row");
  if(row){
    var ordered=parseInt(row.querySelectorAll(".pt-n")[0].textContent)||0;
    var rem=val-ordered;
    var remEl=row.querySelectorAll(".pt-n")[2];
    if(remEl){remEl.textContent=rem;remEl.style.color=rem<0?"var(--r)":"var(--g)";}
    row.className="pt-row"+(rem<0?" danger":rem<3?" warn":"");
  }
  clearTimeout(saveTimers[menuId]);
  saveTimers[menuId]=setTimeout(async function(){
    var sb_=getSB(); if(!sb_)return;
    await sb_.from("menu_items").update({actual_stock:val}).eq("id",menuId);
  },600);
}

// TAB 2: รายออเดอร์ by slot
function renderOrders(){
  var orders=filteredOrders();
  if(!orders.length){
    document.getElementById("orderView").innerHTML="<div style='text-align:center;padding:40px;color:var(--soft)'>ไม่มีออเดอร์</div>";
    return;
  }
  // group by slot
  var slotOrder=["all_day","morning","afternoon","express",""];
  var bySlot={};
  orders.forEach(function(o){
    var s=o.time_slot||"";
    if(!bySlot[s])bySlot[s]=[];
    bySlot[s].push(o);
  });
  var html="";
  slotOrder.forEach(function(s){
    if(!bySlot[s]||!bySlot[s].length)return;
    var label=SLOT_LABELS[s]||"⏰ ไม่ระบุช่วงเวลา";
    html+="<div class='slot-sec'>"
      +"<div class='slot-hdr'><span class='slot-hdr-label'>"+label+"</span><span class='slot-hdr-count'>"+bySlot[s].length+" ออเดอร์</span></div>"
      +"<div class='slot-body'>"+bySlot[s].map(renderCard).join("")+"</div></div>";
  });
  document.getElementById("orderView").innerHTML=html;
}

function renderCard(o){
  var items=getOrderItems(o.id);
  var badge=detectBadge(items);
  var isPkg=!!(o.package_type);
  var isMp=items.some(function(i){return (i.code||"").match(/^HP|^LC/i);});
  var cardCls=isPkg?"oc pkg":isMp?"oc mealplan":"oc";
  var badgeHtml=isPkg?"<span class='oc-badge pkg'>📦 แพ็ค</span>"
    :isMp?"<span class='oc-badge mp'>🥗 Meal</span>"
    :badge!=="normal"?"<span class='oc-badge "+badge+"'>"+badge.toUpperCase()+"</span>":"";
  var itemsHtml=items.length?items.map(function(i){
    return "<div class='item-chip'><span class='ic-code'>"+escH(getCodeDisplay(i.code,i.name))+"</span>"
      +(codeMode!=="name"?" <span style='font-size:10px;color:var(--soft)'>"+escH(i.name.slice(0,12))+"</span>":"")
      +" <span class='ic-qty'>×"+i.qty+"</span></div>";
  }).join(""):"<span style='color:var(--xsoft);font-size:11px'>ไม่พบรายการ</span>";
  // Meal Plan = ซื้อทั้ง subscription ครั้งเดียว ไม่ใช่ของที่ต้องจัดกล่องในวันนี้วันเดียว
  // รอบส่งจริง + เมนูที่กำหนด อยู่ที่ mp_deliveries → ลิ้งไปดูที่แท็บ "รายสินค้า" แทนปุ่มจัดกล่อง
  var actions=isMp
    ?"<div class='oc-actions'><span onclick='switchTab(1)' style='font-size:12px;color:var(--g);font-weight:700;cursor:pointer;text-decoration:underline'>📋 ดูรอบส่ง & เมนูที่แท็บ \"รายสินค้า\" →</span></div>"
    :o.status==="confirmed"||o.status==="preparing"
    ?"<div class='oc-actions'><button class='btn-pack' onclick='markPacked(\""+o.id+"\")'>✅ จัดกล่องเสร็จ</button></div>"
    :o.status==="ready"
    ?"<div class='oc-actions'><span style='font-size:12px;color:var(--g);font-weight:600'>✅ พร้อมส่ง</span><button class='btn-undo' onclick='markUnpack(\""+o.id+"\")'>↩ ยกเลิก</button></div>":"";
  var wantsUtensils=o.want_utensils!==false;
  var utensilHtml="<div class='oc-utensil"+(kitchenUtensilSize==="large"?" oc-utensil-lg":"")+(wantsUtensils?"":" oc-utensil-no")+"'>"
    +(wantsUtensils?"🥄🍴 ใส่ช้อนส้อม":"❌ ไม่ต้องช้อนส้อม")+"</div>";
  return "<div class='"+cardCls+"'>"
    +"<div class='oc-top'>"+badgeHtml+"<div style='flex:1;min-width:0'>"
    +"<div style='display:flex;align-items:center;gap:6px;flex-wrap:wrap'><div class='oc-name'>"+escH(o.customer_name||"ลูกค้า")+"</div>"+lineTag(o)
    +"<div class='oc-order-num'>"+escH(o.order_number||"—")+"</div>"
    +"<span style='font-size:10px;font-weight:700;padding:1px 7px;border-radius:7px;"+(o.payment_status==="paid"?"background:#D1FAE5;color:#065F46":"background:#FEF3C7;color:#92400E")+"' title='สถานะการโอน (แก้ที่หน้า OH)'>"+(o.payment_status==="paid"?"💰 โอนแล้ว":"⏳ รอโอน")+"</span></div>"
    +"<div class='oc-meta'>📍 "+escH(o.delivery_address||"—")+"</div>"
    +"<div class='oc-meta' style='font-size:10px;color:var(--soft)'>🗓️ สั่ง "+fmtOrderPlaced(o.created_at)+" · ส่ง "+fmtDate(o.delivery_date)+"</div></div></div>"
    +"<div class='items-grid'>"+itemsHtml+"</div>"
    +utensilHtml
    +(o.notes?"<div class='oc-note'>📌 "+escH(o.notes)+"</div>":"")
    +actions+"</div>";
}

// ── ACTIONS ──────────────────────────────────────────────
async function markPacked(id){
  if(!requireKqUser())return;
  var sb_=getSB(); if(!sb_)return;
  await sb_.from("orders").update({status:"ready",updated_at:new Date().toISOString()}).eq("id",id);
  var o=allOrders.find(function(x){return x.id===id;}); if(o)o.status="ready";
  logKqActivity((o?o.customer_name+" ("+(o.order_number||"—")+") — ":"")+"✅ จัดกล่องเสร็จ");
  render();
}
async function markUnpack(id){
  if(!requireKqUser())return;
  var sb_=getSB(); if(!sb_)return;
  await sb_.from("orders").update({status:"confirmed",updated_at:new Date().toISOString()}).eq("id",id);
  var o=allOrders.find(function(x){return x.id===id;}); if(o)o.status="confirmed";
  logKqActivity((o?o.customer_name+" ("+(o.order_number||"—")+") — ":"")+"↩ ยกเลิกจัดกล่อง");
  render();
}

// ── PRINT ─────────────────────────────────────────────────
function openPrint(){document.getElementById("printModal").style.display="flex";}
function closePrint(){document.getElementById("printModal").style.display="none";}
function doPrint(type){
  closePrint();
  if(type==="daily")switchTab(1);
  else switchTab(2);
  setTimeout(function(){window.print();},300);
}

// ── UTIL ─────────────────────────────────────────────────
function escH(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
// โชว์ชื่อ LINE ต่อท้าย เฉพาะตอนไม่ตรงกับชื่อผู้รับ — กันสั่งซ้ำ 2 รอบให้คนละคน
function lineTag(o){
  if(!o||!o.line_display_name||o.line_display_name===o.customer_name) return "";
  return " <span style='font-size:10px;color:#9CA3AF;font-weight:400'>(LINE: "+escH(o.line_display_name)+")</span>";
}
