<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Under360 — ครัว</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--g:#1F4D3A;--gs:#EBF3EF;--gold:#C9973F;--r:#DC2626;--rs:#FEF2F2;--ink:#1A1A1A;--soft:#6B7280;--xsoft:#D1D5DB;--bg:#F7F8F6;--white:#fff;--radius:12px;--mono:'IBM Plex Mono';--sans:'IBM Plex Sans Thai',sans-serif;}
body{font-family:var(--sans);background:var(--bg);min-height:100vh;}

/* HEADER */
.hdr{background:var(--g);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
.hdr-title{font-size:15px;font-weight:700;color:#fff;flex:1;}
.hdr-btn{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:var(--sans);text-decoration:none;}
.live-dot{width:8px;height:8px;border-radius:50%;background:#22C55E;box-shadow:0 0 0 3px rgba(34,197,94,.2);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* TABS */
.tab-bar{display:flex;background:var(--white);border-bottom:2px solid var(--xsoft);}
.tab-btn{flex:1;padding:12px 8px;font-size:13px;font-weight:600;color:var(--soft);border:none;background:none;cursor:pointer;font-family:var(--sans);border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s;}
.tab-btn.active{color:var(--g);border-bottom-color:var(--g);}

/* DATE BAR */
.date-bar{background:var(--white);border-bottom:1px solid var(--xsoft);padding:8px 14px;display:flex;align-items:center;gap:8px;overflow-x:auto;}
.dtab{flex-shrink:0;padding:5px 14px;border-radius:20px;border:1px solid var(--xsoft);font-size:13px;font-weight:500;cursor:pointer;background:var(--white);color:var(--soft);}
.dtab.active{background:var(--g);color:#fff;border-color:var(--g);}
.date-sel{flex-shrink:0;padding:5px 10px;border-radius:20px;border:1px solid var(--xsoft);font-size:12px;cursor:pointer;background:var(--white);font-family:var(--sans);color:var(--soft);}

/* MAIN */
.main{padding:14px;max-width:900px;margin:0 auto;}

/* ─── TAB 1: PRODUCTION TABLE ─── */
.prod-section{background:var(--white);border-radius:var(--radius);border:1px solid var(--xsoft);overflow:hidden;margin-bottom:14px;}
.pt-hdr{display:grid;grid-template-columns:1fr 46px 54px 54px 68px;gap:4px;padding:7px 12px;background:var(--gs);border-bottom:2px solid var(--xsoft);}
.pt-hdr span{font-size:10px;font-weight:700;color:var(--soft);text-transform:uppercase;letter-spacing:.4px;text-align:center;}
.pt-hdr span:first-child{text-align:left;}
.pt-row{display:grid;grid-template-columns:1fr 46px 54px 54px 68px;gap:4px;padding:8px 12px;border-bottom:1px solid var(--xsoft);align-items:center;}
.pt-row:last-child{border-bottom:none;}
.pt-row.row-warn{background:#FFFBEB;}
.pt-row.row-danger{background:#FFF1F1;}
.pr-name-cell{display:flex;align-items:center;gap:5px;min-width:0;}
.pr-code-tag{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--g);background:var(--gs);padding:2px 5px;border-radius:4px;white-space:nowrap;flex-shrink:0;}
.pr-name-text{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pr-n{font-family:var(--mono);font-size:13px;font-weight:700;text-align:center;}
.pr-sys-n{color:var(--soft);}
.pr-ord-n{color:var(--gold);}
.pr-rem-cell{font-family:var(--mono);font-size:13px;font-weight:700;text-align:center;padding:2px 6px;border-radius:6px;background:var(--gs);color:var(--g);}
.pr-rem-cell.neg{background:var(--rs);color:var(--r);}
.pr-rem-cell.zero{background:#FFF7ED;color:var(--gold);}
.pr-act-input{width:100%;font-family:var(--mono);font-size:13px;font-weight:700;color:var(--ink);border:1.5px solid var(--xsoft);border-radius:7px;padding:4px 2px;text-align:center;background:var(--white);}
.pr-act-input:focus{outline:none;border-color:var(--g);background:var(--gs);}

.reserve-card{background:#FDF5E8;border:1px solid var(--gold);border-radius:var(--radius);padding:10px 14px;margin-bottom:12px;}
.reserve-title{font-size:12px;font-weight:700;color:var(--gold);margin-bottom:5px;}
.reserve-item{font-size:12px;color:var(--ink);padding:2px 0;}

/* ─── TAB 2: QUEUE ─── */
.ready-banner{background:var(--gs);border:2px solid var(--g);border-radius:var(--radius);padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:14px;}
.rb-num{font-family:var(--mono);font-size:32px;font-weight:700;color:var(--g);line-height:1;}
.rb-label{font-size:14px;color:var(--g);font-weight:700;}
.rb-sub{font-size:11px;color:var(--soft);margin-top:2px;}
.zones{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:600px){.zones{grid-template-columns:1fr;}}
.zone{background:var(--white);border-radius:var(--radius);border:1px solid var(--xsoft);overflow:hidden;}
.zone-hdr{padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--xsoft);}
.zone-title{font-size:13px;font-weight:700;flex:1;}
.zone-count{font-family:var(--mono);font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;}
.zone-a .zone-hdr{background:#FEF3C7;}
.zone-a .zone-count{background:#F59E0B;color:#fff;}
.zone-c .zone-hdr{background:#D1FAE5;}
.zone-c .zone-count{background:#22C55E;color:#fff;}
.zone-d .zone-hdr{background:#F3F4F6;}
.zone-d .zone-count{background:#6B7280;color:#fff;}
.zone-body{padding:10px;max-height:400px;overflow-y:auto;}
.adv-zone{background:var(--white);border-radius:var(--radius);border:1px solid #FDE68A;margin-bottom:10px;overflow:hidden;}
.adv-hdr{padding:10px 14px;background:#FDF5E8;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #FDE68A;}
.adv-date{font-size:13px;font-weight:700;color:var(--gold);}
.order-card{background:var(--bg);border-radius:10px;padding:11px;margin-bottom:8px;border:1px solid var(--xsoft);}
.order-card:last-child{margin-bottom:0;}
.order-card.urgent{border-left:3px solid var(--r);}
.oc-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;}
.oc-badge{font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;flex-shrink:0;}
.oc-badge.hp{background:#DBEAFE;color:#1E40AF;}
.oc-badge.lc{background:#D1FAE5;color:#065F46;}
.oc-name{font-size:13px;font-weight:700;}
.oc-meta{font-size:11px;color:var(--soft);margin-top:1px;}
.oc-items{font-size:12px;color:var(--soft);margin-bottom:8px;display:flex;flex-direction:column;gap:3px;}
.item-chip{display:inline-flex;align-items:center;gap:4px;}
.item-code{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--g);background:var(--gs);padding:1px 5px;border-radius:4px;}
.oc-note{font-size:11px;color:var(--r);background:var(--rs);padding:3px 8px;border-radius:6px;margin-bottom:8px;}
.oc-actions{display:flex;gap:6px;}
.btn-pack{flex:1;background:var(--g);color:#fff;border:none;border-radius:8px;padding:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--sans);}
.btn-pick{flex:1;background:#3B82F6;color:#fff;border:none;border-radius:8px;padding:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--sans);}
.btn-back{background:var(--xsoft);color:var(--soft);border:none;border-radius:8px;padding:9px;font-size:12px;cursor:pointer;font-family:var(--sans);}
.btn-recall-c{flex:1;background:#3B82F6;color:#fff;border:none;border-radius:8px;padding:9px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--sans);}
.btn-recall-a{flex:1;background:#F59E0B;color:#fff;border:none;border-radius:8px;padding:9px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--sans);}
.delivered-meta{font-size:11px;color:#22C55E;font-weight:600;margin-bottom:6px;}
.empty-zone{text-align:center;padding:22px;color:var(--xsoft);font-size:13px;}
.adv-section{margin-top:12px;}
.zone-d-section{margin-top:12px;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">🍳 ครัว Under360</div>
  <div class="live-dot"></div>
  <a href="main_database_v2.html" target="_blank" class="hdr-btn">📖 สูตร</a>
  <button class="hdr-btn" onclick="loadAll()">🔄</button>
</div>

<div class="tab-bar">
  <button class="tab-btn active" id="tab1" onclick="switchTab(1)">🍳 ผลิต</button>
  <button class="tab-btn" id="tab2" onclick="switchTab(2)">📦 จัดกล่อง & ส่ง</button>
</div>

<div class="date-bar">
  <button class="dtab active" id="dtToday" onclick="setDateView('today',this)">วันนี้</button>
  <button class="dtab" id="dtTom" onclick="setDateView('tomorrow',this)">พรุ่งนี้</button>
  <button class="dtab" id="dtAll" onclick="setDateView('all',this)">ทั้งหมด</button>
  <select class="date-sel" id="calPicker" onchange="setDateView('custom',this)"><option value="">📅 ย้อนหลัง...</option></select>
</div>

<!-- TAB 1: PRODUCTION -->
<div class="main" id="tabContent1">
  <div id="reserveSection"></div>
  <div id="prodGrid"><div style="text-align:center;color:var(--soft);padding:32px">กำลังโหลด...</div></div>
  <div style="margin-top:14px;text-align:center">
    <button onclick="switchTab(2)" style="background:var(--g);color:#fff;border:none;border-radius:10px;padding:12px 28px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--sans);">ผลิตครบแล้ว → ไปจัดกล่อง 📦</button>
  </div>
</div>

<!-- TAB 2: QUEUE -->
<div class="main" id="tabContent2" style="display:none">
  <div class="ready-banner" id="readyBanner">
    <span class="rb-num">0</span>
    <div><div class="rb-label">ออเดอร์ พร้อมส่งในตู้เย็น 🧊</div><div class="rb-sub">กด "จัดกล่องเสร็จ" เพื่อเพิ่มเข้าตู้เย็น</div></div>
  </div>
  <div class="zones">
    <div class="zone zone-a">
      <div class="zone-hdr"><span class="zone-title">📦 ยังไม่จัด</span><span class="zone-count" id="cntA">0</span></div>
      <div class="zone-body" id="zoneA"><div class="empty-zone">✅ จัดครบแล้ว!</div></div>
    </div>
    <div class="zone zone-c">
      <div class="zone-hdr"><span class="zone-title">✅ จัดแล้ว รอส่ง</span><span class="zone-count" id="cntC">0</span></div>
      <div class="zone-body" id="zoneC"><div class="empty-zone">📭 ยังไม่มี</div></div>
    </div>
  </div>
  <div class="adv-section" id="zoneB" style="display:none">
    <div style="font-size:12px;font-weight:700;color:var(--soft);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;">📅 จัดล่วงหน้า</div>
    <div id="zoneBContent"></div>
  </div>
  <div class="zone-d-section">
    <div class="zone zone-d" style="margin-top:12px">
      <div class="zone-hdr"><span class="zone-title">🚚 ส่งแล้ว — ดึงกลับได้</span><span class="zone-count" id="cntD">0</span></div>
      <div class="zone-body" id="zoneD"><div class="empty-zone">📭 ยังไม่มี</div></div>
    </div>
  </div>
</div>

<script>
const SB_URL="https://zdartbvhbvqlwzwyyiia.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkYXJ0YnZoYnZxbHd6d3l5aWlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MTY3OTksImV4cCI6MjA5NzM5Mjc5OX0.D41YGH-CuWrVFqcAgXEuhfVTxJ7WY26Xu-PeXBF6LB8";
var sb=null,dateView="today",currentTab=1,customDate=null;
var allOrders=[],allItems=[],allMenus=[];
var saveTimers={};

function getSB(){try{if(!sb&&typeof supabase!=="undefined")sb=supabase.createClient(SB_URL,SB_KEY);return sb;}catch(e){return null;}}
function toISO(d){return d.toISOString().split("T")[0];}
function today(){return toISO(new Date());}
function tomorrow(){var d=new Date();d.setDate(d.getDate()+1);return toISO(d);}
function fmtDate(iso){var d=new Date(iso+"T00:00:00");return d.toLocaleDateString("th-TH",{weekday:"short",day:"numeric",month:"short"});}
function getTargetDate(){
  if(dateView==="today")return today();
  if(dateView==="tomorrow")return tomorrow();
  if(dateView==="custom"&&customDate)return customDate;
  return null;
}

// ── Tabs ─────────────────────────────────────────────────
function switchTab(n){
  currentTab=n;
  document.getElementById("tab1").classList.toggle("active",n===1);
  document.getElementById("tab2").classList.toggle("active",n===2);
  document.getElementById("tabContent1").style.display=n===1?"block":"none";
  document.getElementById("tabContent2").style.display=n===2?"block":"none";
}

// ── Date ─────────────────────────────────────────────────
function setDateView(v,btn){
  dateView=v;
  document.querySelectorAll(".dtab").forEach(function(b){b.classList.remove("active");});
  if(btn&&btn.classList)btn.classList.add("active");
  if(v==="custom")customDate=btn.value;
  renderProd(allMenus);
  renderQueue(allOrders);
}

// ── Load ─────────────────────────────────────────────────
async function loadAll(){
  var sb_=getSB();
  if(!sb_){
    allMenus=MOCK_MENUS;allOrders=MOCK_ORDERS;allItems=MOCK_ITEMS;
    renderProd(allMenus);renderQueue(allOrders);return;
  }
  try{
    var [rO,rI,rM]=await Promise.all([
      sb_.from("orders").select("*").order("delivery_date").order("time_slot"),
      sb_.from("order_items").select("*"),
      sb_.from("menu_items").select("id,code,name,price,stock_quantity,actual_stock,is_available")
    ]);
    allOrders=rO.data||[];allItems=rI.data||[];allMenus=rM.data||[];
    renderProd(allMenus);renderQueue(allOrders);
  }catch(e){
    allMenus=MOCK_MENUS;allOrders=MOCK_ORDERS;allItems=MOCK_ITEMS;
    renderProd(MOCK_MENUS);renderQueue(MOCK_ORDERS);
  }
}

// ── TAB 1: Production ────────────────────────────────────
function renderProd(menus){
  var tgt=getTargetDate();
  var tomStr=tomorrow();

  // Count pending orders per menu for selected date
  var pendingForDate=allOrders.filter(function(o){
    if(o.status==="delivered")return false;
    return !tgt||(o.delivery_date===tgt);
  });
  var menuOrdCount={};
  pendingForDate.forEach(function(o){
    allItems.filter(function(i){return i.order_id===o.id;}).forEach(function(i){
      menuOrdCount[i.menu_item_id]=(menuOrdCount[i.menu_item_id]||0)+(i.quantity||1);
    });
  });

  // Reserve section — advance orders beyond tomorrow
  var reserved=allOrders.filter(function(o){
    return o.delivery_date>tomStr&&(o.status==="confirmed"||o.status==="preparing");
  });
  var resEl=document.getElementById("reserveSection");
  resEl.innerHTML=reserved.length?
    "<div class='reserve-card'><div class='reserve-title'>⚠️ จองล่วงหน้า "+reserved.length+" ออเดอร์ — ต้องผลิตเก็บไว้</div>"
    +reserved.slice(0,5).map(function(o){return "<div class='reserve-item'>📅 ส่ง "+fmtDate(o.delivery_date)+" · "+(o.customer_name||"ลูกค้า")+"</div>";}).join("")
    +(reserved.length>5?"<div class='reserve-item' style='color:var(--soft)'>...และอีก "+(reserved.length-5)+" ออเดอร์</div>":"")
    +"</div>":""
  ;

  // Build table
  var onlineMenus=menus.filter(function(m){return m.is_available!==false;});
  if(!onlineMenus.length)onlineMenus=MOCK_MENUS;

  var rows=onlineMenus.map(function(m){
    var ordered=menuOrdCount[m.id]||0;
    var sys=m.stock_quantity!=null?m.stock_quantity:0;
    var actual=m.actual_stock!=null?m.actual_stock:sys;
    var remain=actual-ordered;
    var rowCls=remain<0?" row-danger":ordered>0&&remain===0?" row-warn":"";
    var remCls=remain<0?" neg":ordered>0&&remain===0?" zero":"";
    return "<div class='pt-row"+rowCls+"'>"
      +"<div class='pr-name-cell'><span class='pr-code-tag'>"+(m.code||"—")+"</span><span class='pr-name-text'>"+(m.name||"เมนู")+"</span></div>"
      +"<div class='pr-n pr-sys-n'>"+sys+"</div>"
      +"<div class='pr-n pr-ord-n'>"+ordered+"</div>"
      +"<div class='pr-rem-cell"+remCls+"' id='rem-"+m.id+"'>"+remain+"</div>"
      +"<input class='pr-act-input' id='act-"+m.id+"' type='number' min='0' value='"+actual+"' oninput='saveActual(\""+m.id+"\",this)'>"
      +"</div>";
  }).join("");

  document.getElementById("prodGrid").innerHTML=
    "<div class='prod-section'>"
    +"<div class='pt-hdr'><span>เมนู</span><span>ระบบ</span><span>ออเดอร์</span><span>คงเหลือ</span><span>จริง ✏️</span></div>"
    +rows
    +"</div>";
}

function saveActual(menuId,input){
  var val=parseInt(input.value);
  if(isNaN(val)||val<0)return;
  // Update in memory
  var m=allMenus.find(function(x){return x.id===menuId;});
  if(m)m.actual_stock=val;
  // Update คงเหลือ cell only (no full re-render = preserve typing focus)
  var tgt=getTargetDate();
  var ordered=0;
  allOrders.filter(function(o){
    if(o.status==="delivered")return false;
    return !tgt||(o.delivery_date===tgt);
  }).forEach(function(o){
    allItems.filter(function(i){return i.order_id===o.id&&i.menu_item_id===menuId;})
      .forEach(function(i){ordered+=(i.quantity||1);});
  });
  var remain=val-ordered;
  var remEl=document.getElementById("rem-"+menuId);
  if(remEl){
    remEl.textContent=remain;
    remEl.className="pr-rem-cell"+(remain<0?" neg":ordered>0&&remain===0?" zero":"");
  }
  // Debounce DB save 600ms
  clearTimeout(saveTimers[menuId]);
  saveTimers[menuId]=setTimeout(async function(){
    var sb_=getSB();
    if(sb_)await sb_.from("menu_items").update({actual_stock:val}).eq("id",menuId);
  },600);
}

// ── Helper: adjust actual_stock (+1 restore / -1 decrement) ──
async function adjustActualStock(orderItems,delta){
  var sb_=getSB();
  for(var i=0;i<orderItems.length;i++){
    var it=orderItems[i];
    var m=allMenus.find(function(x){return x.id===it.menu_item_id;});
    if(m){
      var cur=m.actual_stock!=null?m.actual_stock:(m.stock_quantity||0);
      var nv=Math.max(0,cur+(delta*(it.quantity||1)));
      m.actual_stock=nv;
      if(sb_)await sb_.from("menu_items").update({actual_stock:nv}).eq("id",it.menu_item_id);
    }
  }
}

// ── TAB 2: Queue ─────────────────────────────────────────
function getOrderItems(orderId){
  return allItems.filter(function(i){return i.order_id===orderId;}).map(function(i){
    var m=allMenus.find(function(x){return x.id===i.menu_item_id;})||{code:"—",name:"—"};
    return {code:m.code,name:m.name,qty:i.quantity||1};
  });
}
function detectType(items){
  if(items.some(function(i){return (i.code||"").startsWith("HP");}))return "hp";
  if(items.some(function(i){return (i.code||"").startsWith("LC");}))return "lc";
  return "lc";
}
function renderCard(o,zone){
  var items=getOrderItems(o.id);
  var type=detectType(items);
  var isUrgent=o.delivery_date===today()&&zone==="A";
  var itemsHtml=items.length?items.map(function(i){
    return "<div class='item-chip'><span class='item-code'>"+i.code+"</span> "+i.name.slice(0,14)+" ×"+i.qty+"</div>";
  }).join(""):"<div style='color:var(--xsoft);font-size:11px'>ไม่พบรายการ</div>";
  var noteHtml=o.notes?"<div class='oc-note'>📌 "+o.notes+"</div>":"";
  var actionsHtml="";
  if(zone==="A"){
    actionsHtml="<div class='oc-actions'><button class='btn-pack' onclick='markPacked(\""+o.id+"\")'>✅ จัดกล่องเสร็จ พร้อมส่ง</button></div>";
  } else if(zone==="C"){
    actionsHtml="<div class='oc-actions'><button class='btn-pick' onclick='markPicked(\""+o.id+"\")'>🛵 Messenger หยิบแล้ว</button><button class='btn-back' onclick='markUnpack(\""+o.id+"\")'>↩</button></div>";
  } else if(zone==="D"){
    var t=o.updated_at?new Date(o.updated_at).toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"}):"—";
    actionsHtml="<div class='delivered-meta'>🚚 ส่งเมื่อ "+t+"</div>"
      +"<div class='oc-actions'><button class='btn-recall-c' onclick='markRecall(\""+o.id+"\",\"ready\")'>↩ กลับจัดแล้ว</button><button class='btn-recall-a' onclick='markRecall(\""+o.id+"\",\"confirmed\")'>↩↩ กลับไม่จัด</button></div>";
  }
  return "<div class='order-card"+(isUrgent?" urgent":"")+"'>"
    +"<div class='oc-top'><span class='oc-badge "+type+"'>"+type.toUpperCase()+"</span>"
    +"<div><div class='oc-name'>"+(o.customer_name||"ลูกค้า")+"</div>"
    +"<div class='oc-meta'>"+(o.order_number||"—")+" · 📅 "+(o.delivery_date||"—")+" · ⏰ "+(o.time_slot_label||o.time_slot||"—")+"</div>"
    +"<div class='oc-meta'>📍 "+(o.delivery_address||"—")+"</div></div></div>"
    +"<div class='oc-items'>"+itemsHtml+"</div>"
    +noteHtml+actionsHtml+"</div>";
}

function renderQueue(orders){
  var tgt=getTargetDate();
  var tomStr=tomorrow();
  var zA=orders.filter(function(o){var ok=!tgt||(o.delivery_date===tgt);return ok&&(o.status==="confirmed"||o.status==="preparing");});
  var zC=orders.filter(function(o){var ok=!tgt||(o.delivery_date===tgt);return ok&&o.status==="ready";});
  var zD=orders.filter(function(o){var ok=!tgt||(o.delivery_date===tgt);return ok&&o.status==="delivered";});
  var zB=orders.filter(function(o){return o.delivery_date>tomStr&&(o.status==="confirmed"||o.status==="preparing");});

  // Ready banner — total across ALL dates
  var totalReady=orders.filter(function(o){return o.status==="ready";}).length;
  document.getElementById("readyBanner").innerHTML=
    "<span class='rb-num'>"+totalReady+"</span>"
    +"<div><div class='rb-label'>ออเดอร์ พร้อมส่งในตู้เย็น 🧊</div><div class='rb-sub'>จัดเสร็จรอ Messenger มาหยิบ</div></div>";

  document.getElementById("cntA").textContent=zA.length;
  document.getElementById("cntC").textContent=zC.length;
  document.getElementById("cntD").textContent=zD.length;
  document.getElementById("zoneA").innerHTML=zA.length?zA.map(function(o){return renderCard(o,"A");}).join(""):"<div class='empty-zone'>✅ จัดครบแล้ว</div>";
  document.getElementById("zoneC").innerHTML=zC.length?zC.map(function(o){return renderCard(o,"C");}).join(""):"<div class='empty-zone'>📭 ยังไม่มี</div>";
  document.getElementById("zoneD").innerHTML=zD.length?zD.map(function(o){return renderCard(o,"D");}).join(""):"<div class='empty-zone'>📭 ยังไม่มี</div>";

  var bSec=document.getElementById("zoneB"),bCon=document.getElementById("zoneBContent");
  if(zB.length&&dateView!=="tomorrow"){
    bSec.style.display="block";
    var byDate={};
    zB.forEach(function(o){if(!byDate[o.delivery_date])byDate[o.delivery_date]=[];byDate[o.delivery_date].push(o);});
    bCon.innerHTML=Object.keys(byDate).sort().map(function(iso){
      return "<div class='adv-zone'><div class='adv-hdr'><span class='adv-date'>📅 ส่ง "+fmtDate(iso)+"</span><span style='background:var(--gold);color:#fff;font-size:11px;padding:2px 8px;border-radius:10px'>"+byDate[iso].length+" ออเดอร์</span></div>"
        +"<div style='padding:8px'>"+byDate[iso].map(function(o){return renderCard(o,"A");}).join("")+"</div></div>";
    }).join("");
  }else{bSec.style.display="none";}
}

// markPacked: จัดกล่องเสร็จ → หัก actual_stock + status=ready
async function markPacked(id){
  var orderItems=allItems.filter(function(i){return i.order_id===id;});
  await adjustActualStock(orderItems,-1);
  var sb_=getSB();
  if(sb_)await sb_.from("orders").update({status:"ready",updated_at:new Date().toISOString()}).eq("id",id);
  var o=allOrders.find(function(x){return x.id===id;});
  if(o){o.status="ready";o.updated_at=new Date().toISOString();}
  renderProd(allMenus);renderQueue(allOrders);
}

// markPicked: Messenger หยิบแล้ว → status=delivered + loyalty points
async function markPicked(id){
  var sb_=getSB();
  if(sb_){
    await sb_.from("orders").update({status:"delivered",updated_at:new Date().toISOString()}).eq("id",id);
    try{
      var o=allOrders.find(function(x){return x.id===id;});
      if(o&&o.line_uid&&o.total){
        var cr=await sb_.from("customers").select("points,tier").eq("line_uid",o.line_uid).single();
        if(!cr.error&&cr.data){
          var np=(cr.data.points||0)+o.total;
          var nt=np>=25000?4:np>=10000?3:np>=3000?2:1;
          await sb_.from("customers").update({points:np,tier:nt}).eq("line_uid",o.line_uid);
        }
      }
    }catch(e){}
  }
  var o2=allOrders.find(function(x){return x.id===id;});
  if(o2)o2.status="delivered";
  renderProd(allMenus);renderQueue(allOrders);
}

// markUnpack: ↩ ยกเลิกจัด → คืน actual_stock + status=confirmed
async function markUnpack(id){
  var orderItems=allItems.filter(function(i){return i.order_id===id;});
  await adjustActualStock(orderItems,+1);
  var sb_=getSB();
  if(sb_)await sb_.from("orders").update({status:"confirmed",updated_at:new Date().toISOString()}).eq("id",id);
  var o=allOrders.find(function(x){return x.id===id;});
  if(o)o.status="confirmed";
  renderProd(allMenus);renderQueue(allOrders);
}

// markRecall: ดึงออเดอร์กลับจาก delivered
async function markRecall(id,st){
  if(st==="confirmed"){
    // กลับ "ไม่จัด" → คืน actual_stock
    var orderItems=allItems.filter(function(i){return i.order_id===id;});
    await adjustActualStock(orderItems,+1);
  }
  // st==="ready" → กลับ "จัดแล้ว" → actual_stock ไม่เปลี่ยน (ยังอยู่ในตู้เย็น)
  var sb_=getSB();
  if(sb_)await sb_.from("orders").update({status:st,updated_at:new Date().toISOString()}).eq("id",id);
  var o=allOrders.find(function(x){return x.id===id;});
  if(o)o.status=st;
  renderProd(allMenus);renderQueue(allOrders);
}
