<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Under360 — Kitchen Queue</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --forest:#1F4D3A;--forest-soft:#EBF3EF;
  --gold:#C9973F;--gold-soft:#FDF5E8;
  --red:#DC2626;--red-soft:#FEF2F2;
  --green:#22C55E;--blue:#3B82F6;
  --ink:#1A1A1A;--ink-soft:#6B7280;--ink-xsoft:#D1D5DB;
  --bg:#F7F8F6;--white:#fff;--radius:12px;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans Thai',sans-serif;
}
html,body{min-height:100vh;font-family:var(--sans);background:var(--bg);color:var(--ink);}

/* PIN */
#pinScreen{position:fixed;inset:0;background:var(--forest);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:999;}
.pin-title{color:#fff;font-size:20px;font-weight:700;letter-spacing:1px;}
.pin-dots{display:flex;gap:12px;}
.pin-dot{width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,.3);}
.pin-dot.filled{background:#fff;}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:240px;}
.pin-btn{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:12px;padding:18px;font-size:22px;font-weight:600;cursor:pointer;font-family:var(--sans);}
.pin-btn:hover{background:rgba(255,255,255,.25);}
.pin-btn:active{transform:scale(.95);}
.pin-error{color:#FCA5A5;font-size:13px;min-height:18px;}

/* HEADER */
.header{background:var(--forest);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.hdr-left{display:flex;align-items:center;gap:10px;}
.hdr-title{font-family:var(--mono);font-size:16px;font-weight:700;color:#fff;}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.55);letter-spacing:1px;}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(34,197,94,.2);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.last-upd{font-size:11px;color:rgba(255,255,255,.5);}
.refresh-btn{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:var(--sans);}

/* DATE TABS */
.date-bar{background:var(--white);border-bottom:1px solid var(--ink-xsoft);padding:10px 18px;display:flex;align-items:center;gap:8px;overflow-x:auto;}
.date-tab{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid var(--ink-xsoft);background:var(--white);cursor:pointer;color:var(--ink-soft);}
.date-tab.active{background:var(--forest);color:#fff;border-color:var(--forest);}
.date-tab.urgent{border-color:var(--red);color:var(--red);}
.date-tab.urgent.active{background:var(--red);color:#fff;}

/* MAIN */
.main{padding:16px;max-width:900px;margin:0 auto;}

/* ZONES */
.zones{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:600px){.zones{grid-template-columns:1fr;}}
.zone{background:var(--white);border-radius:var(--radius);border:1px solid var(--ink-xsoft);overflow:hidden;}
.zone-header{padding:12px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--ink-xsoft);}
.zone-title{font-size:13px;font-weight:700;flex:1;}
.zone-count{font-family:var(--mono);font-size:12px;font-weight:700;background:var(--ink-xsoft);padding:2px 8px;border-radius:10px;}
.zone-a .zone-header{background:#FEF3C7;}
.zone-a .zone-count{background:#F59E0B;color:#fff;}
.zone-c .zone-header{background:#D1FAE5;}
.zone-c .zone-count{background:var(--green);color:#fff;}
.zone-body{padding:10px;}

/* ORDER CARDS */
.order-card{background:var(--bg);border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid var(--ink-xsoft);}
.order-card:last-child{margin-bottom:0;}
.order-card.urgent{border-left:3px solid var(--red);}
.oc-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;}
.oc-badge{font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;flex-shrink:0;margin-top:2px;}
.oc-badge.hp{background:#DBEAFE;color:#1E40AF;}
.oc-badge.lc{background:#D1FAE5;color:#065F46;}
.oc-badge.s{background:var(--gold-soft);color:var(--gold);}
.oc-name{font-size:14px;font-weight:700;flex:1;}
.oc-order{font-family:var(--mono);font-size:10px;color:var(--ink-soft);margin-top:1px;}
.oc-slot{font-size:11px;color:var(--ink-soft);}
.oc-items{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.oc-item{display:flex;align-items:center;gap:8px;font-size:12px;}
.item-code{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--forest);background:var(--forest-soft);padding:1px 6px;border-radius:4px;flex-shrink:0;}
.item-name{flex:1;color:var(--ink-soft);}
.item-qty{font-family:var(--mono);font-size:11px;font-weight:700;}
.oc-note{font-size:11px;color:var(--red);background:var(--red-soft);padding:3px 8px;border-radius:6px;margin-bottom:8px;}
.oc-actions{display:flex;gap:6px;}
.btn-pack{flex:1;background:var(--forest);color:#fff;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);}
.btn-pack:active{opacity:.8;}
.btn-pick{flex:1;background:var(--blue);color:#fff;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);}
.btn-pick:active{opacity:.8;}
.btn-unpack{background:var(--ink-xsoft);color:var(--ink-soft);border:none;border-radius:8px;padding:10px;font-size:12px;cursor:pointer;font-family:var(--sans);}
.packed-info{font-size:11px;color:var(--green);font-weight:600;margin-bottom:6px;}

/* ADVANCE ZONE */
.advance-section{margin-top:14px;}
.adv-zone{background:var(--white);border-radius:var(--radius);border:1px solid var(--ink-xsoft);margin-bottom:10px;overflow:hidden;}
.adv-header{padding:10px 16px;background:var(--gold-soft);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #FDE68A;}
.adv-date{font-size:13px;font-weight:700;color:var(--gold);}
.adv-count{font-family:var(--mono);font-size:11px;background:var(--gold);color:#fff;padding:2px 8px;border-radius:10px;}
.adv-body{padding:10px;}

/* EMPTY */
.empty-zone{text-align:center;padding:24px;color:var(--ink-xsoft);font-size:13px;}
.empty-zone .icon{font-size:28px;margin-bottom:6px;}

.zone-d .zone-header{background:#F3F4F6;}
.zone-d .zone-count{background:#6B7280;color:#fff;}
.btn-recall{flex:1;background:#6B7280;color:#fff;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);}
.btn-recall:active{opacity:.8;}
.delivered-info{font-size:11px;color:#6B7280;font-weight:600;margin-bottom:6px;}
</style>
</head>
<body>

<!-- PIN Screen -->
<div id="pinScreen">
  <div class="pin-title">🍳 KITCHEN QUEUE</div>
  <div class="pin-dots" id="pinDots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="pinInput(1)">1</button>
    <button class="pin-btn" onclick="pinInput(2)">2</button>
    <button class="pin-btn" onclick="pinInput(3)">3</button>
    <button class="pin-btn" onclick="pinInput(4)">4</button>
    <button class="pin-btn" onclick="pinInput(5)">5</button>
    <button class="pin-btn" onclick="pinInput(6)">6</button>
    <button class="pin-btn" onclick="pinInput(7)">7</button>
    <button class="pin-btn" onclick="pinInput(8)">8</button>
    <button class="pin-btn" onclick="pinInput(9)">9</button>
    <button class="pin-btn" onclick="pinClear()" style="font-size:16px">⌫</button>
    <button class="pin-btn" onclick="pinInput(0)">0</button>
    <button class="pin-btn" style="opacity:.3">—</button>
  </div>
  <div class="pin-error" id="pinError"></div>
</div>

<!-- Header -->
<div class="header" id="appHeader" style="display:none">
  <div class="hdr-left">
    <div>
      <div class="hdr-title">KQ — KITCHEN QUEUE</div>
      <div class="hdr-sub">UNDER360 · ระบบจัดกล่อง</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="live-dot"></div>
    <span class="last-upd" id="lastUpd">—</span>
    <button class="refresh-btn" onclick="loadOrders()">🔄</button>
  </div>
</div>

<!-- Date Tabs -->
<div class="date-bar" id="dateBar" style="display:none">
  <span style="font-size:12px;color:var(--ink-soft);flex-shrink:0">แสดง:</span>
  <button class="date-tab active" id="dtToday" onclick="setDateView('today',this)">วันนี้</button>
  <button class="date-tab" id="dtTom" onclick="setDateView('tomorrow',this)">พรุ่งนี้</button>
  <button class="date-tab" id="dtAll" onclick="setDateView('all',this)">ทั้งหมด</button>
</div>

<!-- Main Content -->
<div class="main" id="appMain" style="display:none">

  <!-- Zone A + C -->
  <div class="zones">
    <!-- Zone A: ยังไม่จัด -->
    <div class="zone zone-a">
      <div class="zone-header">
        <span>📦 ยังไม่จัด</span>
        <span class="zone-count" id="zoneACount">0</span>
      </div>
      <div class="zone-body" id="zoneA">
        <div class="empty-zone"><div class="icon">✅</div>จัดครบแล้ว!</div>
      </div>
    </div>

    <!-- Zone C: จัดแล้ว -->
    <div class="zone zone-c">
      <div class="zone-header">
        <span>✅ จัดแล้ว รอส่ง</span>
        <span class="zone-count" id="zoneCCount">0</span>
      </div>
      <div class="zone-body" id="zoneC">
        <div class="empty-zone"><div class="icon">📦</div>ยังไม่มีที่จัดแล้ว</div>
      </div>
    </div>
  </div>

  <!-- Zone B: ล่วงหน้า -->
  <div class="advance-section" id="zoneB" style="display:none">
    <div style="font-size:12px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;">📅 จัดล่วงหน้า — รอส่งวันอื่น</div>
    <div id="zoneBContent"></div>
  </div>

  <!-- Zone D: ส่งแล้ว — ดึงกลับได้ -->
  <div class="zone zone-d" style="margin-top:14px;">
    <div class="zone-header">
      <span>🚚 ส่งแล้ว — ดึงกลับได้</span>
      <span class="zone-count" id="zoneDCount">0</span>
    </div>
    <div class="zone-body" id="zoneD">
      <div class="empty-zone"><div class="icon">📭</div>ยังไม่มีออเดอร์ที่ส่งแล้ว</div>
    </div>
  </div>

</div>

<script>
const SB_URL="https://zdartbvhbvqlwzwyyiia.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkYXJ0YnZoYnZxbHd6d3l5aWlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MTY3OTksImV4cCI6MjA5NzM5Mjc5OX0.D41YGH-CuWrVFqcAgXEuhfVTxJ7WY26Xu-PeXBF6LB8";
const PIN="1234";
let sb=null;
function getSB(){try{if(!sb&&typeof supabase!=="undefined")sb=supabase.createClient(SB_URL,SB_KEY);return sb;}catch(e){return null;}}

// ── PIN ──────────────────────────────────────────────────
let pinVal="";
function pinInput(n){
  if(pinVal.length>=4)return;
  pinVal+=n;
  document.getElementById("d"+(pinVal.length-1)).classList.add("filled");
  if(pinVal.length===4){
    if(pinVal===PIN){
      document.getElementById("pinScreen").style.display="none";
      document.getElementById("appHeader").style.display="flex";
      document.getElementById("dateBar").style.display="flex";
      document.getElementById("appMain").style.display="block";
      loadOrders();
      setInterval(loadOrders,30000);
    } else {
      document.getElementById("pinError").textContent="PIN ไม่ถูกต้อง";
      setTimeout(()=>{pinVal="";for(let i=0;i<4;i++)document.getElementById("d"+i).classList.remove("filled");document.getElementById("pinError").textContent="";},1000);
    }
  }
}
function pinClear(){
  if(pinVal.length>0){pinVal=pinVal.slice(0,-1);document.getElementById("d"+pinVal.length).classList.remove("filled");}
}

// ── DATE ─────────────────────────────────────────────────
let dateView="today";
function toISO(d){return d.toISOString().split("T")[0];}
function today(){return toISO(new Date());}
function tomorrow(){var d=new Date();d.setDate(d.getDate()+1);return toISO(d);}
function fmtDate(iso){
  var d=new Date(iso+"T00:00:00");
  return d.toLocaleDateString("th-TH",{weekday:"short",day:"numeric",month:"short"});
}
function setDateView(v,btn){
  dateView=v;
  document.querySelectorAll(".date-tab").forEach(function(b){b.classList.remove("active");});
  btn.classList.add("active");
  loadOrders();
}

// ── LOAD ─────────────────────────────────────────────────
let allOrders=[], allItems=[], allMenus=[];
async function loadOrders(){
  var sb_=getSB();
  if(!sb_){document.getElementById("lastUpd").textContent="offline";return;}
  try{
    var todayStr=today(), tomStr=tomorrow();
    var qOrders=sb_.from("orders").select("*").neq("status","delivered").order("delivery_date").order("time_slot");
    if(dateView==="today") qOrders=qOrders.eq("delivery_date",todayStr);
    else if(dateView==="tomorrow") qOrders=qOrders.eq("delivery_date",tomStr);
    var [rOrders,rItems,rMenus]=await Promise.all([
      qOrders,
      sb_.from("order_items").select("*"),
      sb_.from("menu_items").select("id,code,name,price")
    ]);
    if(rOrders.error) throw rOrders.error;
    allOrders=rOrders.data||[];
    allItems=rItems.data||[];
    allMenus=rMenus.data||[];
    renderAll();
    document.getElementById("lastUpd").textContent=new Date().toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  }catch(e){
    // Fallback mock data for testing
    allOrders=MOCK_ORDERS; allItems=MOCK_ITEMS; allMenus=MOCK_MENUS;
    renderAll();
    document.getElementById("lastUpd").textContent="mock data";
  }
}

function getOrderItems(orderId){
  return allItems.filter(function(i){return i.order_id===orderId;}).map(function(i){
    var m=allMenus.find(function(m){return m.id===i.menu_item_id;})||{code:"—",name:"ไม่พบเมนู"};
    return {code:m.code,name:m.name,qty:i.quantity||1};
  });
}

function detectType(items){
  if(items.some(function(i){return (i.code||"").startsWith("HP")})) return "hp";
  if(items.some(function(i){return (i.code||"").startsWith("LC")})) return "lc";
  return "s";
}

function renderOrderCard(o, zone){
  var items=getOrderItems(o.id);
  var type=detectType(items);
  var isPacked=o.status==="ready";
  var isUrgent=!isPacked && o.delivery_date===today();
  var itemsHtml=items.map(function(i){
    return "<div class='oc-item'><span class='item-code'>"+(i.code||"—")+"</span><span class='item-name'>"+i.name+"</span><span class='item-qty'>×"+i.qty+"</span></div>";
  }).join("");
  if(!itemsHtml) itemsHtml="<div style='font-size:11px;color:var(--ink-xsoft)'>ไม่พบรายการเมนู</div>";

  var noteHtml=o.notes?"<div class='oc-note'>📌 "+o.notes+"</div>":"";
  var packedHtml=isPacked?"<div class='packed-info'>✅ จัดเมื่อ "+(o.updated_at?new Date(o.updated_at).toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"}):"—")+"</div>":"";
  var actionsHtml="";
  if(zone==="A"){
    actionsHtml="<div class='oc-actions'><button class='btn-pack' onclick='markPacked(\""+o.id+"\")'>✅ จัดแล้ว</button></div>";
  } else if(zone==="C"){
    actionsHtml="<div class='oc-actions'><button class='btn-pick' onclick='markPicked(\""+o.id+"\")'>🛵 Messenger หยิบแล้ว</button><button class='btn-unpack' onclick='markUnpack(\""+o.id+"\")'>↩</button></div>";
  } else if(zone==="D"){
    var delivTime=o.updated_at?new Date(o.updated_at).toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"}):"—";
    actionsHtml="<div class='delivered-info'>🚚 ส่งแล้วเมื่อ "+delivTime+"</div>"
      +"<div class='oc-actions'>"
      +"<button class='btn-recall' onclick='markRecall(\""+o.id+"\",\"ready\")' style='background:#3B82F6' title='กลับไปพาแนลจัดแล้ว'>↩ กลับจัดแล้ว</button>"
      +"<button class='btn-recall' onclick='markRecall(\""+o.id+"\",\"confirmed\")' style='background:#F59E0B' title='กลับไปพาแนลยังไม่จัด'>↩↩ กลับไม่จัด</button>"
      +"</div>";
  }

  return "<div class='order-card"+(isUrgent?" urgent":"")+"'>"
    +"<div class='oc-top'><span class='oc-badge "+type+"'>"+(type==="hp"?"HP":type==="lc"?"LC":"S/D")+"</span>"
    +"<div><div class='oc-name'>"+(o.customer_name||"ลูกค้า")+"</div>"
    +"<div class='oc-order'>"+(o.order_number||"—")+"</div>"
    +"<div class='oc-slot'>📅 "+fmtDate(o.delivery_date||"")+" · ⏰ "+(o.time_slot_label||o.time_slot||"—")+"</div>"+"<div class='oc-slot'>📍 "+(o.delivery_address||"—")+"</div></div></div>"
    +"<div class='oc-items'>"+itemsHtml+"</div>"
    +noteHtml+packedHtml+actionsHtml+"</div>";
}

function renderAll(){
  var todayStr=today(), tomStr=tomorrow();
  var targetDate=dateView==="today"?todayStr:dateView==="tomorrow"?tomStr:null;

  var zoneAOrders=allOrders.filter(function(o){
    var onTarget=!targetDate||(o.delivery_date===targetDate);
    return onTarget&&(o.status==="confirmed"||o.status==="preparing");
  });
  var zoneCOrders=allOrders.filter(function(o){
    var onTarget=!targetDate||(o.delivery_date===targetDate);
    return onTarget&&o.status==="ready";
  });
  var zoneBOrders=allOrders.filter(function(o){
    return o.delivery_date>tomStr&&(o.status==="confirmed"||o.status==="preparing");
  });

  // Zone A
  var zA=document.getElementById("zoneA");
  var zACount=document.getElementById("zoneACount");
  zACount.textContent=zoneAOrders.length;
  zA.innerHTML=zoneAOrders.length?zoneAOrders.map(function(o){return renderOrderCard(o,"A");}).join(""):
    "<div class='empty-zone'><div class='icon'>✅</div>จัดครบแล้ว!</div>";

  // Zone C
  var zC=document.getElementById("zoneC");
  var zCCount=document.getElementById("zoneCCount");
  zCCount.textContent=zoneCOrders.length;
  zC.innerHTML=zoneCOrders.length?zoneCOrders.map(function(o){return renderOrderCard(o,"C");}).join(""):
    "<div class='empty-zone'><div class='icon'>📭</div>ยังไม่มีที่จัดแล้ว</div>";

  // Zone D: ส่งแล้ว
  var zoneDOrders=allOrders.filter(function(o){
    var onTarget=!targetDate||(o.delivery_date===targetDate);
    return onTarget&&o.status==="delivered";
  });
  var zD=document.getElementById("zoneD");
  var zDCount=document.getElementById("zoneDCount");
  zDCount.textContent=zoneDOrders.length;
  zD.innerHTML=zoneDOrders.length?zoneDOrders.map(function(o){return renderOrderCard(o,"D");}).join(""):
    "<div class='empty-zone'><div class='icon'>📭</div>ยังไม่มีออเดอร์ที่ส่งแล้ว</div>";

  // Zone B
  var zBSec=document.getElementById("zoneB");
  var zBContent=document.getElementById("zoneBContent");
  if(zoneBOrders.length&&dateView!=="tomorrow"){
    zBSec.style.display="block";
    var byDate={};
    zoneBOrders.forEach(function(o){
      if(!byDate[o.delivery_date])byDate[o.delivery_date]=[];
      byDate[o.delivery_date].push(o);
    });
    var bHtml="";
    Object.keys(byDate).sort().forEach(function(iso){
      var orders=byDate[iso];
      bHtml+="<div class='adv-zone'><div class='adv-header'><span class='adv-date'>📅 ส่ง "+fmtDate(iso)+"</span><span class='adv-count'>"+orders.length+" ออเดอร์</span></div><div class='adv-body'>"+orders.map(function(o){return renderOrderCard(o,"A");}).join("")+"</div></div>";
    });
    zBContent.innerHTML=bHtml;
  } else {
    zBSec.style.display="none";
  }
}

// ── ACTIONS ──────────────────────────────────────────────
async function markPacked(id){
  var sb_=getSB();
  if(sb_){
    await sb_.from("orders").update({status:"ready",updated_at:new Date().toISOString()}).eq("id",id);
  }
  // อัพ mock ด้วย
  var o=allOrders.find(function(x){return x.id===id;});
  if(o){o.status="ready";o.updated_at=new Date().toISOString();}
  renderAll();
}
async function markPicked(id){

async function markRecall(id,targetStatus){

  renderAll();
}
async function markUnpack(id){

  renderAll();
}
