<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Under360 — ข้อมูลลูกค้า</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--forest:#1F4D3A;--forest-soft:#EBF3EF;--gold:#C9973F;--gold-soft:#FDF5E8;--red:#DC2626;--red-soft:#FEF2F2;--ink:#1A1A1A;--ink-soft:#6B7280;--ink-xsoft:#D1D5DB;--bg:#F7F8F6;--white:#fff;--radius:12px;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans Thai',sans-serif;}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100vh;}
.header{background:var(--forest);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;}
.hdr-title{font-family:var(--mono);font-size:16px;font-weight:700;color:#fff;}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.5);}
.back-btn{color:rgba(255,255,255,.7);text-decoration:none;font-size:13px;padding:6px 12px;background:rgba(255,255,255,.1);border-radius:8px;}
.main{padding:20px;max-width:1000px;margin:0 auto;display:grid;grid-template-columns:320px 1fr;gap:16px;}
@media(max-width:700px){.main{grid-template-columns:1fr;}}
.search-box{position:relative;margin-bottom:12px;}
.search-box input{width:100%;padding:10px 14px 10px 36px;border:1px solid var(--ink-xsoft);border-radius:10px;font-size:13px;font-family:var(--sans);background:var(--white);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink-soft);}
.cust-list{display:flex;flex-direction:column;gap:6px;max-height:calc(100vh - 160px);overflow-y:auto;}
.cust-item{background:var(--white);border-radius:10px;padding:12px 14px;cursor:pointer;border:1px solid var(--ink-xsoft);transition:.15s;}
.cust-item:hover{background:var(--forest-soft);border-color:var(--forest);}
.cust-item.active{background:var(--forest-soft);border-color:var(--forest);border-width:2px;}
.ci-name{font-weight:600;font-size:14px;margin-bottom:3px;}
.ci-meta{font-size:11px;color:var(--ink-soft);display:flex;gap:8px;flex-wrap:wrap;}
.tag{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:700;}
.tag-lc{background:#D1FAE5;color:#065F46;}
.tag-hp{background:#DBEAFE;color:#1E40AF;}
.tag-new{background:#FEF3C7;color:#92400E;}
.tag-loyal{background:#EDE9FE;color:#5B21B6;}
.profile{background:var(--white);border-radius:var(--radius);border:1px solid var(--ink-xsoft);overflow:hidden;}
.p-header{background:var(--forest);padding:20px;display:flex;align-items:center;gap:14px;}
.p-avatar{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.p-name{font-size:18px;font-weight:700;color:#fff;}
.p-meta{font-size:12px;color:rgba(255,255,255,.6);}
.p-body{padding:18px;}
.p-section{margin-bottom:18px;}
.p-sec-title{font-size:12px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px;}
.p-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.p-field{background:var(--bg);border-radius:8px;padding:10px 12px;}
.p-field-label{font-size:10px;color:var(--ink-soft);font-weight:600;text-transform:uppercase;margin-bottom:3px;}
.p-field-val{font-size:13px;font-weight:500;}
.pref-tag{display:inline-block;background:var(--red-soft);color:var(--red);padding:3px 8px;border-radius:6px;font-size:11px;margin:2px;}
.history-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--ink-xsoft);font-size:12px;}
.h-date{font-family:var(--mono);font-size:11px;color:var(--ink-soft);width:80px;flex-shrink:0;}
.h-items{flex:1;color:var(--ink-soft);}
.h-total{font-family:var(--mono);font-weight:700;color:var(--forest);}
.empty-profile{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;color:var(--ink-soft);gap:10px;}
</style>
</head>
<body>
<div class="header">
  <div><div class="hdr-title">👥 ข้อมูลลูกค้า</div><div class="hdr-sub">UNDER360 · Customer Management</div></div>
  <a class="back-btn" href="operation_hub.html">← OH</a>
</div>

<div class="main">
  <!-- LEFT: Customer List -->
  <div>
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input id="searchInput" placeholder="ค้นหาชื่อ LINE หรือโทรศัพท์..." oninput="filterCustomers()">
    </div>
    <div class="cust-list" id="custList"></div>
  </div>

  <!-- RIGHT: Profile -->
  <div class="profile" id="profile">
    <div class="empty-profile">
      <div style="font-size:40px">👤</div>
      <div>เลือกลูกค้าเพื่อดูข้อมูล</div>
    </div>
  </div>
</div>

<script>
const SB_URL="https://zdartbvhbvqlwzwyyiia.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkYXJ0YnZoYnZxbHd6d3l5aWlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MTY3OTksImV4cCI6MjA5NzM5Mjc5OX0.D41YGH-CuWrVFqcAgXEuhfVTxJ7WY26Xu-PeXBF6LB8";
let sb=null;
function getSB(){try{if(!sb&&typeof supabase!=="undefined")sb=supabase.createClient(SB_URL,SB_KEY);return sb;}catch(e){return null;}}
function fmtB(n){return "฿"+Number(n||0).toLocaleString();}

// Load customers from Supabase
async function loadCustomersFromSB(){
  var sb_=getSB(); if(!sb_) return;
  try{
    var res=await sb_.from("customers").select("*, orders(total,delivery_date,order_number,status)").order("created_at",{ascending:false});
    if(res.error||!res.data||!res.data.length) return;
    // แปลงเป็น CUSTOMERS format
    window.CUSTOMERS_SB=res.data.map(function(c){
      var orders=c.orders||[];
      var totalSpend=orders.reduce(function(s,o){return s+(o.total||0);},0);
      var lastOrder=orders.length?orders.sort(function(a,b){return b.delivery_date>a.delivery_date?1:-1;})[0].delivery_date:null;
      return {
        id:c.id,name:c.name||c.line_display_name||"ไม่ระบุ",
        line:"@"+(c.line_display_name||"—"),phone:c.phone||"—",
        type:c.tier<=2?"lc":"hp",
        totalOrders:orders.length,totalSpend:totalSpend,
        lastOrder:lastOrder||"—",pref:[],address:c.address||"—",
        subscription:null,loyal:orders.length>=10,new:orders.length<=2,
        history:orders.slice(0,3).map(function(o){return {date:o.delivery_date,items:o.order_number,total:o.total||0};})
      };
    });
    filteredCust=[...window.CUSTOMERS_SB];
    renderList();
  }catch(e){console.error(e);}
}

const CUSTOMERS=[
  {id:"c1",name:"Boom",line:"boom_fitness",phone:"081-234-5678",type:"hp",totalOrders:24,totalSpend:18600,lastOrder:"2026-06-19",pref:["ไม่ทานเนื้อแดง","ไม่ชอบเกาหลี"],address:"สุขุมวิท 39 แขวงคลองตัน",subscription:"HP Monthly รอบ9",loyal:true,new:false},
  {id:"c2",name:"Pete",line:"pete.health",phone:"082-345-6789",type:"hp",totalOrders:12,totalSpend:8400,lastOrder:"2026-06-18",pref:[],address:"ทองหล่อ 15",subscription:"HP Weekly รอบ2",loyal:false,new:false},
  {id:"c3",name:"Frederik",line:"fredrik_bkk",phone:"083-456-7890",type:"hp",totalOrders:8,totalSpend:5600,lastOrder:"2026-06-20",pref:["ไม่ทานเนื้อ"],address:"เอกมัย 10",subscription:"HP Weekly รอบ1",loyal:false,new:false},
  {id:"c4",name:"คุณธัญภา",line:"thanyapa_t",phone:"084-567-8901",type:"hp",totalOrders:3,totalSpend:2100,lastOrder:"2026-06-15",pref:[],address:"ลาดพร้าว 71",subscription:null,loyal:false,new:true},
  {id:"c5",name:"ชมพิสุทธิ์",line:"chom_clean",phone:"085-678-9012",type:"lc",totalOrders:18,totalSpend:11250,lastOrder:"2026-06-19",pref:["ไม่เผ็ด"],address:"อโศก 12",subscription:"LC Weekly รอบ3",loyal:true,new:false},
  {id:"c6",name:"ขวัญชนก",line:"kwanchanok_k",phone:"086-789-0123",type:"lc",totalOrders:31,totalSpend:19375,lastOrder:"2026-06-20",pref:["ขาวไม่เอาข้าวกล้อง","ไม่ผักชี"],address:"นานา 3",subscription:"LC Monthly รอบ2",loyal:true,new:false},
  {id:"c7",name:"พรรณพิไล",line:"punpilay",phone:"087-890-1234",type:"lc",totalOrders:7,totalSpend:4375,lastOrder:"2026-06-17",pref:[],address:"รัชดา 32",subscription:null,loyal:false,new:false},
  {id:"c8",name:"คุณYok",line:"yok_diet",phone:"088-901-2345",type:"lc",totalOrders:15,totalSpend:9375,lastOrder:"2026-06-18",pref:["แพ้กุ้ง"],address:"ลาดกระบัง 18",subscription:"LC Monthly รอบ2",loyal:true,new:false},
  {id:"c9",name:"คุณนุ่น",line:"noon_fit",phone:"089-012-3456",type:"hp",totalOrders:2,totalSpend:1400,lastOrder:"2026-06-10",pref:[],address:"บางนา 25",subscription:null,loyal:false,new:true},
  {id:"c10",name:"คุณเมย์",line:"may_wellness",phone:"090-123-4567",type:"lc",totalOrders:9,totalSpend:5625,lastOrder:"2026-06-19",pref:["ไม่ทานปลา"],address:"สีลม 8",subscription:"LC Weekly รอบ1",loyal:false,new:false},
];
const HISTORY={
  c1:[{date:"2026-06-19",items:"HP01×2, HP04×1",total:495},{date:"2026-06-17",items:"HP02×2, HP07×1",total:495},{date:"2026-06-15",items:"HP01×1, HP09×2",total:495}],
  c6:[{date:"2026-06-20",items:"LC01×3, LC04×2",total:625},{date:"2026-06-18",items:"LC02×2, LC07×1",total:375},{date:"2026-06-16",items:"LC01×2, LC05×1",total:375}],
};

let filteredCust=[...CUSTOMERS];
function filterCustomers(){
  const q=document.getElementById("searchInput").value.toLowerCase();
  var src=window.CUSTOMERS_SB||CUSTOMERS; filteredCust=q?src.filter(c=>c.name.toLowerCase().includes(q)||c.line.toLowerCase().includes(q)||c.phone.includes(q)):src;
  renderList();
}
function renderList(){
  document.getElementById("custList").innerHTML=filteredCust.map(c=>`
    <div class="cust-item" id="ci-${c.id}" onclick="showProfile('${c.id}')">
      <div class="ci-name">${c.name} ${c.loyal?"⭐":""}</div>
      <div class="ci-meta">
        <span class="tag tag-${c.type}">${c.type.toUpperCase()}</span>
        ${c.new?`<span class="tag tag-new">ใหม่</span>`:""}
        ${c.loyal?`<span class="tag tag-loyal">ขาประจำ</span>`:""}
        <span>${c.totalOrders} ออเดอร์</span>
        <span>${fmtB(c.totalSpend)}</span>
      </div>
    </div>`).join("");
}
function showProfile(id){
  const c=CUSTOMERS.find(x=>x.id===id);
  if(!c)return;
  document.querySelectorAll(".cust-item").forEach(el=>el.classList.remove("active"));
  document.getElementById("ci-"+id)?.classList.add("active");
  const hist=HISTORY[id]||[];
  document.getElementById("profile").innerHTML=`
    <div class="p-header">
      <div class="p-avatar">👤</div>
      <div><div class="p-name">${c.name}</div><div class="p-meta">@${c.line} · ${c.phone}</div></div>
    </div>
    <div class="p-body">
      <div class="p-section">
        <div class="p-sec-title">สถิติ</div>
        <div class="p-grid">
          <div class="p-field"><div class="p-field-label">ออเดอร์ทั้งหมด</div><div class="p-field-val" style="font-family:var(--mono);color:var(--forest);font-size:22px">${c.totalOrders}</div></div>
          <div class="p-field"><div class="p-field-label">ยอดรวม</div><div class="p-field-val" style="font-family:var(--mono);color:var(--forest);font-size:22px">${fmtB(c.totalSpend)}</div></div>
          <div class="p-field"><div class="p-field-label">ออเดอร์ล่าสุด</div><div class="p-field-val">${c.lastOrder}</div></div>
          <div class="p-field"><div class="p-field-label">ประเภท</div><div class="p-field-val"><span class="tag tag-${c.type}">${c.type.toUpperCase()}</span></div></div>
        </div>
      </div>
      ${c.subscription?`<div class="p-section"><div class="p-sec-title">Subscription</div><div class="p-field"><div class="p-field-label">คอร์สปัจจุบัน</div><div class="p-field-val">📅 ${c.subscription}</div></div></div>`:""}
      <div class="p-section">
        <div class="p-sec-title">ที่อยู่จัดส่ง</div>
        <div class="p-field"><div class="p-field-label">ที่อยู่</div><div class="p-field-val">📍 ${c.address}</div></div>
      </div>
      ${c.pref.length?`<div class="p-section"><div class="p-sec-title">ข้อจำกัดอาหาร</div><div>${c.pref.map(p=>`<span class="pref-tag">⚠️ ${p}</span>`).join("")}</div></div>`:""}
      <div class="p-section">
        <div class="p-sec-title">ประวัติออเดอร์</div>
        ${hist.length?hist.map(h=>`<div class="history-row"><span class="h-date">${h.date}</span><span class="h-items">${h.items}</span><span class="h-total">${fmtB(h.total)}</span></div>`).join(""):"<div style='font-size:12px;color:var(--ink-soft)'>ยังไม่มีประวัติ</div>"}
      </div>
    </div>`;
}
renderList();
loadCustomersFromSB();
</script>
</body>
</html>
