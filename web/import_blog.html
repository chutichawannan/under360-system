  "title": "วิธีลดต้นขาใหญ่ อย่างยั่งยืนและถาวร! (สาวต้นขาใหญ่ห้ามพลาดน้า)",
  "excerpt": "รวม 8 ท่าบริหารต้นขาด้านนอกและด้านในจาก DanceBody ช่วยลดต้นขาใหญ่ให้เรียวสวยอย่างยั่งยืน พร้อมทานอาหารคลีนควบคู่การออกกำลังกาย",
  "cover_url": "https://static.wixstatic.com/media/9bfc29_0b57f068a18a464eb97b837dbfd6d0ff~mv2.jpg",
  "created_at": "2017-02-26T09:00:00+07:00",
  "content_md": "วิธีลดต้นขาใหญ่ อย่างยั่งยืนและถาวร! (สาวต้นขาใหญ่ห้ามพลาดน้า)\n\nสาวๆหลายคนรวมทั้งตัวพลอยเองมักจะเผชิญปัญหาต้นขาใหญ่ ลดน้ำหนักยังไง ต้นขาก็ยังเป็นส่วนสุดท้ายที่ไขมันหายไปอยู่ดี! วันนี้พลอยเลยมีท่าบริหารต้นขามาแนะนำกันค่ะ ซึ่งท่าเหล่านี้ออกแบบโดย DanceBody creator Katia Pryce นางแบบและนักออกแบบท่าเต้นชื่อดัง\n\n## เริ่มต้นด้วย 4ท่าบริหารสำหรับต้นขาด้านนอก\n\n**1. Two Pumps**\n\nนอนตะแครงข้างโดยใช้ตัวส่วนด้านซ้ายแนบลงกับพื้น ใช้ข้อศอกซ้ายยันพื้นไว้และอุ้มส่วนศรีษะ จากนั้นงอขาซ้ายตามภาพ และเหยียดเท้าขวาออกให้ตรงและยกขาขวาขึ้นลง ขึ้นครั้งแรกเพียงครึ่งนึง ส่วนอีกครั้งขึ้นให้สูงที่สุด โดยทำสลับกันไป ทำทั้งหมด 30 ครั้งต่อข้าง ทั้งหมด 2 เซ็ต\n\n**2. Check Mark**\n\nเริ่มท่าเดียวกับท่าแรก จากนั้นชี้นิ้วหัวแม่โป้งขึ้นไปทางขวาและลากกลับมาตรงสะดือให้เป็นแนวเฉียงดังภาพ พยายามยืดขาขึ้นลงให้ไกลมากที่สุด ทำทั้งหมด 20 ครั้งต่อข้าง ทั้งหมด 2 เซ็ต\n\n**3. Push up legs**\n\nเริ่มท่าเดิมเลยค่ะ โดยต่างกันตรงที่ท่านี้ขาจะขยับจากหน้าไปหลัง โดยยกขาให้เป็นประตูโค้ง ทำทั้งหมด 20 ครั้งต่อข้าง ทั้งหมด 2 เซ็ต\n\n**4. The Burner**\n\nเริ่มต้นท่าเดียวกับท่าแรก โดยทำการงอเข่าขวาเข้ามาหาตัว แล้วเอี้ยวตัวไปด้านหลังพร้อมเอามือขวาแตะพื้นเพื่อให้ร่างกายมีความสมดุล จากนั้นเตะขาไปด้านหลังแบบภาพและนำมือขวากลับมาวางไว้ด้านหน้าลำตัว ทำทั้งหมด 20 ครั้งต่อข้าง ทั้งหมด 2 เซ็ต\n\n## 4 ท่าบริหารสำหรับต้นขาด้านใน\n\n**1. Single Sweep**\n\nตะแคงซ้ายนอนลงกับพื้นเหมือนท่าด้านบน จากนั้นงอหัวเข่าด้านขวาขึ้นมาตั้งฉากกับพื้นวางไว้ด้านหลังขาซ้าย จากนั้นยกขาซ้ายขึ้นให้สูงที่สุด และตอนลงอย่าลงสุดให้เหลือทิ้งไว้ประมาณ 5 เซนติเมตรจากพื้น ทำไป 25 ครั้งต่อข้าง ทั้งหมด 2 เซ็ต\n\n**2. Heel Press**\n\nท่าจะคล้ายๆท่า Single sweep เลยค่ะ แต่ต่างกันยกขาซ้ายขึ้นเหนือพื้น 5-7 เซนติเมตร จากนั้นเตะเข้าเตะออก โดยพยายามให้หัวเข่าชิดหน้าอกมาที่สุดตอนแตะเข้า พยายามอย่าให้ขาตกพื้น ทำไป 25 ครั้งต่อข้าง ทั้งหมด 2 เซ็ต\n\n**3. Combo**\n\nท่าเริ่มต้นเหมือนกันเลยค่ะ จากนั้นนำหัวเข่าซ้ายเข้าหาหน้าอกและเหยียดออกโดยตอนเหยียดให้เหยียดออกไปด้านหน้าของลำตัวและนำกลับมาเป็นรูปตัว L ดังภาพ ทำไป 20 ครั้งต่อข้าง ทั้งหมด 2 เซ็ต\n\n**4. Dancer Lift**\n\nท่านี้เริ่มต้นให้นอนลงกับพื้น จากนั้นยืดขา 2 ข้างชูขึ้นฟ้า และจับขาขวาไว้ให้ชี้ขึ้นฟ้าจากนั้นยกขาซ้ายลงและขึ้น โดยตอนขึ้นยกให้มาแตะถึงขาขวาให้ได้ ทำไปช้าๆทั้งหมด 20 ครั้งต่อข้าง ทั้งหมด 2 เซ็ต\n\n## สรุป\n\nครบแล้วกับท่าบริหารขาให้เรียวสวยค่ะ\n\nใครอยากลด สู้ๆ ค่อยๆทำสลับกับท่าบริหารส่วนอื่นไปด้วยน้า เพื่อให้กล้ามเนื้อผ่อนคลาย\n\nและอย่าลืมทานอาหารคลีนดีดีควบคู่ไปกับการออกกำลังกายด้วยน้า",

  "content_md": "# ประโยชน์ของการวิ่งออกกำลังกาย\n\nปี 2017 แล้วใครยังไม่ได้ไปตรวจสุขภาพหันมาตรวจสุขภาพประจำปีกันนะคะ แต่ใครที่ตรวจแล้ว และผลออกมาว่าเคอเลสเตอรอลสูงเกินเกณฑ์กันบ้าง หมันหาเวลามาออกกำลังกายเพื่อสุขภาพที่แข็งแรงกันดีกว่าจ้า\n\nซึ่งวันนี้แอดมินพลอยขอแนะนำวิธีการออกกำลังกายที่ง่ายที่สุด ไม่ต้องใช้อุปกรณ์อื่นใดมาเป็นตัวช่วย ก็คือการวิ่งนั่นเอง\n\nการวิ่งนั้นดียังไงมาอ่านกันเลยค่ะ\n\n## 1. การวิ่งช่วยป้องกันโรคหัวใจ\n\nเนื่องจากปกติแล้วคนอยู่ดีกินดีแบบเราๆ มักจะทำงานประจำและเหินห่างจากการออกกำลังกาย ดังนั้นมักจะมีไขมันไปจับผนังเส้นเลือด ทำให้เลือดเดินได้ไม่สะดวก และเสี่ยงต่อการเป็น\"โรคหัวใจ\"ได้ โดยอาการนี้อาจเป็นไปอย่างอ่อน ๆ แค่เจ็บตึงหน้าอก หรือเป็นในระดับรุนแรงถึงกับเป็นลมล้มหมดสติ และอาจถึงแก่ชีวิตได้ ซึ่งการวิ่งนั้นทำให้เส้นเลือดที่เลี้ยงหัวใจมีขนาดใหญ่ขึ้นจึงยากที่ไขมันจะอุดตันได้นั่นเอง\n\n## 2. ไขมันในเลือดลดลง\n\nหลายๆโรคที่เกิดขึ้นกับคนรอบตัวอาทิ เคอเลสเตอรอลสูง, ไตกรีเซอไรล์สูง, โรคไขมันอุดตันในเส้นเลือด ฯลฯ มักเกิดจากการที่เรากินของมัน ของทอด เช่น กล้วยแขก ปลาทอด กุ้งชุปแป้งทอด ทอดมัน เป็นประจำ ซึ่งของมัน ของทอดเหล่านี้มีไขมันสูงมาก ทำให้ไขมันสะสมในร่างกายจนไปจับที่ผนังเส้นเลือด ทำให้เกิดโรคต่างๆในที่สุด\n\nซึ่งมีวิจัยมาแล้วว่าการวิ่งเป็นประจำทำให้ระดับไขมันในเลือดลดลง ช่วยลดปัจจัยที่ทให้เกิดโรคร้ายต่างๆได้อย่างมาก\n\n## 3. ความดันเลือดลดลง\n\nยิ่งคนเราสูงอายุขึ้น ก็มักจะมีความดันเลือดสูงขึ้นตามมาเป็นโรคประจำตัวด้วย สาเหตุที่ความดันสูงนั้น ไม่ใช่จะโทษว่าเพราะอายุมากขึ้นอย่างเดียว จริงๆแล้วมันเกิดจากการเสื่อมสภาพของหลอดเลือดในคนที่ไม่ได้ออกกำลังกาย ดังนั้นจึงมีงานวิจัยพบว่าผู้สูงอายุที่ออกกำลังกายเป็นประจำจะมีความดันเลือดปกติเท่าคนหนุ่มสาว\n\n## 4. เบิร์นไขมันส่วนเกินได้อย่างดี\n\nสำหรับผู้ที่ต้องการจะลดความอ้วน นี่คือวิธีออกกำลังที่ดีที่สุดวิธีนึงเลยทีเดียว เพราะการลดความอ้วนนั้นจะต้องมีการ cardio เกิดขึ้น ซึ่งการวิ่งก็คือการ cardio อย่างนึง ดังนั้นยิ่งวิ่งมากเท่าไหร่ไขมันส่วนเกินก็สลายไปมากเท่านั้น พลอยมีข้อแนะนำสำหรับมือใหม่อยากหัดวิ่งมาฝากด้วย\n\n## Tips เริ่มเแรกของการวิ่งสำหรับผู้ที่ไม่เคยออกกำลังกายหนัก\n\nการวิ่งถือเป็นการทรมานร่างกายมาก มักจะหอบเหนื่อยหายใจไม่ออก ดังนั้นการเตรียมตัวคือ ทานอาหารอย่างน้อย 2 ชั่วโมงก่อนวิ่งเพื่อให้มีแรง อย่าดื่มน้ำมากจนเกินไปเพราะจะจุกเสียดได้ และควรเริ่มจากการตั้งเป้าเวลา เช่น ใช้เวลาเป็นตัวตั้ง ที่ 30 นาที โดยเเบ่งเป็นเดินเร็วสลับกับวิ่งจนครบ 30 นาที จากนั้นเมื่อรู้สึกว่า เวลาที่เราตั้งไว้ร่างกายไม่เหนื่อยไม่หอบ ก็ให้เพิ่มระยะเวลาวิ่งเข้าไปให้มากขึ้น จนร่างกายเข้าที่ก็จะสามารถวิ่งต่อเนื่องได้นาน 30 นาทีขึ้นแล้วค่ะ\n\n## สำคัญ\n\nแต่ที่สำคัญวิ่งอย่างเดียวอาจจะไม่พอสำหรับการลดความอ้วน เพราะขืนยังกินอาหารสะเปะสะปะแบบไม่ยั้งอยู่ วิ่งให้ขาขวิดยังไงก็ไม่ผอมน้าต้องหันมาควบคุมอาหารด้วยจ้า\n\nยังไงก็ขอฝากเพจอาหารคลีนเข้าไปพูดคุยสอบถามกันได้เลยน้า",

  "title": "ไขมันทรานส์ ควรเลี่ยง ไม่เสี่ยงชีวิตสั้น",
  "excerpt": "รู้จักไขมันทรานส์ ไขมันร้ายที่เพิ่ม LDL ลด HDL ต้นเหตุโรคหัวใจ/เบาหวาน พร้อมเทคนิคเลือกซื้ออาหารและวิธีสังเกต PHOs บนฉลาก",
  "cover_url": "https://static.wixstatic.com/media/9bfc29_edd973176d864567a7b048fea92b2c84~mv2_d_2917_2500_s_4_2.jpg",
  "created_at": "2018-05-14T09:00:00+07:00",
  "content_md": "สวัสดีค่ะ วันก่อนแม่ค้าได้ส่งภาพปริมาณไขมันทรานส์ในโดนัทมาให้ดู วันนี้เลยขอมาเขียนบทความเกี่ยวกับไขมันทรานส์ให้อ่านเพิ่มเติมกันตามสัญญาค่ะ\n\nใครยังไม่รู้ว่าไขมันมีกี่ชนิด แล้วแต่ละชนิดดีหรือไม่ดีอย่างไร กลับไปอ่านบทความเรื่องไขมันได้ก่อนนะคะ\n\n## ไขมันทรานส์คืออะไร\n\nไขมันทรานส์ (trans fat) เป็นไขมันไม่อิ่มตัว (unsaturated fat) ซึ่งพลอยขอบอกเลยว่าเป็น \"ไขมันที่อันตรายมาก\" เพราะเป็นไขมันร้ายที่ทำให้เกิดโรคหลากชนิด และยังไปทำลายไขมันดีในร่างกายด้วย\n\nอาหารที่มีส่วนประกอบของไขมันทรานส์สังเกตได้ง่ายๆค่ะ เราจะเจอทั้งหมด 2 รูปแบบในชีวิตประจำวัน:\n\n1. ถ้ามาจากธรรมชาติจะมีคุณสมบัติแข็งเป็นไข เจอในเนื้อสัตว์ นม แต่เจอในปริมาณน้อย\n2. ไขมันทรานส์ที่ถูกสังเคราะห์ขึ้นมา ซึ่งมักใช้ในอุตสาหกรรมอาหารอย่างแพร่หลายเพราะช่วยให้อาหารมีอายุที่ยาวนานขึ้น อย่างที่เห็นได้ชัดเจนสุดก็คือ น้ำมันพืชทั่วไปตามท้องตลาด เพราะน้ำมันพืชในปัจจุบันมีการเติมไฮโดรเจนเข้าไปเพื่อทำให้น้ำมันไม่เหม็นหืน เช่น น้ำมันถั่วเหลือง, น้ำมันข้าวโพด, น้ำมันทานตะวัน และที่โดนัทมีไขมันทรานส์เยอะเพราะใช้การทอดแบบชุ่มน้ำมัน\n\n## ผลร้ายจากไขมันทรานส์\n\nการที่เราทานอาหารที่มีไขมันทรานส์มากๆ ส่งผลให้ระดับไขมันเลว (LDL) ให้เลือดเพิ่มสูงขึ้น และลด HDL ไขมันชนิดดีให้ลดลง ทำให้คอเลสเตอรอลในเนื้อเยื่อ และผนังหลอดเลือดมีมากขึ้น ความสามารถในการจับตัวของลิ่มเลือดลดลง การอุดตันของการไหลเวียนเลือดย่อมเพิ่มมากขึ้น และเป็นสาเหตุสำคัญเบื้องต้นที่ทำให้เกิดปัญหาตามมาคือ:\n\n1. น้ำหนักและไขมันส่วนเกินเพิ่มมากขึ้น\n2. มีสภาวการณ์ทำงานของตับผิดปกติ\n3. มีความเสี่ยงสูงที่จะเป็นโรคเบาหวาน โรคความดันโลหิตสูง โรคหัวใจขาดเลือด โรคหลอดเลือดหัวใจตีบ โรคไขมันอุดตันในเส้นเลือด\n\n## ทำไม Trans-fat ถึงยังฮอตฮิตอยู่\n\nต้องเท้าความก่อนว่าก่อนปี พ.ศ 2533 หลายคนไม่รู้ว่าไขมันทรานส์มีโทษต่อร่างกาย ไขมันทรานส์จึงใช้ในอุตสาหกรรมอาหารอย่างแพร่หลาย แต่ต่อมาก็ได้มีงานวิจัยเกิดขึ้นว่า ไขมันทรานส์นี่แหละ เป็นตัวการหลักที่ทำให้คนเจ็บป่วยทั้งโรคหัวใจและ stroke อย่างหลายประเทศ เช่น อเมริกาก็มีกฎหมายควบคุมไขมันทรานส์ออกมาแล้ว\n\n**ส่วนบ้านเราสำนักงานคณะกรรมการอาหารและยาเตรียมประกาศใช้ในราชกิจจานุเบกษาเดือนมิถุนายนนี้ และให้เวลาปรับตัวหลังประกาศใช้ 1 ปี** โดยหากมีการฝ่าฝืน มีบทลงโทษทางอาญาทั้งจำและปรับ ขณะที่ก่อนหน้านี้สหรัฐอเมริกาประกาศใช้กฎดังกล่าว ซึ่งพบสถิติผู้ป่วยโรคไม่ติดต่อเรื้อรังลดลงเป็นจำนวนมาก ซึ่งถือเป็นเรื่องน่ายินดีค่ะ\n\n## เคล็ดลับการเลือกซื้อของ\n\nในเมื่อกว่าจะมีกฎหมายมารองรับอีกเป็นปี พลอยขอมาแบ่งปันเทคนิคนะคะ:\n\n1. ดูแค่คำว่า Trans fat 0% ไม่พออีกต่อไป เพราะบางทีมันอาจจะมาในรูปแบบอื่น ให้สังเกตคำว่า PHOs ย่อมาจาก partially hydrogenated oils น้ำมันที่ผ่านการเติมไฮโดรเจนนั่นเอง\n2. เลือกรับประทานเนื้อสัตว์ที่ไม่ติดหนัง ไขมันต่ำ\n3. เลือกอาหารที่มาจากธรรมชาติ เช่น นมlow fat ปลา ถั่ว\n4. เลือกอาหารที่ผ่านการนึ่ง อบ ย่าง แทนการทอด\n\n## ข้อมูลเพิ่มเติมเกี่ยวกับ Under360\n\n**อาหารทางร้านผ่านทุกข้อเลยค่ะ** ที่สำคัญอาหารคลีนเราใช้น้ำมันรำข้าวในการปรุงอาหารในปริมาณต่ำมากค่ะ แบบเป็นละอองสเปรย์ ที่เลือกใช้เพราะ \"ปราศจากไขมันทรานส์ (Free of trans-fat)\" และมีจุด smoke point สูงช่วยลดความเสี่ยงต่อการได้รับสารก่อมะเร็งที่มีในควันน้ำมัน เรื่องนี้เดี๋ยวมาต่อตอนหน้านะคะ\n\n---\n\n**แท็ก:** อาหารคลีน, ไขมัน\n\n**ที่มาข้อมูล:** http://www.heart.org/HEARTORG/HealthyLiving/Diet-and-Lifestyle-Recommendations",

  "content_md": "# หมูสันใน อาหารคลีน: ตัวช่วยลดน้ำหนักที่อร่อยได้\n\nเคยเบื่อกับการกินอาหารคลีนที่จืดชืดและซ้ำซากจำเจไหมคะ? หรือเคยถูกทักว่า \"กินคลีนแล้วหน้าตาอาหารไม่น่ากินเลย\" บอกเลยว่าถ้าคุณยังไม่ได้ลองใช้ \"หมูสันใน\" มาทำอาหารคลีน คุณกำลังพลาดอะไรไปเยอะมาก! บทความนี้จะพาคุณไปรู้จักกับหมูสันในให้มากขึ้น พร้อมทั้งประโยชน์ต่อสุขภาพ และวิธีการนำมาปรุงเป็นเมนูอาหารคลีนที่ทั้งอร่อยและมีประโยชน์ต่อร่างกาย มาเริ่มกันเลย!\n\n## หมูสันในคืออะไร? ทำไมถึงเหมาะกับอาหารคลีน\n\nหมูสันในเป็นเนื้อส่วนที่อยู่ติดกับกระดูกสันหลังของหมู มีลักษณะเป็นชิ้นยาว สีชมพูอ่อน และที่สำคัญคือมีไขมันน้อยมาก เรียกได้ว่าเป็นส่วนที่มีไขมันน้อยที่สุดในบรรดาเนื้อหมูทั้งหมด ด้วยเหตุนี้ หมูสันในจึงกลายเป็นตัวเลือกยอดนิยมสำหรับคนที่รักสุขภาพและต้องการควบคุมน้ำหนัก\n\n**คุณสมบัติเด่นของหมูสันในที่ทำให้เหมาะกับอาหารคลีน:**\n\n* มีไขมันต่ำ (เพียง 2-3% เท่านั้น)\n* อุดมไปด้วยโปรตีนคุณภาพสูง\n* เนื้อนุ่ม รสชาติกลมกล่อม\n* ปรุงง่าย ดูดซับรสชาติได้ดี\n* หาซื้อได้ง่ายตามซุปเปอร์มาร์เก็ตทั่วไป\n\n## คุณค่าทางโภชนาการของหมูสันใน\n\nเมื่อพูดถึงคุณค่าทางโภชนาการ หมูสันในถือว่าเป็น \"ซูเปอร์ฟู้ด\" ที่คนรักสุขภาพไม่ควรมองข้าม โดยในหมูสันใน 100 กรัม ให้พลังงานเพียงประมาณ 143 กิโลแคลอรี พร้อมด้วยสารอาหารสำคัญต่างๆ ดังนี้:\n\n* โปรตีน: 26 กรัม\n* ไขมัน: 2-3 กรัม\n* คอเลสเตอรอล: 79 มิลลิกรัม\n* โซเดียม: 54 มิลลิกรัม\n* วิตามิน B1, B2, B3, B6, B12\n* แร่ธาตุสำคัญ: เหล็ก, สังกะสี, ฟอสฟอรัส, แมกนีเซียม\n\nนอกจากนี้ หมูสันในยังมีกรดอะมิโนที่จำเป็นต่อร่างกายครบทุกชนิด ซึ่งช่วยในการสร้างและซ่อมแซมกล้ามเนื้อได้เป็นอย่างดี\n\n## ประโยชน์ของหมูสันในต่อสุขภาพและการลดน้ำหนัก\n\nหลายคนอาจสงสัยว่าเนื้อหมูจะดีต่อสุขภาพและช่วยลดน้ำหนักได้จริงหรือ? คำตอบคือ \"ได้\" ถ้าเลือกส่วนที่ถูกต้องและปรุงอย่างเหมาะสม ซึ่งหมูสันในก็คือคำตอบนั่นเอง\n\n**ประโยชน์ของหมูสันในต่อสุขภาพมีมากมาย:**\n\n### 1. ช่วยในการเผาผลาญและลดน้ำหนัก\n\nเนื่องจากอุดมไปด้วยโปรตีนที่ช่วยให้รู้สึกอิ่มนาน ลดความอยากอาหาร และเพิ่มการเผาผลาญพลังงานในร่างกาย\n\n### 2. สร้างและซ่อมแซมกล้ามเนื้อ\n\nโปรตีนในหมูสันในช่วยในการสร้างและซ่อมแซมกล้ามเนื้อ เหมาะสำหรับผู้ที่ออกกำลังกายหรือต้องการเพิ่มมวลกล้ามเนื้อ\n\n### 3. ป้องกันภาวะโลหิตจาง\n\nด้วยปริมาณเหล็กที่สูง หมูสันในจึงช่วยป้องกันภาวะโลหิตจางได้ โดยเฉพาะในผู้หญิงและเด็ก\n\n### 4. บำรุงระบบประสาทและสมอง\n\nวิตามิน B ในหมูสันในมีส่วนสำคัญในการทำงานของระบบประสาทและสมอง ช่วยปรับปรุงความจำและการเรียนรู้\n\n### 5. ส่งเสริมระบบภูมิคุ้มกัน\n\nด้วยสารอาหารที่ครบถ้วน หมูสันในจึงช่วยเสริมสร้างระบบภูมิคุ้มกันให้แข็งแรง ต้านทานโรคได้ดีขึ้น\n\n## เคล็ดลับการเลือกซื้อหมูสันในที่ดีและสด\n\nการเลือกหมูสันในที่ดีเป็นขั้นตอนสำคัญที่จะช่วยให้อาหารของคุณอร่อยและมีประโยชน์มากขึ้น มาดูกันว่ามีเคล็ดลับอะไรบ้าง:\n\n1. **สังเกตสี**: หมูสันในที่ดีควรมีสีชมพูอ่อน ไม่ซีดเกินไปหรือแดงเข้มจนผิดปกติ\n\n2. **ดูความชื้น**: ควรมีความชุ่มชื้นพอดี ไม่แห้งหรือเปียกแฉะจนเกินไป\n\n3. **ตรวจสอบกลิ่น**: หมูสดจะมีกลิ่นอ่อนๆ ไม่มีกลิ่นเหม็นหรือกลิ่นผิดปกติ\n\n4. **สัมผัสเนื้อ**: ควรมีความยืดหยุ่น เมื่อกดแล้วควรคืนตัวกลับมาได้ดี\n\n5. **เลือกซื้อจากแหล่งที่เชื่อถือได้**: ควรซื้อจากร้านที่มีการเก็บรักษาที่ดี มีความสะอาด และมีการหมุนเวียนสินค้าอย่างสม่ำเสมอ\n\n## วิธีเตรียมหมูสันในก่อนนำไปประกอบอาหาร\n\nก่อนจะนำหมูสันในไปปรุงอาหาร การเตรียมที่ถูกต้องจะช่วยให้อาหารของคุณอร่อยและปลอดภัยยิ่งขึ้น ขั้นตอนง่ายๆ ดังนี้:\n\n1. **ล้างให้สะอาด**: ล้างหมูสันในด้วยน้ำสะอาดเพื่อกำจัดสิ่งสกปรกและเชื้อโรคที่อาจติดมากับเนื้อ\n\n2. **ตัดแต่งส่วนเกิน**: ตัดแต่งเส้นเอ็นและไขมันส่วนเกินออก แต่ไม่จำเป็นต้องตัดออกทั้งหมด เพราะไขมันบางส่วนจะช่วยเพิ่มความนุ่มและรสชาติให้กับเนื้อ\n\n3. **เช็ดให้แห้ง**: ใช้กระดาษซับหรือผ้าสะอาดเช็ดให้แห้งก่อนนำไปปรุง\n\n4. **หมักให้เข้าเนื้อ**: หากต้องการหมัก ควรหมักในตู้เย็นอย่างน้อย 30 นาที หรือดีที่สุดคือ 2-4 ชั่วโมง เพื่อให้เครื่องปรุงซึมเข้าเนื้อ\n\n5. **ปรับอุณหภูมิ**: ก่อนนำไปปรุง ควรนำออกจากตู้เย็นและพักไว้ที่อุณหภูมิห้องประมาณ 15 นาที เพื่อให้เนื้อสุกอย่างทั่วถึง\n\n## 3 เมนูอาหารคลีนจากหมูสันในที่อร่อยจากร้าน Under360\n\nมาถึงส่วนที่หลายคนรอคอย นั่นคือเมนูอาหารคลีนจากหมูสันในที่ไม่เพียงแต่ดีต่อสุขภาพ แต่ยังอร่อยถูกปากคนไทยอีกด้วย!\n\n### 1. ข้าวแฮมเบิร์กราดซอสแกงกะหรี่\n\nแฮมเบิร์กปั้นก้อนเนื้ออกไก่ ผสมสันในหมู ย่างสุกพร้อมเสริฟ ทานคู่กับซอสแกงกะหรี่เนื้อนุ่มทานง่ายมากค่ะ\n\n### 2. บะหมี่ผักหมูกระเทียม\n\nบะหมี่ผักลวก เสริฟพร้อมเมนูสันในหมูกระเทียมสูตรคลีนๆ ทานง่ายหอมกลิ่นหมูกระเทียมสุดๆ\n\n### 3. เส้นหมี่ก๋วยเตี๋ยวหลอดหมูสับทรงเครื่อง\n\nเส้นหมี่ก๋วยเตี๋ยวหลอดหมูสับทรงเครื่องใช้เป็นสันในหมู เป็นเมนูอาหารจีน-ไทยที่นำเส้นหมี่หรือเส้นก๋วยเตี๋ยวหลอดมาคลุกเคล้ากับหมูสับ ปรุงรสด้วยซอสเข้มข้น และใส่เครื่องต่าง ๆ เช่น เต้าหู้ เห็ด\n\n## เทคนิคการปรุงหมูสันในให้อร่อยแบบคลีนๆ\n\nการทำอาหารคลีนไม่ได้หมายความว่าอาหารจะต้องจืดชืดและไม่มีรสชาติ เพียงแค่รู้เทคนิคในการปรุง หมูสันในของคุณก็จะอร่อยได้โดยไม่ต้องพึ่งน้ำมันหรือเครื่องปรุงที่ไม่ดีต่อสุขภาพมากเกินไป\n\n### 1. ใช้สมุนไพรแทนเกลือ\n\nการใช้สมุนไพรต่างๆ เช่น ออริกาโน โรสแมรี่ ไทม์ หรือสมุนไพรไทยอย่างใบมะกรูด ตะไคร้ จะช่วยเพิ่มกลิ่นหอมและรสชาติโดยไม่ต้องใช้เกลือมาก\n\n### 2. เลือกวิธีปรุงที่ดีต่อสุขภาพ\n\nวิธีการปรุงที่แนะนำสำหรับอาหารคลีน ได้แก่ การย่าง, นึ่ง, ต้ม, อบ หรือผัดแบบใช้น้ำมันน้อย แทนการทอดหรือผัดแบบใช้น้ำมันมาก\n\n### 3. ใช้น้ำมันที่ดีต่อสุขภาพ\n\nเลือกใช้น้ำมันมะกอก, น้ำมันรำข้าว, หรือน้ำมันคาโนลา ซึ่งมีไขมันที่ดีต่อสุขภาพมากกว่าน้ำมันทั่วไป\n\n### 4. ความสำคัญของการหมัก\n\nการหมักหมูสันในก่อนนำไปปรุงจะช่วยให้เนื้อนุ่มและรสชาติซึมเข้าเนื้อมากขึ้น แม้จะใช้เครื่องปรุงน้อยก็ตาม\n\n### 5. ปรุงเสร็จแล้วพักให้นาน\n\nหลังปรุงสุก ควรพักหมูสันในไว้สักครู่ก่อนตัดหรือรับประทาน เพื่อให้น้ำในเนื้อกระจายตัวสม่ำเสมอ ทำให้เนื้อนุ่มและฉ่ำน้ำมากขึ้น\n\n## ข้อควรระวังในการรับประทานหมูสันใน\n\nแม้หมูสันในจะเป็นเนื้อที่ดีต่อสุขภาพ แต่ก็ยังมีข้อควรระวังบางประการที่ควรคำนึงถึง:\n\n1. **ปริมาณการบริโภค**: แม้จะเป็นเนื้อที่มีไขมันต่ำ แต่ก็ไม่ควรรับประทานมากเกินไป ปริมาณที่เหมาะสมคือประมาณ 100-150 กรัมต่อมื้อ\n\n2. **ระวังการปรุงสุก**: ควรปรุงให้สุกทั่วถึง เพื่อป้องกันเชื้อโรคที่อาจมีในเนื้อหมู\n\n3. **เลือกซื้อจากแหล่งที่เชื่อถือได้**: เพื่อให้มั่นใจว่าเนื้อหมูปลอดภัยและมีคุณภาพดี\n\n4. **ข้อระวังสำหรับผู้ที่มีโรคประจำตัว**: ผู้ที่มีโรคเกาต์หรือกรดยูริกสูงควรรับประทานในปริมาณที่จำกัด\n\n5. **ความหลากหลายในการรับประทาน**: ไม่ควรรับประทานหมูสันในเพียงอย่างเดียว ควรหมุนเวียนแหล่งโปรตีนอื่นๆ ด้วย เช่น ไก่, ปลา, ไข่, หรือโปรตีนจากพืช\n\n## สรุป: หมูสันใน ตัวช่วยสำคัญสำหรับคนรักสุขภาพ\n\nหมูสันในเป็นส่วนที่ดีที่สุดของเนื้อหมูสำหรับผู้ที่ต้องการดูแลสุขภาพและควบคุมน้ำหนัก ด้วยปริมาณไขมันที่ต่ำและโปรตีนที่สูง จึงเหมาะอย่างยิ่งสำหรับการนำมาประกอบอาหารคลีน\n\nหมูสันในไม่เพียงแต่มีประโยชน์ต่อสุขภาพเท่านั้น แต่ยังสามารถนำมาประกอบอาหารได้หลากหลายเมนู ทั้งอาหารไทยและต่างประเทศ โดยยังคงความอร่อยไว้ได้อย่างครบถ้วน\n\nการเลือกวัตถุดิบที่ดีและวิธีการปรุงที่เหมาะสมจะช่วยให้มื้ออาหารของคุณไม่เพียงแต่ดีต่อสุขภาพ แต่ยังอร่อยถูกปากอีกด้วย ลองนำหมูสันในมาเป็นส่วนหนึ่งในเมนูอาหารประจำวันของคุณ และคุณจะพบว่าการกินคลีนนั้นไม่ได้น่าเบื่ออย่างที่คิด!\n\n## มาเริ่มเปลี่ยนสุขภาพของคุณด้วยหมูสันในกันเถอะ!\n\n**อยากสุขภาพดี ชีวิตเปลี่ยน ต้องลอง \"เมนูที่ทำด้วยหมูสันในจากร้าน Under360\"**\n\n* คลิกสั่งซื้อเลย\n* สมัครสมาชิกได้รับส่วนลด 50 บาท สำหรับลูกค้าใหม่",

  "content_md": "การลดน้ำหนักด้วยการทานอาหารคลีน: วิธีง่ายๆ สู่สุขภาพที่ดีกว่า\n=============================================================\n\nหลายคนมักมองว่าการลดน้ำหนักเป็นเรื่องยาก ต้องทรมานตัวเอง อดอาหาร หรือทำตามสูตรสำเร็จที่เห็นผลเร็วแต่ไม่ยั่งยืน แต่จริงๆ แล้ว การลดน้ำหนักที่ได้ผลและยั่งยืนคือการปรับเปลี่ยนไลฟ์สไตล์และนิสัยการกินอย่างค่อยเป็นค่อยไป วันนี้เราจะมาพูดถึงวิธีลดน้ำหนักที่ทั้งได้ผลและดีต่อสุขภาพ นั่นคือ \"การทานอาหารคลีน\" มาดูกันว่าอาหารคลีนคืออะไร มีประโยชน์อย่างไร และจะเริ่มต้นทานอาหารคลีนได้อย่างไรบ้าง\n\n### อาหารคลีนคืออะไร? ทำไมถึงช่วยลดน้ำหนักได้\n\nอาหารคลีน (Clean Eating) คือการรับประทานอาหารที่ผ่านการแปรรูปน้อยที่สุด เน้นอาหารธรรมชาติ สด ใหม่ และมีคุณค่าทางโภชนาการสูง หลีกเลี่ยงอาหารที่มีสารปรุงแต่ง น้ำตาล เกลือ และไขมันทรานส์ในปริมาณสูง\n\nอาหารคลีนช่วยลดน้ำหนักได้เพราะ:\n\n* มีแคลอรี่ต่ำกว่าอาหารแปรรูป\n* อุดมไปด้วยใยอาหารที่ช่วยให้อิ่มนาน\n* ไม่มีน้ำตาลและคาร์โบไฮเดรตที่ทำให้น้ำตาลในเลือดพุ่งสูง\n* มีสารอาหารที่จำเป็นต่อการเผาผลาญพลังงาน\n* ช่วยลดการสะสมของไขมันและน้ำในร่างกาย\n\n### ประโยชน์ของการทานอาหารคลีนนอกเหนือจากการลดน้ำหนัก\n\nการทานอาหารคลีนไม่เพียงแต่ช่วยในเรื่องการลดน้ำหนักเท่านั้น แต่ยังมีประโยชน์อื่นๆ อีกมากมาย ได้แก่:\n\n1. **ช่วยให้ผิวพรรณสดใส** - อาหารคลีนอุดมไปด้วยวิตามินและแร่ธาตุที่จำเป็นต่อสุขภาพผิว\n\n2. **เพิ่มพลังงานให้ร่างกาย** - ช่วยให้รู้สึกกระปรี้กระเปร่า ไม่ง่วงหรือเหนื่อยล้า\n\n3. **ช่วยระบบย่อยอาหารทำงานได้ดีขึ้น** - ลดอาการท้องอืด ท้องเฟ้อ และท้องผูก\n\n4. **ช่วยเสริมสร้างภูมิคุ้มกัน** - อาหารคลีนมีสารต้านอนุมูลอิสระและวิตามินที่ช่วยเสริมภูมิคุ้มกัน\n\n5. **ลดความเสี่ยงต่อโรคเรื้อรัง** - เช่น โรคหัวใจ เบาหวาน และความดันโลหิตสูง\n\n6. **ช่วยให้นอนหลับได้ดีขึ้น** - การทานอาหารที่ดีต่อสุขภาพช่วยให้คุณภาพการนอนดีขึ้น\n\n7. **ช่วยเสริมสร้างกล้ามเนื้อ** - โปรตีนคุณภาพดีช่วยในการซ่อมแซมและเสริมสร้างกล้ามเนื้อ\n\n### หลักการพื้นฐานของการทานอาหารคลีน\n\nการทานอาหารคลีนมีหลักการพื้นฐานที่ไม่ยากและสามารถปรับใช้ได้ในชีวิตประจำวัน ดังนี้:\n\n#### 1. เลือกอาหารที่ไม่ผ่านการแปรรูป หรือแปรรูปน้อยที่สุด\n\n* **ผักและผลไม้สด** - เน้นความหลากหลายของสีเพื่อให้ได้วิตามินและแร่ธาตุที่แตกต่างกัน\n\n* **เนื้อสัตว์ไขมันต่ำ** - อกไก่, ปลา, เนื้อวัวเลี้ยงด้วยหญ้า\n\n* **ไข่** - แหล่งโปรตีนคุณภาพดีและมีวิตามินหลายชนิด\n\n* **ธัญพืชไม่ขัดสี** - ข้าวกล้อง, ข้าวโอ๊ต, คินัว\n\n* **ถั่วและเมล็ดพืช** - อัลมอนด์, เมล็ดเจีย, เมล็ดแฟลกซ์\n\n* **นมและผลิตภัณฑ์จากนมไขมันต่ำ** - นมพร่องมันเนย, โยเกิร์ตกรีกไม่ปรุงแต่งรส\n\n#### 2. หลีกเลี่ยงอาหารและเครื่องดื่มที่มีสารปรุงแต่งและสารเคมี\n\n* อาหารแปรรูป เช่น ไส้กรอก, แฮม, เบคอน\n\n* ขนมขบเคี้ยว, ขนมหวาน, ช็อคโกแลต\n\n* น้ำอัดลม, เครื่องดื่มชูกำลัง, น้ำผลไม้ปรุงแต่ง\n\n* อาหารกึ่งสำเร็จรูป, อาหารแช่แข็งพร้อมรับประทาน\n\n* ซอสปรุงรสที่มีน้ำตาลและโซเดียมสูง\n\n#### 3. ปรุงอาหารด้วยวิธีที่ดีต่อสุขภาพ\n\n* **นึ่ง** - วิธีการปรุงอาหารที่รักษาสารอาหารได้ดีที่สุด\n\n* **ต้ม** - เหมาะสำหรับซุปและแกงที่มีน้ำซุปเป็นส่วนประกอบ\n\n* **อบ** - ใช้น้ำมันน้อยและรักษารสชาติได้ดี\n\n* **ย่าง** - ให้รสชาติดีโดยไม่ต้องใช้น้ำมันมาก\n\n* **ผัดแบบใช้น้ำมันน้อย** - ใช้น้ำมันมะกอกหรือน้ำมันมะพร้าวในปริมาณน้อย\n\n#### 4. ดื่มน้ำให้เพียงพอ\n\nการดื่มน้ำในปริมาณที่เพียงพอ (ประมาณ 2-3 ลิตรต่อวัน) มีความสำคัญอย่างมากต่อการลดน้ำหนักและสุขภาพโดยรวม เพราะ:\n\n* ช่วยในการขับถ่ายของเสีย\n* ช่วยให้รู้สึกอิ่มและลดความอยากอาหาร\n* ช่วยในการเผาผลาญไขมัน\n* ลดการกินเกินและการกินจุกจิก\n\n### เมนูอาหารคลีนง่ายๆ สำหรับมือใหม่จากร้าน Under360\n\nการเริ่มต้นทานอาหารคลีนไม่จำเป็นต้องยุ่งยากหรือใช้วัตถุดิบที่หายาก นี่คือเมนูง่ายๆ ที่คุณสามารถหาซื้อทานได้เอง:\n\n#### มื้อเช้า\n\n* **ข้าวสะโพกไก่ตุ๋นเกาลัด**\n\n* **ต้มยำปลากระพง+ข้าว**\n\n#### มื้อกลางวัน\n\n* **ข้าวอบหน้าไก่กุนเชียง**\n\n* **บะหมี่ผักหมูกระเทียม**\n\n#### มื้อเย็น\n\n* **เส้นหมี่ก๋วยเตี๋ยวหลอดหมูสับทรงเครื่อง**\n\n* **ข้าวผัดกิมจิอกไก่**\n\n#### ของว่าง\n\n* ผลไม้สด\n\n* ถั่วและเมล็ดพืชคั่ว (ไม่เติมเกลือหรือน้ำตาล)\n\n* โยเกิร์ตกรีกกับน้ำผึ้งนิดหน่อย\n\n* ผักสดจิ้มกับฮัมมัส\n\n### เทคนิคการทานอาหารคลีนให้ประสบความสำเร็จ\n\n1. **เริ่มต้นทีละน้อย** - ไม่จำเป็นต้องเปลี่ยนนิสัยการกินทั้งหมดในคราวเดียว เริ่มจากการเปลี่ยนแปลงเล็กๆ น้อยๆ ก่อน\n\n2. **วางแผนมื้ออาหารล่วงหน้า** - จัดเตรียมอาหารสำหรับทั้งสัปดาห์เพื่อหลีกเลี่ยงการกินอาหารนอกบ้านหรืออาหารจานด่วน\n\n3. **อ่านฉลากอาหาร** - เรียนรู้ที่จะเข้าใจส่วนประกอบและคุณค่าทางโภชนาการ\n\n4. **ทานอาหารให้ช้าลงและใส่ใจ** - รับรู้ถึงความอิ่มและความพึงพอใจจากอาหาร\n\n5. **ทานอาหารในปริมาณที่เหมาะสม** - ควบคุมขนาดของมื้ออาหาร ไม่ทานจนอิ่มเกินไป\n\n6. **ให้รางวัลตัวเอง** - เมื่อทำได้ตามเป้าหมาย อาจให้รางวัลตัวเองด้วยสิ่งอื่นที่ไม่ใช่อาหาร\n\n7. **ไม่อดอาหาร** - การทานอาหารคลีนไม่ใช่การอดอาหาร ควรทานให้ครบทั้ง 3 มื้อและอาจมีอาหารว่าง 1-2 มื้อต่อวัน\n\n### วิธีเริ่มต้นทานอาหารคลีนสำหรับผู้เริ่มต้น\n\n1. **ทำความสะอาดตู้เย็นและตู้เก็บอาหาร** - กำจัดอาหารแปรรูปและขนมขบเคี้ยวที่ไม่ดีต่อสุขภาพ\n\n2. **เขียนรายการอาหารที่ต้องซื้อ** - เน้นวัตถุดิบสด โปรตีนคุณภาพดี และธัญพืชไม่ขัดสี\n\n3. **เรียนรู้วิธีการปรุงอาหารพื้นฐาน** - เรียนรู้วิธีการนึ่ง ต้ม อบ ย่าง\n\n4. **จัดเตรียมอาหารล่วงหน้า** - สละเวลา 1-2 ชั่วโมงในวันหยุดเพื่อเตรียมอาหารสำหรับวันทำงาน\n\n5. **ค่อยๆ ปรับเปลี่ยน** - เริ่มจากการเปลี่ยนแปลง 1-2 มื้อต่อวัน แล้วค่อยๆ เพิ่มขึ้น\n\n6. **หาแรงบันดาลใจ** - ดูเมนูอาหารคลีนต่างๆ ทางออนไลน์ หรือซื้อหนังสือทำอาหารคลีน\n\n7. **เข้าร่วมกลุ่มหรือชุมชนออนไลน์** - แลกเปลี่ยนประสบการณ์และเรียนรู้จากผู้อื่น\n\n### คำถามที่พบบ่อยเกี่ยวกับการทานอาหารคลีนเพื่อลดน้ำหนัก\n\n**ทานอาหารคลีนแล้วจะลดน้ำหนักได้เร็วแค่ไหน?**\n\nการลดน้ำหนักที่ดีและปลอดภัยควรลดประมาณ 0.5-1 กิโลกรัมต่อสัปดาห์ ซึ่งการทานอาหารคลีนร่วมกับการออกกำลังกายจะช่วยให้ลดน้ำหนักได้อย่างมีประสิทธิภาพและยั่งยืน\n\n**ต้องงดอาหารที่ชอบทั้งหมดเลยหรือไม่?**\n\nไม่จำเป็น สามารถมี \"วันโกง\" (Cheat Day) หรือ \"มื้อโกง\" (Cheat Meal) ได้ประมาณสัปดาห์ละ 1 ครั้ง แต่ควรทานในปริมาณที่พอเหมาะ\n\n**ทานอาหารคลีนแล้วรู้สึกหิวบ่อย ควรทำอย่างไร?**\n\nควรเพิ่มโปรตีนและไฟเบอร์ในแต่ละมื้อ และอาจแบ่งมื้ออาหารเป็นมื้อเล็กๆ วันละ 5-6 มื้อแทน 3 มื้อใหญ่\n\n**จำเป็นต้องทานอาหารออร์แกนิคเท่านั้นหรือไม่?**\n\nไม่จำเป็น อาหารออร์แกนิคอาจมีราคาแพง สามารถเลือกวัตถุดิบทั่วไปที่สด สะอาด และมีคุณภาพดีได้\n\n**ควรทานคาร์โบไฮเดรตหรือไม่?**\n\nควรทาน แต่เลือกคาร์โบไฮเดรตเชิงซ้อน เช่น ข้าวกล้อง, ขนมปังโฮลเกรน, มันฝรั่ง, มันเทศ แทนคาร์โบไฮเดรตเชิงเดี่ยวจากแป้งขัดขาวและน้ำตาล\n\n### สรุป: การทานอาหารคลีนคือกุญแจสู่การลดน้ำหนักอย่างยั่งยืน\n\nการลดน้ำหนักด้วยการทานอาหารคลีนไม่ใช่แค่การไดเอทชั่วคราว แต่เป็นการปรับเปลี่ยนวิถีชีวิตเพื่อสุขภาพที่ดีในระยะยาว การเลือกรับประทานอาหารที่มีประโยชน์ต่อร่างกาย ไม่ผ่านการแปรรูป และเต็มไปด้วยสารอาหารจะช่วยให้คุณไม่เพียงแค่ลดน้ำหนักได้เท่านั้น แต่ยังรู้สึกกระปรี้กระเปร่า สดชื่น และมีพลังงานมากขึ้น\n\nการเริ่มต้นอาจจะยากในช่วงแรก แต่เมื่อคุณผ่านช่วงปรับตัวไปได้ คุณจะพบว่าการทานอาหารคลีนเป็นเรื่องง่ายและสนุกกว่าที่คิด คุณจะเริ่มรู้สึกถึงการเปลี่ยนแปลงในร่างกาย พลังงานที่เพิ่มขึ้น และสุขภาพที่ดีขึ้น\n\n### พร้อมเริ่มต้นเปลี่ยนแปลงตัวเองด้วยอาหารคลีนแล้วหรือยัง?\n\nหากคุณรู้สึกว่าถึงเวลาที่ต้องดูแลสุขภาพและรูปร่างของตัวเองอย่างจริงจังแล้ว เริ่มต้นง่ายๆ ด้วยการปรับเปลี่ยนอาหารในมื้อถัดไปของคุณให้เป็นอาหารคลีน! ลองทำตามคำแนะนำในบทความนี้ วางแผนมื้ออาหารของคุณล่วงหน้า และเริ่มต้นการเดินทางสู่สุขภาพที่ดีกว่าตั้งแต่วันนี้",

  "content_md": "\"ปวยเล้ง\" หรือเรียกอีกชื่อว่า \"ผักกาดขาวปลี\" เป็นผักที่คนไทยคุ้นเคยกันเป็นอย่างดี โดยเฉพาะในเทศกาลกินเจหรือมื้ออาหารจีน แต่คุณรู้หรือไม่ว่าผักชนิดนี้มีประโยชน์มากมายต่อสุขภาพ? วันนี้เราจะพาคุณไปรู้จักกับประโยชน์หลากหลายของปวยเล้ง ที่นอกจากจะอร่อยแล้ว ยังดีต่อร่างกายอย่างคาดไม่ถึง!\n\n### ปวยเล้งคืออะไร?\n\nปวยเล้ง (Chinese Cabbage) หรือผักกาดขาวปลี มีชื่อวิทยาศาสตร์ว่า Brassica rapa subsp. pekinensis เป็นผักตระกูลกะหล่ำที่มีลักษณะเป็นใบซ้อนกันเป็นหัว มีสีขาวอมเขียวอ่อน ใบนอกจะมีสีเขียวเข้มกว่าใบด้านใน เนื้อกรอบ รสชาติหวานอ่อนๆ นิยมนำมาประกอบอาหารได้หลากหลาย ทั้งผัด ต้ม แกง หรือกินสด\n\nปวยเล้งเป็นผักที่ปลูกได้ดีในอากาศเย็น นิยมปลูกในประเทศแถบเอเชียตะวันออก เช่น จีน เกาหลี ญี่ปุ่น และได้แพร่หลายมาสู่ประเทศไทยผ่านวัฒนธรรมการทำอาหารของชาวจีนโพ้นทะเล\n\n### คุณค่าทางโภชนาการของปวยเล้ง\n\nก่อนจะเข้าสู่ประโยชน์ของปวยเล้ง มาดูคุณค่าทางโภชนาการกันก่อน:\n\n- ปวยเล้ง 100 กรัม ให้พลังงานเพียง 12-15 แคลอรี\n- อุดมไปด้วยวิตามินซี วิตามินเค วิตามินบี6 และวิตามินเอ\n- มีแร่ธาตุสำคัญ เช่น แคลเซียม โพแทสเซียม และฟอสฟอรัส\n- มีใยอาหารสูง\n- มีสารต้านอนุมูลอิสระหลายชนิด\n\n### 10 ประโยชน์ของปวยเล้งที่น่าทึ่ง\n\n#### 1. ช่วยเสริมภูมิคุ้มกัน\n\nปวยเล้งมีวิตามินซีสูง ซึ่งเป็นวิตามินสำคัญที่ช่วยเสริมสร้างภูมิคุ้มกันให้กับร่างกาย การรับประทานปวยเล้งเป็นประจำจะช่วยให้ร่างกายแข็งแรง ต้านทานโรคได้ดีขึ้น โดยเฉพาะในช่วงที่มีการระบาดของโรคต่างๆ\n\n#### 2. ดีต่อระบบย่อยอาหาร\n\nใยอาหารในปวยเล้งช่วยกระตุ้นการทำงานของระบบย่อยอาหาร ช่วยให้ระบบขับถ่ายทำงานได้ดี ป้องกันอาการท้องผูก นอกจากนี้ ความชุ่มชื้นตามธรรมชาติของปวยเล้งยังช่วยเพิ่มความชุ่มชื้นในลำไส้ ทำให้การขับถ่ายสะดวกยิ่งขึ้น\n\n#### 3. ช่วยควบคุมน้ำหนัก\n\nด้วยปริมาณแคลอรีที่ต่ำแต่มีใยอาหารสูง ปวยเล้งจึงเป็นอาหารที่เหมาะสำหรับผู้ที่ต้องการควบคุมน้ำหนัก การรับประทานปวยเล้งจะช่วยให้อิ่มท้องได้นาน แต่ให้พลังงานน้อย ช่วยลดความอยากอาหารและการรับประทานอาหารมากเกินไป\n\n#### 4. ช่วยลดความเสี่ยงของโรคมะเร็ง\n\nปวยเล้งมีสารกลูโคซิโนเลต (Glucosinolates) ซึ่งเป็นสารที่พบในผักตระกูลกะหล่ำ งานวิจัยพบว่าสารนี้มีคุณสมบัติในการต้านมะเร็ง โดยเฉพาะมะเร็งลำไส้ใหญ่ มะเร็งปอด และมะเร็งกระเพาะอาหาร\n\n#### 5. บำรุงผิวพรรณ\n\nวิตามินซีและวิตามินเอในปวยเล้งมีส่วนสำคัญในการบำรุงผิวพรรณ วิตามินซีช่วยในการสร้างคอลลาเจน ทำให้ผิวเต่งตึง ลดเลือนริ้วรอย ส่วนวิตามินเอช่วยให้ผิวชุ่มชื้น ไม่แห้งกร้าน รวมถึงช่วยซ่อมแซมเซลล์ผิวที่เสียหาย\n\n#### 6. ช่วยลดความดันโลหิต\n\nโพแทสเซียมในปวยเล้งช่วยควบคุมสมดุลของเกลือแร่ในร่างกาย ซึ่งมีผลต่อการรักษาระดับความดันโลหิตให้อยู่ในเกณฑ์ปกติ การรับประทานอาหารที่มีโพแทสเซียมสูงอย่างปวยเล้งเป็นประจำ จะช่วยลดความเสี่ยงของโรคความดันโลหิตสูงได้\n\n#### 7. บำรุงกระดูกและฟัน\n\nแคลเซียมและวิตามินเคในปวยเล้งมีความสำคัญต่อการสร้างและบำรุงกระดูกและฟัน วิตามินเคช่วยในการดูดซึมแคลเซียมไปใช้ในการสร้างมวลกระดูก ป้องกันโรคกระดูกพรุน ส่วนแคลเซียมช่วยให้กระดูกและฟันแข็งแรง\n\n#### 8. ช่วยบำรุงสายตา\n\nปวยเล้งมีวิตามินเอและลูทีน (Lutein) ซึ่งเป็นสารอาหารที่มีความสำคัญต่อการบำรุงสายตา ลูทีนช่วยป้องกันการเสื่อมของจอประสาทตา และลดความเสี่ยงของโรคต้อกระจก ส่วนวิตามินเอช่วยในการมองเห็นในที่มืด\n\n#### 9. ช่วยต้านการอักเสบ\n\nสารต้านอนุมูลอิสระในปวยเล้งมีคุณสมบัติในการต้านการอักเสบ ช่วยลดอาการอักเสบในร่างกาย บรรเทาอาการปวดข้อ และช่วยฟื้นฟูร่างกายหลังการเจ็บป่วย หรือการออกกำลังกายอย่างหนัก\n\n#### 10. ช่วยล้างพิษในร่างกาย\n\nปวยเล้งมีคุณสมบัติเป็นผักเย็น มีความชุ่มชื้นสูง และมีสารที่ช่วยในการขับสารพิษออกจากร่างกาย โดยเฉพาะการล้างพิษในตับและไต ช่วยให้ร่างกายกำจัดของเสียได้อย่างมีประสิทธิภาพ\n\n### วิธีเลือกซื้อและเก็บรักษาปวยเล้ง\n\nการเลือกซื้อปวยเล้งที่ดีควรดูจาก:\n\n- หัวแน่น ใบซ้อนกันแน่นหนา\n- ใบเขียวสด ไม่มีรอยช้ำหรือเหี่ยว\n- ก้านใบสีขาวสะอาด ไม่มีรอยดำ\n- น้ำหนักเหมาะสมกับขนาด (หัวที่แน่นจะมีน้ำหนักมากกว่า)\n\nวิธีเก็บรักษาปวยเล้งให้สดนาน:\n\n1. ล้างให้สะอาดและตากให้แห้ง\n2. ห่อด้วยกระดาษซับน้ำหรือผ้าสะอาด\n3. เก็บในถุงพลาสติกเจาะรูหรือกล่องพลาสติกที่มีฝาปิด\n4. แช่ในช่องเย็นของตู้เย็น สามารถเก็บได้นาน 5-7 วัน\n\n### เมนูอาหารจากปวยเล้งที่น่าลอง\n\nปวยเล้งสามารถนำไปประกอบอาหารได้หลากหลาย เช่น:\n\n1. **ปวยเล้งผัดน้ำมันหอย** - เมนูง่ายๆ ที่ให้รสชาติกลมกล่อม อร่อย และได้คุณค่าทางอาหารครบถ้วน\n\n2. **แกงจืดปวยเล้งหมูสับ** - เมนูซุปใสที่อุดมไปด้วยวิตามินและแร่ธาตุ เหมาะสำหรับผู้ป่วยหรือผู้ที่ต้องการอาหารเบาๆ\n\n3. **ปวยเล้งต้มซีอิ๊ว** - เมนูเพื่อสุขภาพ รสชาตินุ่มนวล มีกลิ่นหอมเฉพาะตัว\n\n4. **ปวยเล้งห่อหมู** - นำปวยเล้งมาห่อหมูสับที่ปรุงรสแล้ว นำไปนึ่งให้สุก รับประทานกับน้ำจิ้มซีฟู้ด\n\n5. **สลัดปวยเล้ง** - หั่นปวยเล้งเป็นชิ้นเล็กๆ คลุกกับน้ำสลัดรสเปรี้ยวหวาน เพิ่มความกรุบกรอบด้วยถั่วลิสงคั่ว\n\n### ใครควรระวังในการรับประทานปวยเล้ง?\n\nแม้ว่าปวยเล้งจะมีประโยชน์มากมาย แต่มีบางกลุ่มที่ควรระวังในการรับประทาน:\n\n- ผู้ที่มีปัญหาเกี่ยวกับไทรอยด์ เนื่องจากผักตระกูลกะหล่ำมีสารกอยโตรเจน (Goitrogen) ซึ่งอาจรบกวนการทำงานของต่อมไทรอยด์หากรับประทานในปริมาณมาก\n\n- ผู้ที่ใช้ยาต้านการแข็งตัวของเลือด (Warfarin) ควรระวังการรับประทานปวยเล้งปริมาณมาก เนื่องจากวิตามินเคในปวยเล้งอาจลดประสิทธิภาพของยา\n\n- ผู้ที่มีอาการท้องอืด ท้องเฟ้อง่าย อาจต้องระวังการรับประทานปวยเล้งดิบจำนวนมาก เพราะอาจทำให้มีแก๊สในกระเพาะอาหารและลำไส้เพิ่มขึ้น\n\n### มาเริ่มต้นดูแลสุขภาพด้วยปวยเล้งกันเถอะ!\n\nวันนี้คุณอยากลองนำปวยเล้งมาปรุงอาหารแล้วหรือยัง? ลองหาปวยเล้ง จากตลาดหรือจากร้าน Under360\n\n- สมัครสมาชิกได้รับส่วนลด 50 บาท สำหรับลูกค้าใหม่\n- คลิกสั่งซื้อเลย",

  "excerpt": "รวม 7 กลุ่มอาหารช่วยเร่งการเผาผลาญและเบิร์นไขมัน ตั้งแต่โปรตีนสูง แร่ธาตุบำรุงไทรอยด์ พริก กาแฟ ชาเขียว บลูเบอร์รี่ ไปจนถึงพืชตระกูลถั่ว",

  "content_md": "# 7 อาหารลดน้ำหนัก ช่วยเบิร์นไขมัน ที่ต้องรู้ไว้\n\nลูกค้าของร้านเป็นสายสุขภาพ แต่รู้ไหมคะว่ามีอาหารกลุ่มนึงที่ช่วยเร่งการเผาผลาญได้เป็นอย่างดี ยิ่งกิน ยิ่งดีต่อสุขภาพ ช่วยให้น้ำหนักยิ่งลด แม่ค้าอยากให้หันมาทานแทนขนมคบเคี้ยวกันจ้า\n\n## 1. อาหารที่มีโปรตีนสูง\n\nอาหารที่มีโปรตีนสูง ได้แก่ อกไก่ เนื้อ ปลา ไข่ไก่ และถั่วจะช่วยเพิ่มอัตราการเผาผลาญได้อย่างดีภายในไม่กี่ชั่วโมงหลังรับประทาน เพราะการกินอาหารที่มีโปรตีนสูง ต้องใช้พลังงานจากร่างกายมาช่วยย่อยมากขึ้น หรือใช้พลังาน TEF มากขึ้นนั่นเอง\n\n**TEF คืออะไร?** คือพลังงาน ที่เราต้องใช้ในการย่อย ดูดซึม และสะสมอาหาร ซึ่งเราจะใช้พลังงานนี้ประมาณ 10% ของพลังงานที่ร่างกายเราเผาผลาญในหนึ่งวัน ทั้งนี้ประเภทของอาหารก็มีส่วนสำคัญในการใช้พลังงาน\n\n**จากวิจัยพบว่า 3 สารอาหารหลักมีการใช้พลังงานในการย่อย ดูดซึมและสะสมที่แตกต่างกันดังนี้**\n- คาร์โบไฮเดรต: 5–10%\n- ไขมัน: 0–3%\n- โปรตีน: 20–30%\n\nจะเห็นว่าโปรตีนใช้พลังงานในการเผาผลาญ ย่อย และดูดซึมมากที่สุดในอาหารหลักทั้ง 3 ประเภท นี่คือหนึ่งในหลายสาเหตุที่ว่า การเพิ่มปริมาณโปรตีนในแต่ละมื้อจะช่วยซ่อมแซมและสร้างกล้ามเนื้อแล้ว ยังช่วยลดไขมันได้ดีอีกด้วย\n\n## 2. อาหารที่มีธาตุเหล็ก ซิงค์ ซิลิเนียมสูง\n\nสามสารอาหารนี้เป็นสารหลักที่ช่วยในเรื่องการทำงานของต่อมไทรอยด์ที่มีหน้าที่สร้างฮอร์โมนไทรอยด์ ซึ่งทำหน้าที่ในการเผาผลาญให้เกิดพลังงานเพื่อใช้ในชีวิตประจำวัน เรียกได้ว่าหากขาดแร่ธาตุ 3 ตัวนี้ไปอาจจะไปลดการทำงานของต่อมไทรอยด์จนส่งผลให้ระบบเผาผลาญไม่ดีก็เป็นได้ ดังนั้นอาหารทีมีแร่ธาตุ 3 ชนิดนี้อยู่เยอะได้แก่\n\n- อาหารที่มีซีลีเนียมสูง: ปลาทูน่า เนื้อวัว เมล็ดทานตะวัน เห็ด เครื่องในสัตว์ และถั่วเหลือง\n- อาหารที่มีสังกะสีสูง: เนื้อวัว เนื้อแกะ หอยนางรม ปลาซาร์ดีน ถั่วเหลือง ถั่ววอลนัท และเมล็ดทานตะวัน ธัญพืชต่าง ๆ\n- อาหารที่มีธาตุเหล็กสูง: เครื่องในสัตว์ หอยนางรม ผักโขม ถั่วเหลือง ถั่วขาว และเมล็ดฟักทอง\n\n## 3. พริก\n\nแคปไซซิน (Capsaicin) เป็นสารที่อยู่ในพริกให้พริกมีรสเผ็ดร้อน ผลการวิจัยในประเทศญี่ปุ่นพบว่า \"สารแคปไซซินช่วยลดการอยากอาหาร และเร่งการเผาผลาญได้\"\n\n## 4. กาแฟ\n\nจากผลการศึกษาพบว่าคาเฟอีนที่อยู่ในกาแฟช่วยเพิ่มอัตราการเผาผลาญได้เพิ่มขึ้นถึง 11% และจาก 6 ผลการทดลองพบว่าคนที่ดื่มกาแฟแล้วได้รับคาเฟอีนเข้าสู่ร่างกายขั้นต่ำ 270mg ต่อวัน หรือเท่ากับกาแฟดำประมาณ 3 แก้ว ช่วยเบิร์นแคลลอรี่ได้เพิ่มขึ้นถึงวันละ 100kcal/วัน\n\nจากการศึกษาพบว่าเบิร์นแคลได้จริง แต่จะตาค้างไหม แม่ค้าไม่รับประกันนะคะ 555 แต่อยากแนะนำว่าถ้าดื่ม ขอเป็นกาแฟดำ ดีต่อสุขภาพที่สุดค่ะ\n\n## 5. ชาเขียว\n\nนักวิจัยเค้าพิสูจน์มาแล้วค่ะว่าคนออกกำลังกายที่ดื่มชาเขียว 4 แก้วต่อวัน เป็นระยะเวลา 3 เดือน จะมีไขมันรอบเอวน้อยกว่าคนที่ไม่ได้ดื่ม เพราะในชาเขียวมีสารโพลีฟีนอล EGCG (Epigallocatechin gallate) ซึ่งช่วยกระตุ้นระบบเผาผลาญได้โดยตรง อยากผอมไปหาชาเขียวมาดื่มๆ ด่วนๆ แต่แนะนำว่าต้องเป็นชาเขียวแท้ ไม่ผสมน้ำเชื่อม น้ำตาลค่ะ เช่น ชาเขียวฟูจิ ชาเขียว Itoen\n\n## 6. บลูเบอร์รี่\n\nผลไม้ชนิดนี้อุดมไปด้วยสารต้านอนุมูลอิสระ มีส่วนช่วยเร่งอัตราการเผาผลาญไขมัน อีกทั้งยังเอื้อต่อการเจริญเติบโตของกระดูก ที่สำคัญยังช่วยต้านอนุมูลอิสระ ตัวการสำคัญของภาวะสะสมไขมันเลยล่ะ\n\n## 7. พืชตระกูลถั่ว\n\nถั่วชนิดต่างๆ เช่น ถั่วลูกไก่ ถั่วเลนทิล ถั่วลิสง ถั่วจำพวกนี้จะให้โปรตีนสูง ซึ่งช่วยดึงอัตราการเผาผลาญของร่างกายให้เพิ่มมากขึ้น อีกทั้งจากการศึกษาพบว่ากลุ่มคนที่ทานอาหารตระกูลถั่วเป็นหลักในมื้ออาหาร ช่วยเพิ่มอัตราการเผาผลาญและลดน้ำหนักได้ดีกว่ากลุ่มคนที่ไม่ได้ทานถึง 1.5 เท่า เนื่องจากกลุ่มพืชตระกูลถั่วมีใยอาหารสูง เช่นใยอาหารชนิดละลายน้ำ ซึ่งเป็นอาหารที่ดีของแบคทีเรียดีในกะเพราะอาหาร และแบคทีเรียพวกนี้คายกรดไขมันสายสั้นออกมาทำให้ดึงไขมันสะสมออกมาใช้ได้เพิ่มมากขึ้น\n\nรู้แล้วพรุ่งนี้รีบติด 1 ใน อาหารเหล่านี้เป็นของทานเล่นแทนขนมคบเคี้ยวกันค่ะ\n\nสอบถามข้อมูลในการทนอาหารกับแอดมินได้ตลอดที่ Line @under360 นะคะ",

  "excerpt": "รู้จักอาหารคลีนอย่างละเอียด พร้อม 10 เหตุผลที่ควรกิน วิธีเริ่มต้น เมนูแนะนำ และวิธีรับมือความท้าทาย เพื่อสุขภาพที่ดีในระยะยาว",

  "created_at": "2025-04-07T09:00:00+07:00",
  "content_md": "## ทำไมถึงต้องกินอาหารคลีน: คู่มือฉบับสมบูรณ์เพื่อสุขภาพที่ดีขึ้น\n\nสวัสดีเพื่อน ๆ ทุกคน! คุณเคยได้ยินคำว่า \"อาหารคลีน\" บ่อยแค่ไหน? ในยุคที่ผู้คนให้ความสำคัญกับสุขภาพมากขึ้น คำนี้กลายเป็นเทรนด์ฮิตที่เราไม่สามารถมองข้ามได้ แต่อาหารคลีนคืออะไรกันแน่? และทำไมเราถึงควรใส่ใจกับมันด้วย? บทความนี้จะพาคุณไปทำความรู้จักกับอาหารคลีนอย่างละเอียด พร้อมเหตุผลที่ทำให้มันเป็นตัวเลือกที่ดีสำหรับทุกคน\n\n### อาหารคลีนคืออะไร?\n\nอาหารคลีน ไม่ได้หมายถึงอาหารที่ล้างสะอาดเท่านั้นนะ! 😄 แต่หมายถึงอาหารที่ผ่านการแปรรูปน้อยที่สุด ไม่มีสารเคมี สารกันบูด หรือวัตถุเจือปนอาหารที่ไม่จำเป็น เป็นอาหารที่อยู่ในรูปแบบธรรมชาติมากที่สุด เช่น ผัก ผลไม้สด เนื้อสัตว์ที่ไม่ผ่านการแปรรูป ธัญพืชไม่ขัดสี และไขมันดีจากธรรมชาติ\n\nการกินอาหารคลีนไม่ใช่แค่ \"ไดเอท\" แบบชั่วคราว แต่เป็นการปรับเปลี่ยนวิถีการกินที่สมดุลและยั่งยืน เพื่อสุขภาพในระยะยาว\n\n### 10 เหตุผลที่คุณควรกินอาหารคลีน\n\n#### 1. ช่วยควบคุมน้ำหนักได้อย่างมีประสิทธิภาพ\n\nการกินอาหารคลีนช่วยให้คุณควบคุมแคลอรี่ได้ง่ายขึ้น เพราะอาหารธรรมชาติมักมีแคลอรี่ต่ำกว่าอาหารแปรรูป แต่อุดมไปด้วยสารอาหารที่จำเป็น ทำให้คุณรู้สึกอิ่มนานและลดความอยากอาหารระหว่างมื้อ\n\n#### 2. เพิ่มพลังงานให้ร่างกาย\n\nอาหารคลีนให้พลังงานที่สะอาดและยั่งยืนแก่ร่างกาย ไม่เหมือนอาหารที่มีน้ำตาลสูงที่อาจทำให้พลังงานขึ้นๆ ลงๆ การกินอาหารคลีนจะช่วยให้คุณรู้สึกกระปรี้กระเปร่าตลอดทั้งวัน ไม่มีอาการง่วงนอนหลังมื้ออาหาร\n\n#### 3. ช่วยเสริมสร้างระบบภูมิคุ้มกัน\n\nอาหารที่อุดมไปด้วยวิตามิน แร่ธาตุ และสารต้านอนุมูลอิสระจากธรรมชาติช่วยเสริมสร้างระบบภูมิคุ้มกันให้แข็งแรง ลดความเสี่ยงต่อการเจ็บป่วย และช่วยให้ร่างกายฟื้นตัวเร็วขึ้นหากมีการติดเชื้อ\n\n#### 4. ปรับปรุงสุขภาพผิว\n\nสารอาหารสำคัญในอาหารคลีน โดยเฉพาะวิตามินซี วิตามินอี และโอเมก้า-3 มีส่วนช่วยในการบำรุงผิวพรรณให้เปล่งปลั่ง ชะลอการเกิดริ้วรอย และลดการอักเสบที่อาจก่อให้เกิดปัญหาผิว เช่น สิว และผื่นต่างๆ\n\n#### 5. ลดความเสี่ยงต่อโรคเรื้อรัง\n\nการกินอาหารคลีนช่วยลดความเสี่ยงต่อโรคเรื้อรังหลายชนิด เช่น โรคหัวใจ เบาหวาน ความดันโลหิตสูง และมะเร็งบางชนิด การลดการบริโภคอาหารแปรรูป น้ำตาล และไขมันทรานส์ มีผลดีต่อสุขภาพในระยะยาวอย่างมาก\n\n#### 6. เพิ่มประสิทธิภาพในการทำงานของสมอง\n\nอาหารคลีนที่มีโอเมก้า-3 วิตามินบี และสารต้านอนุมูลอิสระ ช่วยเพิ่มประสิทธิภาพในการทำงานของสมอง ปรับปรุงความจำ และช่วยป้องกันภาวะสมองเสื่อม โดยเฉพาะปลา ถั่ว เมล็ดพืช และผักใบเขียวเข้ม\n\n#### 7. ช่วยในการย่อยและดูดซึมสารอาหาร\n\nอาหารคลีนมักมีใยอาหารสูง ซึ่งช่วยในการย่อยอาหารและการขับถ่าย ลดปัญหาท้องผูก และช่วยให้ร่างกายดูดซึมสารอาหารได้ดีขึ้น นอกจากนี้ยังช่วยเสริมสร้างจุลินทรีย์ที่ดีในลำไส้\n\n#### 8. ยกระดับคุณภาพการนอนหลับ\n\nเมื่อคุณกินอาหารที่มีคุณค่าทางโภชนาการสูง ร่างกายจะทำงานได้อย่างมีประสิทธิภาพมากขึ้น รวมถึงการควบคุมฮอร์โมนที่เกี่ยวข้องกับการนอนหลับ ทำให้คุณนอนหลับได้ลึกและฟื้นฟูพลังงานได้ดีขึ้น\n\n#### 9. ช่วยลดการอักเสบในร่างกาย\n\nอาหารแปรรูป น้ำตาล และไขมันไม่ดีสามารถกระตุ้นการอักเสบในร่างกาย ซึ่งเป็นสาเหตุของโรคต่างๆ อาหารคลีนโดยเฉพาะผักและผลไม้ที่มีสีสันสดใส มีคุณสมบัติต้านการอักเสบที่ช่วยปกป้องเซลล์จากความเสียหาย\n\n#### 10. สร้างความสัมพันธ์ที่ดีกับอาหาร\n\nการกินอาหารคลีนไม่ใช่แค่เรื่องของการกินเพื่อสุขภาพ แต่ยังช่วยให้คุณมีความสัมพันธ์ที่ดีกับอาหาร เข้าใจว่าอาหารคือเชื้อเพลิงและยาของร่างกาย การตระหนักถึงคุณค่าของอาหารจะช่วยให้คุณมีพฤติกรรมการกินที่สมดุลและเป็นมิตรกับตัวเองมากขึ้น\n\n### เริ่มต้นกินอาหารคลีนอย่างไร?\n\nการปรับเปลี่ยนมาสู่การกินอาหารคลีนไม่จำเป็นต้องทำแบบหักดิบ คุณสามารถเริ่มจากขั้นตอนเล็กๆ ต่อไปนี้:\n\n1. **เพิ่มผัก ผลไม้ในทุกมื้อ** - แทรกผักเข้าไปในทุกมื้ออาหาร และกินผลไม้เป็นของว่างแทนขนมขบเคี้ยว\n\n2. **ลดอาหารแปรรูป** - หลีกเลี่ยงอาหารที่มีส่วนผสมยาวเหยียด และเลือกอาหารที่มีส่วนผสมน้อยชิ้นที่คุณรู้จัก\n\n3. **ดื่มน้ำเปล่าให้เพียงพอ** - แทนที่เครื่องดื่มที่มีน้ำตาลสูงด้วยน้ำเปล่า น้ำสมุนไพร หรือชาไม่หวาน\n\n4. **เลือกธัญพืชไม่ขัดสี** - ข้าวกล้อง ขนมปังโฮลเกรน พาสต้าโฮลเกรน มีใยอาหารและสารอาหารมากกว่าธัญพืชขัดสี\n\n5. **ปรุงอาหารเอง** - การทำอาหารทานเองช่วยให้คุณควบคุมส่วนผสมได้และลดการใช้สารปรุงแต่งที่ไม่จำเป็น\n\n### เมนูอาหารคลีนจากร้าน Under360 ที่แสนอร่อย\n\nการกินอาหารคลีนไม่ได้หมายความว่าต้องกินอาหารจืดชืดไร้รสชาติ! ลองเมนูทางร้าน Under360 ได้เลย!:\n\n* **บะหมี่ผักบะช่อเด้งอกไก่สุกี้** - บะหมี่ผักลวก สูตรนี้เฮ๊ลตี้ ทานคู่กับเนื้ออกไก่ปั้นก้อนคล้ายลูกชิ้นทำเป็นบะช่อ ราดด้วยน้ำจิ้มสูกี้สุตรเด็ดของทางร้านพร้อมทาน\n\n* **เส้นหมี่หมูย่างน้ำยำ** - เส้นหมี่ขาวลวก เสริฟพร้อมกับเนื้อสันในหมูไร้มัน อบย่าง ทานคู่กับน้ำยำแสนอร่อยแบบคลีนๆ\n\n* **หมี่เตี๊ยวผัดพริกเผาฟองเต้าหู้ไก่ฉีก** - เส้นหมี่เตี๊ยววสไตล์จีนๆ ผัดคลุกเค้ากับพริกเผา พร้อมเครื่องเคียงผักและเห้ดหอม เสริฟพร้อมอกไก่ฉีกเส้นแนะนำอร่อยถูกใจแน่นอน\n\n* **ข้าวสะโพกไก่ตุ๋นเกาลัด** - สะโพกไก่ตุ๋นด้วยสูตรลับของที่ร้าน+ด้วยเกาลัดตุ๋นรวมกันทานง่ายเมนูนี้หอมอรอ่ยทานแล้วติดใจเสริฟพร้อมข้าวไรซ์เบอร์รี่แสนอร่อย\n\n### ความท้าทายและวิธีรับมือ\n\nการเปลี่ยนแปลงพฤติกรรมการกินอาจมีความท้าทาย เฉพาะอย่างยิ่งในช่วงแรก นี่คือปัญหาที่พบบ่อยและวิธีรับมือ:\n\n* **ความอยากอาหาร** - จัดเตรียมของว่างคลีนไว้ล่วงหน้า เช่น ถั่ว ผลไม้ โยเกิร์ต\n\n* **ไม่มีเวลาทำอาหาร** - วางแผนและเตรียมอาหารล่วงหน้าในวันหยุด\n\n* **รับประทานนอกบ้าน** - ศึกษาเมนูก่อนไป และอย่ากลัวที่จะขอปรับเปลี่ยนอาหารตามความต้องการ\n\n* **ค่าใช้จ่าย** - เลือกซื้อผักผลไม้ตามฤดูกาล และใช้โปรตีนราคาประหยัด เช่น ไข่ ถั่ว\n\n### เริ่มต้นวันนี้เพื่อสุขภาพที่ดีขึ้น!\n\nการกินอาหารคลีนไม่ใช่แค่เทรนด์ชั่วคราว แต่เป็นการลงทุนระยะยาวให้กับสุขภาพของคุณ เริ่มจากขั้นตอนเล็กๆ และค่อยๆ ปรับเปลี่ยนไปทีละนิด คุณจะสังเกตเห็นความเปลี่ยนแปลงทั้งด้านร่างกายและจิตใจ\n\n**คุณพร้อมที่จะเปลี่ยนแปลงชีวิตด้วยอาหารคลีนหรือยัง?**",

  "excerpt": "รู้จักปลาแซลมอน แหล่งโปรตีนคุณภาพสูงและโอเมก้า 3 พร้อมวิธีเลือก ปรุง และเมนูช่วยควบคุมน้ำหนักแบบง่ายๆ",

  "created_at": "2025-03-27T09:00:00+07:00",
  "content_md": "# ปลาแซลมอน: ซูเปอร์ฟู้ดเพื่อสุขภาพที่คุณควรรู้จัก\n\n## ทำไมปลาแซลมอนถึงเป็นอาหารคลีนสุดปัง?\n\nใครบ้างที่ยังไม่รู้จักปลาแซลมอน? อาหารสุดพิเศษที่จะมาพลิกชีวิตคนรักสุขภาพให้ง่ายขึ้น! เรามาดูกันว่าทำไมปลาแซลมอนถึงเป็นตัวเลือกสุดเจ๋งสำหรับคนที่อยากมีสุขภาพดีแบบง่ายๆ\n\n### คุณประโยชน์ทางโภชนาการที่น่าทึ่ง\n\nปลาแซลมอนเป็นแหล่งโปรตีนคุณภาพสูงที่มาพร้อมกับกรดไขมันโอเมก้า 3 ซึ่งเป็นประโยชน์ต่อร่างกายมากมาย ไม่ว่าจะเป็น:\n\n* การบำรุงสมอง ช่วยเพิ่มประสิทธิภาพการทำงานของระบบประสาท\n\n* สนับสนุนการลดอักเสบในร่างกาย\n\n* เสริมสร้างระบบภูมิคุ้มกัน\n\n* ช่วยดูแลหัวใจให้แข็งแรง\n\n## วิธีเลือกและเตรียมปลาแซลมอนให้ได้คุณภาพสูงสุด\n\n### การเลือกปลาแซลมอนคุณภาพ\n\n1. เลือกปลาแซลมอนสดที่มีสีชมพูสดใส\n\n2. ถ้าเป็นปลาแช่แข็ง ให้เลือกแบบที่ไม่มีน้ำแข็งเกาะ\n\n3. ควรเลือกปลาที่มาจากแหล่งเพาะเลี้ยงที่มีคุณภาพ\n\n### เทคนิคการปรุงเพื่อรักษาสารอาหาร\n\n* อบ: วิธีที่ดีที่สุดในการรักษาคุณค่าทางโภชนาการ\n\n* ย่าง: ช่วยให้รสชาติดีโดยไม่ต้องเติมน้ำมันมาก\n\n* นึ่ง: เหมาะสำหรับคนรักสุขภาพ\n\n## ปลาแซลมอนกับการควบคุมน้ำหนัก\n\nเชื่อไหมว่าปลาแซลมอนสามารถช่วยคุณลดน้ำหนักได้? โปรตีนสูงและไขมันดีช่วยให้อิ่มนาน ลดความอยากอาหาร และเร่งการเผาผลาญ\n\n### เมนูลดน้ำหนักด้วยปลาแซลมอน\n\n* ข้าวแซลมอนซอสกะเพราเห็ดออรินจิ\n\n* ข้าวปลาแซลมอนสมุนไพรลุยสวน\n\n* ข้าวญี่ปุ่นอบสาหร่าย แซลมอน\n\n* ข้าวลาบแซลมอน\n\n## ข้อควรระวังในการบริโภค\n\nแม้ปลาแซลมอนจะดีต่อสุขภาพ แต่ควรระมัดระวังเรื่อง:\n\n* ปริมาณการบริโภค (สัปดาห์ละ 2-3 ครั้ง)\n\n* เลือกปลาที่ปลอดสารปนเปื้อน\n\n* คนท้อง เด็ก และผู้สูงอายุควรปรึกษาแพทย์\n\n👉 อยากมีสุขภาพดีแบบง่ายๆ เริ่มวันนี้กับปลาแซลมอนสักจานจากร้าน Under360 เลย!\n\nรับประกันว่าคุณจะตกหลุมรักการทานปลาแซลมอนอย่างแน่นอน 🐟✨",

  "content_md": "## ท่าบริหารหน้าอกให้ใหญ่ อัพไซส์ง่ายๆ\n\nมีบทความอาหารคลีนมามากแล้ว วันนี้พลอยขอนำเสนอเทคนิคอัพไซส์ให้ตู้มขึ้นง่ายๆ ไม่ต้องพึ่งมีดหมอค่า โดยสิ่งที่แนะนำจะเป็นบทความท่าบริหารหน้าอกและการเลือกทานอาหารค่ะ\n\nเริ่มต้นด้วยหลักการทางวิทยศาสตร์ว่าทำไมการออกกำลังกายช่วยอัพไซส์หน้าอกได้\n\nจากภาพจะเห็นว่าบริเวณหน้าอกของผู้หญิงไม่ได้มีแค่ไขมันอย่างเดียวอย่างที่เข้าใจกัน แต่ช่วงบนของหน้าอกจะมีกล้ามเนื้อส่วนอกด้วย ซึ่งการบริหารร่างกายท่าดังต่อไปนี้ ช่วยทำให้กล้ามเนื้อกระชับ ได้รูป สวยงามค่า แต่ไม่ต้องกลัวนะคะ ผู้หญิงเล่นบ่อยๆก็ไม่บึก ไม่ถึกค่ะ เพราะมวลกล้ามเนือเราไม่เหมือนกล้ามอกผู้ชาย\n\n### ท่าบริหารเพิ่มไซส์หน้าอก (Bust Exercise)\n\n#### 1. ท่า Push-Ups\n\nเป็นท่าเบสิคของการกระชับกล้ามเนื้ออก\n\nโดยวางฝ่ามือทั้งสองข้างบนพื้น/เสื่อโยคะ เท้าเหยียดตรง และยกร่างกายเราลงโดยงอข้อศอก และยกร่างกายของเรากลับขึ้นมา โดยหากรู้สึกว่ายากไป ทำไม่ได้ ให้ใช้นิ้วโป้งเท้าช่วยในการยกตัวขึ้นลงค่ะ\n\nLink ท่าที่ถูกต้อง https://www.youtube.com/watch?v=IODxDxX7oi4\n\n#### 2. ท่า Wall Push-Ups\n\nเป็นท่าที่คล้ายกับท่าแรก แต่จะง่ายกว่ามากๆ ใครไม่ชอบท่าแรก หันมาฝึกจากท่านี้ก่อนได้น้า โดยท่าทุกอย่างเหมือนกับท่า Push-Ups ข้อแรกหมดเลย ต่างกันตรงที่ยกตัวขึ้น-ลงจากกำแพงแทนจากพื้นค่ะ\n\nLink ท่าที่ถูกต้อง https://www.youtube.com/watch?v=YB0egDzsu18\n\n#### 3. ท่า Bench Press\n\nท่านี้เป็นท่าที่จำเป็นมากสำหรับการบริหารหน้าอกของสาวๆ แต่จำเป็นต้องมีอุปกรณ์นิดส์นึงนะคะ อุปกรณ์ที่ต้องเตรียม ได้แก่ ดัมเบลประมาณ 2kg 2ข้าง และ stability ball/เก้าอี้ โดยนอนหงายเอาหลังหนุนกับบอล งอเข่า 90องศากับพื้น จากนั้น ถือดัมเบลทั้งสองข้าง หน้าตรงมองที่ดัมเบล จากนั้นยกดัมเบลขึ้น-ลง จากหน้าอกจนกระทั่งแขนเหยียดตรง\n\nLink ท่าที่ถูกต้อง https://www.youtube.com/watch?v=69uOj5XCuUw\n\n#### 4. Tricep Dips\n\nเป็นท่าที่สาวๆคู่ควรที่สุด!! เพราะนอกจากจะช่วยอัพไซส์หน้าอกได้แล้ว ยังช่วยในเรื่องของไขมันใต้ท้องแขนอีกด้วยค่าา (เห็นมั้ย ว่าคู่ควรกับเรา)\n\nโดยท่านี้มีอุปกรณ์เป็นเก้าอี้ / ม้านั่ง โดยใช้ฝ่ามือทั้งสองขาเกะาขอบไว้ให้แน่นตามภาพ ข่าเหยียด และยกตัวขึ้นลงโดยที่ให้แขนอยู่ที่เดิม\n\nLink ท่าที่ถูกต้อง https://www.youtube.com/watch?v=0326dy_-CzM\n\n#### 5. Dumbbell Flys\n\nอีกท่ายอดฮิตของสาวอยากอกโต 5555 โดยใช้อุปกรณ์เป็นดัมเบล 1-2 kg 2 ข้าง โดยนอนหงายไปกับเสื่อโยคะ จากนั้นงกเข้าขึ้น และยกแขนขึ้นลง โดยมีหลักคือเปิดแขนให้กว้างไว้ค่า\n\nLink ท่าที่ถูกต้อง https://www.youtube.com/watch?v=tJ2kaO29NDM\n\n## สรุปการออกกำลังกาย\n\nโดย 5 ท่านี้แหละที่อยากแนะนำให้ทำสลับกับ body weight ท่าอื่น ทำท่าละ 20 ครั้ง ทั้งหมด 3 เซ็ต ก็พร้อมหน้าอกกระชับ สวยงามได้รูปกันแล้ว\n\n## โภชนาการ\n\nที่สำคัญนอกจากออกกำลังกายแล้วอย่าลืมเลือกทานอาหารที่ส่งเสริมซึ่งกันและกันด้วยนะคะ อาจจะหันมาทานอาหารคลีนเพื่อให้ผอม สุขภาพดี หรือเน้นไปที่อาหารที่มีฮอร์โมนที่ช่วยเรื่องหน้าอกโตขึ้น\n\nโดยฮอร์โมนที่ช่วยให้หน้าอกโตขึ้นมีตามภาพเลยค่า ดังนั้นอาหารที่แนะนำ ได้แก่ น้ำมะพร้าว, แอปเปิ้ล, เชอร์รี่, บีทรูท, แครอท,ข้าว, กระเทียม,ชาเขียว เป็นต้น\n\n**ยังไงใครมีข้อสงสัยสามารถพูดคุยสอบถามกันได้ที่แฟนเพจร้านเลยนะคะ** [**under360**](http://www.facebook.com/under360food/)",

  "excerpt": "รู้จักข้าวไรซ์เบอร์รี่ ซูเปอร์ฟู้ดสัญชาติไทย สารต้านอนุมูลอิสระสูง ดัชนีน้ำตาลต่ำ ใยอาหารและโปรตีนสูง ทำไมจึงเหมาะกับอาหารคลีน พร้อมเมนูยอดนิยมของ Under360",
  "cover_url": "https://static.wixstatic.com/media/9bfc29_ebab8cd7806d4cd3941d28729fbc4f95~mv2.png",
  "created_at": "2025-04-05T09:00:00+07:00",
  "content_md": "# ข้าวไรซ์เบอร์รี่: ทางเลือกยอดนิยมสำหรับอาหารคลีน\n\n## เปิดโลกข้าวไรซ์เบอร์รี่ ซูเปอร์ฟู้ดสัญชาติไทย\n\nสวัสดีเพื่อนๆ ที่รักสุขภาพทุกคน! เคยสงสัยไหมว่าทำไมในช่วงนี้เราถึงเห็นข้าวสีม่วงเข้มที่ชื่อว่า \"ข้าวไรซ์เบอร์รี่\" ปรากฏอยู่ในเมนูอาหารคลีนเกือบทุกร้าน? วันนี้เราจะมาไขข้อข้องใจและพาคุณไปทำความรู้จักกับซูเปอร์ฟู้ดสัญชาติไทยที่กำลังเป็นที่นิยมทั่วโลกกัน!\n\nข้าวไรซ์เบอร์รี่ไม่ใช่แค่ข้าวธรรมดาๆ แต่เป็นข้าวที่เกิดจากการผสมผสานระหว่างข้าวหอมนิลและข้าวหอมมะลิ 105 ทำให้ได้ข้าวที่มีสีม่วงเข้มเกือบดำ มีกลิ่นหอม และรสชาติที่เป็นเอกลักษณ์ นอกจากรสชาติที่อร่อยแล้ว ยังอุดมไปด้วยคุณค่าทางโภชนาการมากมาย ซึ่งเป็นเหตุผลหลักที่ทำให้มันกลายเป็นส่วนประกอบยอดนิยมในอาหารคลีน\n\n## คุณประโยชน์ของข้าวไรซ์เบอร์รี่ที่ทำให้เป็นดาวเด่นในอาหารคลีน\n\n### สารต้านอนุมูลอิสระสูง ช่วยชะลอวัย\n\nสิ่งที่ทำให้ข้าวไรซ์เบอร์รี่โดดเด่นมากคือปริมาณสารต้านอนุมูลอิสระที่สูงมาก โดยเฉพาะแอนโทไซยานิน ซึ่งเป็นสารที่ให้สีม่วงแก่ข้าว สารนี้ช่วยต่อต้านอนุมูลอิสระ ลดการอักเสบในร่างกาย และยังมีบทบาทสำคัญในการชะลอความเสื่อมของเซลล์ต่างๆ กล่าวง่ายๆ คือช่วยให้คุณดูอ่อนเยาว์และสุขภาพดีจากภายในสู่ภายนอกนั่นเอง!\n\n### ดัชนีน้ำตาลต่ำ เหมาะสำหรับคนควบคุมน้ำหนักและผู้ป่วยเบาหวาน\n\nหนึ่งในเหตุผลที่ข้าวไรซ์เบอร์รี่ได้รับความนิยมในวงการอาหารคลีนคือมีดัชนีน้ำตาล (Glycemic Index) ที่ต่ำกว่าข้าวขาวทั่วไป นั่นหมายความว่าเมื่อรับประทานแล้ว น้ำตาลในเลือดจะค่อยๆ เพิ่มขึ้นอย่างช้าๆ ไม่ทำให้เกิดการพุ่งสูงของอินซูลิน จึงเหมาะอย่างยิ่งสำหรับผู้ที่ต้องการควบคุมน้ำหนัก ผู้ที่เป็นเบาหวาน หรือผู้ที่ต้องการรักษาระดับน้ำตาลในเลือดให้สม่ำเสมอ\n\n### ใยอาหารสูง ช่วยระบบขับถ่าย\n\nข้าวไรซ์เบอร์รี่มีใยอาหารสูงกว่าข้าวขาวถึง 2-3 เท่า! ใยอาหารเหล่านี้ช่วยให้ระบบย่อยอาหารทำงานได้ดีขึ้น ลดปัญหาท้องผูก และยังทำให้รู้สึกอิ่มนานอีกด้วย นี่คือเหตุผลว่าทำไมหลายคนที่รับประทานข้าวไรซ์เบอร์รี่ในมื้ออาหารจึงไม่รู้สึกหิวบ่อย ช่วยให้ควบคุมปริมาณอาหารที่รับประทานได้ง่ายขึ้น\n\n### วิตามินและแร่ธาตุครบถ้วน ครบเครื่องเรื่องสารอาหาร\n\nนอกจากสารต้านอนุมูลอิสระและใยอาหารแล้ว ข้าวไรซ์เบอร์รี่ยังอุดมไปด้วยวิตามินและแร่ธาตุมากมาย ไม่ว่าจะเป็นวิตามินอี วิตามินบี ธาตุเหล็ก สังกะสี และโฟเลต ซึ่งล้วนมีบทบาทสำคัญต่อการทำงานของร่างกาย เช่น การสร้างเม็ดเลือด การเสริมสร้างภูมิคุ้มกัน และการซ่อมแซมเซลล์ที่เสียหาย\n\n### โปรตีนสูงกว่าข้าวทั่วไป เหมาะสำหรับนักกีฬาและผู้ออกกำลังกาย\n\nหากคุณเป็นคนที่ออกกำลังกายเป็นประจำ ข้าวไรซ์เบอร์รี่คือทางเลือกที่ดีเพราะมีปริมาณโปรตีนสูงกว่าข้าวขาวทั่วไปประมาณ 30% โปรตีนเหล่านี้จำเป็นต่อการซ่อมแซมและเสริมสร้างกล้ามเนื้อหลังการออกกำลังกาย ทำให้คุณฟื้นตัวได้เร็วขึ้นและพร้อมสำหรับการออกกำลังกายครั้งต่อไป\n\n## ทำไมข้าวไรซ์เบอร์รี่จึงเหมาะกับอาหารคลีนอย่างลงตัว\n\n### ความหลากหลายในการปรุง เข้ากับทุกเมนู\n\nข้าวไรซ์เบอร์รี่มีความยืดหยุ่นสูงในการนำไปประกอบอาหาร คุณสามารถใช้แทนข้าวขาวในเมนูโปรดของคุณได้แทบทุกเมนู ไม่ว่าจะเป็นข้าวผัด สลัดข้าว ข้าวยำ หรือแม้แต่ข้าวต้มและโจ๊ก รสชาติที่เป็นเอกลักษณ์ของมันยังช่วยเพิ่มมิติให้กับอาหารของคุณอีกด้วย บางร้านอาหารคลีนถึงกับสร้างสรรค์เมนูพิเศษโดยใช้ข้าวไรซ์เบอร์รี่เป็นส่วนประกอบหลักเลยทีเดียว\n\n### รับประทานง่าย อิ่มนาน ไม่ต้องกังวลเรื่องน้ำหนัก\n\nด้วยคุณสมบัติที่ทำให้อิ่มเร็วและอิ่มนาน ข้าวไรซ์เบอร์รี่จึงเป็นทางเลือกที่ดีสำหรับผู้ที่ต้องการควบคุมปริมาณแคลอรี่ที่ได้รับในแต่ละวัน นอกจากนี้ ใยอาหารในข้าวไรซ์เบอร์รี่ยังช่วยดูดซับไขมันและน้ำตาลบางส่วน ทำให้ร่างกายดูดซึมพลังงานน้อยลง เรียกได้ว่าเป็นมิตรกับผู้ที่ต้องการลดน้ำหนักเป็นอย่างมาก\n\n### ผลิตในประเทศไทย สดใหม่ และปลอดภัย\n\nอีกหนึ่งข้อดีของข้าวไรซ์เบอร์รี่คือเป็นพืชที่ผลิตในประเทศไทย ทำให้เราสามารถหาซื้อได้ง่าย ราคาไม่แพงจนเกินไป และมีความสดใหม่ นอกจากนี้ ข้าวไรซ์เบอร์รี่ยังมักปลูกด้วยวิธีเกษตรอินทรีย์ ปราศจากสารเคมีและยาฆ่าแมลง สอดคล้องกับแนวคิดอาหารคลีนที่เน้นความปลอดภัยและเป็นธรรมชาติ\n\n## วิธีการเลือกและการเก็บรักษาข้าวไรซ์เบอร์รี่ให้คงคุณค่า\n\nการเลือกซื้อข้าวไรซ์เบอร์รี่ควรสังเกตสีของข้าว ข้าวไรซ์เบอร์รี่คุณภาพดีจะมีสีม่วงเข้มสม่ำเสมอ ไม่มีเมล็ดข้าวสีอื่นปน และควรเลือกซื้อจากแหล่งที่น่าเชื่อถือ หากเป็นไปได้ ควรเลือกข้าวที่มีการรับรองมาตรฐานเกษตรอินทรีย์\n\nสำหรับการเก็บรักษา ควรเก็บข้าวไรซ์เบอร์รี่ในภาชนะปิดสนิท วางในที่แห้งและเย็น ไม่โดนแสงแดดโดยตรง เพื่อรักษาคุณค่าทางโภชนาการและป้องกันการเกิดมอด หากเก็บถูกวิธี ข้าวไรซ์เบอร์รี่สามารถอยู่ได้นานถึง 6-12 เดือน โดยไม่เสียคุณภาพ\n\n## อาหารคลีนยอดนิยมของร้าน Under360 ที่ใช้ข้าวไรซ์เบอร์รี่\n\n### 1. ข้าวผัดกิมจิอกไก่ซอสเกาหลี\n\nข้าวไรซ์เบอร์รี่ผัดกับกิมจิรสเปรี้ยวเผ็ดสไตล์เกาหลี เพิ่มโปรตีนด้วยอกไก่นุ่ม ชูรสชาติกลมกล่อมจัดจ้าน อร่อยลงตัวพร้อมคุณค่าทางโภชนาการในทุกคำ\n\n### 2. ข้าวสะโพกไก่ตุ๋นเกาลัด\n\nเมนูสุขภาพที่ผสานความหอมของข้าวไรซ์เบอร์รี่กับความนุ่มละมุนของสะโพกไก่ตุ๋นเกาลัด รสชาติกลมกล่อมจากการตุ๋นด้วยสมุนไพรและเครื่องปรุงอย่างพิถีพิถัน เหมาะสำหรับผู้รักสุขภาพและต้องการมื้ออาหารที่อร่อยและมีประโยชน์ครบถ้วนในจานเดียว\n\n### 3. ข้าวแฮมเบิร์กราดซอสแกงกะหรี่\n\nเมนูฟิวชั่นสไตล์ญี่ปุ่นที่จับคู่แฮมเบิร์กเนื้อนุ่มชุ่มฉ่ำกับซอสแกงกะหรี่เข้มข้นหอมเครื่องเทศ เสิร์ฟพร้อมข้าวไรซ์เบอร์รี่ที่อุดมไปด้วยใยอาหารและสารต้านอนุมูลอิสระ เพิ่มคุณค่าทางโภชนาการให้กับมื้ออร่อยได้อย่างลงตัว\n\n## เริ่มต้นใช้ข้าวไรซ์เบอร์รี่ในชีวิตประจำวันอย่างไรดี?\n\nการเปลี่ยนมาทานข้าวไรซ์เบอร์รี่ไม่จำเป็นต้องทำทันทีทั้งหมด คุณสามารถเริ่มต้นด้วยการผสมข้าวไรซ์เบอร์รี่กับข้าวขาวที่คุณคุ้นเคยในอัตราส่วน 1:1 ก่อน แล้วค่อยๆ เพิ่มสัดส่วนของข้าวไรซ์เบอร์รี่มากขึ้นเรื่อยๆ\n\nอีกหนึ่งเคล็ดลับคือการแช่ข้าวไรซ์เบอร์รี่ก่อนหุงประมาณ 30 นาที ถึง 1 ชั่วโมง จะช่วยให้ข้าวนุ่มขึ้นและใช้เวลาหุงน้อยลง หรือหากใช้หม้อหุงข้าวไฟฟ้า ให้เพิ่มน้ำมากกว่าปกติเล็กน้อย ประมาณ 10-15% จะทำให้ได้ข้าวไรซ์เบอร์รี่ที่นุ่มกำลังดี\n\n## ไม่รอช้า! มาเริ่มต้นเปลี่ยนชีวิตให้ดีขึ้นด้วยข้าวไรซ์เบอร์รี่กันเถอะ!\n\nการเปลี่ยนแปลงเล็กๆ ในชีวิตประจำวัน เช่น การเปลี่ยนจากข้าวขาวมาเป็นข้าวไรซ์เบอร์รี่ อาจส่งผลดีต่อสุขภาพของคุณในระยะยาวอย่างที่คุณคาดไม่ถึง ไม่ว่าจะเป็นการช่วยควบคุมน้ำหนัก การลดความเสี่ยงในการเกิดโรคเรื้อรังต่างๆ หรือแม้แต่การมีผิวพรรณที่ดีขึ้น\n\nวันนี้เรามาเริ่มต้นใหม่กันไหม? ลองซื้อข้าวกล่อง ข้าวไรซ์เบอร์รี่จากทางร้าน Under360 มาสร้างสุขภาพดีด้วยกันเถอะ\n\n- สมัครสมาชิกได้รับส่วนลด 50 บาท สำหรับลูกค้าใหม่\n- คลิกสั่งซื้อเลย",

  "content_md": "เนื่องจากวันศุกร์ที่ 13 ก.ค. 61 ที่ผ่านมามีประกาศจากกระทรวงสาธารณสุขออกมาห้ามใช้น้ำมันที่ผ่านกระบวนการเติมไฮโดรเจนบางส่วน ( PHOs)ออกมา เลยอยากจะมาเขียนแนะนำเพิ่มเติมค่ะ\n\nเกริ่นก่อนว่ากระบวนการ hydrogenation หรือการเติมไฮโดนเจนในน้ำมันเป็นกระบวนการทางเคมีที่ทำน้ำมันพืชชนิดไม่อิ่มตัว (พวกเหลวๆ) ให้กลายเป็นของแข็ง\n\nจะแบ่งเป็น 2 แบบ\n\n1. Partial hydrogenation (คือทำปฏิกิริยาไม่สมบูรณ์)\n2. Fully hydrogenation (ปฏิกิริยาสมบูรณ์)\n\nแบบแรกนั่นก็คือ Partially Hydrogenated Oils (PHOs)ที่กฎหมายบ้านเราแบนไปนั่นเอง ซึ่งน้ำมันตัวนี้มี ไขมันทรานส์\n\nส่วนแบบที่สองได้น้ำมันที่เรียกว่า Fully hydrogenated Oils (FHOs) ซึ่งตัวนี้ไม่ใช่ไขมันทรานส์ ซึ่งปลอดภัยกว่าแบบแรก\n\nดังนั้นสินค้าต่างๆต้องปรับตัวนำ PHOs ออกจากผลิตภัณฑ์ต่างๆภายใน 180 วัน\n\nซึ่งถือว่าเป็นเรื่องดี แฮปปี้กับชีวิตคนในประเทศไทยมากๆ เพราะไขมันทรานส์ให้โทษมากกับร่างกาย\n\nสามารถย้อนอ่านบทความที่เคยเขียนไว้เรื่องไขมันทรานส์ได้ที่ลิงค์นี้ค่ะ https://www.under360food.com/single-post/transfat\n\nแต่! ภาคอุตสาหกรรมจะปรับตัวกันอย่างไรต้องลุ้นต่อไป\n\nที่แม่ค้าคิดไว้ คือภาคอุตสาหกรรมบ้านเราน่าจะใช้ Fully hydrogenated Oils (FHOs) เข้ามาแทน หรือมีกระบวนการดัดแปรไขมันและน้ำมันด้วยวิธีอื่นๆ เข้ามาทดแทนแน่นอนค่ะ เช่น Interesterification ซึ่งกว่าจะมีบทความพิสูจน์ว่าเป็นอันตรายต่อร่างกายก็ใช้เวลาอีกหลายปี...\n\nดังนั้นเราหวังให้ผู้ผลิต ผลิตแต่ของสุขภาพออกมาก็คงจะเป็นไปได้ยาก เพราะคนเราชอบทานของมัน ของอร่อย ดังนั้นเราควรเลือกทานกันเองด้วยนะคะ\n\nแล้วคำถามถัดไปที่หลายคนอยากรู้เมื่ออ่านมาถึงตรงนี้ก็คือ แล้ว**ตัว Fully Hydrogenated Oils มีพิษมีภัยเหมือนไขมันทรานส์หรือไม่?**\n\nตอบเลยว่า **โทษของมันไม่มากเท่าไขมันทรานส์แน่นอน แต่ก็ไม่ใช่ว่าจะดีสำหรับร่างกาย**\n\nเพราะมันก็คือน้ำมันจากการเติมไฮโดรเจนเข้าไปเช่นกัน ซึงทำให้เกิด stearic acid หรือไขมันอิ่มตัวนั่นเอง ถ้าใครยังนึกภาพไม่ออก ยกตัวอย่างเช่น ไขมันจากเนื้อสัตว์ แบบไขมันหมู\n\nซึ่งไขมันอิ่มตัวเป็นไขมันที่ไม่ดีรองลงมาจากไขมันทรานส์เลยนะคะ\n\nเพราะจากข้อมูลทางการแพทย์มีคำแนะนำให้ลดการบริโภคไขมันอิ่มตัวด้วย เพราะไขมันอิ่มตัวมีความเชื่อมโยงในการเพิ่มระดับไขมันเลว LDL ในร่างกาย รวมถึงเสี่ยงต่อการเป็นโรคหลอดเลือดและหัวใจมากขึ้น\n\nดังนั้นแม่ค้ายังคงแนะนำว่าเลี่ยงอาหารจำพวก Fast food, อาหารเบเกอรี่, อาหารที่ผ่านการ processed แล้วได้เป็นดีที่สุด เพราะถึงแม้ในอนาคตป้ายฉลากของผลิตภัณฑ์จะทำให้เราสบายใจขึ้นเพราะอาหารไม่มีไขมันทรานส์ แต่สินค้าก็จะหาไขมันอย่างอื่นมาทดแทนซึ่งไม่ดีต่อสุขภาพได้เช่นกัน อย่าให้โดนหลอกไปกับคำว่า Trans fat 0 อย่างเดียวนะคะ\n\nส่วนไขมันที่ควรทานคือไขมันประเภท polyunsaturated Fat(ไขมันไม่อิ่มตัวเชิงซ้อน) พบได้ในพืช ผัก เป็นไขมันประเภทที่ดี\n\nส่วนอีกประเภทซึ่งเป็นไขมันที่ดีที่สุดคือ ไขมันไม่อิ่มตัวเชิงเดี่ยว Monounsaturated Fat พบได้ในน้ำมันมะกอก อะโวคาโด้ น้ำมันรำข้าว น้ำมันคาโนลา ฯลฯ\n\n**รู้แบบนี้แล้วเรามาปรับตัวด้วยการเลือกทานอาหารสุขภาพกันดีกว่าค่ะ**\n\n**ทานอาหารคลีนของเราก็ไม่เจอ Trans fat นะคะ อิอิ้**",

 {
  "slug": "why-fasting-is-bad-for-health",
  "title": "ทำไมอดอาหารถึงไม่ดีต่อสุขภาพ",
  "excerpt": "การอดอาหารทำให้อ้วนมากกว่าผอมเพราะเกิดโยโย่เอฟเฟคท์ ร่างกายลดการใช้พลังงานลง วิธีลดน้ำหนักที่ถูกต้องคือออกกำลังกายสม่ำเสมอและทานอาหารเพื่อสุขภาพ",
  "cover_url": "https://static.wixstatic.com/media/94a665_3f57236cd4ba4059a7dc70c10b47d724~mv2.jpg",
  "created_at": "2017-01-24T09:00:00+07:00",
  "content_md": "หลายๆคนคงเคยผ่านช่วงเวลาไดเอทด้วยการอดอาหารเพื่อให้น้ำหนักลดลงเร็วที่สุดกันมาแล้ว\n\nเพราะไหนจะงานแต่งปลายปีบ้าง ไหนจะงานเลี้ยงบ้าง ถ้าไม่รีบลดก็คงไม่ทัน\n\nแต่พอเลิกลดแล้วก็เด้งกลับมาเท่าเดิมในเวลาอันรวดเร็ว นั่นก็เพราะจริงๆแล้วการอดอาหารกลับทำให้อ้วนมากกว่าผอมนั่นเอง\n\nดร.สุวิมล ทรัพย์วโรบล นักกำหนดอาหารวิชาชีพ USA ได้อธิบายถึงหลักการง่ายๆของการอดอาหารแต่กลับทำให้อ้วนว่า เพราะร่างกายของเรามีระบบการควบคุมการใช้พลังงาน ดังนั้นการติดลบพลังงานโดยการอดอาหาร จะส่งผลให้น้ำหนักตัวลดลงอย่างรวดเร็วแค่เพียงช่วงแรกเท่านั้น หลังจากนั้นร่างกายจะลดระดับการใช้พลังงานลงเหมือนกับที่คอมพิวเตอร์เข้าสู่ safe mode เพื่อลดการใช้พลังงานในเวลาที่ต้องประหยัด หรือเมื่อมีพลังงานจำกัด ทำให้ส่วนต่างของพลังงานที่ติดลบหรือขาดทุนอยู่ลดลงตามไปด้วย จนกระทั่งระดับการใช้พลังงานเท่ากับพลังงานที่ได้รับจากอาหาร น้ำหนักตัวก็จะคงที่\n\nและที่สำคัญคนส่วนใหญ่มักจะไม่สามารถอดอาหารได้นาน ดังนั้นเมื่อไม่สามารถทนอดอาหารได้ ก็จะหันกลับมารับประทานเท่าเดิม หรือมากกว่าเดิม ทำให้ร่างกายนำพลังงานส่วนที่เหลือไปเก็บไว้ในรูปของไขมันใต้ผิวหนัง ทำให้กลับมาอ้วนเหมือนเดิม โดยเราเรียกระบบนี้ว่า \"โยโย่เอฟเฟคท์ (yo-yo effect)\"\n\nเป็นผลให้คนทั่วไปที่ลดน้ำหนักผิดวิธีไม่สามารถควบคุมน้ำหนักได้ บางคนนั้นมีน้ำหนักมากกว่าช่วงที่เริ่มอดเสียอีกก็มี\n\nซึ่งแอดมินพลอยขอบอกเลยค่ะ ว่าเป็นจริงๆ เพราะพลอยเองเคยลองอดอาหารมาแล้ว สูตร7วัน 14วันในเน็ตก็จัดมาหมด และเกิดโยโย่เอฟเฟคท์มาแล้วกับตัว ตอนแรกน้ำหนักจะลดลงอย่างรวดเร็ว 1-2kg ภายใน 1 อาทิตย์ พอหลังจากนั้นก็ตบะแตก น้ำหนักพุ่งกลับคืนอย่างรวดเร็วจนทะลุของเดิมด้วยซ้ำ ซึ่งพอทำแบบนี้บ่อยๆเข้า ในที่สุดระบบเผาผลาญของร่างกายก็พัง จะกลับไปอดแบบเดิมก็ไม่ลดแล้ว ในที่สุดก็เริ่มนับ1กันใหม่ หันกลับมาออกกำลังกายทุกวันเพื่อปรับระบบเผาผลาญ และทานอาหารคลีนแทน\n\nใครยังไม่เห็นภาพ ขอยกตัวอย่างเพิ่มนะคะ เช่น คุณเป็นคนที่ต้องการใช้พลังงาน 1,500 กิโลแคลอรีต่อวัน แต่ตั้งใจอดอาหารเพื่อลดน้ำหนัก จึงเริ่มอดอาหาร โดยรับประทานแค่ 1,000 กิโลแคลอรีต่อวัน ทำให้ได้พลังงานน้อยกว่าที่ต้องใช้ 500 กิโลแคลอรีต่อวัน\n\nทำแบบนี้ไปเรื่อยๆ เป็นเวลาหนึ่งสัปดาห์ พลังงานจะติดลบ 3,500 กิโลแคลอรี (500 กิโลแคลอรี x 7 วัน) น้ำหนักตัวจะลดลงประมาณครึ่งกิโลกรัม\n\nหากสามารถอดอาหารแบบนี้ต่อไปได้เป็นเวลา 2 สัปดาห์ น้ำหนักจะลดลงหนึ่งกิโลกรัม (500 กิโลแคลอรี x 14 วัน เท่ากับ 7,000 กิโลแคลอรี) และหนึ่งเดือนน้ำหนักก็จะลดลงสองกิโลกรัม ฟังแล้วก็ชื่นใจ คนอดอาหารก็จะเริ่มมีกำลังใจในการอดต่อไป แต่น้ำหนักจะลดลงได้ไม่มาก เพราะร่างกายจะปรับลดความต้องการพลังงานลง จนเท่ากับพลังงานที่รับประทาน น้ำหนักตัวจะเริ่มคงที่\n\nแต่หากกลับมารับประทาน 1,500 กิโลแคลอรี ส่วนเกิน 500 กิโลแคลอรี ก็จะถูกเก็บสะสมไว้ในร่างกายทันที น้ำหนักตัวก็จะเริ่มกลับมาเป็นขาขึ้นเหมือนเดิม\n\n## ข้อแนะนำสำหรับการลดน้ำหนักอย่างถูกต้อง\n\nทั้งนี้จึงมีข้อแนะนำสำหรับคนที่อยากลดน้ำหนักว่า:\n\n**สำหรับเด็กวัยเรียน และวัยรุ่น:**\n- ควรรับประทานอาหารให้ครบ 3 มื้อ โดยเฉพาะมื้อเช้า เพื่อให้สารอาหารบำรุงสมอง\n- อาหารเช้าประเภทซีเรียล ไม่ควรรับประทานอย่างเดียว ควรเพิ่มนม ไข่ และสลัดผักผลไม้จะดีที่สุด\n- ลดปริมาณการใช้น้ำมันในการปรุงอาหารลง\n- หลีกเลี่ยงขนมถุง ของทอด เนื่องจากอยู่ในวัยที่กำลังเจริญเติบโต มีความจำเป็นต้องได้รับสารอาหารที่เพียงพอ\n\n**สำหรับผู้ใหญ่:**\n- ระบบเผาผลาญจะไม่ดีเหมือนหนุ่มสาว แต่ก็ต้องทานให้ครบ 3 มื้อ 5 หมู่เหมือนเดิม\n- ลดของทอด ของมัน หันมาทานไขมันดีมากขึ้น เช่น ใช้น้ำมันมะกอก กินอโวคาโด ถั่วอัลมอนด์ เป็นต้น\n- เนื้อสัตว์ก็หมั่นทานปลา อกไก่ให้มากขึ้น\n- ทานอาหารตามตารางพิรามิดอาหาร\n\n## สรุป\n\nได้ไขข้อสงสัยกันไปแล้ว ว่าวิธีการอดอาหารไม่ใช่วิธีการลดน้ำหนักที่ถูกต้อง ดังนั้นวิธีเดียวที่จะสามารถคงระดับการใช้พลังงานของร่างกายได้ก็คือ:\n\n- การออกกำลังกายอย่างสม่ำเสมอ\n- ปรับเปลี่ยนพฤติกรรมการบริโภค\n- มีวินัยในการเลือกทานอาหารเพื่อสุขภาพ\n- ที่สำคัญคือทำใจให้ผ่อนคลายไม่เครียด\n\nพียงเท่านี้คุณก็จะมีรูปร่างที่สวยงาม ไปพร้อมกับการมีสุขภาพที่ดีแล้ว\n\nยังไงพูดคุย คอมเม้นกันได้เลยนะคะ แอดมินพลอยจะนำบทความดีดีมาให้อ่านกันบ่อยๆค่ะ :D\n\n_ที่มา : เว็บไซด์เดลินิวส์ออนไลน์_",

  "content_md": "หลายๆท่านอาจจะได้ยินคำว่า **อาหารคลีน** กันอยู่บ่อยครั้ง\n\nโดยเฉพาะช่วงหลังที่คนรอบข้างต่างลดความอ้วนด้วยวิธีการทานอาหารคลีนกันซะส่วนใหญ่\n\nจริงๆนิยามของ อาหารคลีนอาจแตกต่างกันไปตามแต่ละบุคคล\n\nแต่พลอยจะรวบรวมความหมายของ อาหารคลีน ที่นิยมทานกันในบ้านเราค่ะ\n\n## 1. ไม่ใช้ของแปรรูป\n\nอาหารแปรรูป หรือ processed food คือ อาหารที่อยู่ในกระป๋อง ในถุง ที่อยู่ตามซุปเปอร์ต่างๆ ซึ่งมักจะผ่านกระบวนการทำหรือปรุงแต่งหลากหลายขั้นตอนจากโรงงาน เช่น การใส่สีผสมอาหาร การแต่งกลิ่น การใส่สารกันบูด จนทำให้ไม่รู้เลยว่าวัตถุดิบหลักมาจากอะไร\n\nขอยกตัวอย่างให้เห็นภาพง่ายๆ เลยคือ **ไส้กรอก** อาหารแปรรูปที่ผู้ใหญ่ชอบให้เด็กๆทาน เพราะอร่อย ทานง่าย แต่หารู้ไม่ว่ากว่าจะมาเป็นไส้กรอกนั้น ผ่านกระบวนการหลายอย่าง นอกจากใช้เนื้อสัตว์ที่มีไขมันสูงในการผลิตแล้ว ยังมีส่วนประกอบทั้ง สารไนเตรท ไนไตรท์ ในกระบวนการทำเพิ่มเข้ามาด้วย ซึ่งเป็นต้นเหตุของการเกิดโรคต่างๆขึ้นในอนาคตได้ และถึงแม้ทางผู้ผลิตจะกล่าวว่าปริมาณไนเตรทจะไม่เกินเกณฑ์ที่รัฐกำหนด แต่เราสามารถหลีกเลี่ยงไม่รับสารเหล่านี้ได้ด้วยการเลือกทานอย่างอื่น\n\n## 2. หลีกเลี่ยงอาหารหมักดอง\n\nอาหารคลีนมักจะไม่ใช้ของหมักดอง เนื่องจากในขั้นตอนกระบวนการหมักดองนั้น มักจะใช้น้ำตาล หรือเกลือในปริมาณที่สูงมาก จนทำให้อาหารเหล่านั้น หวานจัด เค็มจัดผิดธรรมชาติ จนเก็บรักษาได้ยาวนาน อาหารหมักดองต่างๆ อาทิเช่น ผักดอง กุ้งแห้ง ไข่เค็ม เป็นต้น\n\n## 3. ขนมถุงต่างๆ\n\nขนมถุงต่างๆที่อยู่ตาม shelf ซุปเปอร์มาร์เก็ตล้วนไม่ใช่อาหารคลีนทั้งสิ้น\n\nเนื่องจากขนมถุงในไทย ใส่สารต่างๆเยอะมาก ทั้งสารกันบูด สารแต่งกลิ่น สารคงรูป สีผสมอาหาร และ ไขมันปาล์ม แถมประโยชน์ที่ได้จาก nutrition ก็แทบจะไม่มี มีแค่คาร์บและไขมันไม่ดีทั้งสิ้น ทานมากก็ทำให้อ้วนง่าย ไขมันสูง จนเกิดสาเหตุของโรคไขมันอุดตันในเส้นเลือดในอนาคตได้\n\nดังนั้นคนทานคลีนควรหลีกเลี่ยง ขนมถุง รวมไปถึง ช็อคโกแลตแปรรุป เยลลี่ต่างๆค่ะ\n\n(หากอยากทานให้ทานช็อคโกแลตแท้ dark chocolate 70%แทนค่ะ)\n\n## 4. อาหารคลีนคืออาหาร Whole food\n\nพลอยขอออกตัวก่อนว่า อันนี้นำนิยามมาจากเพจ eat clean baby ซึ่งอ่านแล้วตรงใจมาก\n\nอาหารคลีน ก็คืออาหารที่เป็น whole food อาหารที่ได้จากป่า จากธรรมชาติ เช่น หาปลาได้นำมาโรยเกลือย่าง หาไข่ไก่ได้ก็นำมาต้ม หาผักผลไม้ก็นำมาทานสดๆ ทุกอย่างสามารถหาและทำได้ในป่า นั่นคืออาหารคลีน ส่วนพวกพิซซ่า น้ำอัดลม หาไม่ได้ทำไม่ได้ในป่า ก็ไม่ใช่อาหารคลีนค่ะ\n\n## 5. อาหารที่มีไขมันแต่เป็นไขมันดี\n\nอาหารคลีนไม่ใช่ว่าจะต้องเลี่ยงน้ำมันเสมอไป ร่างกายในชีวิตประจำวันของเราต้องทานให้ครบ 5 หมู่ดังนั้นไขมันจึงไม่ควรหลีกเลี่ยงเพราะจะทำให้เกิดโรคขาดสารอาหารได้ แต่เราควรเลือกทานไขมันดีแทนค่ะ\n\nโดยไขมันดี (HDL) ย่อมาจากคำว่า high density lipoprotein คือ ไขมันที่มีความหนาแน่นสูง เป็นไขมันที่ดีสำหรับหลอดเลือดแดงเพราะจะป้องกันไม่ให้ไขมันที่ไม่ดี คือ โคเลสเตอรอล, ไตรกลีเซอไรด์ และ LDL ไปพอกสะสมในหลอดเลือดแดง เรียกว่าถ้าไปตรวจสุขภาพแล้ว HDL สูง ก็จะช่วยป้องกันการเกิดโรคต่างๆ เช่น โรคหลอดเลือดหัวใจตีบลงได้\n\nอาหารที่มีไขมันดีสูง ได้แก่ ปลาแซลมอน ไข่ไก่ ถั่วอัลมอนด์ น้ำมันมะกอก สาหร่าย อะโวคาโด เป็นต้น\n\n## 6. อาหารที่ใช้ lean meat\n\nอาหารคลีนเป็นอาหารที่ใช้เนื้อสัตว์ที่มีไขมันน้อยในการประกอบอาหารค่ะ\n\nดูได้จากตารางตามภาพ ก็ควรเลือกใช้เนื้อสัตว์ที่อยู่ปิรามิดด้านบน High กับ Highest ซึ่งได้แก่ อกไก่ลอกหนัง เนื้อหมูส่วนสันใน(นำมันออก) เนื้อวัวส่วนวันใน(นำมันออก)\n\nส่วนที่ควรหลีกเลี่ยง ได้แก่ แฮม เบคอน ปีกไก่ เครื่องในสัตว์ Rib รวมไปถึงหมูสับตามตลาดนัดค่ะ เพราะหมูสับตามตลาดนัดมักจะผสมไขมันหมู หนังหมูลงไปมากก่อนนำมาขาย\n\nดังนั้นใครอยากทำหมูสับ แนะนำให้ใช้ส่วนสันในลอกหนังมาบด/สับเอง เหมือนกับแบบที่ร้านทำค่า :))\n\n---\n\n**\"ใครรู้จักนิยามของอาหารคลีนแล้ว ลองหันมาทำอาหารคลีนทานกันดูนะคะ เน้นเลือกของที่ได้จากธรรมชาติ เลี่ยงของทอด ของแปรรูปค่ะ\"**\n\nหากใครไม่มีเวลาทำเองลองจัดของร้านดูได้น้า ฝากเฟซบุ้คเพจไว้ด้วยค่า คลิกเลย **Under360**",

  "title": "Top10 Fitness influencers 2017",
  "excerpt": "พลอยพาไปรู้จัก 10 ผู้ทรงอิทธิพลด้านสุขภาพและฟิตเนสแห่งปี 2017 ที่จัดอันดับโดยนิตยสาร Forbes ทั้งเทรนเนอร์ นางแบบ และครูสอนออกกำลังกายชื่อดังจากทั่วโลก",
  "cover_url": "https://static.wixstatic.com/media/9bfc29_f6dcab3d80c34f7cbdb995b2a79f020a~mv2.jpg",
  "created_at": "2017-05-02T09:00:00+07:00",
  "content_md": "# Top10 Fitness influencers 2017\n\nไม่ได้อัพเดทบล็อกกันมานาน วันนี้พลอยขอนำเสนอหัวข้อสุดแซ่บ Top10 Fitness influencers แห่งปี2017 ที่จัดโดยนิตยสาร Forbes กันค่ะ\n\n1 ใน 10 ของผู้ทรงอิทธิพลด้านสุขภาพและฟิตเนสนอกจากผู้หญิงสวยๆหุ่นแซ่บๆกันแล้ว ก็ยังมีผู้ชาย 2 คนติดโผมาในลำดับที่ 5 และ 7 ด้วยน้า มาดูกันค่ะ ว่าแต่ละท่านเป็นใคร มาจากไหน และทำอะไรอยู\n\n## 1. Kayla Itsines\n\nKayla อายุ 25 ปี อาชีพเทรนเนอร์จากประเทศออสเตรเลีย หรือใครหลายๆคนรู้จักในนาม \"Workout Queen\" จะบอกว่าเธอคนนี้ดังมาจากการออก ebooks ซีรีย์หลากหลาย เช่น Bikini Body Guides และทำ Application ออกกำลังกายชื่อดังอย่าง Sweat with Kayla ที่สอนการออกกำลังกาย และการเตรียมมื้ออาหารในการลดน้ำหนัก ใครอยากลองทำโหลดแอปเธอกันได้เลย\n\n## 2. Jennifer Jen Selter\n\nJen อายุ 23 ปีเป็นทั้งเซเลป และนางแบบด้านการออกกำลังกายชื่อดังของอเมริกา ถ้าถามแอดมินว่าใครแซ่บสุด ก็จะตอบได้อย่างรวดเร็วว่าเธอคนนี้นี่แหละค่ะ เพราะภาพที่โชว์ลง instagram ล้วนแต่แซ่บแบบพริกสิบเม็ด จริงๆภาพที่ติดตาของ Jen น่าจะเป็นบอดี้ส่วนสะโพกที่สวยงามมากๆ แบบที่ใครหลายคนฝันถึงเลยทีเดียว\n\n## 3. Emily Skye\n\nEmily เริ่มต้นจากการที่เธอโพสภาพการออกกำลังกายของตัวเองลง social network จนกระทั่งมีคนติดตามเพิ่มขึ้นเรื่อยๆ ตอนนี้เธอก็มีเว็บไซต์ส่วนตัว ให้ลงคอร์สเทรนออนไลน์นั่นเองค่า\n\n## 4. Michelle Lewin\n\nMichelle อายุ 31 ปีจากประเทศเวเนซูเอลา เธอคนนี้ไม่ได้เป็นแค่ฟิตเนสเทรนเนอร์ธรรมดาๆ แต่เธอเป็น Body building ที่เริ่มเข้าสู่วงการด้วยการแข่งขัน NPC bikini competition ตอนนี้กล้ามสวยแค่ไหนเข้าไปส่องในไอจีเธอกันค่ะ\n\n## 5. Joe Wicks\n\n1 ใน 2 คนที่เป็นผู้ชายที่เข้ามาแทรกอยู่ใน 10 อันดับแรกแบบน่าตกใจ Joe เริ่มต้นจากการทวิตสูตรการทานอาหารและเทคนิคการออกกำลังกายของตัวเองลงบนทวิตเตอร์ จนกระทั่งคนติดตามมากขึ้นเรื่อยๆ จนได้ออกหนังสือสูตรอาหารชื่อ 'Lean in 15' ออกมา ซึ่งเป็นเล่มที่ขายดีที่สุดแห่งปี2015 ด้วยยอดขายมากกว่า 9แสนเล่ม!!\n\n## 6. Cassey Ho\n\nCasset อายุ31ปี สาวเวียดนามแต่เติบและโตในอเมริกา เริ่มต้นจากเป็นครูสอนพิลาทิสและได้โพสวิดีโอการสอนลงบนยูทูปตั้งแต่ปี 2009 จนกระทั่งมีคนติดตามเยอะขึ้นมากและกลายเป็นครูสอนพิลาทิสชื่อดังในที่สุด แอบกระซิบเลยว่าในไอจีน่าติดตามมากเพราะทั้งสนุกและตลก ><\n\n## 7. Simeon Panda\n\nผู้ชายสุดแซ่บอีกคนที่ติดอยู่ใน Top 10 ของปีนี้ ใครกล้ามแน่นสุดขอยกให้คนนี้เลยค่า Simoen ลงแข่งเพียบและได้รับรางวัลชนะเลิศ the European Championship ในปี 2013 นอกจากนี้ก็ยังได้เป็นคณะกรรมการในการตัดสินการแข่งขันเพาะกายหลายงานด้วย\n\n## 8. Lyzabeth Lopez\n\nLyzabeth ได้รับรางวัลชนะเลิศในสาขาเทรนเนอร์ และยังเป็นนักโภชนาการอาหาร ฟิตเนสเทรนเนอร์ ซึ่งมีโปรแกรมการลดน้ำหนักของตัวเอง เปิดให้คนไปลงทะเบียนได้\n\n## 9. Natalie Jill\n\nNatalie เป็นบุคคลที่ขอซูฮกในความพยายามของเธอมากๆ! เพราะเรื่องของเธอมีอยู่ว่า เธอหย่าจากสามี เสียบ้านแล้วก็ทำให้น้ำหนักทะยานสูงขึ้นเรื่อยๆ จนกระทั่งเธอได้ตัดสินใจลดน้ำหนักอย่างจริงจัง จนตอนนี้หุ่นสวยเช้ง และกลายมาเป็นฟิตเนสเทรนเนอร์ชื่อดัง และผู้เชี่ยวชาญด้านอาหาร gluten free\n\n## 10. Rachel Brathen\n\nตัวแม่ด้านโยคะชื่อดัง ที่ท่วงท่าและลีลาการสอนโยคะของเธอน่าดึงดูดสุดๆ แม้แต่ตอนที่ท้องก็ยังเล่นโยคะอยู่ ซึ่งทำให้คนติดตามมากขึ้นเรื่อยๆ จนตอนนี้ลูกน้อยของเธอน่ารักสุดๆไปเลยค่า\n\n---\n\nใครถูกใจคนไหน อยากติดตามใคร ฟอลไอจี 10 ซุปตาร์ด้านการออกกำลังกายชื่อดังกันได้เลย ทุกคนสร้างแรงบันดาลใจได้ดีมากๆค่า",

  "content_md": "### Ketogenic Diet คืออะไร\n\nคีโตเจนิค ไดเอตคืออะไร ทำไมคนกินเยอะกันจัง? หลายๆคนมีเพื่อนกินคีโตแล้วน้ำหนักลดเยอะมาก แต่หลายคนก็ทำได้แป้บเดียวก็เลิก มันคืออะไร ทานอาหารแบบไหน เหมือนอาหารคลีนหรือไม่ บทความนี้มีคำตอบค่ะ\n\nการกินคีโตคือการกินอาหารที่คุมสารอาหารโดยเน้นการกินไขมันสูง+งดน้ำตาล เพื่อเปลี่ยนระบบร่างกายในการนำพลังงานไขมันไปใช้แทนน้ำตาล เรียกว่าเปลี่ยนจาก Sugar burner to Fat burner ค่ะ\n\n### การกินคีโต เราจะกินในสัดส่วนตามนี้\n\n**1. Fat 75%**\n- Saturated fat (ไขมันอิ่มตัว) 30% เช่น น้ำมันมะพร้าว เนย มันหมู\n- Monounsaturated fat (ไขมันไม่อิ่มตัวเชิงเดี่ยว) 50% เช่น น้ำมันมะกอก อโวคาโด ถั่วต่างๆ\n- Polyunstaurated fat (ไขมันไม่อิ่มตัวเชิงซ้อน) 20% เช่น น้ำมันดอกทานตะวัน\n\n**2. Protein 20%**\n\n**3. Carb 5%** หรือไม่เกิน 20 กรัม (งดแป้งและน้ำตาลเด็ดขาด ค่า carb ที่ได้จะมาจากผักและถั่วต่างๆ)\n\nมาถึงตรงนี้คนที่ทานคลีนแบบพวกเรามาโดยตลอดคงจะตกใจไม่ใช่น้อยว่า ทำไมถึงทานไขมันได้เยอะขนาดนี้ โดยเฉพาะไขมันอิ่มตัว (Saturated fat) มันไม่เป็นอันตรายต่อร่างกายหรอ?\n\n### แล้วจะคำนวณอย่างไร ว่าจะทานยังไง\n\nตามที่เคยเขียนบทความไปแล้ว ทุกครั้งในการลดน้ำหนัก ต้องกินในน้อยกว่า BMR ไม่มากกว่า TDEE การกินคีโตก็ต้องใช้การคำนวณเช่นกันค่ะ\n\n### ตัวอย่างการคำนวณ\n\nนส.A คำนวณ BMR TDEE ออกมาได้ตามนี้\n\nอยากลดน้ำหนัก เลยเลือกทาน 1,500 แคลอรี จึงได้โควต้าการทานดังนี้\n\n- **คาร์บ 5%** = (1500/100)*5 = 75\n  - คาร์บ 1 กรัมให้พลังงาน 4 kcal จึงทานคาร์บได้ 75/4 = 19 กรัม\n\n- **โปรตีน 20%** = (1500/100)*20 = 300\n  - โปรตีน 1 กรัมให้พลังงาน 4kcal จึงทานโปรตีนได้ 300/4 = 75 กรัม\n\n- **ไขมัน 75%** = (1500/100)*75 = 1125\n  - ไขมัน 1 กรัมให้พลังงาน 9 kcal จึงทานไขมันได้ 1125/9 =125 กรัม\n\n### ส่วนการทานคีโตเป็นการกินไขมันแล้วลดไขมันได้ยังไง?\n\nเหตุผลที่การกินคีโตต้องจำกัดปริมาณคาร์บ เพราะต้องการให้ร่างกายหยุดการเบิร์นคาร์บและน้ำตาล และบังคับให้ร่างกายเปลี่ยนมาใช้พลังงานไขมันแทน จนร่ายการเข้าสู่ภาวะที่เรียกว่า ภาวะคิโตซิส (Ketosis) นั่นเองค่ะ\n\nแต่ทั้งนี้ทุกอย่างมี 2 ด้านเสมอ การทานอาหารคีโตไม่เหมาะกับทุกคนเสมอไป ก่อนที่จะทานให้หาข้อมูลเยอะๆ และถ้ายิ่งแนะนำให้ผู้ใหญ่ที่มีโรคประจำตัวเยอะ ยิ่งไม่แนะนำค่ะ\n\n---\n\n### สุดท้ายนี้อย่างไรก็ตาม\n\nกินอาหารให้พอดีๆ รักแบบไหน กินแบบนั้น กินให้พอดีไม่มากไป\n\nชีวิตจะสมดุลย์ค่า\n\nหากชอบบทความนี้แชร์เพื่อเป็นกำลังใจให้แม่ค้าด้วยนะคะ\n\nขอบคุณค่า",

 {
  "slug": "pm25-air-pollution-bangkok",
  "title": "เมื่อฝุ่นละอองปกคลุมกรุงเทพ! มารู้จัก PM2.5 กัน",
  "excerpt": "รู้จักฝุ่นพิษ PM2.5 ที่ปกคลุมกรุงเทพ อันตรายต่อสุขภาพ สาเหตุการเกิด และวิธีป้องกันตัวเองในช่วงอากาศเป็นพิษ",
  "cover_url": "https://static.wixstatic.com/media/9bfc29_79c3ef26ce064010be2baaa6d3181b97~mv2_d_4752_3168_s_4_2.jpg",
  "created_at": "2018-02-09T09:00:00+07:00",
  "content_md": "หลายวันมานี้มีหลายคนสังเกตว่ามีหมอกควันปกคลุมทั่วกรุงเทพอีกครั้ง\n\nซึ่งท้องฟ้าที่มืดมัว ไม่ใช่หมอกควันทั่วไปแต่อย่างใด! มันคือฝุ่นละอองพิษขนาดเล็ก ซึ่งเป็นมลพิษทางอากาศ และส่งผลร้ายต่อสุขภาพของทุกคนที่สูดดมด้วย\n\nดังนั้นวันนี้พลอยจึงอยากออกมาเขียนบทความเพื่อให้ลูกค้ารวมถึงคนใกล้ตัวได้มารู้จักความอันตรายของสภาวะอากาศแบบนี้ รวมถึงวิธีดูแลตัวเองในช่วงนี้กันค่ะ\n\n## PM 2.5 คืออะไร?\n\nต้องกล่าวก่อนว่าฝุ่นละอองทั่วไปมีอยู่ตามอากาศมาตั้งนานแล้ว แต่ฝุ่นเหล่านั้นมีขนาดใหญ่ถูกกรองโดนขนจมูกของมนุษย์ ซึ่งทำให้ไม่เป็นอันตรายต่อร่างกายมากนัก\n\nแต่PM2.5 คือชื่อเรียกของเจ้าฝุ่นละอองขนาดเล็กไม่เกิน 2.5 ไมครอน ซึ่งเล็กกว่า 1 ใน 25 ส่วนของเส้นผ่านศูนย์กลางของเส้นผมมนุษย์ คิดภาพตามแล้วคือเล็กมาก เล็กจนสามารถเล็ดลอดขนจมูกเข้าสู่ร่างกายได้ และมีขนาดเพียงครึ่งหนึ่งของขนาดเม็ดเลือด (5 ไมครอน) ดังนั้นฝุ่นพิษ PM2.5 จึงสามารถเข้าสู่เส้นเลือดฝอยและกระจายไปตามอวัยวะได้เกือบทั่วร่างกาย และฝุ่นเหล่านี้เป็นพาหะนำสารแปลกปลอมเข้ามาในร่างกายด้วย เช่น สารแคดเมียม ปรอท โลหะหนัก ไฮโดรคาร์บอน และสารก่อมะเร็งจำนวนมาก\n\n## อันตรายของ PM2.5 กับสุขภาพ\n\nอย่างที่กล่าวไปข้างต้น จากการศึกษาของ Institue for health and Evaluation พบว่ามลพิษทางอากาศเป็น 1 ใน 5 ปัจจัยหลักที่คร่าชีวิตของมนุษย์ และเป็นปัจจัยร่วมที่เป็นสาเหตุของโรคต่างๆมากมาย อาทิ โรคหัวใจขาดเลือด โรคปอดอุดกั้นเรื่องรัง โรคหลอดเลือดในสมอง โรคมะเร็งปอด เนื่องจากตอนสูดดมอากาศเข้าร่างกาย มลพิษเหล่านี้นำพาสารระคายเคืองและสารก่อมะเร็งเข้าสู่ร่างกาย\n\n## แล้วฝุ่นเหล่านี้มาจากไหน? ทำไมอยู่ๆถึงมืดมัว\n\nสาเหตุการเกิดมลพิษเหล่านี้โทษใครไม่ได้ เพราะเกิดจากมนุษย์ล้วนๆ อาทิ\n\n- การคมนาคมขนส่ง โดยเฉพาะ ไอเสียจากยานพาหนะที่ใช้น้ำมันเชื้อเพลิงต่างๆ\n- การเผาไหม้ในที่โล่ง ซึ่งประเทศไทยเป็นประเทศที่เพาะปลูกพืชเชิงเดี่ยวจำนวนมาก เพราะผลิตป้อนสู่บริษัทอุตสาหกรรมเกษตรขนาดใหญ่ ทำให้ต้องเผาหญ้าในที่โล่งบ่อยครั้ง\n- อุตสาหกรรมการผลิค โดยหนึ่งในพื้นที่ที่พบมลพิษทางอากาศมากที่สุดพื้นที่หนึ่ง ก็คือ พื้นที่เขตควบคุมมลพิษมบตาพด จังหวัดระยอง\n\nดังนั้นทุกวันนี้เราควรจะเช็คสภาพมลพิษทางอากาศของ PM2.5 มากกว่าพยากรณ์อากาศ ร้อนหนาวอีกนะคะ เว็บไซต์ที่แนะนำ ได้แก่ http://aqicn.org/city/bangkok/ เป็นเว็บไซต์แสดงค่ามลภาวะ PM2.5 ทางอากาศทั่วโลก แบบเรียลไทม์ และแสดงถึงวันถัดๆไปด้วยค่ะ\n\n**ถ้าวันไหนเห็นสภาพอากาศเป็นสีแดง ควรหลีกเลี่ยงการทำกิจกรรมกลางแจ้ง โดยเฉพาะเด็กและผู้สูงอายุ รวมถึงผู้ที่มีโรคประจำตัว หรือถ้าจำเป็นจริงๆ แนะนำว่าเตรียมหยิบหน้ากากอนามัยรุ่น N95 มาใส่ก่อนออกจากบ้านกันเลยค่า หน้ากากอนามัยรุ่นทั่วไปกรอง PM2.5 ไม่ได้นะคะ**\n\nสุดท้ายนี้หากเห็นว่าบทความนี้มีประโยชน์ ฝากแชร์ต่อให้เพื่อนๆหรือคนที่เรารักด้วยค่ะ\n\nในเมื่อสภาวะอากาศที่เป็นพิษแก้ไขไม่หายภายในทันที เราควรรู้จักป้องกันตนเองกันนะคะ",

  "title": "กลูเตนฟรีคืออะไร (Gluten Free)",
  "excerpt": "กลูเตนคือโปรตีนในข้าวสาลี ข้าวไรย์ ข้าวบาร์เลย์ พบได้ในเบเกอรี่และอาหารแปรรูปมากมาย อาหารปลอดกลูเตนเหมาะกับผู้แพ้กลูเตน/โรคเซลิแอค ไม่ใช่อาหารลดน้ำหนัก",
  "cover_url": "https://static.wixstatic.com/media/9bfc29_91f861d4482049ad92f30b8aa6776814~mv2.jpg",
  "created_at": "2017-11-20T09:00:00+07:00",
  "content_md": "**กลูเตนฟรี (Gluten Free) คืออะไร?**\n\nสินค้ากลูเตนฟรีเริ่มมีแพร่หลายมากขึ้นในประเทศไทย แต่หลายคนยังไม่รู้ว่าจริงๆแล้วกลูเตนคืออะไร มีในอาหารแบบไหน และเกี่ยวข้องอย่างไรกับการลดน้ำหนักอ่านบทความนี้ มีทุกคำตอบค่ะ\n\n**เริ่มจากกลูเตนคืออะไร?** กลูเตน (Gluten) เป็นโปรตีนชนิดหนึ่งที่พบได้ในข้าวสาลี ข้าวไรย์ และข้าวบาร์เลย์ ดังนั้นจะพบกลูเตนในผลิตภัณฑ์จำพวก ขนมปัง เบเกอรี่ พาย เค้ก เกือบ 100% เนื่องจากเป็นอาหารที่ทำมาจากแป้งข้าวสาลี และสาเหตุที่ใช้แป้งข้าวสาลีมาทำอาหารจำพวกเบเกอรี่นั้น เนื่องจากกลูเตนมีคุณสมบัติเด่นคือทำให้อาหารมีความยืดหยุ่น ทำให้ขนมปังเหนียวนุ่มอร่อย\n\n**กลูเตนมีในอาหารจำพวกไหน?** นอกจากผลิตภัณฑ์ในเบเกอรี่แล้ว กลูเตนมักใช้เป็นส่วนประกอบในวงการอาหารอีกมาก เรียกว่าแทบจะทุกสิ่งมีกลูเตนเป็นส่วนประกอบทั้งสิ้น\n\n- **กลุ่มข้าว แป้ง** ได้แก่ แป้งข้าวไรย์ เช่น ขนมปังข้าวไรย์ แครกเกอร์ พาสต้า แป้งข้าวบาร์เลย์ เช่น ขนมปังข้าวบาร์เลย์ แครกเกอร์ พาสต้า เครื่องดื่มรสมอลต์ แป้งข้าวสาลี ผลิตภัณฑ์ที่มีส่วนผสมจากแป้งสาลี เช่น บะหมี่ หมี่ซั่ว เกี๊ยว มะกะโรนี สปาเกตตี้ แป้งทอดกรอบ ปาท่องโก๋ ครองแครงกรอบ เฟรนช์ฟรายด์สำเร็จรูป โรตี นาน ซาลาเปา ซุปข้น สตูว์ ขนมปัง และผลิตภัณฑ์เบเกอรี่ทุกชนิด เช่น เค้ก พาย ครัวซองต์ ขนมปังกรอบ แพนเค้ก เวเฟอร์ ฯลฯ ซึ่งรวมถึงแป้งชนิดอื่นที่มีส่วนผสมของแป้งสาลีแต่มีชื่อแตกต่างกัน เช่น แป้งหมี่ แป้งดูรัม แป้งซาโมลินา แป้งฟารินาแป้งแกรม และแป้งสเปลท์\n\n- **กลุ่มเนื้อสัตว์** ได้แก่ เนื้อสัตว์แปรรูป เช่น ลูกชิ้น ทอดมัน ไส้กรอก เนื้อสัตว์ชุบแป้งทอด เช่น นักเก็ต เทมปุระ ไก่ทอด กลุ่ม เนื้อสัตว์หมักนุ่ม เช่น หมูสับปรุงรส หมูเด้ง หมูนุ่ม ไก่ย่างซีอิ๊ว เนื้อสัตว์เทียม เช่น โปรตีนเกษตร หมี่กึง อาหารทะเลบางชนิด ซึ่งมักจะลดกลิ่นคาวโดยการล้างด้วยแป้งสาลีหรือแป้งหมี่ก่อนนำไปปรุงอาหาร\n\n- **กลุ่มผัก-ผลไม้** ได้แก่ ผักผลไม้ที่ปรุงโดยการทอด เพราะส่วนใหญ่แป้งทอดกรอบมักมีส่วนผสมของแป้งเอนกประสงค์หรือแป้งสาลีนั่นเอง กลุ่มผักผลไม้กวน เนื่องจากแป้งสาลีช่วยให้อาหารมีความหนืด จึงนิยมนำมาผสมอาหารที่กวนให้มีความหนืดน่ารับประทานมากยิ่งขึ้น\n\n- **กลุ่มขนม** เช่น ไอศครีม ลูกอม กล้วยทอด มันทอด ไข่นกกระทา ขนมไหว้พระจันทร์\n\n- **กลุ่มซอสปรุงรส** เช่น น้ำมันหอย ซีอิ๊ว น้ำสลัด ผงทำซุปข้น เกรวี่ ซอสข้าวหมูแดง\n\n**ทำไมถึงต้อง Gluten Free?** สุพิศ กลิ่นหวล นักโภชนาการชำนาญการพิเศษ ฝ่ายโภชนาการ โรงพยาบาลกลาง สำนักการแพทย์ อธิบายไว้ว่าจริงๆแล้ว \"กลูเตนเป็นเพียงโปรตีนชนิดหนึ่ง ที่ไม่เป็นอันตรายสำหรับคนทั่วไปเพียงแต่ต้องรับประทานอย่างพอเหมาะ นอกจากผู้ที่มีอาการแพ้กลูเตน หรือโรคความผิดปกติในช่องท้องที่กลูเตนไปขัดขวางการดูดซึมอาหาร ซึ่งคนไทยส่วนใหญ่ที่บริโภคข้าวเป็นอาหารหลัก ก็มีโอกาสเกิดโรคดังกล่าวน้อย\"\n\nดังนั้นอาหาร Gluten Free จึงเหมาะสมสำหรับผู้ที่แพ้กลูเตนหรือบุคคลที่เป็นโรคเซลิแอค (Celiac Disease) ค่ะ\n\nและสำหรับความเชื่อในการเลือกรับประทาน \"อาหารปลอดกลูเตน\" (Gluten-free) ไม่ได้เกี่ยวข้องกับการส่งผลดีต่อสุขภาพเพิ่มขึ้น รวมถึงอาหารปลอดกลูเตนไม่ใช่อาหารลดน้ำหนัก สำหรับผู้ที่ไม่มีอาการแพ้สามารถกินอาหารที่มีกลูเตนได้ปกติ ไม่จำเป็นต้องซื้ออาหารที่ระบุว่า 'Gluten Free' เพราะอาหารประเภทนี้ยังมีพลังงานเท่ากับอาหารปกติ เพียงแต่ผลิตขึ้นโดยที่ไม่มีส่วนผสมของโปรตีนจากข้าวสาลี ข้าวไรย์ และข้าวบาร์เลย์ เช่น ขนมปังสูตรไม่มีกลูเตน แต่ปริมาณไขมัน แป้ง น้ำตาลยังเท่าเดิม\n\n**สำหรับผู้ที่แพ้กลูเตนแนะนำอาหารตามนี้ค่ะ** อาหารที่ปราศจากกลูเตน หมายถึง หากอาหารเหล่านี้ไม่ผ่านกระบวนการผลิตใดๆ และไม่มีการปรุงแต่งรสชาติหรือใส่สารกันเสียและไม่มีส่วนผสมของกลูเตน อาหารเหล่านี้จะปราศจากกลูเตนโดยสิ้นเชิง ซึ่งมีอาหาร ดังต่อไปนี้\n\nถั่วชนิดต่างๆ เมล็ดพืช เนื้อสัตว์ สัตว์ปีก และอาหารทะเล ผักและผลไม้สด ผลิตภัณฑ์จากนม ส่วนอาหารประเภทแป้งที่ปราศจากกลูเตน ได้แก่\n\nข้าว ข้าวฟ่าง ข้าวโพด มันฝรั่ง แป้งข้าวเจ้า แป้งข้าวเหนียว แป้งมันสำปะหลัง แป้งข้าวฟ่าง แป้งท้าวยายม่อม แป้งซอร์กัม ถั่วเหลืองหรือแป้งจากถั่วอื่นๆ แป้งจากผักโขม (Amaranth) บัควีท (Buckwheat) คอร์นมีล (Cornmeal) เมล็ดแฟล็ก (Flax) โฮมินี (Hominy) ควินัว (Quinoa)\n\nซึ่งจริงๆแล้วอาหารที่ไม่ผ่านการแปรรูป เป็นอาหารที่ปลอดกลูเตนโดยธรรมชาติอยู่แล้ว เช่น ผลไม้และผักสด ปลา ไก่ เนื้อไร้มัน ถั่วชนิดต่างๆ ถั่วลันเตา ข้าวกล้อง ผลิตภัณฑ์จากนมไขมันต่ำ ถั่วเปลือกแข็ง เมล็ดพืชต่างๆ น้ำมันมะกอก\n\nจริงๆแล้วสำหรับคนที่ไม่ได้แพ้กลูเตนเพียงเลือกรับประทานอาหารให้พอดี ถูกหลักอนามัย และออกกำลังกายอย่างสม่ำเสมอ เพียงเท่านี้สุขภาพร่างกายก็จะแข็งแรงสมวัยค่ะ\n\nCR : www.thaihealth.or.th",

  "excerpt": "อาหารคลีนคืออะไร มีหลักการและประโยชน์อย่างไร พร้อม 10 อาหารคลีนที่แนะนำ เคล็ดลับการทำ และข้อควรระวัง เพื่อเริ่มต้นดูแลสุขภาพอย่างยั่งยืน",
  "cover_url": "https://static.wixstatic.com/media/9bfc29_55b039d278184c94bd96d91098d1a6af~mv2.jpg",
  "created_at": "2025-03-26T09:00:00+07:00",
  "content_md": "## ทำไมต้องใส่ใจอาหารเพื่อสุขภาพ\n\nในยุคปัจจุบันที่ชีวิตเต็มไปด้วยความเร่งรีบและความเครียด การดูแลสุขภาพผ่านอาหารถือเป็นเรื่องสำคัญมากขึ้นเรื่อยๆ อาหารคลีนไม่ใช่แค่เทรนด์แต่เป็นวิถีชีวิตที่ช่วยให้เราสามารถป้องกันโรคและเพิ่มคุณภาพชีวิตได้อย่างยั่งยืน\n\n## อาหารคลีนคืออะไร?\n\nอาหารคลีน (Clean Food) หมายถึง อาหารที่ผ่านการแปรรูปน้อยที่สุด เน้นความสดใหม่ มีคุณค่าทางโภชนาการสูง และปราศจากสารเคมีที่เป็นอันตราย เป็นการบริโภคอาหารที่ใกล้ชิดธรรมชาติมากที่สุด\n\n### หลักการสำคัญของอาหารคลีน\n\n1. **เลือกวัตถุดิบธรรมชาติ**: เน้นผักสด ผลไม้ เนื้อสัตว์คุณภาพ และธัญพืชแบบไม่ผ่านการขัดสี\n\n2. **หลีกเลี่ยงอาหารแปรรูป**: ลดการบริโภคอาหารสำเร็จรูป ขนมกรุบกริบ และเครื่องดื่มที่มีน้ำตาลสูง\n\n3. **ปรุงอาหารด้วยวิธีที่เหมาะสม**: นึ่ง ต้ม อบ แทนการทอดหรือผัดน้ำมันมาก\n\n## ประโยชน์ของอาหารเพื่อสุขภาพ\n\n### ด้านร่างกาย\n\n- เพิ่มภูมิต้านทาน\n- ควบคุมน้ำหนัก\n- ลดความเสี่ยงของโรคเรื้อรัง\n- เพิ่มพลังงานและความกระปรี้กระเปร่า\n\n### ด้านจิตใจ\n\n- ลดความเครียด\n- เพิ่มความมั่นใจ\n- ช่วยให้นอนหลับดีขึ้น\n\n## 10 อาหารคลีนที่แนะนำ\n\n1. ผักใบเขียว: คะน้า ผักบุ้ง สปาแนค\n2. ปลา: ปลาแซลมอน ปลาทู\n3. ธัญพืช: ข้าวกล้อง ควินัว\n4. ไข่\n5. ถั่วและเมล็ดพืช\n6. โยเกิร์ตไร้ไขมัน\n7. อกไก่\n8. ผลไม้ตระกูลเบอร์รี่\n9. น้ำมันมะกอก\n10. เต้าหู้\n\n## เคล็ดลับการทำอาหารคลีน\n\n- เตรียมอาหารล่วงหน้า\n- ใช้เครื่องปรุงธรรมชาติ\n- ควบคุมปริมาณน้ำตาลและเกลือ\n- ดื่มน้ำให้เพียงพอ\n\n## ข้อควรระวังในการบริโภคอาหารคลีน\n\n- ตรวจสอบแหล่งที่มาของวัตถุดิบ\n- อ่านฉลากโภชนาการ\n- คำนวณสัดส่วนสารอาหารให้เหมาะสม\n- ปรึกษาโภชนากรหากมีข้อสงสัย\n\n---\n\nการรับประทานอาหารเพื่อสุขภาพไม่ใช่เรื่องยาก แค่ตั้งใจและเริ่มทีละนิด รับรองว่าร่างกายจะตอบแทนคุณอย่างแน่นอน\n\n👉 เริ่มต้นชีวิตใหม่กับอาหารคลีนของ Under360 วันนี้เลย!",

  "content_md": "# คนเราควรดื่มน้ำวันละเท่าไหร่\n\nสวัสดีเดือนเมษายนค่า เดือนนี้เรามีโปรโมชั่นดับร้อน ซื้ออาหารคลีน 2 คอร์ส รับฟรีไปเลย Infused water bottle มูลค่า 350 บาท!! (จะใช้ภายในอาทิตย์เดียวกัน หรือคนละอาทิตย์ก็ได้ หรือรับแบบแพคกับข้าวสูญญากาศไซส์ s ก็ได้เช่นกัน)\n\nวันนี้พลอยเลยมาเขียนบทความเกี่ยวกับการดื่มน้ำให้ทุกท่านอ่านกันค่ะ\n\n**เริ่มจากคำถามเบสิคว่าวันนึงคนเราควรดื่มน้ำเท่าไหร่?** ถ้าตอบแบบทั่วไปและไม่ผิดก็คือคนเราควรดื่มน้ำให้ได้ 8 - 10 แก้ว / วัน แต่แก้วคนเราก็ไม่เท่ากัน ดังนั้นพลอยจึงนำสูตรคิดจากองค์กรอนามัยโลกมาคำนวณให้ดูกันนะคะ โดยสูตรนี้มีน้ำหนักตัวเป็นตัวแปรหลักแล้ว และอาจมีปัจจัยอื่นมาเกี่ยวข้องด้วยในด้านพฤติกรรม เช่น การออกกำลังกาย สภาพอากาศ รวมไปถึงอาหารอื่นๆ ที่ทานในแต่ละมื้อ (ที่มีน้ำเป็นส่วนประกอบ)\n\n**สูตรคำนวณ (น้ำหนักตัว (กิโลกรัม) x 2.2 x 30) / 2** หน่วยที่ได้ออกมาเป็นมิลลิลิตรนะคะ เช่น หนัก 60 กิโลกรัม เอาเข้าแทนค่าก็จะได้ควรดื่มน้ำ (60 x 2.2 x 30) / 2 = 1980 มิลลิลิตร แปลว่าคนที่มีน้ำหนักตัว 60 กิโลกรัมไม่ควรดื่มน้ำต่ำกว่า 1,980 ml/วัน เพราะถ้าเราดื่มน้ำน้อยกว่านี้ เลือดที่ 90% ทำมาจากน้ำก็จะไหลเวียนไม่สะดวก ร่างกายก็จะขับของเสียได้ยาก ระบบร่างกายต่างๆทำงานไม่เต็มที่ รวมถึงระบบเผาผลาญด้วย เรียกว่าดื่มน้ำไม่พอเป็นบ่อเกิดสารพัดโรคค่ะ\n\n**ดื่มน้ำบ่อยก็ปัสสาวะบ่อยโดยเฉพาะตอนกลางคืนผิดปกติไหม?** โดยปกติกะเพราปัสสาวะจะมีความจุประมาณ 400 - 500 ml ดังนั้นในตอนกลางวันการเข้าห้องน้ำเพื่อปัสสาวะอย่างเดียวจะอยู่ที่ 4 - 6 ครั้งเป็นเรื่องปกตินะคะ ซึ่งการเข้าห้องน้ำมากหรือน้อยขึ้นอยู่กับปัจจัยอื่นๆร่วมด้วย เช่น ปริมาณน้ำที่ดื่ม, การออกกำลังกาย, การเสียเหงื่อ ดังนั้นเราควรสังเกตตัวเองหากเข้าห้องน้ำเกิน 10 ครั้งต่อวันหรือบ่อยจนรำคาญอาจจะมีปัญหาเรื่องไตควรไปพบแพทย์นะคะ แต่หากเข้าห้องน้ำน้อยเกินไปเช่น 2-3 ครั้งต่อวัน น่าจะขาดน้ำ ควรดื่มน้ำให้มากขึ้นกว่าเดิมค่ะ\n\nส่วนการปัสสาวะตอนกลางคืน ซึ่งเป็นช่วงเวลาของการนอนหลับ เราไม่ได้ดื่มมาก จึงทำให้ช่วงเวลากลางคืนจะมีระยะของการถ่ายปัสสาวะห่างออกไป ทำให้โดยปกติจะต้องตื่นมาถ่ายปัสสาวะคืนละ 1 ครั้ง บางคนอาจจะไม่ต้องตื่นเลยหากถ่ายปัสสาวะก่อนนอนแล้ว แต่อย่างไรก็ดีในวัยสูงอายุอาจจะถ่ายปัสสาวะคืนละ 2 ครั้งได้โดยไม่ถือเป็นความผิดปกติค่ะ\n\n**เทคนิคในการดื่มน้ำ** พอเราคำนวณและรู้แล้วว่าการปัสสาวะ 4 - 6 ครั้ง/วันเป็นเรื่องปกติ ดังนั้นควรมาดื่มน้ำให้เพียงพอต่อวันกันนะคะ ไม่ใช่ว่ารอให้กระหายน้ำก่อนแล้วจึงดื่ม เพราะการกระหายน้ำแปลว่าร่างกายเราขาดน้ำไปเรียบร้อยแล้วค่ะ ดังนั้นเทคนิคในการดื่มน้ำก็คือควรดื่มในช่วงกลางวันให้มากเข้าไว้ ส่วนกลางคืนลดหลั่นลงมาตามภาพเลยค่ะ\n\nTIPS ก็คือไม่ควรดื่มมากๆขณะทานข้าว เพราะทำให้กรดในกระเพาะเจือจาง ย่อยยาก ให้หันมาจิบน้ำบ่อยๆระหว่างวันแทน หรือใครมัวแต่ทำงานจนลืมแนะนำให้พกกระติกน้ำคู่ใจไว้ข้างกาย หมด 1 ขวดขีด 1 ขีดไปเลยจ้า\n\nปล. กระติกน้ำแก้วที่ทางร้านแถม 1 ขวด = 300ml ค่ะ\n\n**ส่วนใครคิดว่าไม่อยากดื่มน้ำเยอะเพราะกลัวพุงป่อง อ้วนและบวม** บอกเลยว่าคิดผิด เพราะมันตรงข้ามม๊ากมาก การดื่มน้ำยิ่งเยอะยิ่งทำให้ระบบเผาผลาญทำงานดีขึ้น น้ำหนักลดง่ายขึ้น และหากดื่มมากเกินไป ร่างกายก็จะขับออกได้เองค่ะ ในทางกลับกันหากเราดื่มน้ำน้อย ร่างกายนี่แหละจะบวมน้ำแทนค่ะเพราะร่างกายคิดว่าเราขาดน้ำ จึงต้องกักเก็บเก็บน้ำไว้\n\nดังนั้นรู้แบบนี้แล้วหันมาดื่มน้ำให้เพียงพอกันนะคะ เริ่มต้นจากคำนวณสูตรและหยิบน้ำมาดื่มเข้าปากกันเลยจ้า\n\nแต่ขอเป็นน้ำเปล่านะคะ หากหยิบน้ำหวานมาดื่มจะได้เบาหวานแทนสุขภาพดีค่ะ\n\nหากชื่นชอบบทความฝากแชร์เพื่อเป็นกำลังใจให้แม่ค้าในการเขียนบทความต่อๆไปด้วยนะคะ\n\nขอบคุณค่ะ",

  "excerpt": "เปิดค่าพลังงาน สารอาหาร และค่าดัชนีน้ำตาล (GI) ของทุเรียน พร้อมพลิกความเชื่อว่าทุเรียนน้ำตาลสูง และวิธีทานให้พอดีสำหรับคนทานอาหารคลีน",
