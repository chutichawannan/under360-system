  "content_md": "## เข้าใจอาหารคลีนที่แท้จริง\n\nสวัสดีเพื่อนๆ ที่รักสุขภาพทุกคน! เชื่อว่าหลายคนคงเคยได้ยินวลีฮิตที่ว่า \"You are what you eat\" หรือ \"คุณคือสิ่งที่คุณกิน\" กันมาบ้างแล้วใช่ไหมล่ะ? และนี่คือเหตุผลที่ทำให้อาหารคลีนกลายเป็นเทรนด์ฮอตฮิตที่ไม่เคยตกยุคเลยสักที แต่คำถามที่หลายคนสงสัยคือ... \"แค่กินอาหารคลีนโดยไม่ต้องออกกำลังกายเลย จะทำให้สุขภาพดีได้จริงหรือ?\"\n\nวันนี้เราจะมาไขข้อข้องใจนี้กัน พร้อมแชร์ความรู้และเคล็ดลับการกินอาหารคลีนอย่างถูกวิธี เพื่อให้คุณได้รับประโยชน์สูงสุดจากอาหารที่คุณเลือกทาน!\n\n## อาหารคลีนคืออะไรกันแน่?\n\nก่อนที่เราจะเจาะลึกเรื่องนี้ มาทำความเข้าใจก่อนว่าอาหารคลีนที่แท้จริงคืออะไร อาหารคลีนไม่ได้หมายถึงแค่ผักสดๆ หรืออาหารที่ต้มแบบจืดชืด แต่คือ:\n\n- อาหารที่ผ่านการแปรรูปน้อยที่สุด\n- อาหารที่ปราศจากสารเคมี สารกันบูด และสารปรุงแต่งที่ไม่จำเป็น\n- อาหารที่มีคุณค่าทางโภชนาการครบถ้วน\n- อาหารที่ปรุงด้วยวิธีที่ดีต่อสุขภาพ เช่น ต้ม นึ่ง อบ\n\nการกินอาหารคลีนจึงคือการกินอาหารที่ \"สะอาด\" ทั้งในแง่ของวัตถุดิบและกระบวนการปรุง เพื่อให้ร่างกายได้รับสารอาหารอย่างครบถ้วนและปลอดภัยที่สุด\n\n## ประโยชน์ของอาหารคลีนที่คุณอาจไม่เคยรู้\n\nแค่หันมากินอาหารคลีนอย่างสม่ำเสมอ คุณจะได้รับประโยชน์มากมายที่อาจเกินคาด:\n\n### 1. ควบคุมน้ำหนักได้ดีขึ้น\n\nอาหารคลีนมักมีแคลอรี่ต่ำกว่าอาหารทั่วไป แต่มีสารอาหารที่จำเป็นครบถ้วน ทำให้รู้สึกอิ่มนานและลดความอยากอาหารโดยไม่ต้องอดมื้อ\n\n### 2. ผิวพรรณดีขึ้นอย่างเห็นได้ชัด\n\nสารอาหารจากผักผลไม้สดและโปรตีนคุณภาพดีจะช่วยฟื้นฟูผิวจากภายใน ทำให้ผิวเปล่งปลั่ง ลดการเกิดสิว และชะลอความเสื่อมของเซลล์ผิว\n\n### 3. ระบบย่อยอาหารทำงานได้ดีขึ้น\n\nกากใยอาหารจากผักผลไม้และธัญพืชไม่ขัดสีช่วยให้ระบบขับถ่ายทำงานได้อย่างมีประสิทธิภาพ ลดปัญหาท้องผูก และล้างสารพิษออกจากร่างกาย\n\n### 4. มีพลังงานเพิ่มขึ้น\n\nเมื่อร่างกายได้รับสารอาหารที่มีประโยชน์อย่างครบถ้วน ระดับพลังงานจะเพิ่มสูงขึ้น ทำให้รู้สึกกระปรี้กระเปร่าตลอดทั้งวัน แม้จะไม่ได้ออกกำลังกายก็ตาม\n\n### 5. ลดความเสี่ยงของโรคเรื้อรัง\n\nการกินอาหารคลีนช่วยลดความเสี่ยงต่อโรคต่างๆ เช่น เบาหวาน ความดันโลหิตสูง โรคหัวใจ และมะเร็งบางชนิด\n\n## แค่กินคลีนโดยไม่ออกกำลังกาย พอหรือไม่?\n\nนี่คือคำถามสำคัญที่หลายคนสงสัย คำตอบคือ... **ได้ แต่มีข้อแม้**\n\nการกินอาหารคลีนโดยไม่ออกกำลังกายสามารถส่งผลดีต่อสุขภาพโดยรวมได้จริง แต่อาจไม่ใช่วิธีที่สมบูรณ์แบบที่สุดในการดูแลสุขภาพ มาดูกันว่า:\n\n**สิ่งที่การกินคลีนอย่างเดียวทำได้:**\n\n- ควบคุมน้ำหนักในระดับหนึ่ง\n- ปรับสมดุลสารอาหารในร่างกาย\n- ช่วยให้ระบบย่อยอาหารทำงานได้ดีขึ้น\n- ลดการอักเสบในร่างกาย\n- เพิ่มภูมิคุ้มกัน\n\n**สิ่งที่การกินคลีนอย่างเดียวอาจทำได้ไม่เต็มที่:**\n\n- สร้างมวลกล้ามเนื้อ\n- เพิ่มความแข็งแรงของกระดูกและข้อต่อ\n- เพิ่มประสิทธิภาพการทำงานของหัวใจและปอด\n- เสริมสร้างความยืดหยุ่นและการทรงตัว\n- ลดความเครียดและปรับสมดุลฮอร์โมน\n\n## เคล็ดลับการกินคลีนให้ได้ผลแม้ไม่ได้ออกกำลังกาย\n\nหากคุณไม่มีเวลาหรือไม่สามารถออกกำลังกายได้ในขณะนี้ นี่คือวิธีที่จะทำให้การกินคลีนของคุณมีประสิทธิภาพมากขึ้น:\n\n### 1. เน้นสมดุลของสารอาหาร\n\nแทนที่จะเน้นแค่ลดแคลอรี่ ให้ใส่ใจสัดส่วนของสารอาหารหลัก คือ โปรตีน คาร์โบไฮเดรต และไขมันดี ในสัดส่วนที่เหมาะสม (40:30:30) เพื่อให้ร่างกายได้รับสารอาหารครบถ้วน\n\n### 2. จัดตารางมื้ออาหารให้เหมาะสม\n\nการกินอาหารเป็นเวลาและแบ่งเป็นมื้อเล็กๆ 5-6 มื้อต่อวัน จะช่วยให้เมตาบอลิซึมทำงานได้ดีและต่อเนื่อง แม้คุณจะไม่ได้ออกกำลังกาย\n\n### 3. ดื่มน้ำให้เพียงพอ\n\nน้ำเป็นส่วนสำคัญของการกินคลีน ดื่มน้ำอย่างน้อยวันละ 8 แก้ว เพื่อช่วยในการขับถ่ายสารพิษและทำให้เซลล์ต่างๆ ทำงานได้อย่างมีประสิทธิภาพ\n\n### 4. เพิ่มการเคลื่อนไหวในชีวิตประจำวัน\n\nแม้จะไม่ได้ออกกำลังกายอย่างเป็นทางการ แต่การเพิ่มการเคลื่อนไหวในชีวิตประจำวัน เช่น เดินขึ้นบันไดแทนการใช้ลิฟต์ จอดรถไกลๆ และเดินเข้าออฟฟิศ หรือทำงานบ้านอย่างกระฉับกระเฉง ก็ช่วยเผาผลาญแคลอรี่ได้มากขึ้น\n\n### 5. กินอาหารที่มีสารต้านอนุมูลอิสระสูง\n\nเพิ่มการบริโภคผักและผลไม้ที่มีสีสันสดใส เพราะมักอุดมไปด้วยสารต้านอนุมูลอิสระ ซึ่งช่วยปกป้องเซลล์จากความเสียหายและลดการอักเสบในร่างกาย\n\n## เมนูอาหารคลีนที่ทำง่ายสำหรับคนไม่มีเวลา\n\nข้ออ้างที่ว่าอาหารคลีนทำยากและใช้เวลานานนั้นไม่จริงเสมอไป นี่คือไอเดียเมนูง่ายๆ ที่ใช้เวลาทำไม่เกิน 15 นาที:\n\n**มื้อเช้า:**\n\n- โยเกิร์ตกรีกราดด้วยน้ำผึ้งและผลไม้สด\n- ขนมปังโฮลเกรนทาอะโวคาโดและไข่ต้ม\n- สมูทตี้ผักผลไม้ใส่โปรตีนจากถั่วหรือนมถั่วเหลือง\n\n**มื้อกลางวัน:**\n\n- สลัดควินัวกับผักหลากสี และอกไก่อบหรือปลาย่าง\n- ข้าวกล้องผัดกับผักรวมและเต้าหู้\n- แซนด์วิชไข่ขาวกับอะโวคาโดและผักสด\n\n**มื้อเย็น:**\n\n- ซุปผักรวมกับถั่วขาวหรือถั่วเลนทิล\n- ปลาย่างกับมันฝรั่งอบและผักย่าง\n- อกไก่อบสมุนไพรกับมันเทศและสลัดผัก\n\n**ของว่าง:**\n\n- ผลไม้สด\n- ถั่วและเมล็ดธัญพืชคั่ว\n- แครกเกอร์โฮลเกรนกับฮัมมัส\n\n## ข้อควรระวังในการกินคลีนโดยไม่ออกกำลังกาย\n\nแม้การกินคลีนจะมีประโยชน์มากมาย แต่ก็มีข้อควรระวังบางประการ:\n\n### 1. อย่าจำกัดแคลอรี่มากเกินไป\n\nการกินแคลอรี่น้อยเกินไปจะทำให้เมตาบอลิซึมช้าลง และอาจทำให้ร่างกายขาดสารอาหารบางชนิดได้\n\n### 2. ระวังการขาดกล้ามเนื้อ\n\nการไม่ออกกำลังกายควบคู่กับการกินคลีนอาจทำให้มวลกล้ามเนื้อลดลงได้ โดยเฉพาะถ้าคุณกินโปรตีนไม่เพียงพอ\n\n### 3. ความอดทนของร่างกายมีแนวโน้มลดลง\n\nแม้คุณจะมีสุขภาพที่ดีจากการกินคลีน แต่ความสามารถในการทำกิจกรรมที่ใช้แรงหรือต้องทนทานอาจลดลงได้หากไม่มีการออกกำลังกายเลย\n\n## กินคลีนอย่างเดียวได้ผลจริงหรือ?\n\nการกินอาหารคลีนแม้จะไม่ได้ออกกำลังกายนั้น **ดีกว่าการไม่ใส่ใจเรื่องอาหารเลย** อย่างแน่นอน และสามารถช่วยปรับปรุงสุขภาพโดยรวมได้มาก แต่เพื่อสุขภาพที่สมบูรณ์แบบ การผสมผสานระหว่างการกินคลีนและการออกกำลังกายแม้เพียงเล็กน้อยก็จะให้ผลลัพธ์ที่ดีกว่า\n\nอย่างไรก็ตาม หากชีวิตประจำวันของคุณไม่เอื้ออำนวยให้ออกกำลังกายได้ในขณะนี้ การเริ่มต้นด้วยการปรับเปลี่ยนการกินเป็นอาหารคลีนก็เป็นก้าวแรกที่ยอดเยี่ยมแล้ว!",

  "content_md": "สวัสดีเพื่อนๆ นักชิมทุกคน! เวลาที่เราปรุงอาหาร เรามักจะใส่เครื่องปรุงรสต่างๆ เพื่อให้อาหารของเรามีรสชาติที่อร่อยถูกปาก แต่รู้หรือไม่ว่า การใส่รสดีหรือผงชูรสมากเกินไปอาจส่งผลเสียต่อสุขภาพของเราได้หลายประการ\n\nในบทความนี้ เราจะมาพูดคุยกันถึงโทษของการใส่รสดีในอาหารที่มากเกินความจำเป็น เพื่อให้คุณได้ตระหนักและรู้จักการปรุงอาหารให้อร่อยอย่างปลอดภัยมากขึ้น ไม่ว่าคุณจะเป็นคนที่ชอบทำอาหารทานเองที่บ้าน หรือเป็นเจ้าของร้านอาหาร บทความนี้มีประโยชน์สำหรับทุกคนแน่นอน!\n\n## รสดีคืออะไรกันแน่?\n\nก่อนที่เราจะไปดูกันว่าการใส่รสดีมากเกินไปมีโทษอย่างไรบ้าง มาทำความเข้าใจกันก่อนว่ารสดีคืออะไร\n\nรสดี หรือที่หลายคนรู้จักในชื่อ \"ผงชูรส\" มีชื่อทางวิทยาศาสตร์ว่า โมโนโซเดียมกลูตาเมต (Monosodium Glutamate หรือ MSG) เป็นเกลือโซเดียมของกรดกลูตามิก ซึ่งเป็นกรดอะมิโนที่พบได้ตามธรรมชาติในอาหารหลายชนิด เช่น เนื้อสัตว์ ชีส และผัก\n\nรสดีถูกใช้อย่างแพร่หลายในการปรุงอาหารเพื่อเพิ่มรสชาติที่เรียกว่า \"อูมามิ\" (Umami) หรือรสชาติที่ทำให้อาหารมีความกลมกล่อมมากขึ้น แต่การใช้รสดีมากเกินไปก็อาจนำมาซึ่งปัญหาสุขภาพต่างๆ ได้\n\n## โทษของการใส่รสดีมากเกินไป\n\n### 1. อาการแพ้และภาวะไม่ทนต่อผงชูรส\n\nหลายคนอาจเคยได้ยินเกี่ยวกับ \"Chinese Restaurant Syndrome\" หรือกลุ่มอาการที่เกิดจากการรับประทานอาหารที่มีผงชูรสปริมาณมาก ซึ่งอาจทำให้เกิดอาการต่างๆ เช่น:\n\n- ปวดศีรษะอย่างรุนแรง\n- หน้าแดง ร้อนวูบวาบ\n- เหงื่อออกมากผิดปกติ\n- แน่นหน้าอก\n- คลื่นไส้ อาเจียน\n- ชาบริเวณปากและคอ\n\nถึงแม้ว่าการศึกษาทางวิทยาศาสตร์จะยังไม่สามารถยืนยันได้ว่าอาการเหล่านี้เกิดจากผงชูรสโดยตรง แต่มีผู้บริโภคจำนวนไม่น้อยที่รายงานว่าตนเองมีอาการไม่สบายหลังจากรับประทานอาหารที่มีผงชูรสในปริมาณมาก\n\n### 2. เพิ่มความเสี่ยงต่อโรคอ้วนและโรคเบาหวาน\n\nการเติมรสดีในอาหารช่วยเพิ่มรสชาติให้อาหารอร่อยขึ้น ทำให้เรารับประทานอาหารได้มากขึ้นโดยไม่รู้ตัว นี่อาจเป็นสาเหตุหนึ่งที่ทำให้เรารับประทานอาหารเกินความจำเป็น นำไปสู่การสะสมไขมันและน้ำหนักตัวที่เพิ่มขึ้น\n\nมีงานวิจัยบางชิ้นพบความเชื่อมโยงระหว่างการบริโภคผงชูรสในปริมาณมากกับโรคอ้วนและภาวะดื้อต่ออินซูลิน ซึ่งเป็นสาเหตุสำคัญของโรคเบาหวานชนิดที่ 2\n\n### 3. ปัญหาระบบประสาทและสมอง\n\nการศึกษาในห้องทดลองพบว่า การได้รับผงชูรสในปริมาณสูงอาจส่งผลกระทบต่อระบบประสาทและการทำงานของสมอง โดยอาจก่อให้เกิด:\n\n- ปัญหาด้านความจำ\n- อาการวิตกกังวล\n- ความผิดปกติในการนอนหลับ\n- ผลกระทบต่อการเรียนรู้และความสามารถในการจดจำ\n\nอย่างไรก็ตาม งานวิจัยเหล่านี้ส่วนใหญ่ยังเป็นการทดลองในสัตว์ทดลอง และยังต้องการการศึกษาเพิ่มเติมในมนุษย์\n\n### 4. ผลกระทบต่อระบบทางเดินอาหาร\n\nการบริโภคอาหารที่มีผงชูรสในปริมาณมากเป็นประจำอาจส่งผลต่อระบบทางเดินอาหาร ทำให้เกิดอาการต่างๆ เช่น:\n\n- กรดไหลย้อน\n- แน่นท้อง อืดแน่น\n- ท้องเสีย\n- อาหารไม่ย่อย\n\nนอกจากนี้ ยังมีการศึกษาที่พบว่า การได้รับผงชูรสในปริมาณสูงอาจส่งผลกระทบต่อจุลินทรีย์ในลำไส้ ซึ่งมีความสำคัญต่อระบบภูมิคุ้มกันและการย่อยอาหารของเรา\n\n### 5. ความดันโลหิตสูง\n\nผงชูรสมีโซเดียมเป็นส่วนประกอบ ดังนั้นการบริโภคในปริมาณมากอาจนำไปสู่การได้รับโซเดียมเกินความต้องการของร่างกาย ซึ่งเป็นปัจจัยเสี่ยงสำคัญของโรคความดันโลหิตสูง\n\nผู้ที่มีปัญหาความดันโลหิตสูงหรือมีความเสี่ยงต่อโรคหัวใจควรระมัดระวังการบริโภคอาหารที่มีผงชูรสสูงเป็นพิเศษ\n\n## ใครควรหลีกเลี่ยงการบริโภครสดี?\n\nถึงแม้ว่าองค์การอาหารและยาของหลายประเทศจะจัดให้ผงชูรสเป็นสารปรุงแต่งอาหารที่ปลอดภัย แต่มีกลุ่มคนบางกลุ่มที่ควรระมัดระวังหรือหลีกเลี่ยงการบริโภคผงชูรส ได้แก่:\n\n- ผู้ที่มีอาการแพ้หรือไม่ทนต่อผงชูรส\n- ผู้ป่วยโรคความดันโลหิตสูง\n- ผู้ป่วยโรคไต เนื่องจากมีข้อจำกัดในการบริโภคโซเดียม\n- หญิงตั้งครรภ์และให้นมบุตร (ควรปรึกษาแพทย์)\n- ผู้ที่มีอาการปวดศีรษะไมเกรนบ่อยครั้ง\n\n## ทางเลือกสำหรับการปรุงอาหารให้อร่อยโดยไม่ต้องใช้รสดี\n\nการลดหรือเลิกใช้ผงชูรสไม่ได้หมายความว่าอาหารของคุณจะต้องจืดชืดและไม่น่ารับประทาน มีวิธีการมากมายที่จะช่วยเพิ่มรสชาติให้อาหารโดยไม่ต้องพึ่งพารสดี เช่น:\n\n### 1. ใช้สมุนไพรและเครื่องเทศธรรมชาติ\n\nสมุนไพรสดและเครื่องเทศต่างๆ สามารถเพิ่มกลิ่นและรสชาติให้อาหารได้อย่างยอดเยี่ยม ลองใช้:\n\n- ใบโหระพา กะเพรา สะระแหน่\n- ขิง ข่า ตะไคร้\n- พริกไทย พริกไทยดำ\n- ยี่หร่า อบเชย กานพลู\n\n### 2. น้ำซุปและน้ำสต็อกบ้านทำ\n\nการทำน้ำซุปหรือน้ำสต็อกจากกระดูกสัตว์ ผัก และสมุนไพรต่างๆ จะให้รสชาติที่เข้มข้นและอุดมไปด้วยสารอาหาร โดยไม่ต้องพึ่งพาผงชูรส\n\n### 3. ซอสธรรมชาติ\n\nซอสที่ทำจากธรรมชาติ เช่น ซอสมะเขือเทศ น้ำปลา ซีอิ๊ว หรือซอสถั่วเหลือง (ในปริมาณที่เหมาะสม) สามารถเพิ่มรสชาติให้อาหารได้โดยไม่ต้องใช้ผงชูรส\n\n### 4. ใช้ผักและผลไม้ที่มีรสเข้มข้น\n\nผักและผลไม้บางชนิดมีรสชาติเข้มข้นที่สามารถเพิ่มรสชาติให้อาหารได้ เช่น:\n\n- มะเขือเทศ\n- เห็ดหอม\n- หอมใหญ่ กระเทียม\n- น้ำมะนาว น้ำส้มสายชู\n\n## บทสรุป\n\nการใส่รสดีในอาหารอาจช่วยเพิ่มรสชาติให้อร่อยมากขึ้นในระยะสั้น แต่การบริโภคในปริมาณมากและเป็นประจำอาจนำมาซึ่งผลเสียต่อสุขภาพหลายประการ ตั้งแต่อาการแพ้ ผลกระทบต่อระบบประสาทและสมอง ไปจนถึงความเสี่ยงต่อโรคอ้วนและความดันโลหิตสูง\n\nการเลือกใช้วัตถุดิบคุณภาพดี สมุนไพรและเครื่องเทศธรรมชาติ ตลอดจนเทคนิคการปรุงอาหารที่ถูกต้อง จะช่วยให้คุณสามารถทำอาหารรสชาติดีโดยไม่ต้องพึ่งพารสดีมากเกินไป\n\nสุขภาพที่ดีเริ่มต้นจากอาหารที่ดี และการลดหรือเลิกใช้ผงชูรสในการปรุงอาหารก็เป็นก้าวแรกที่สำคัญในการดูแลสุขภาพของคุณและคนที่คุณรัก",

  "content_md": "เมล็ดเจีย หรือชื่อภาษาอังกฤษ chia seed คืออะไร? อาหารคลีนสุดฮอตที่หลายคนยังไม่รู้จัก หลายๆคนได้ยินกันมาว่าเรามาลดน้ำหนักด้วยเมล็ดเจียกันดีกว่า แต่ เอ.. แพงจุงเลย ใช้เม็ดแมงลักแทนได้ไหม จริงๆแล้วบอกเลยว่าแทนกันไม่ได้ สารอาหารและคุณค่าทางโภชนาการแตกต่างกันอย่างสิ้นเชิงค่ะ\n\nเมล็ดเจียเป็นพืชที่มีอายุยาวนานถึง 3,500 ปีมาแล้ว เป็นพืชเศรษฐกิจของทวีปอเมริกา จากประเทศ USA MEXICO AGENTINA เป็นต้น ส่วนที่ไทยก็มีปลูกอยู่แถบกาญจนบุรี ลำปาง ค่ะ\n\n## เมล็ดเจียต่างจากเม็ดแมงลักอย่างไร?\n\nพวกเราสาวกทานอาหารคลีนต้องรู้ไว้นะคะ ถึงแม้พืชทั้ง 2 ชนิดเมื่อนำไปแช่น้ำจะบวมพองเหมือนกัน แต่วิธีการดูง่ายๆก็คือ\n\n- **เมล็ดเจียเมื่อบวมพองลักษณะเม็ดจะใสและจับตัวกัน**\n- **ส่วนเม็ดแมงลักจะพองตัวแล้วมีลักษณะเมือกสีขาวขุ่น ไม่จับตัวกันค่ะ**\n\n## คุณค่าทางโภชนาการ\n\nส่วนคุณค่าทางโภชนาการของเมล็ดเจียเรียกได้ว่า สุดยอดมว๊ากๆ จนกระทรวงการเกษตรของสหรัฐอเมริกา (USDA) ยกให้เป็น Super Seed นั่นคือพืชที่อัดแน่นไปด้วยสารอาหารที่จำเป็นต่อร่างกาย โดยเมล็ดเจียประกอบไปด้วย ไฟเบอร์ กรดไขมันดีชนิด omega-3, omega-6 แคลเซียม แมกนีเซียม สารต้านอนุมูลอิสระ รวมไปถึงโปรตีน!\n\n## ซึ่งเมล็ดเจียช่วยในการลดความอ้วนได้อย่างไร?\n\nเมล็ดเจียเมื่อนำไปแช่น้ำแล้วจะบวมพอง ทำให้ช่วยในการควบคุมความอยากอาหารได้อย่างดี อิ่มท้องนาน แบบแคลลอรี่ต่ำ ไม่สะสมเป็นไขมันในร่างกาย การที่มันบวมพองและทำให้เราอิ่มได้นาน เนื่องจากมีกลไกการดูดซึมของเหลว เพราะอุดมไปด้วยไฟเบอร์ที่ละลายน้ำได้ พอเราทานเมล็ดเจียแช่น้ำเข้าไป ไฟเบอร์ก็จะทำการขยายตัวในกะเพราะ เราจึงรู้สึกอิ่ม\n\nและนอกจากประโยชน์ในเรื่องของการลดความอ้วนแล้วเมล็ดเจียยังให้คุณประโยชน์ในด้านต่างๆ ดังต่อไปนี้ด้วย\n\n- **ลดความเครียด** เมล็ดเจียมีแมกนีเซียมอยู่เป็นจำนวนมากและแมกนีเซียมนี่ล่ะที่เป็นตัวลดความเครียดอย่างดีเลยทีเดียว หรือใครที่รู้สึกเหนื่อยล้า เมล็ดเจียก็ช่วยให้ผ่อนคลายความเหนื่อยล้าให้กับคุณได้เช่นกัน\n- **อุดมไปด้วยแคลเซียม** สำหรับคนที่ไม่ชอบดื่มนมก็สามารถทานเมล็ดเจียเพื่อเสริมสร้างแคลเซียมแทนก็ได้นะคะ เพราะเมล็ดเจียก็มีแคลเซียมอยู่เป็นจำนวนมากเหมือนกัน แถมยังมีแคลเซียมมากกว่านมอีกด้วย\n- **ต่อต้านและกำจัดอนุมูลอิสระ** เมล็ดเจียมีสารต้านอนุมูลอิสระสูงมาก ซึ่งนอกจากจะช่วยปกป้องคุณจากโรคร้ายต่างๆ ได้แล้ว ยังทำให้ผิวพรรณเนียนใสมากขึ้นอีกด้วย\n- **ลดอาการบวม** สำหรับคนที่มีอาการบวมจากการทานเค็มมากเกินไป ก็สามารถทานเมล็ดเจียเพื่อลดอาการบวมได้เหมือนกันนะคะ ซึ่งเมล็ดเจียนั้นสามารถลดอาการบวมได้อย่างดีเยี่ยมเลย\n\n## เมนูอาหารคลีนเมล็ดเจียที่แนะนำ\n\n**พุดดิ้งเมล็ดเจีย** : สาวๆที่รักของหวานแต่ไม่อยากอ้วน วันนี้มาลองเมล็ดเจียในพุดดิ้งกันค่ะ แค่เติมเมล็ดเจียลงไปในน้ำพุดดิ้งที่ทำด้วยนมอัลมอนด์ ผลไม้สดหั่นเป็นลูกเต๋า อย่างเช่น สตอเบอร์รี่ หรือลิ้นจี่ แต่เน้นความหวานจากผลไม้สดแทนที่จะมาจากน้ำตาลฟอกขาว ถ้าใครชอบความหวานหอมๆ อาจใช้น้ำตาลสดแทนน้ำตาลในการทำพุดดิ้งก็ได้ และแช่เมล็ดเจียลงไปในน้ำพุดดิ้งจนกระทั่งพองตัว เอาเข้าตู้เย็นแล้วรอจนเย็นฉ่ำก็จะเป็นเมนูที่ชื่นใจสุดๆ เอาไว้คลายร้อนในหน้าร้อนนี้\n\n## ท้ายที่สุดก็มีข้อแนะนำการทานเมล็ดเจียมาฝากกันค่ะ\n\n1. เมล็ดเจียมีเส้นใยสูงอย่างที่กล่าวไว้ อาจก่อให้เกิดอาการท้องอืดและแก๊สในทางเดินอาหารได้ ดังนั้นควรทานตอนเมล็ดเจียพองตัวเรียบร้อยแล้ว (แช่น้ำประมาณ 10 - 15 นาที)\n2. เมล็ดเจียมี omega-3 สูง ซึ่งเป็นความสามารถในการสลายลิ่มเลือด ดังนั้น ผู้ป่วยที่กำลังจำทำการผ่าตัด หรือผู้ที่ใช้ยาแอสไพรินอยู่ ควรปรึกษาแพทย์ก่อน\n3. การวิจัยจาก รพ เซนต์ไมเคิลในโตรอนโต ประเทศแคนาดา พบว่าเมล็ดเจียมีความสามารถลดความดันโลหิตในอยู่ในระดับค่อนข้างต่ำได้ค่อนข้างดี ดังนั้นผู้ที่มีความดันโลหิตต่ำควรทานในปริมาณน้อย\n\nทีนี้พวกเราสายกินอาหารคลีนก็รู้ข้อมูลกันแล้ว หามาทานเป็นของว่างกันค่ะ",

  "title": "เลือกทานผลไม้ยังไงไม่ให้อ้วน!",
  "excerpt": "กินผลไม้แทนข้าวเย็น = ความเชื่อผิดๆ ที่ทำให้โยโย่ มารู้จักน้ำตาลฟรุกโตส และวิธีเลือกผลไม้หวานน้อยให้ถูกหลัก",
  "cover_url": "img/img27.jpg",
  "created_at": "2017-03-12T09:00:00+07:00",
  "content_md": "เวลาคนเราลดความอ้วนมักได้ยินบ่อยๆ ว่า \"ให้ทานผลไม้แทนข้าวเย็น\" — ซึ่งเป็นคำบอกต่อที่ผิดมากๆ ค่ะ ใครเสิร์ชวิธีไดเอทแล้วเจอตารางแบบนี้ ไม่ควรทำตามอย่างยิ่ง\n\nเพราะไม่ว่าจะไดเอทยังไง ร่างกายควรได้อาหารครบ 3 มื้อ และแต่ละมื้อควรมี **โปรตีนเป็นหลัก** ตามด้วยคาร์บ ไขมัน วิตามิน การกินแค่ผลไม้เป็นมื้อเย็นทำให้ร่างกายได้สารอาหารไม่พอ กลายเป็นการอดอาหาร ซึ่งนำไปสู่ **โยโย่เอฟเฟคท์**\n\nดังนั้นการทานผลไม้ตอนไดเอท แนะนำให้ทานเป็น**อาหารว่างระหว่างมื้อแทนขนม**จะดีที่สุด เพราะความหวานและน้ำในเนื้อผลไม้ช่วยเรียกความสดชื่นได้\n\n## ผลไม้มีประโยชน์ แต่ก็มีน้ำตาล\n\nผลไม้อุดมด้วยแร่ธาตุ วิตามิน ไฟเบอร์ และสารต้านอนุมูลอิสระ มีผลการศึกษาพบว่า **การทานผลไม้วันละ 400–600 กรัม ช่วยลดความเสี่ยงโรคมะเร็ง เบาหวาน โรคหัวใจ และโรคอ้วน**\n\nแต่ต้องรู้จักน้ำตาลในผลไม้ด้วย นั่นคือ **ฟรุกโตส (Fructose)** — น้ำตาลโมเลกุลเดี่ยวที่พบในผลไม้และน้ำผึ้ง หวานกว่าน้ำตาลทรายถึง 1.4 เท่า แม้จะเป็นน้ำตาลธรรมชาติ แต่ถ้าทานเกินกว่าที่ร่างกายเผาผลาญหมด ก็กลายเป็นไขมันสะสมทำให้อ้วนได้เหมือนกันค่ะ\n\nองค์การอนามัยโลกแนะนำว่าไม่ควรทานน้ำตาลเกินวันละ 6 ช้อนชา — แต่อย่าเพิ่งตกใจ ตัวเลขนี้หมายถึง **added sugar** (น้ำตาลปรุงอาหาร นมข้น น้ำผึ้ง น้ำเชื่อม) ไม่ใช่น้ำตาลในผลไม้\n\nส่วนผลไม้ ควรเลือกทาน**ผลไม้หวานน้อยประมาณ 6–8 ชิ้น/วัน** เพื่อให้ได้วิตามิน เกลือแร่ และใยอาหารที่เพียงพอ\n\n## ข้อแนะนำเพิ่มเติม\n\n- ใครชอบผลไม้น้ำตาลสูง ให้ลดสัดส่วนลง\n- **ไม่ควรดื่มน้ำผลไม้กล่อง** เพราะน้ำตาลสูงมาก — ถ้าอยากดื่ม เลือก Cold Pressed Juice หรือคั้นสดเอง\n- ผลไม้หวานน้อยที่แนะนำ: ชมพู่ แตงโมจินตหราเหลือง ฝรั่ง สตรอว์เบอร์รี สาลี่ แอปเปิล\n\nท้ายสุด อย่าลืมออกกำลังกายและทานอาหารที่สมดุลควบคู่ไปด้วยนะคะ :D",

 {
  "slug": "heart-rate-zone",
  "title": "วิ่งอย่างไรให้ไขมันออกไปได้เยอะที่สุด — Heart Rate Zone โซนของคนอยากผอม",
  "excerpt": "วิ่งโซนไหนเผาไขมันดีที่สุด? รู้จัก Heart Rate 5 โซน พร้อมสูตรคำนวณง่ายๆ และเทคนิคจับโซนโดยไม่ต้องมีนาฬิกา",
  "cover_url": "img/covers/cover-bajang.jpg",
  "created_at": "2018-11-15T09:00:00+07:00",
  "content_md": "สวัสดีค่า กลับมาอีกครั้งกับบทความที่ห่างหายไปนาน วันนี้ขอนำเสนอ Heart rate zone โซนของคนอยากผอม\n\nก่อนที่จะรู้ว่าวิ่งโซนไหนแล้วจะลดไขมันได้ดีที่สุด ขอแนะนำให้รู้จักคำ 2 คำนี้ก่อนนะคะ\n\n**1. Maximum Heart Rate** คืออัตราการเต้นสูงสุดที่หัวใจของคุณจะรับได้ ซึ่งคำนวณโดยใช้สูตร\n\n- ผู้ชาย: MaxHR = 214 – (0.8 × อายุ)\n- ผู้หญิง: MaxHR = 209 – (0.7 × อายุ)\n\nเช่น อายุ 30 ปี คำนวณออกมาได้ประมาณ 188\n\n**2. Target Heart Rate** เป้าหมายอัตราการเต้นของหัวใจที่ควรพยายามทำให้ได้ในการออกกำลังกายแต่ละครั้ง ซึ่งจะแตกต่างกันไปตามเป้าหมายของแต่ละคนค่ะ\n\n## Heart Rate Zone ทั้ง 5 โซน\n\nอัตราการเต้นของหัวใจเป็นตัวบ่งบอกว่าเราเหนื่อยระดับไหน และช่วยให้รู้ว่าควรตั้งเป้าหมายที่ระดับใดเพื่อผลลัพธ์ที่ดีที่สุด\n\n**Zone 1 — Basic (50–60% ของ MaxHR)**\nโซนออกกำลังกายเพื่อความสดชื่นกระปรี้กระเปร่า ต่อเนื่อง 20–40 นาที เช่น เดินเร็ว ปั่นจักรยานเบาๆ ให้หัวใจได้สูบฉีด แต่สำหรับคนที่ต้องการลดน้ำหนัก โซนนี้ยังไม่พอที่จะเผาผลาญไขมันส่วนเกิน\n\n**Zone 2 — Endurance / Burn Fat (60–70%)** ⭐\nโซนที่ร่างกายดึงพลังงานจากไขมันมาใช้ได้ดีที่สุด ทำให้การลดน้ำหนักเห็นผลชัด ออกต่อเนื่อง 20–40 นาที เหงื่อออกพอสมควร หายใจแรงขึ้น แต่ยังพูดคุยได้ปกติ\n\n**Zone 3 — Aerobic (70–80%)**\nโซนเพิ่มความอึด เช่น มินิมาราธอน ฮาล์ฟมาราธอน หรือเวทเทรนนิ่งเพิ่มกล้ามเนื้อ ช่วยทั้งเผาผลาญไขมันและสร้างความแข็งแรงอดทน เหมาะกับผู้ออกกำลังกายเพื่อสุขภาพ\n\n**Zone 4 — Tempo (80–90%)**\nโซนเพิ่มศักยภาพร่างกาย เช่น วิ่ง 10 กม. ต่ำกว่า 60 นาที ช่วงนี้จะเหนื่อยหอบ พูดได้เป็นคำๆ เท่านั้น ทำต่อเนื่องได้ 2–10 นาที\n\n**Zone 5 — Sprint (90–100%)**\nโซนของนักกีฬาอาชีพหรือผู้ต้องการความเร็วสูง เช่น แข่งวิ่ง 100–400 เมตร — สำหรับคนที่ร่างกายยังไม่แข็งแรงพอ อาจหน้ามืด เป็นลม ความดันขึ้น หรือหัวใจเต้นผิดจังหวะได้ ควรอยู่ในความดูแลของแพทย์หรือครูฝึก\n\n## สรุป: อยากลดไขมัน วิ่งโซนไหน?\n\nคนที่อยากลดไขมันควรคุม Heart Rate ให้อยู่ใน **โซน 2–3** ก็พอค่ะ มากกว่านั้นจะกลายเป็นการออกกำลังกายเพื่อเป้าหมายอื่นแล้ว\n\n*ตัวอย่าง: MaxHR 188 อยากลดไขมัน ควรวิ่งให้อัตราการเต้นหัวใจไม่เกิน 80% = ประมาณ 150*\n\nถ้าออกกำลังกายในฟิตเนส เครื่องเล่นมีตัวจับ Heart Rate อยู่แล้ว แต่ถ้าวิ่งสวน แนะนำใส่นาฬิกาจับอัตราการเต้นหัวใจจะช่วยได้เยอะ — หรือถ้าไม่มี ใช้เทคนิค **วิ่งไปร้องเพลงไป** ก็ได้ค่ะ ถ้าร้องไม่ได้ แสดงว่าน่าจะเกินโซน 3 แล้ว\n\n**TIP สำหรับคนที่ Heart Rate ขึ้นสูงง่ายผิดปกติ** (ทำอะไรนิดหน่อยก็พุ่งเข้าโซน 5): อันตรายนะคะ แนะนำให้ปรับตัวโดยวิ่งหรือปั่นให้ HR ไม่เกินโซน 3 สัก 2–3 เดือนก่อน ควบคู่กับการลดคาร์บลงด้วยค่ะ",

  "title": "กินคลีนห้ามกินอะไรบ้าง? แนวทางสู่การกินคลีนอย่างถูกต้อง",
  "excerpt": "รวม 10 อาหารที่ควรหลีกเลี่ยงเมื่อกินคลีน พร้อมทางเลือกที่ดีกว่า เคล็ดลับเริ่มต้น และประโยชน์ของการกินคลีนอย่างสมดุลและยั่งยืน",
  "cover_url": "https://static.wixstatic.com/media/9bfc29_a022340312884b278b24bcf32e4aa3d5~mv2_d_2733_2438_s_4_2.jpg",
  "created_at": "2025-04-23T09:00:00+07:00",
  "content_md": "การกินคลีนกำลังเป็นเทรนด์สุขภาพที่ได้รับความนิยมอย่างมากในปัจจุบัน ไม่ว่าจะเป็นคนที่ต้องการลดน้ำหนัก รักษาสุขภาพ หรือเพียงแค่อยากมีไลฟ์สไตล์ที่ดีขึ้น แต่หลายคนอาจยังสงสัยว่า \"กินคลีนห้ามกินอะไรบ้าง?\" บทความนี้จะพาคุณไปทำความรู้จักกับหลักการกินคลีน อาหารที่ควรหลีกเลี่ยง และเคล็ดลับในการเริ่มต้นกินคลีนอย่างยั่งยืน\n\n## กินคลีนห้ามกินอะไรบ้าง? 10 อาหารที่ควรหลีกเลี่ยง\n\n### 1. อาหารแปรรูปสูง\n\nอาหารแปรรูปสูง เช่น ไส้กรอก แฮม เบคอน และเนื้อแปรรูปต่างๆ มักมีส่วนผสมของไนเตรท เกลือ และสารกันบูด ซึ่งเมื่อบริโภคในปริมาณมาก อาจเพิ่มความเสี่ยงต่อโรคหัวใจและมะเร็งบางชนิด นอกจากนี้ อาหารเหล่านี้ยังมีโซเดียมสูง ซึ่งส่งผลเสียต่อความดันโลหิตได้\n\n### 2. น้ำตาลฟอกขาวและน้ำตาลเทียม\n\nน้ำตาลขัดขาวให้พลังงานเปล่า แต่ไม่มีสารอาหารที่มีประโยชน์ต่อร่างกาย การบริโภคน้ำตาลในปริมาณมากเกินไปเชื่อมโยงกับปัญหาสุขภาพหลายอย่าง เช่น โรคอ้วน เบาหวาน และโรคหัวใจ\n\nสำหรับน้ำตาลเทียม แม้จะไม่ให้แคลอรี่ แต่การศึกษาบางชิ้นพบว่าอาจส่งผลต่อแบคทีเรียในลำไส้และกระตุ้นความอยากอาหารได้\n\n### 3. ไขมันทรานส์\n\nไขมันทรานส์พบได้ในมาร์การีนบางชนิด อาหารทอด และขนมอบต่างๆ ไขมันประเภทนี้ส่งผลเสียต่อระดับคอเลสเตอรอลและเพิ่มความเสี่ยงต่อโรคหัวใจ ควรเลือกใช้น้ำมันที่มีประโยชน์ เช่น น้ำมันมะกอก น้ำมันรำข้าว หรือน้ำมันอโวคาโดแทน\n\n### 4. ขนมขบเคี้ยวประเภทถุง\n\nขนมขบเคี้ยวส่วนใหญ่มักผ่านการทอดในน้ำมันที่ให้ไขมันไม่ดี มีเกลือและสารปรุงแต่งสูง ทั้งยังให้พลังงานมากแต่คุณค่าทางอาหารต่ำ ควรเลือกขนมที่ทำจากธรรมชาติแทน เช่น ถั่วอบ ผลไม้อบแห้ง หรือธัญพืชไม่ขัดสี\n\n### 5. เครื่องดื่มที่มีน้ำตาลสูง\n\nน้ำอัดลม น้ำผลไม้กล่อง และเครื่องดื่มชงสำเร็จต่างๆ มักมีน้ำตาลสูงมาก เพียงขวดเดียวอาจมีน้ำตาลเกินกว่าปริมาณที่ควรได้รับต่อวัน ควรเลือกดื่มน้ำเปล่า น้ำสมุนไพร หรือชาไม่มีน้ำตาลแทน\n\n### 6. แอลกอฮอล์\n\nแอลกอฮอล์เป็นสารพิษต่อตับและให้พลังงานเปล่า อีกทั้งยังบั่นทอนการทำงานของระบบภูมิคุ้มกัน หากต้องการกินคลีนอย่างจริงจัง ควรลดหรืองดการดื่มแอลกอฮอล์\n\n### 7. อาหารที่มีสารกันบูดและวัตถุเจือปนอาหาร\n\nสารกันบูด สารแต่งสี และสารแต่งกลิ่นสังเคราะห์ต่างๆ ที่พบในอาหารสำเร็จรูป อาจก่อให้เกิดการแพ้ในบางคน และการศึกษาบางชิ้นยังพบความเชื่อมโยงกับปัญหาสมาธิสั้นในเด็ก\n\n### 8. อาหารจานด่วน (Fast Food)\n\nอาหารฟาสต์ฟู้ดมักมีแคลอรี่ ไขมันอิ่มตัว และโซเดียมสูง แต่มีวิตามิน แร่ธาตุ และใยอาหารต่ำ การรับประทานเป็นประจำเพิ่มความเสี่ยงต่อโรคอ้วน เบาหวาน และความดันโลหิตสูง\n\n### 9. ขนมหวานและเบเกอรี่ทั่วไป\n\nขนมเค้ก คุกกี้ และเบเกอรี่ส่วนใหญ่มักทำจากแป้งขัดขาว น้ำตาลฟอกขาว และไขมันไม่ดี ถ้าอยากทานขนม ลองเลือกสูตรที่ทำจากวัตถุดิบธรรมชาติ เช่น แป้งข้าวโอ๊ต น้ำตาลมะพร้าว หรือน้ำผึ้งแทน\n\n### 10. ผลิตภัณฑ์นมที่ไม่ได้คุณภาพ\n\nนมและผลิตภัณฑ์จากนมที่ผ่านกระบวนการผลิตมาก เช่น ชีสแผ่น หรือไอศกรีมทั่วไป มักมีส่วนผสมของสารกันบูด น้ำตาล และไขมันสูง ควรเลือกผลิตภัณฑ์นมที่เป็นธรรมชาติ เช่น โยเกิร์ตธรรมชาติ หรือชีสที่ทำจากนมแท้ 100%\n\n## ทางเลือกที่ดีกว่าสำหรับการกินคลีน\n\nแทนที่จะมองว่า \"กินคลีนห้ามกินอะไรบ้าง\" ลองเปลี่ยนมุมมองเป็นการเลือกอาหารที่ดีต่อสุขภาพแทน:\n\n### ผักและผลไม้\n\nควรรับประทานผักและผลไม้หลากหลายสี อย่างน้อยวันละ 5 กำมือ โดยเฉพาะผักใบเขียว ซึ่งอุดมไปด้วยวิตามิน แร่ธาตุ และสารต้านอนุมูลอิสระ\n\n### โปรตีนคุณภาพดี\n\nเลือกโปรตีนจากปลา ไข่ เนื้อสัตว์ที่เลี้ยงแบบธรรมชาติ หรือโปรตีนจากพืช เช่น ถั่วเหลือง ถั่วลันเตา ถั่วเมล็ดแห้งต่างๆ หรือเต้าหู้\n\n### ธัญพืชไม่ขัดสี\n\nเลือกข้าวกล้อง ข้าวไรซ์เบอร์รี่ ข้าวโอ๊ต คินัว และธัญพืชไม่ขัดสีอื่นๆ ซึ่งอุดมไปด้วยใยอาหาร วิตามินบี และแร่ธาตุสำคัญ\n\n### ไขมันดี\n\nไขมันไม่อิ่มตัวจากอโวคาโด ถั่ว เมล็ดพืช และน้ำมันคุณภาพดี ช่วยบำรุงสมอง หัวใจ และผิวพรรณ\n\n### เครื่องปรุงจากธรรมชาติ\n\nใช้เครื่องเทศและสมุนไพรธรรมชาติแทนผงชูรส ซอสปรุงสำเร็จ หรือเครื่องปรุงที่มีโซเดียมสูง\n\n## เคล็ดลับการเริ่มต้นกินคลีน\n\n1. **เริ่มทีละขั้น** - ไม่จำเป็นต้องเปลี่ยนนิสัยการกินทั้งหมดในทันที ลองเริ่มจากการแทนที่อาหารแปรรูปด้วยอาหารธรรมชาติทีละชนิด\n\n2. **อ่านฉลากอาหาร** - ฝึกอ่านฉลากโภชนาการและส่วนผสม หลีกเลี่ยงผลิตภัณฑ์ที่มีส่วนผสมที่ออกเสียงยากหรือฟังดูเป็นสารเคมี\n\n3. **ทำอาหารเอง** - การทำอาหารเองที่บ้านช่วยให้คุณควบคุมส่วนผสมได้ดีกว่า และมักประหยัดกว่าการซื้ออาหารสำเร็จรูป\n\n4. **วางแผนมื้ออาหาร** - การวางแผนล่วงหน้าช่วยให้คุณไม่หันไปพึ่งอาหารฟาสต์ฟู้ดเมื่อหิวและไม่มีเวลา\n\n5. **ช้อปปิ้งอย่างฉลาด** - เดินช้อปปิ้งตามขอบร้านซึ่งมักเป็นที่วางสินค้าสด แทนการเดินในโซนกลางที่มักเต็มไปด้วยอาหารแปรรูป\n\n## ประโยชน์ของการกินคลีน\n\nการกินคลีนไม่ใช่แค่เทรนด์ชั่วคราว แต่เป็นไลฟ์สไตล์ที่มีประโยชน์มากมาย:\n\n* **น้ำหนักลดลงอย่างยั่งยืน** - การกินคลีนช่วยให้ร่างกายได้รับสารอาหารที่จำเป็นโดยไม่ได้รับแคลอรี่ส่วนเกิน\n\n* **ระดับพลังงานดีขึ้น** - อาหารธรรมชาติช่วยให้ระดับน้ำตาลในเลือดคงที่ ไม่ขึ้นๆ ลงๆ เหมือนเมื่อทานอาหารที่มีน้ำตาลสูง\n\n* **ระบบภูมิคุ้มกันแข็งแรง** - วิตามินและแร่ธาตุจากอาหารธรรมชาติช่วยเสริมภูมิคุ้มกัน\n\n* **ผิวพรรณสดใส** - การได้รับสารต้านอนุมูลอิสระและน้ำที่เพียงพอช่วยให้ผิวเปล่งปลั่ง\n\n* **สุขภาพจิตดีขึ้น** - มีการศึกษาพบความเชื่อมโยงระหว่างอาหารที่ดีต่อสุขภาพกับอารมณ์ที่ดีและลดความเสี่ยงต่อภาวะซึมเศร้า\n\n## คำถามที่พบบ่อยเกี่ยวกับการกินคลีน\n\n### กินคลีนต้องงดแป้งและข้าวหรือไม่?\n\nไม่จำเป็น คุณสามารถทานธัญพืชไม่ขัดสีได้ เช่น ข้าวกล้อง ข้าวโอ๊ต หรือคินัว ซึ่งให้พลังงานและใยอาหารที่จำเป็น\n\n### กินคลีนแล้วจะผอมเร็วไหม?\n\nการกินคลีนไม่ใช่สูตรลดน้ำหนักอย่างรวดเร็ว แต่เป็นการปรับเปลี่ยนไลฟ์สไตล์ที่ช่วยให้น้ำหนักลดลงอย่างยั่งยืนและสุขภาพดีในระยะยาว\n\n### กินคลีนแพงกว่าการกินทั่วไปหรือไม่?\n\nไม่เสมอไป การซื้อวัตถุดิบสดตามฤดูกาลและการทำอาหารเองที่บ้านอาจประหยัดกว่าการซื้ออาหารสำเร็จรูปหรืออาหารนอกบ้านบ่อยๆ\n\n## กินคลีนอย่างสมดุลและยั่งยืน\n\nการกินคลีนไม่ใช่การงดอาหารที่ชอบทั้งหมด แต่เป็นการเลือกอาหารที่มีประโยชน์มากกว่า และลดการบริโภคอาหารที่ให้โทษ สิ่งสำคัญคือต้องมีความสมดุลและทำให้เป็นไลฟ์สไตล์ที่ยั่งยืน ไม่ใช่เพียงแค่ไดเอทระยะสั้น\n\nการรู้ว่า \"กินคลีนห้ามกินอะไรบ้าง\" เป็นเพียงจุดเริ่มต้น สิ่งสำคัญคือการค่อยๆ ปรับเปลี่ยนนิสัยการกินไปในทางที่ดีขึ้น และให้รางวัลตัวเองด้วยอาหารที่ชอบเป็นครั้งคราวโดยไม่รู้สึกผิด\n\n## มาเริ่มกินคลีนไปด้วยกันวันนี้!\n\nคุณพร้อมที่จะเริ่มต้นเส้นทางสู่การกินคลีนแล้วหรือยัง? ลองเริ่มจากการทำตามคำแนะนำในบทความนี้ และเห็นการเปลี่ยนแปลงที่ดีขึ้นของร่างกายและจิตใจของคุณ!\n\nหรือเริ่มต้นทานอาหารคลีนง่าย ๆ โดยสั่งกับทางร้านเรา Under360 มีเมนูให้เลือกมากมาย!",

  "content_md": "ห่างหายจากการเขียนบทความไปนาน วันนี้กลับมาพร้อมกับบทความเกี่ยวกับโซเดียม ภัยเงียบของทุกคน\n\nก่อนอื่นต้องกล่าวก่อนว่าโซเดียมคือ เกลือแร่ (สารอาหาร) ชนิดหนึ่งที่มีความจำเป็นต่อร่างกาย โดยโซเดียมจะทำหน้าที่ควบคุมความสมดุลของเหลวในร่างกาย รักษาความดันโลหิตให้อยู่ในระดับปกติ ช่วยในการทำงานของประสาทและกล้ามเนื้อ (รวมถึงกล้ามเนื้อหัวใจด้วย) ตลอดจนการดูดซึมสารอาหาร บางอย่างในไตและลำไส้เล็ก\n\nดังนั้นร่างกายของเราจึงห้ามขาดโซเดียม แต่ควรลดลงมาให้เหมาะสมกับความต้องการค่ะ\n\n## ทำไมถึงต้องควบคุมโซเดียม?\n\nเพราะงานวิจัยพบว่าคนไทยรับประทานโซเดียมมากถึง 7,000 มก./วัน ซึ่งเกินกว่าที่กระทรวงสาธาณสุขไทยกำหนดไว้ไปมาก (กำหนดไว้แค่ 2,300 มก/วัน) และนั่นเป็นสาเหตุที่ทำให้คนไทยเป็นโรคความดันโลหิตสูงมากกว่า 10 ล้านคน คิดเป็นประมาณ 1 ใน 6 ของประชากรทั้งประเทศ\n\nและนอกจากโรคความดันโลหิตสูงที่เป็นโทษจากการรับประทานโซเดียมมากไปแล้ว ยังมีข้อเสียอีกมากมายดังนี้:\n\n- การทานโซเดียมมากเกินไปทำให้ไตทำงานหนักขึ้น เนื่องจากไตซึ่งเป็นอวัยวะที่กรองของเสียและน้ำออกนอกร่างกายจะต้องทำงานหนักเมื่อมีโซเดียมในร่างกายสูง และเมื่อต้องทำงานหนักเป็นประจำไตก็จะเสื่อมเร็วขึ้น\n\n- การทานโซเดียมมากเกินไป ทำให้ร่างกายของคนเราดื่มน้ำเยอะขึ้น และนั่นทำให้เกิดภาวะบวมน้ำ\n\n- เพิ่มความเสี่ยงต่อการเกิดโรคความดันโลหิตสูงและตามมาด้วยความเสี่ยงต่อโรคหัวใจและหลอดเลือด เนื่องมาจากการที่ร่างกายได้รับโซเดียมจะไปเพิ่มเซลล์กล้ามเนื้อของหัวใจและหลอดเลือด ทำให้เกิดความดันโลหิตที่สูงขึ้นและหัวใจทำงานหนักมากขึ้น\n\n## ควบคุมโซเดียมอย่างไร?\n\nกระทรวงสาธารณสุขไทย แนะนำให้รับโซเดียมเข้าร่างกายไม่เกิน 2,300 มก. หรือเทียบเท่ากับเกลือ 1 ช้อนชา/วัน แต่ถ้าเป็นโรคประจำตัว เช่น โรคหัวใจและหลอดเลือด เบาหวาน มะเร็ง ไม่ควรเกิน 2,000 มก./วัน\n\nซึ่งทางอาหารคลีนของ under360 foodbox เราควบคุมโซเดียมให้กล่องนึงไม่เกิน 500 มก./กล่อง เพื่อสุขภาพที่ดีและโซเดียมไม่มากเกินไป\n\nแต่นอกจากการทานอาหารคลีนแล้วในชีวิตประจำวันก็สามารถทำได้ โดยการปรับพฤติกรรมการบริโภคอาหารตามนี้ค่ะ\n\n- ทานผักสดผลไม้เป็นประจำ\n\n- หากปรุงอาหารเอง ไม่ควรเติมเกลือมากกว่า 1 ช้อนชา/วัน รวมถึงไม่ใส่ผงฟู ด้วยค่ะ\n\n- ทานอาหารที่มีโปแตสเซียม พบมากในผักและผลไม้ เช่น ถั่วแดง ถั่วขาว กล้วย ส้ม และนม เป็นต้น\n\n- ทานนม, โยเกิร์ตไม่มีไขมัน หรือไขมันต่ำ แทนชีส\n\n- ทานอาหารสดให้บ่อยกว่า อาหารที่ปรุงหลายขั้นตอน เช่น พิซซ่า เบคอน หรือฮอทดอก\n\n- อ่านฉลากโภชนาการก่อนซื้อ เลือกที่มีโซเดียมต่ำ\n\n- ชิมอาหารก่อนปรุงรสเพิ่ม ลดการเติมเกลือ น้ำปลา ซีอิ๊ว และซอสปรุงรสต่างๆ\n\n- หลีกเลี่ยงอาหารแปรรูปที่ทำสำเร็จ เช่น อาหารกระป๋อง และบะหมี่กึ่งสำเร็จรูป\n\n- ดื่มน้ำเปล่าเป็นประจำ แทนเครื่องดื่มเกลือแร่ และน้ำผลไม้กล่อง\n\n- งดทานขนมถุง เพราะขนมถุงมักใส่เกลือเยอะเป็นพิเศษเพื่อยืดอายุการเก็บรักษาให้นานยิ่งขึ้นซึ่งมีโซเดียมสูงมาก\n\n## ตัวอย่างของอาหารที่มีปริมาณโซเดียมสูงมาก\n\nเบอร์เกอร์ 1 ชิ้นก็เกินปริมาณที่แนะนำต่อวันแล้วค่ะ\n\nหรือแม้แต่อาหารยอดฮิตของคนไทย ก็โซเดียมสูงเกินไปสำหรับ 1 มื้อค่ะ\n\nรวมถึงของแซ่บๆ อย่างส้มตำก็โซเดียมสูงปรี๊ดค่ะ นานๆกินทีนะคะ\n\nหรือถ้าพักกลางวันแถวออฟฟิศ กินอาหารตามสั่งก็อย่าลืมเน้นแม่ค้าให้ลดเค็มลงมาค่ะ\n\nรู้แบบนี้แล้วเรามาทานอาหารแบบคุมโซเดียมกันบ้างดีกว่านะคะ เพราะช่วยลดความเสี่ยงต่อการเกิดโรคต่างๆ ได้มากกว่าที่คิด ไม่ว่าจะเป็น ลดความเสี่ยงเป็นโรคหัวใจได้ 10 เปอร์เซ็นต์ ลดปัญหาหลอดเลือดอุดตันลง 13 เปอร์เซ็นต์ ยืดอายุไตและไม่เสี่ยงต่อการเป็นโรคความดันโลหิตสูง และโรคร้ายอื่นๆค่ะ :)\n\n**หากบทความถูกใจหรือมีประโยชน์รบกวนฝากแชร์ให้คนรอบข้างด้วยนะคะ :D**\n\n**พูดคุยสอบถามเพิ่มเติมได้ทางแฟนเพจค่า**",

  "slug": "get-rid-of-cellulite",
  "title": "มากำจัดเซลลูไลท์กันเถอะ",
  "excerpt": "รู้จักเซลลูไลท์ไขมันผิวส้มใต้ผิวหนัง สาเหตุจากพันธุกรรม สุขภาพผิว และไขมันสะสม พร้อมวิธีดูแลลดเลือนด้วยการลดน้ำหนัก ดูแลผิว และควบคุมอาหาร",
  "cover_url": "https://static.wixstatic.com/media/9bfc29_6a23e5507c364f58873120ac317aa0bb~mv2.jpg",
  "created_at": "2018-03-25T09:00:00+07:00",
  "content_md": "มากำจัดเซลลูไลท์กันเถอะ\n=======================\n\nเซลลูไลท์คือไขมันที่เป็นผิวส้มอยู่ใต้ผิวหนัง มีลักษณะขรุขระและเป็นรอยย่น ซึ่งสาวๆหลายคนอาจจะไม่อ้วน แต่มีเซลลูไลท์เยอะโดยเฉพาะช่วงต้นขา สะโพก ซึ่งพลอยเชื่อว่าเป็นสิ่งกวนใจสาวๆเป็นอันดับต้นๆแน่นอนเลย วันนี้เลยขอพามารู้จักกับเจ้าเซลลูไลท์ไขมันตัวร้ายที่คอยกวนใจสาวๆกันค่ะ\n\n**เซลลูไลท์ คือ อะไร?**\n\nเซลลูไลท์ คือ ผิวหนังที่เป็นลอนคลื่นคล้ายๆผิวของเปลือกส้ม มักจะพบมากในบริเวณที่มีไขมันสะสมเยอะ เช่น ต้นขา สะโพกและรอบเอว โดยจะมีมากในร่างกายของคุณผู้หญิงมากกว่าคุณผู้ชายเพราะด้วยโครงสร้างทางผิวหนังที่แตกต่างกันในแต่ละเพศ\n\n**_TIP_**\n\nเช็คได้ไม่ยากว่าตัวเองมีเซลลูไลท์หรือเปล่า โดยการบีบผิวหนังบริเวณต้นขาขึ้นมา ถ้าพบลักษณะเป็นก้อนไขมัน แบบตะปุ่มตะป่ำ ผิวขรุขระ คล้ายผิวเปลือกส้ม ให้คิดได้เลยว่าเป็น เซลลูไลท์ แน่นอน หากปล่อยทิ้งไว้นานจะมองเห็นชัดขึ้นถึงแม้จะไม่ได้บีบผิวหนังขึ้นมาด\n\n**เซลลูไลท์เกิดขึ้นได้อย่างไร ?**\n\nเกิดจากการสะสมไขมันที่มากเกินไปในชั้่นผิวหนังตื้นในบริเวณเลือดไหวเวียนไม่ดี จนทำให้ผนังชั้นหุ้มเซลล์เกิดผิวที่ขรุขระเหมือนเปลือกส้มขึ้นนั่นเองค่ะ\n\nภาพเปรียบเทียบด้านซ้ายคือภาพของผิวหนังปกติ ภาพด้านขวาผิวหนังที่เกิดเซลลูไลท์\n\nจะเห็นได้ว่าก้อนสีเหลืองคือเซลล์ฺไขมันนะคะ ภาพด้านขวามีไขมันสะสมที่มีขนาดใหญ่กว่า เพราะมีปริมาณไขมันสะสมเยอะจนดันให้เกิดคลื่นขรุขระขึ้นจนเป็นเซลลูไลท์ในที่สุด\n\nสาเหตุที่ทำให้เกิดขึ้นมีดังนี้ค่ะ\n\n**1. พันธุกรรม**\n\nปัจจัยที่ส่งผลค่อนข้างมาก คือ พันธุกรรม หากใครมีสมาชิกในครอบครัวมีเซลลูไลท์ สามารถทำให้มีโอกาสเกิดเซลลูไลท์สูงได้เช่นกัน\n\n**2. สุขภาพผิวหนัง**\n\nถ้าคุณมีสุขภาพผิวหนังที่แข็งแรง เต่งตึงแข็งแรง ไม่ย่อนคล้อย ความตึงตรงนี้ก็จะช่วยป้องกันไม่ให้เจ้าไขมันใต้ชั้นผิวหนังมันสามารถดันผิวของคุณออกมาเป็นลอนคลื่นได้ นี่คือสาเหตุที่ว่าทำไมเราจึงพบเซลลูไลท์ในเด็กน้อยกว่าผู้ใหญ่ นอกจากนี้ผิวที่ขาดการดูแล หรือกิจกรรมต่างๆที่ทำลายผิวสวยของคุณ เช่น เหล้า (ทำให้ผิวหนังขาดน้ำ) บุหรี่ (ทำลาย vitamin C ซึ่งมีส่วนในการสร้าง collagen ของผิวหนัง) ก็ยังทำให้ผิวหนังของคุณอ่อนแอ และเกิดเซลลูไลท์ได้ง่ายขึ้นอีกด้วย\n\n**3. ไขมันสะสม**\n\nนี่คือต้นตอของเซลลูไลท์ก็ว่าได้ เพราะเซลลูไลท์เกิดจากไขมันใต้ชั้นผิวหนังที่สะสมพอกพูน จนขยายตัวและดันผิวหนังคุณขึ้นมาเป็นลอนคลื่น เพราะฉะนั้นถ้าร่างกายคุณไม่ได้มีไขมันส่วนเกินสะสมเยอะจนเซลล์ไขมันขยายตัว โอกาสเกิดเซลลูไลท์ก็จะยิ่งลดน้อยลงไปอีก\n\n**วิธีการกำจัดเซลลูไลท์**\n\nปัจจุบันยังไม่มีวิธีการรักษาที่ทำให้เซลลูไลท์หายไปอย่างสิ้นเชิง แต่เราสามารถช่วยทำให้ผิวบริเวณที่เกิดเซลลูไลท์เรียบเนียนขึ้นได้ โดยวิธีการแก้ไขทำได้ดังนี้\n\n**1. ลดน้ำหนัก**\n\nหากมีน้ำหนักเกินหรือเป็นโรคอ้วน การออกกำลังกายหรือการรับประทานอาหารคลีนเพื่อลดน้ำหนักจะช่วยทำให้ลักษณะของผิวที่ขรุขระหรือแตกลายดูดีขึ้น แต่การลดน้ำหนักตัวไม่ได้ช่วยทำให้เซลลูไลท์หายไปจนหมดอย่างถาวร แต่ทำให้ผิวดูดีหรือกระชับขึ้นได้ สามารถออกกำลังกายได้ทั้งแบบแอโรบิค และฝึกความแข็งแรงของกล้ามเนื้อ (การยกเวท) เพราะเมื่อกล้ามเนื้อของคุณขยายตัวจากการเล่นเวท มันจะทำให้ผิวหนังของคุณบริเวณที่มีเซลลูไลท์เกิดความเต่งตึง (ผิวดูกระชับ) คล้ายๆกับว่าเราเอากระดาษยับๆมาดึงออกให้ตึงนั่นเอง\n\n**2. ดูแลผิวพรรณของคุณให้ดีที่สุด**\n\nโดยการดื่มน้ำเยอะๆเพราะน้ำก็เป็นส่วนประกอบสำคัญของผิวหนัง งดเหล้าและบุหรี่เพราะเป็นตัวการทำลายสุขภาพผิวของคุณ และสุดท้ายก็ทานอาหารให้ครบ 5 หมู่ ผิวหนังจะได้มีสารอาหารไปบำรุงผิวสวย\n\n**3. ควบคุมอาหาร**\n\nเซลลูไลท์เกิดจากไขมันสะสม ดังนั้นเราควรลดการทานอาหารจำพวกไขมัน น้ำตาล ของหวาน และฟาสต์ฟู้ดลง หันมาทานอาหารสุขภาพหรืออาหารคลีนกันให้มากขึ้น\n\n**การกำจัดเซลลูไลท์ด้วยตัวเองต้องอาศัยเวลาและการอดทน**\n\nยังไงพลอยแนะนำว่าไม่ควรใช้วิธีเร่งรัดหรือหลงเชื่อคำโฆษณาของครีมทาผิว คอร์สเลเซอร์ หรือนวดเพื่อลดเซลลูไลท์ เพราะบางท่านเสียเงินไปจำนวนมากแต่ก็ไม่ได้ผลลัพธ์อย่างที่ต้องการ สุดท้ายเซลลูไลท์ก็กลับมาอีกเพราะไม่ปรับพฤติกรรมการกิน ดังนั้นมาแก้ปัญหาที่ต้นเหตุกันดีกว่านะคะ\n\n**สุดท้ายหากชอบบทความไหนกดแชร์ให้แม่ค้าด้วยนะค้า**\n\n**พูดคุยกันในไลน์@ เพิ่มเติมได้ตลอดค่า**",
  "published": false
 },

  "excerpt": "รวมหลักการกินอาหารคลีนที่ช่วยให้นอนหลับสบาย พร้อมวิตามินและ 8 เมนู/อาหารที่ส่งผลดีต่อการนอน และพฤติกรรมการกินที่ควรปรับ",

  "content_md": "### Clean food, Good sleep\n\nในช่วงที่ผ่านมามีหลายคนบ่นว่านอนไม่หลับ หรือหลับไม่เต็มอิ่มกันมากขึ้น เพราะภาวะความเครียดจากการทำงาน และสาเหตุอื่นๆ เช่น การทานอาหาร รูปแบบการใช้ชีวิต ความกังวล เป็นต้น **ดังนั้นวันนี้พลอยเลยนำหลักการทานอาหารคลีนที่ช่วยในการนอนหลับมาฝากกันค่ะ**\n\nหลายคนคงรู้อยู่แล้ววว่าการทานอาหารคลีนมีประโยชน์ต่อสุขภาพหลายด้าน นอกจากจะทำให้ร่างกายรู้สึกสดชื่น เคอเลสเตอรอลลด ไขมันลด ควบคุมน้ำตาลในกระแสเลือดได้แล้ว การกินคลีนยังทำให้หลับสบายได้อีกด้วย\n\n**แต่หลายคนอาจส่งสัยว่าทานอาหารคลีนแล้วช่วยในการนอนหลับอย่างไร?** การรับประทานอาหารถือว่าเป็นปัจจัยหลักที่ช่วยให้นอนหลับ การทานอาหารคลีนจะทำให้ระบบประสาททำงานอย่างเป็นปกติ เพราะแร่ธาตุและวิตามินของอาหารคลีนมีส่วนช่วยควบคุมการทำงานของฮอร์โมน อีกทั้งยังกระตุ้นการตอบสนองของฮอร์โมนที่ช่วยในเรื่องการนอนหลับ จึงทำให้ผู้ที่ทานอาหารคลีนนั้นจะมีโอกาสนอนหลับพักผ่อนได้ดีกว่าคนที่ไม่กินคลีน ซึ่งการนอน 7-9 ชั่วโมงอย่างเต็มอิ่ม จะทำให้ร่างกายของเรามีเวลาเพียงพอในการสร้างและซ่อมแซมกล้ามเนื้อได้อย่างตรงจุด ส่งผลต่อสุขภาพร่างกายที่ดีมากยิ่งขึ้น และรู้สึกสดชื่นในทุกๆ วัน\n\nโดยวิตามินที่ช่วยในการนอนหลับหลักๆ ได้แก่\n- แคลเซียม 600 มิลลิกรัมต่อวัน จะช่วยให้ผ่อนคลายและหลับง่ายขึ้น\n- แมกนีเซียม 250-500 มิลลิกรัมต่อวัน จะช่วยให้นอนหลับสบาย\n- วิตามินบีหก 50-100 มิลลิกรัมต่อวัน เนื่องจากวิตามินบี6 จะส่งกรดอะมิโนทริปโตเฟนที่ทำให้เส้นประสาทแข็งแรงขึ้นและมีอารมณ์มั่นคงขึ้น ทำให้รู้สึกผ่อนคลาย\n- วิตามินบี 12 เป็นวิตามินเสริมอีกชนิดที่ช่วยรักษาอาการนอนไม่หลับ โดยกิน 25 ไมโครกรัมต่อวัน ควบคู่กับวิตามินบี 5 อีก 100 มิลลิกรัม\n\n**ดังนั้นเรามาเลือกทานอาหารคลีนที่ส่งผลต่อการนอนหลับสบายกันค่ะ**\n\n**1. ชาคาโมมายล์**\nชาคาโมมายล์ถูกใช้สำหรับบำบัดอาการนอนไม่หลับมาตั้งแต่ครั้งสมัยโบราณ คาโมมายล์จะช่วยเพิ่มไกลซิน ซึ่งเป็นสารเคมีที่ช่วยผ่อนคลายประสาทและกล้ามเนื้อ ดื่มชาคาโมมายล์สักแก้วก่อนนอน ช่วยให้นอนหลับสบายมากยิ่งขึ้น\n\n**2. บล็อคโครี่**\nบล็อคโครี่ 1ถ้วยครึ่งมีปริมาณแคลเซียมมากถึง 93 มิลลิกรัม ซึ่งในอาหารคลีนของทางร้านทุกกล่องมี บล็อคโครี่อย่างเต็มเปี่ยม ทานทุกวัน ได้รับประโยชน์ที่ดีทุกวันค่ะ ^^\n\n**3. Whole Grains หรือ ข้าวไรซ์เบอร์รี่**\nข้าวไรซ์เบอร์รี่เป็นอาหารคลีนอันดับต้นๆที่ทุกคนนึกถึง ซึ่งนอกจากมีกากใยมากที่ช่วยเรื่องการขับถ่ายแล้ว ยังอุดมไปด้วยแมกนีเซียมมากถึง 86 มิลลิกรัม ต่อ 1 ถ้วยหุงข้าว (ประมาณ 1 กล่องครึ่งจากอาหารคลีนทางร้าน) หรือถ้าหากวันไหนเบื่อข้าว การทานขนมปังโฮลวีทก็มีทริปโตเฟนและแมกนีเซียมที่ช่วยในการนอนหลับได้เช่นกันค่ะ\n\n**4. นมและโยเกิร์ต**\nมีทริปโตเฟน และแคลเซียมช่วยคลายคามเครียด ดื่มนมหรือโยเกิร์ต 1 ถ้วยก่อนเข้านอน ช่วยให้ท้องที่ว่างอยู่รู้สึกอิ่มกำลังดีไม่อิ่มจนเกินไป\n\n**5. ถั่วอัลมอนด์**\nอัลมอนด์จำนวนหนึ่งฝ่ามือก็สามารถช่วยให้การนอนหลับนั้นง่ายขึ้น เมล็ดอัลมอนด์มีทริปโตแฟน เมลาโตนินและแมกนีเซียม ช่วยลดความตึงเครียดของกล้ามเนื้อและระบบประสาท สร้างความผ่อนคลาย และยังช่วยให้หัวใจเต้นในจังหวะปกติด้วย\n\n**6. อกไก่**\nมีนางเอกของอาหารคลีนคือข้าวไรซ์เบอร์รี่แล้ว พระเอกของงานนี้ที่ไม่พูดถึงคงไม่ได้นั่นคืออกไก่ เพราะไก่อุดมไปด้วยวิตามินบี12 ทานทุกวัน โปรตีนสะอาดเข้าร่างกายทุกวันค่า ใครยูริคสูงไม่ต้องกลัวนะคะ เพราะส่วนอกไก่นั้นยูริคต่ำมากๆ\n\n**7. ปลาแซลมอน**\nเป็นอีกหนึ่งเนื้อสัตว์ที่มีคุณค่าทางโภชนาการที่ดีมาก ทั้งอุดมไปด้วยไขมันดีแล้วยังเต็มเปี่ยมไปด้วยวิตามินบี12เช่นกัน\n\n**8. มะเขือเทศ**\nมะเขือเทศไม่ใช่แค่ทานแล้วผิวดีแก้มแดงอย่างเดียว แต่ยังช่วยให้นอนหลับสบายขึ้นด้วย เพราะมีสารเมลาโตนิน ซึ่งเป็นสารที่ช่วยปรับสภาพร่างกายในรอบวันและเหนี่ยวนำให้เกิดการนอนหลับลึก ซึ่งเมนูอาหารของทางร้านที่ประกอบไปด้วยมะเขือเทศจำนวนมาก ได้แก่ สปาเก็ตตี้อกไก่ซอสสตูว, ข้าวน้ำพริกอ่องอกไก่ เป็นต้น\n\nนอกจากอาหารเหล่านี้ที่ช่วยในการนอนหลับแล้ว การปรับพฤติกรรมในการทานอาหารก็สามารถช่วยได้อีกด้วยนะคะ ได้แก่\n- ไม่ควรเข้านอนเมื่อยังหิว หรืออิ่มเกินไป\n- งดการกินอาหารมันๆหรือเผ็ดร้อนมากเกินไปเพราะส่งผลต่อการนอนหลับได้\n- งดเครื่องดื่มที่มีคาเฟอีนก่อนนอน เช่น ชา กาแฟ น้ำอัดลม รวมถึงขนมหวานทุกชนิดเพราะน้ำตาลจะกระตุ้นให้รู้สึกตัว\n\n**และท้ายสุดขอฝากลักษณะอาการนอนไม่หลับที่ควรไปพบแพทย์ค่ะ**\n- นอนไม่หลับมานาน 1-2 สัปดาห์ หรือมากกว่า โดยไม่มีสาเหตุที่ชัดเจน\n- รู้สึกง่วง อ่อนเพลีย จนใม่สามารถทำงานอย่างมีประสิทธิภาพในตอนกลางวัน หลับบ่อยครั้งในระหว่างวัน\n- สงสัยว่ามีโรคบางอย่างแอบแฝงอยู่ เช่น ซึมเศร้า วิตกกังวล\n\n**ยังไงใครนอนไม่หลับอยู่ลองหันมาทานอาหารคลีนและปรับพฤติกรรมการทานอาหารกันนะคะ ท่านไหนอยากรู้ข้อมูลเรื่องไหนเพิ่มเติม คอมเม้นกันมาได้เลยค่า ^^**",

  "title": "ทำไมอาหารคลีนต้องกินคู่กับข้าวไรซ์เบอร์รี่ - คู่หูสุขภาพที่ลงตัว",
  "excerpt": "ไขข้อสงสัยว่าทำไมข้าวไรซ์เบอร์รี่ถึงเป็นคู่หูที่ลงตัวกับอาหารคลีน ทั้งดัชนีน้ำตาลต่ำ เส้นใยสูง และสารต้านอนุมูลอิสระ พร้อมวิธีเลือกซื้อและเก็บรักษา",
  "cover_url": "https://static.wixstatic.com/media/9bfc29_3ee7310086ba4ddfae604f470f07ef51~mv2.jpg",
  "created_at": "2025-04-09T09:00:00+07:00",
  "content_md": "### ทำไมอาหารคลีนต้องกินคู่กับข้าวไรซ์เบอร์รี่ - คู่หูสุขภาพที่ลงตัว\n\nคุณเคยสงสัยไหมว่าทำไมคนรักสุขภาพมักจะกินข้าวไรซ์เบอร์รี่คู่กับอาหารคลีน? หรือบางทีคุณอาจกำลังเริ่มต้นเส้นทางการดูแลสุขภาพและกำลังมองหาตัวเลือกอาหารที่ดีที่สุด วันนี้เราจะมาไขข้อสงสัยและแนะนำให้คุณรู้จักกับคู่หูสุขภาพที่ลงตัวอย่าง \"อาหารคลีนและข้าวไรซ์เบอร์รี่\" ที่ไม่ใช่แค่เทรนด์ความนิยม แต่เป็นการผสมผสานที่มีประโยชน์ต่อร่างกายอย่างแท้จริง\n\n### ข้าวไรซ์เบอร์รี่คืออะไร? ทำไมถึงได้รับความนิยมในหมู่คนรักสุขภาพ\n\nข้าวไรซ์เบอร์รี่ หรือที่หลายคนเรียกว่า \"ข้าวสีม่วง\" เป็นข้าวสายพันธุ์พิเศษที่พัฒนาขึ้นในประเทศไทย โดยเกิดจากการผสมข้ามพันธุ์ระหว่างข้าวหอมนิลและข้าวหอมมะลิ 105 ผลลัพธ์ที่ได้คือข้าวที่มีสีม่วงเข้มเกือบดำ มีกลิ่นหอม และรสชาติที่เป็นเอกลักษณ์\n\nความพิเศษของข้าวไรซ์เบอร์รี่ไม่ได้อยู่แค่สีสันที่สวยงาม แต่อยู่ที่คุณค่าทางโภชนาการที่แน่นปึ้ก ข้าวชนิดนี้มีสารต้านอนุมูลอิสระสูง โดยเฉพาะแอนโทไซยานิน (Anthocyanin) ซึ่งเป็นสารที่ให้สีม่วงและมีคุณสมบัติในการต้านการอักเสบ ป้องกันมะเร็ง และชะลอวัย นอกจากนี้ยังอุดมไปด้วยวิตามินบี โอเมก้า 3 เส้นใยอาหาร และแร่ธาตุที่จำเป็นหลายชนิด\n\n### อาหารคลีนคืออะไร? และทำไมถึงเป็นที่นิยม\n\nอาหารคลีน (Clean Food) คือการรับประทานอาหารที่ผ่านการปรุงแต่งน้อยที่สุด เน้นความสด สะอาด และคงคุณค่าทางโภชนาการให้มากที่สุด โดยหลีกเลี่ยงอาหารแปรรูป สารปรุงแต่ง และน้ำตาลเกินจำเป็น เรียกได้ว่าเป็นการกินอาหารในรูปแบบที่ธรรมชาติตั้งใจให้เรากิน\n\nหลักการของอาหารคลีนประกอบด้วย:\n\n* เน้นวัตถุดิบธรรมชาติ ไม่ผ่านการแปรรูป\n* มีความสมดุลของสารอาหาร ทั้งโปรตีน คาร์โบไฮเดรต และไขมันดี\n* เน้นผักและผลไม้สดตามฤดูกาล\n* หลีกเลี่ยงน้ำตาล แป้งขัดขาว และไขมันทรานส์\n* ปรุงด้วยวิธีที่รักษาคุณค่าสารอาหาร เช่น การนึ่ง ต้ม อบ\n\n### ทำไมข้าวไรซ์เบอร์รี่จึงเป็นคู่หูที่ดีของอาหารคลีน\n\n#### 1. ดัชนีน้ำตาลต่ำ ควบคุมน้ำหนักได้ดีกว่า\n\nหนึ่งในเหตุผลสำคัญที่ทำให้ข้าวไรซ์เบอร์รี่เป็นตัวเลือกที่ดีกว่าข้าวขาวคือค่าดัชนีน้ำตาล (Glycemic Index หรือ GI) ที่ต่ำกว่า นั่นหมายความว่าเมื่อรับประทานข้าวไรซ์เบอร์รี่ น้ำตาลในเลือดจะค่อยๆ เพิ่มขึ้นอย่างช้าๆ ไม่ทำให้เกิดการพุ่งสูงแล้วตกลงอย่างรวดเร็วเหมือนข้าวขาว\n\nการที่น้ำตาลในเลือดคงที่จะช่วยให้:\n\n* รู้สึกอิ่มนานขึ้น ลดการกินจุบจิบระหว่างมื้อ\n* ควบคุมน้ำหนักได้ดีขึ้น\n* ลดความเสี่ยงของโรคเบาหวานและโรคหัวใจ\n* มีพลังงานคงที่ตลอดวัน ไม่หิวหรือเหนื่อยง่าย\n\n#### 2. เส้นใยอาหารสูง ดีต่อระบบย่อยอาหาร\n\nข้าวไรซ์เบอร์รี่มีเส้นใยอาหารสูงกว่าข้าวขาวถึง 3-4 เท่า ซึ่งเส้นใยเหล่านี้มีประโยชน์มหาศาลต่อร่างกาย โดยเฉพาะระบบทางเดินอาหาร เมื่อรับประทานคู่กับอาหารคลีนที่มักจะมีผักและโปรตีนคุณภาพดี ก็จะยิ่งเสริมประสิทธิภาพในการย่อยและดูดซึมสารอาหาร\n\nประโยชน์ของเส้นใยอาหารในข้าวไรซ์เบอร์รี่:\n\n* ช่วยให้ระบบขับถ่ายทำงานได้ดี ป้องกันอาการท้องผูก\n* เป็นอาหารของจุลินทรีย์ดีในลำไส้ เสริมสร้างสุขภาพจุลินทรีย์ในลำไส้\n* ช่วยลดคอเลสเตอรอลในเลือด\n* ช่วยในการควบคุมน้ำหนัก เพราะให้ความรู้สึกอิ่มนาน\n\n#### 3. สารต้านอนุมูลอิสระสูง ต่อต้านความเสื่อมของเซลล์\n\nจุดเด่นของข้าวไรซ์เบอร์รี่อยู่ที่ปริมาณสารต้านอนุมูลอิสระที่สูงมาก โดยเฉพาะแอนโทไซยานินที่ให้สีม่วงเข้ม ซึ่งช่วยต่อต้านอนุมูลอิสระที่เป็นสาเหตุของความเสื่อมของเซลล์และความแก่ก่อนวัย\n\nเมื่อรับประทานคู่กับอาหารคลีนที่มักจะอุดมไปด้วยผักและผลไม้สดซึ่งก็มีสารต้านอนุมูลอิสระสูงเช่นกัน จะเป็นการเสริมพลังการต่อต้านอนุมูลอิสระให้แก่ร่างกาย ช่วยชะลอวัยและป้องกันโรคเรื้อรังหลายชนิด\n\n#### 4. วิตามินและแร่ธาตุครบถ้วน เติมเต็มสารอาหารที่ร่างกายต้องการ\n\nข้าวไรซ์เบอร์รี่มีวิตามินและแร่ธาตุสูงกว่าข้าวขาวธรรมดามาก โดยเฉพาะ:\n\n* วิตามินบีรวม ที่ช่วยในกระบวนการเผาผลาญพลังงาน\n* แคลเซียม ที่ช่วยบำรุงกระดูกและฟัน\n* ธาตุเหล็ก ที่สำคัญสำหรับการสร้างเม็ดเลือดแดง\n* สังกะสี ที่ช่วยเสริมภูมิคุ้มกัน\n* แมกนีเซียม ที่ช่วยในการทำงานของระบบประสาทและกล้ามเนื้อ\n\nเมื่อรับประทานร่วมกับอาหารคลีนที่ประกอบด้วยโปรตีนคุณภาพดี ผัก และไขมันดี จะทำให้ร่างกายได้รับสารอาหารครบถ้วนและสมดุล\n\n#### 5. รสชาติที่ลงตัว เข้ากันได้ดีกับอาหารคลีนหลากหลายรูปแบบ\n\nนอกจากคุณค่าทางโภชนาการแล้ว ข้าวไรซ์เบอร์รี่ยังมีรสชาติที่เป็นเอกลักษณ์ มีความหอมเฉพาะตัว และเนื้อสัมผัสที่เหนียวนุ่ม เคี้ยวง่าย ซึ่งเข้ากันได้ดีกับอาหารคลีนหลากหลายรูปแบบ ไม่ว่าจะเป็น:\n\n* อกไก่อบสมุนไพร\n* ปลาย่างน้ำมันมะกอก\n* สลัดผักรวม\n* แกงเขียวหวานไก่แบบไขมันต่ำ\n* ผัดผักรวมน้ำมันมะกอก\n\n### วิธีการเลือกซื้อและเก็บรักษาข้าวไรซ์เบอร์รี่ให้คงคุณค่า\n\nการเลือกซื้อข้าวไรซ์เบอร์รี่คุณภาพดีและการเก็บรักษาอย่างถูกต้องจะช่วยให้คุณได้รับประโยชน์สูงสุดจากข้าวชนิดนี้:\n\n**การเลือกซื้อ:**\n\n* เลือกข้าวที่มีสีม่วงเข้มสม่ำเสมอ\n* ควรซื้อจากแหล่งที่เชื่อถือได้ มีการระบุแหล่งที่มาชัดเจน\n* สังเกตวันที่ผลิตและวันหมดอายุ ควรเลือกข้าวที่ผลิตใหม่\n* พิจารณาเลือกข้าวไรซ์เบอร์รี่ออร์แกนิคหากเป็นไปได้\n\n**การเก็บรักษา:**\n\n* เก็บในภาชนะปิดสนิท ป้องกันความชื้นและแมลง\n* เก็บในที่แห้ง เย็น และไม่โดนแสงแดดโดยตรง\n* ไม่ควรเก็บข้าวไว้นานเกิน 6 เดือน เพราะสารอาหารอาจเสื่อมลง\n* ข้าวที่หุงสุกแล้วควรเก็บในตู้เย็นไม่เกิน 3 วัน\n\n### ข้อควรระวังและข้อจำกัดในการรับประทานข้าวไรซ์เบอร์รี่\n\nแม้ว่าข้าวไรซ์เบอร์รี่จะมีประโยชน์มากมาย แต่ก็มีข้อควรระวังสำหรับบางกลุ่มคน:\n\n* ผู้ที่มีภาวะลำไส้รั่วซึม (Leaky Gut Syndrome) อาจต้องระวังเนื่องจากข้าวไรซ์เบอร์รี่มีเส้นใยสูง\n* ผู้ที่เพิ่งเริ่มรับประทานอาหารที่มีเส้นใยสูง ควรค่อยๆ เพิ่มปริมาณเพื่อให้ร่างกายปรับตัว\n* ผู้ที่มีปัญหาการดูดซึมแร่ธาตุบางชนิด ควรปรึกษาแพทย์หรือนักโภชนาการ\n* ข้าวไรซ์เบอร์รี่ใช้เวลาหุงนานกว่าข้าวขาวปกติ (ประมาณ 30-40 นาที) จึงต้องวางแผนเวลาในการเตรียมอาหาร\n\n### ทำไมคู่หูอาหารคลีนและข้าวไรซ์เบอร์รี่ถึงเป็นตัวเลือกที่ดีเยี่ยมสำหรับคนรักสุขภาพ\n\nจากที่กล่าวมาทั้งหมด จะเห็นได้ว่าข้าวไรซ์เบอร์รี่และอาหารคลีนเป็นคู่หูที่ลงตัวอย่างยิ่งสำหรับผู้ที่ใส่ใจสุขภาพ ด้วยคุณสมบัติที่เสริมกันและกัน ทั้งในด้านคุณค่าทางโภชนาการ รสชาติ และประโยชน์ต่อสุขภาพในระยะยาว\n\nการรับประทานอาหารคลีนคู่กับข้าวไรซ์เบอร์รี่อย่างสม่ำเสมอ จะช่วยให้คุณได้รับประโยชน์หลายด้าน ไม่ว่าจะเป็นการควบคุมน้ำหนัก การป้องกันโรคเรื้อรัง การชะลอวัย และการมีสุขภาพที่ดีแบบองค์รวม\n\nหากคุณยังไม่เคยลองรับประทานข้าวไรซ์เบอร์รี่คู่กับอาหารคลีน นี่อาจเป็นเวลาที่ดีที่จะเริ่มต้นการเปลี่ยนแปลงเล็กๆ ที่จะส่งผลดีต่อสุขภาพของคุณในระยะยาว\n\n### เริ่มต้นไลฟ์สไตล์สุขภาพดีด้วยข้าวไรซ์เบอร์รี่วันนี้!\n\nอยากให้สุขภาพดีขึ้นแบบเห็นผลชัดเจน? ลองเปลี่ยนมาทานข้าวไรซ์เบอร์รี่คู่กับอาหารคลีนวันนี้! สั่งซื้อข้าวไรซ์เบอร์รี่ออร์แกนิคคุณภาพดีจากร้านของเราได้ที่ Under360\n\n* คลิกสั่งซื้อเลย\n* สมัครสมาชิกได้รับส่วนลด 50 บาท สำหรับลูกค้าใหม่\n\n[สั่งอาหารผ่านไลน์ รับส่วนลดทันที 50 บาท คลิกเลย!](https://lin.ee/MP0fOj9)",

  "content_md": "## สาเหตุที่ทำให้พุงป่องแบบไม่รู้ตัว!\n\nใครๆก็บอกว่าการลดพุงนั้นยากที่สุดในการออกกำลังกายทั้งหมด ทานอาหารคลีนก็แล้ว เข้าฟิตเนสก็แล้วทำไมยังป่องอยู่ จริงๆแล้วการลดหน้าท้องให้ถูกวิธี จะต้องเริ่มจากปรับพฤติกรรมบางอย่างที่ทำให้พุงป่องออกไปซะก่อน ใครพุงป่องแบบไม่รู้สาเหตุ ลองดูกันค่ะว่ามีอะไรบ้าง\n\n### 1. นอนพักผ่อนไม่เพียงพอ\n\nการนอนหลับผักผ่อนที่น้อยกว่า 6 ชั่วโมงต่อวันเป็นสาเหตุหนึ่งที่ทำให้น้ำหนักตัวมีแนวโน้มเพิ่มสูงขึ้น เนื่องจากการนอนน้อยทำให้ระบบเผาผลาญพัง แถมเกิดฮอร์โมนของความเครียดเพิ่มสูงขึ้น **ซึ่งเจ้าฮอร์โมนเครียดตัวนี้ส่งผลให้อยากกินของหวานและแป้งเพิ่มขึ้น**เพื่อลดความเครียดลง จนทำให้เกิดการทานแป้งและน้ำตาลมากเกินไป จนในที่สุดร่างกายเผาผลาญไม่หมด และนำไปสะสมจนเป็นไขมันที่พุง\n\n### 2. ทานอาหารที่มีไฟเบอร์ไม่เพียงพอ\n\nในหนึ่งวัน คนเราต้องการไฟเบอร์เข้าร่างกายตามนี้\n\n- ผู้ชาย อายุน้อยกว่า 50 ปี ควรจะได้รับไฟเบอร์ 38 กรัมต่อวัน\n- ผู้ชาย อายุมากกว่า 51 ปี ควรจะได้รับไฟเบอร์ 30 กรัมต่อวัน\n- ผู้หญิง อายุน้อยกว่า 50 ปี ควรจะได้รับไฟเบอร์ 25 กรัมต่อวัน\n- ผู้หญิง อายุมากกว่า 50 ปี ควรจะได้รับไฟเบอร์ 21 กรัมต่อวัน\n\n(ซึ่งแอบกระซิบว่าผักผลไม้ 100g ไฟเบอร์แค่เล็กน้อยมากๆค่ะ ตามตารางเลย)\n\nซึ่งการทานไฟเบอร์จะไปช่วยขจัดไขมันที่สะสมอยู่ในบริเวณพุงลงได้ อีกทั้งช่วยในการลดน้ำหนัก เพราะอาหารไฟเบอร์สูงมักจะใช้เวลาในการเคี้ยวมากกว่า ทำให้ร่างกายมีเวลาที่จะรับรู้ว่าเราไม่หิวได้นานขึ้น **ดังนั้นใครรู้ตัวว่าทานไม่เพียงพอ พยายามจัดผักผลไม้ ส่วนข้าวก็เปลี่ยนเป็นข้าวไรซ์เบอร์รี่ให้มากขึ้นนะคะ**\n\n### 3. ดื่มหนัก\n\nสำหรับคนที่ทานอาหารคลีนได้เป็นประจำ แต่ยังติดดื่มหนัก บอกเลยว่าผิดมากๆค่า เพราะเครื่องดื่มที่มีแอลกอฮอล์มักจะมีแคลออรี่สูงมาก ทำให้มีความเสี่ยงสูงที่จะมีพุงป่องเนื่องจากร่างกายสะสมพลังงานส่วนเกินมากขึ้น จนกลายเป็นไขมันบริเวณหน้าท้อง โดยเฉพาะท่านใดชอบดื่มเบียร์เป็นประจำ ลงพุงอย่างแรงค่ะ ดังนั้นแนะนำว่าจัดเบาๆ เฉพาะงานปาร์ตี้พอนะคะ\n\n### 4. ทานไขมันผิดประเภท\n\nอย่างที่เคยคุยกันไว้ว่า ไขมันมีทั้งไขมันดี และไขมันไม่ดี ซึ่งไขมันไม่ดีเป็นสาเหตุหลักที่ทำให้น้ำหนักตัวเกินและเป็นที่มาของพุงป่อง **แต่ร่างกายคนเราก็ขาดไขมันไม่ได้ เพราะไขมันมีประโยชน์มากหากรับในปริมาณที่พอดี เพราะจะช่วยให้รู้สึกอิ่มในระหว่างมื้ออาหารและช่วยในการ support metabolism ค่ะ** ดังนั้นเราจึงต้องเลือกทานอาหารที่มีไขมันดีเป็นส่วนประกอบกัน ซึ่งไขมันดีก็มีในอาหารจำพวก ถั่วอัลมอนด์ อะโวคาโด ปลาแซลมอน น้ำมันมะพร้าว น้ำมัน canola เมล็ดฟักทอง เป็นต้น ซึ่งอาหารคลีนของทางร้านมีเมนูปลาแซลมอนที่อร่อย เต็มเปี่ยมไปด้วยไขมันดี และอยากแนะนำให้ทุกท่านได้ทาน นั่นคือ ข้าวปลาแซลมอนแซ่บค่ะ ^^\n\nดังนั้นหากทุกท่านอยากมีรูปร่างที่สวยงาม มีหน้าท้องที่แบนราบแล้ว ขอแนะนำว่าควรหลีกเลี่ยงพฤติกรรมที่เป็นสาเหตุ ที่ทำให้เกิดการสะสมของไขมันบริเวณหน้าท้องกันนะคะ และทางที่ดีควรออกกำลังกายและทานอาหารคลีนควบคู่กันไป เพื่อให้ได้ผลลัพธ์ที่ชัดเจน",

  "excerpt": "รู้จักน้ำมันรำข้าว น้ำมันเพื่อสุขภาพที่อุดมด้วยสารโอรีซานอลและวิตามินอี ช่วยลดคอเลสเตอรอล บำรุงหัวใจ ผิวพรรณ และสมอง พร้อมวิธีใช้ในครัวและข้อควรระวัง",
  "cover_url": "https://static.wixstatic.com/media/9bfc29_3e306f171d38464c9ffba3dede580f79~mv2.jpg",
  "created_at": "2025-03-27T09:00:00+07:00",
  "content_md": "## น้ำมันรำข้าว คืออะไร?\n\nน้ำมันรำข้าวเป็นน้ำมันธรรมชาติที่สกัดจากชั้นนอกสุดของเมล็ดข้าว (รำข้าว) ซึ่งปกติมักถูกกำจัดทิ้งในระหว่างกระบวนการสีข้าว แต่จริงๆ แล้ว รำข้าวนี่แหละคือแหล่งรวมสารอาหารที่มีประโยชน์มากมาย\n\n## คุณสมบัติทางโภชนาการที่น่าทึ่งของน้ำมันรำข้าว\n\n### 1. แหล่งสารต้านอนุมูลอิสระชั้นเยี่ยม\n\n\"น้ำมันรำข้าวมีสารต้านอนุมูลอิสระที่เรียกว่า โอรีซานอล ซึ่งช่วยปกป้องเซลล์จากความเสียหาย\" นักวิทยาศาสตร์พบว่าสารนี้มีประสิทธิภาพในการต่อต้านการอักเสบและลดความเสี่ยงของโรคเรื้อรัง\n\n### 2. ช่วยลดคอเลสเตอรอล\n\nโอรีซานอลยังช่วยลดระดับคอเลสเตอรอลชนิดไม่ดี (LDL) และเพิ่มคอเลสเตอรอลชนิดดี (HDL) ส่งผลดีต่อระบบหัวใจและหลอดเลือด\n\n### 3. กรดไขมันที่มีประโยชน์\n\nน้ำมันรำข้าวประกอบด้วยกรดไขมันไม่อิ่มตัวหลายชนิด โดยเฉพาะโอเมก้า 3 และโอเมก้า 6 ซึ่งช่วยบำรุงสมอง หัวใจ และระบบประสาท\n\n## ประโยชน์ต่อสุขภาพที่น่าสนใจ\n\n### การควบคุมน้ำหนัก\n\nกรดไขมันในน้ำมันรำข้าวช่วยเร่งการเผาผลาญและลดการสะสมไขมัน ทำให้เหมาะสำหรับคนที่ใส่ใจสุขภาพและต้องการควบคุมน้ำหนัก\n\n### บำรุงผิวพรรณ\n\nสารต้านอนุมูลอิสระช่วยชะลอวัย ป้องกันริ้วรอย และทำให้ผิวดูกระจ่างใส\n\n### สุขภาพสมอง\n\nวิตามินอีและสารต้านอนุมูลอิสระช่วยป้องกันการเสื่อมของเซลล์สมอง\n\n## การใช้งานน้ำมันรำข้าวในครัว\n\n### เหมาะสำหรับปรุงอาหาร\n\n- ใช้ผัดอาหารที่อุณหภูมิต่ำถึงปานกลาง\n- เหมาะสำหรับทำสลัดและน้ำสลัด\n- สามารถใช้แทนน้ำมันพืชทั่วไปในสูตรอาหารต่างๆ\n\n## ข้อควรระวังในการใช้\n\n\"ควรใช้อย่างพอเหมาะ ไม่ควรบริโภคเกิน 2-3 ช้อนโต๊ะต่อวัน\" และควรเก็บให้พ้นแสงแดดและความร้อน\n\n---\n\n**อยากสุขภาพดี ชีวิตเปลี่ยน ต้องลอง \"น้ำมันรำข้าวจากร้าน Under360\"**",

  "slug": "benefits-of-avoiding-msg",
  "title": "ข้อดีของการไม่ทานผงชูรส: ทางเลือกสุขภาพที่คุณอาจมองข้าม",
  "excerpt": "รวม 10 ข้อดีของการเลิกทานผงชูรส (MSG) ตั้งแต่ลดไมเกรน อาการแพ้ ควบคุมน้ำหนัก ไปจนถึงวิธีหลีกเลี่ยงผงชูรสในชีวิตประจำวัน",
  "cover_url": "https://static.wixstatic.com/media/9bfc29_4e61cc7bf49b411f9068668f043b8138~mv2.jpg",
  "created_at": "2025-03-30T09:00:00+07:00",
  "content_md": "ในยุคที่เราใส่ใจสุขภาพและคุณภาพชีวิตกันมากขึ้น อาหารได้กลายเป็นปัจจัยสำคัญที่หลายคนให้ความสนใจ เพราะสิ่งที่เรากินเข้าไปส่งผลโดยตรงต่อร่างกายและจิตใจของเรา หนึ่งในส่วนประกอบที่มักถูกพูดถึงบ่อยๆ ในวงการอาหารก็คือ \"ผงชูรส\" หรือที่นักวิทยาศาสตร์เรียกว่า โมโนโซเดียมกลูตาเมต (MSG)\n\nแม้ว่าผงชูรสจะช่วยให้อาหารมีรสชาติอร่อยขึ้น แต่มีหลายเหตุผลที่ทำให้หลายคนเลือกที่จะหลีกเลี่ยงการบริโภคสารนี้ บทความนี้จะพาคุณไปสำรวจประโยชน์มากมายที่คุณอาจได้รับเมื่อตัดสินใจบอกลาผงชูรส\n\n## ผงชูรสคืออะไร และทำไมบางคนถึงเลือกที่จะไม่ทาน\n\nผงชูรสเป็นสารเพิ่มรสชาติที่นิยมใช้กันอย่างแพร่หลายในอาหารหลากหลายประเภท มันถูกสกัดจากพืชหรือสัตว์ที่มีโปรตีนสูง แต่ปัจจุบันส่วนใหญ่ผลิตขึ้นด้วยกระบวนการหมักแบคทีเรีย สารนี้ให้รสชาติที่เรียกว่า \"อูมามิ\" ซึ่งเป็นรสชาติที่ห้าต่อจากรสหวาน เปรี้ยว เค็ม และขม\n\nแม้ว่าองค์การอาหารและยาของหลายประเทศจะรับรองว่าผงชูรสมีความปลอดภัยสำหรับการบริโภค แต่ก็มีผู้บริโภคจำนวนมากที่รายงานว่าพวกเขามีอาการแพ้หรือไม่สบายหลังจากรับประทานอาหารที่มีผงชูรส ซึ่งเรียกกันว่า \"อาการแพ้ผงชูรส\" (Chinese Restaurant Syndrome)\n\n## 10 ข้อดีของการไม่ทานผงชูรส\n\n### 1. ลดอาการปวดศีรษะและไมเกรน\n\nหลายคนที่มีประวัติเป็นไมเกรนพบว่าผงชูรสเป็นหนึ่งในตัวกระตุ้นที่ทำให้มีอาการปวดศีรษะรุนแรง การงดผงชูรสอาจช่วยลดความถี่และความรุนแรงของอาการปวดศีรษะและไมเกรนได้ นี่อาจเปลี่ยนชีวิตสำหรับผู้ที่ทนทุกข์กับอาการเหล่านี้เป็นประจำ\n\n### 2. ลดอาการแพ้และความรู้สึกไม่สบาย\n\nอาการแพ้ผงชูรสมักรวมถึงความรู้สึกชาตามใบหน้า คอ และหน้าอก ร้อนวูบวาบ เหงื่อออกมาก ใจสั่น คลื่นไส้ และอาการไม่สบายอื่นๆ การไม่ทานผงชูรสสามารถขจัดอาการเหล่านี้ได้สำหรับผู้ที่มีความไวต่อสารนี้\n\n### 3. ควบคุมน้ำหนักได้ดีขึ้น\n\nมีการศึกษาบางชิ้นที่แสดงให้เห็นว่าผงชูรสอาจส่งผลต่อการควบคุมความอยากอาหารและน้ำหนัก โดยกระตุ้นให้เกิดความอยากอาหารมากขึ้น นอกจากนี้ อาหารที่มีส่วนผสมของผงชูรสมักจะเป็นอาหารแปรรูปที่มีแคลอรี่สูง การตัดผงชูรสออกอาจช่วยให้คุณเลือกอาหารที่มีคุณค่าทางโภชนาการมากขึ้น ซึ่งช่วยในการควบคุมน้ำหนักได้\n\n### 4. ลดอาการบวมน้ำและการกักเก็บของเหลว\n\nผงชูรสมีโซเดียมในปริมาณสูง ซึ่งอาจทำให้ร่างกายกักเก็บน้ำและเกิดอาการบวมน้ำได้ การหลีกเลี่ยงผงชูรสอาจช่วยลดอาการบวมน้ำ ทำให้คุณรู้สึกสบายตัวมากขึ้น และลดความเสี่ยงต่อโรคความดันโลหิตสูง\n\n### 5. สุขภาพหัวใจที่ดีขึ้น\n\nโซเดียมในผงชูรสเป็นปัจจัยเสี่ยงต่อโรคความดันโลหิตสูง ซึ่งเป็นสาเหตุสำคัญของโรคหัวใจ การลดการบริโภคผงชูรสอาจช่วยลดความเสี่ยงต่อปัญหาสุขภาพหัวใจในระยะยาว โดยเฉพาะสำหรับผู้ที่มีประวัติครอบครัวเป็นโรคหัวใจ\n\n### 6. การนอนหลับที่ดีขึ้น\n\nบางคนรายงานว่าการบริโภคผงชูรสส่งผลต่อคุณภาพการนอนหลับ ทำให้นอนไม่หลับหรือหลับไม่สนิท การตัดผงชูรสออกจากอาหารอาจช่วยให้คุณหลับได้ลึกและฟื้นฟูร่างกายได้ดีขึ้น ซึ่งส่งผลดีต่อสุขภาพโดยรวม\n\n### 7. พัฒนาการรับรู้รสชาติที่แท้จริงของอาหาร\n\nผงชูรสทำให้อาหารมีรสชาติเข้มข้นขึ้น แต่ก็อาจบดบังรสชาติธรรมชาติของวัตถุดิบที่แท้จริง การหลีกเลี่ยงผงชูรสอาจช่วยให้ประสาทการรับรสของคุณไวต่อรสชาติที่ละเอียดอ่อนมากขึ้น ทำให้คุณสามารถเพลิดเพลินไปกับรสชาติธรรมชาติของอาหาร\n\n### 8. การปรับปรุงสภาพผิว\n\nบางคนพบว่าผงชูรสอาจกระตุ้นให้เกิดปัญหาผิวหนัง เช่น สิว ผื่น และอาการระคายเคือง การลดการบริโภคผงชูรสอาจช่วยให้ผิวของคุณดูสุขภาพดีและชุ่มชื้นมากขึ้น\n\n### 9. ลดความเสี่ยงของโรคเรื้อรัง\n\nแม้ว่าจะยังต้องมีการศึกษาเพิ่มเติม แต่มีข้อมูลที่แสดงให้เห็นว่าการบริโภคผงชูรสในปริมาณมากอาจเกี่ยวข้องกับความเสี่ยงที่เพิ่มขึ้นของโรคเมตาบอลิก เช่น โรคเบาหวานประเภท 2 และโรคอ้วน การลดหรือเลิกบริโภคผงชูรสอาจเป็นส่วนหนึ่งของแผนการป้องกันโรคเรื้อรังเหล่านี้\n\n### 10. สร้างนิสัยการรับประทานอาหารที่ดีต่อสุขภาพมากขึ้น\n\nการตัดสินใจไม่ทานผงชูรสมักจะเป็นส่วนหนึ่งของการเปลี่ยนแปลงวิถีชีวิตที่ใหญ่กว่า การเลี่ยงอาหารที่มีผงชูรสมักหมายถึงการเลี่ยงอาหารแปรรูปและหันไปหาอาหารธรรมชาติมากขึ้น อันนำไปสู่การบริโภคผัก ผลไม้ โปรตีนที่ไม่แปรรูป และธัญพืชไม่ขัดสีมากขึ้น\n\n## วิธีหลีกเลี่ยงผงชูรสในชีวิตประจำวัน\n\n### อ่านฉลากอาหาร\n\nผงชูรสอาจซ่อนอยู่ในผลิตภัณฑ์หลายชนิดภายใต้ชื่อต่างๆ เช่น โมโนโซเดียมกลูตาเมต, กลูตาเมตโมโนโซเดียม, โซเดียมกลูตาเมต, E621, และ \"สารสกัดจากยีสต์\" การอ่านฉลากอย่างระมัดระวังเป็นขั้นตอนแรกในการหลีกเลี่ยงสารนี้\n\n### ปรุงอาหารเองที่บ้าน\n\nการปรุงอาหารเองที่บ้านเป็นวิธีที่ดีที่สุดในการควบคุมว่ามีอะไรอยู่ในอาหารของคุณ คุณสามารถใช้เครื่องเทศและสมุนไพรธรรมชาติเพื่อเพิ่มรสชาติ แทนที่จะพึ่งพาผงชูรส\n\n### ใช้สารให้รสชาติธรรมชาติทดแทน\n\nสร้างรสชาติอูมามิโดยใช้ส่วนผสมธรรมชาติ เช่น เห็ดชิตาเกะ สาหร่ายคอมบุ มะเขือเทศ น้ำปลา (ที่ไม่มีผงชูรส) และชีสพาร์เมซาน ซึ่งล้วนให้รสชาติเข้มข้นโดยไม่ต้องใช้ผงชูรส\n\n### ระมัดระวังเมื่อรับประทานอาหารนอกบ้าน\n\nอย่าลังเลที่จะถามพนักงานเสิร์ฟว่าอาหารใดมีผงชูรสและขอให้ปรุงอาหารโดยไม่ใส่ผงชูรส ร้านอาหารหลายแห่งยินดีที่จะปรับเปลี่ยนตามคำขอของลูกค้า\n\n## ผลลัพธ์ที่คุณอาจสังเกตเห็นหลังจากเลิกทานผงชูรส\n\nเมื่อคุณเริ่มลดการบริโภคผงชูรส คุณอาจสังเกตเห็นการเปลี่ยนแปลงต่างๆ มากมาย ผลลัพธ์เหล่านี้แตกต่างกันไปในแต่ละคน แต่มักรวมถึง:\n\n**1. ระยะสั้น (สัปดาห์แรก):** อาหารอาจรู้สึกจืดในตอนแรก แต่ประสาทการรับรสของคุณจะปรับตัวและคุณจะเริ่มสังเกตเห็นความละเอียดอ่อนในรสชาติของอาหารมากขึ้น\n\n**2. ระยะกลาง (2-4 สัปดาห์):** อาการแพ้และอาการไม่สบายต่างๆ อาจเริ่มลดลง คุณอาจสังเกตเห็นการลดลงของอาการบวมน้ำและรู้สึกสบายตัวมากขึ้น\n\n**3. ระยะยาว (1 เดือนขึ้นไป):** ผู้ที่มีอาการปวดศีรษะเรื้อรังอาจพบว่าอาการดีขึ้น คุณอาจรู้สึกมีพลังงานมากขึ้น นอนหลับได้ดีขึ้น และมีความคิดที่ชัดเจนมากขึ้น\n\n## การเลือกชีวิตที่ปราศจากผงชูรสเป็นการลงทุนเพื่อสุขภาพที่ดีขึ้น\n\nการเลือกที่จะลดหรือเลิกบริโภคผงชูรสอาจเป็นการตัดสินใจที่ดีต่อสุขภาพของคุณ แม้ว่าวิทยาศาสตร์เกี่ยวกับความปลอดภัยของผงชูรสยังคงมีข้อถกเถียง แต่ประโยชน์ของการไม่ทานผงชูรสนั้นมีมากมาย ตั้งแต่อาการทางกายที่ดีขึ้นไปจนถึงการพัฒนาความสัมพันธ์ที่ดีขึ้นกับอาหาร\n\nท้ายที่สุดแล้ว การเลือกที่จะบริโภคหรือไม่บริโภคผงชูรสเป็นเรื่องส่วนบุคคล แต่การทดลองลดการบริโภคผงชูรสสักระยะหนึ่งอาจช่วยให้คุณเข้าใจว่าสารนี้ส่งผลต่อร่างกายของคุณอย่างไร และการเปลี่ยนแปลงนี้เหมาะสมกับคุณหรือไม่\n\n## เริ่มต้นการเดินทางสู่การมีชีวิตที่ปราศจากผงชูรสได้จากร้าน Under360\n\nอยากเริ่มต้นชีวิตที่ไม่มีผงชูรสแต่ไม่รู้จะเริ่มต้นอย่างไร? เราเข้าใจว่านี่อาจเป็นการเปลี่ยนแปลงที่ท้าทาย แต่คุณไม่จำเป็นต้องทำคนเดียว! ลองสั่งอาหารจากทางร้าน Under360 ได้เลย!\n\n- คลิกสั่งซื้อเลย\n- สมัครสมาชิกได้รับส่วนลด 50 บาท สำหรับลูกค้าใหม่\n\n[สั่งอาหารผ่านไลน์ รับส่วนลดทันที 50 บาท](https://lin.ee/T55UzEH)",

  "content_md": "ทำไมอาหารคลีนเราสด สะอาด เสียยากทั้งๆที่ไม่ใช้สารกันบูด มารู้ความลับหลังครัวกันค่ะ\n==================================================================================\n\n**วันนี้อาหารคลีน under360 จะพามารู้จักกับหลักการต่อสู้กับเจ้าจุลินทรีย์วายร้าย** **ที่ทำให้อาหารเสียง่ายกันค่ะ**\n\n**อย่างที่เรารู้กันว่าอาหารเสียเกิดจากเชื้อจุลินทรีย์ ได้แก่ ยีสต์ เชื้อรา และแบคทีเรียจำนวนมากเข้าไปเจริญเติบโตในอาหารอย่างรวดเร็ว แต่เราสามารถต่อสู้กับเจ้าวายร้ายพวกนี้ได้ด้วยหลักการ \"FATTOM\" ค่ะ**\n\nFATTOM เป็นตัวย่อให้จำได้ง่าย มาจาก F = Food อาหาร A = Acid กรด T = Time เวลา T = Temperature อุณหภูมิ O = Oxygen ออกซิเจน M = Moisture ความชื้น\n\n### 1. **Food**\n\nเนื่องจากอาหารร้านมีเป็นโปรตีนเป็นหลัก เราจึงเน้นย้ำการใช้วัตถุดิบที่สดใหม่จากตลาดส่งตรงถึงร้าน และทำการตัดแต่ง นำไขมันออกเอง ล้างน้ำสะอาดและเก็บไว้อย่างมีคุณภาพ\n\n### 2. **Acid**\n\nทางร้านไม่ใช้สารควบคุมความเป็นกรด ลูกค้ามั่นใจได้ 100% ว่าอาหารคลีนที่ทานไปไม่มีการใส่สารใดใดเกิดขึ้นค่ะ เพราะอาหารคลีนของร้านนอกจากบุคคลทั่วไป มีผู้ใหญ่ ผู้ป่วยไขมันสูง และเด็กๆที่ทาน ด้วยค่ะ เราจึงไม่ใช้สารใดๆให้เป็นอันตรายแก่ร่างกายทั้งสิ้น\n\n### 3. **Time**\n\nเวลาเป็นอีกหลักการที่เข้าถึงง่าย รู้แค่ว่ายิ่งวางทิ้งไว้นานอาหารยิ่งบูดง่าย! แต่หลายคนยังไม่เคยรู้ว่าเวลาที่จุลินทรีย์เติบโตจนผลิตสารพิษลงไปในอาหารนั่นคือ 4 ชั่วโมง\n\nดูจากกราฟจะเห็นว่า เมื่อเวลาผ่านไป 1-3 ชั่วโมงแรก เชื้อจุลินทรีย์เติบโตไม่มาก แต่พอเข้าชั่วโมงที่ 4 เป็นชั่วโมงที่เติบโตเด้งหลายเท่า ซึ่งเป็นจุดที่ทำให้เกิดผลเสียต่อร่างกาย อาหารคลีนของเราใส่ใจเรื่องนี้อย่างเต็มที่ทำอาหารเสร็จรีบเข้าตู้เย็น เพื่อไม่ให้จุลินทรีย์โตนั่นเอง\n\n### 4. **Temperature**\n\nเรื่องอุณหภูมิ น่าจะเป็นหลักการที่ลูกค้าเข้าถึงง่ายที่สุด เช่น เราซื้อข้าวแกงมาตอนเช้า พอตากแดดหน่อยมันก็บูดเน่าซะแล้ว เนื่องจากอากาศที่ร้อนของประเทศเรา ทำให้จุลินทรีย์พวกนี้ชอบมาก เหมาะกับการเติบโต จนทำให้อาหารเน่าเสีย\n\nดังนั้น เราจึงแจ้งลูกค้ามาตลอดว่าอาหารคลีนทางร้านขออนุญาตทำตอนกลางคืนและนำเข้าตู้เย็นไปส่งแบบเย็นนะคะ เราจะไม่ปล่อยให้ของอยู่ที่อุณหภูมิห้องนานเกินไปค่ะ และเมื่อลูกค้ารับข้าวไปแล้วแนะนำให้เข้าตู้เย็นทันที เนื่องจากความเย็นของตู้เย็นช่องปกติจะอยู่ที่ 2-3 C จุลินทรีย์อยู่ไม่ได้ ตายจากไปอาหารก็ไม่เน่าเสียค่ะ และหากทำตอนเช้าส่งในวันมีการบูดเกิดขึ้นแน่นอนค่ะ และต่อให้ไม่บูดก็ไม่ใช่เรื่องดี เพราะแบคทีเรียจะเติบโตมาก ตามกราฟข้างต้นเลย ดังนั้นถ้าท่านไหนออฟฟิศไม่มีตู้เย็น แนะนำให้ส่งถึงบ้าน หรือใช้บริการเพิ่มน้ำแข็งแห้งเข้าไปค่ะ\n\n### 5. **Oxygen**\n\nอาหารคลีนของเรามีการปรับแพคเกจจิ้งมาใช้การซีลปิดนานแล้ว รวมถึงสินค้าใหม่กับข้าวแพคแบบสูญญากาศทำให้ออกซิเจนไม่เข้า เนื่องจากเราเล็งเห็นถึงเรื่องคุณภาพของอาหารมานาน และนี่ก็เป็นอีกเคล็ดลับนึงที่ทำให้อาหารเสียยากทั้งๆที่ไม่ใช้สารกันบูดหรือสารเคมีอื่นๆค่ะ\n\n### 6. **Moisture**\n\nสาเหตุที่กล่องข้าวของเรามี ทั้งหมด 3 ช่อง เนื่องจาก เราต้องการแยกความชื้นของอาหารแต่ละเมนูออกจากกัน โดยเฉพาะช่องผักที่มีปริมาณน้ำมากกว่าช่องอื่นทำให้เสียได้ง่ายกว่าค่ะ\n\n---\n\n**วันนี้พลอยขอมาแชร์เคล็ด(ไม่)ลับ เพื่อแบ่งปันให้ลูกค้ามีความรู้ความเข้าใจเกี่ยวกับเชื้อจุลินทรีย์และวิธีการป้องกัน ทำให้อาหารของเราพ้นจากอันตรายและทำให้ผู้ที่รับประทานเข้าไปตั้งแต่เด็กน้อย ยันผู้สูงอายุมีแต่ความปลอดภัยค่ะ**\n\n**ยังไงทางร้านสัญญาว่าจะไม่หยุดเรียนรู้ ไม่หยุดสรรหาความอร่อยที่มาพร้อมกับคุณภาพ มาตรฐานที่ดีในทุกๆกล่องนะคะ ถึงแม้จะเป็นโฮมเม้ดแต่ครัวเราได้มาตรฐานแน่นอนค่า**",

  "title": "ฉีกกฎอาหารคลีนแบบเดิมๆ มาหุ่นสวยมั่นใจ กับสลัดผักไฮโดรกันจ้า",
  "excerpt": "แนะนำเมนูน้องใหม่ \"สลัดผักอกไก่อบ\" จากผักไฮโดรโปนิกส์ไร้สารพิษ พร้อมประโยชน์ของผักแต่ละชนิด สำหรับคนที่อยากฉีกกฎอาหารคลีนแบบเดิมๆ",
  "cover_url": "https://static.wixstatic.com/media/9bfc29_580118b2b09f4c53b20a815de4d13127~mv2_d_3264_2448_s_4_2.jpg",
  "created_at": "2017-02-28T09:00:00+07:00",
  "content_md": "# ฉีกกฎอาหารคลีนแบบเดิมๆ มาหุ่นสวยมั่นใจ กับสลัดผักไฮโดรกันจ้า\n\nถ้าพูดถึงอาหารคลีน สิ่งแรกที่เรามักจะนึกถึงเป็นอันดับแรก ก็คืออาหารกล่อง ที่ประกอบไปด้วยข้าวไรซ์เบอร์รี่และกับข้าว อาทิ อกไก่\n\nซึ่งทำให้ใครหลายๆคนเบื่อบ้างบางคราว หากทานติดต่อกันเป็นเวลานาน\n\nทางร้านอาหารคลีน under360 เองก็เห็นถึงจุดนี้พลอยจึงมีการออกเมนูอื่นๆเข้ามาเพิ่มเติม\n\nเช่น เมนูบะหมี่ผัก เมนูวุ้นเส้นต่างๆ เพื่อให้ลูกค้าทานได้ไม่เบื่อ กินได้แบบยั่งยืน\n\nและตอนนี้ก็ขอแนะนำเมนูน้องใหม่ล่าสุด **\"สลัดผักอกไก่อบ\"**\n\n## ทำไมถึงเลือกสลัดผัก?\n\nเมื่อสุขภาพเป็นสิ่งที่ต้องดูแล และมีโรคภัยไข้เจ็บในรูปแบบใหม่เกิดขึ้นทุกวัน อาหารจึงเป็นสิ่งสำคัญ ที่จะเข้ามามีบทบาทต่อการดูแลสุขภาพร่างกายของคนในยุคปัจจุบันมากที่สุด สาเหตุที่เลือกเมนูสลัดผักไฮโดรฯนั้น เนื่องจากผักไฮโดรฯ ที่ร้านใช้เป็นผักที่เลือกมาแบบไร้สารพิษ คุณประโยชน์ที่จะได้รับนั้นมากกว่าผักทั่วไป รสชาติหวานกรอบดีกว่าผักปกติ ที่สำคัญมีกากใยอาหารมาก โดยกากใยพวกนี้จะช่วยล้างผนังลำไส้ กำจัดพวกไขมันและอนุมูลอิสระที่เกาะตามผนังลำไส้ อันเป็นสาเหตุของการเกิดโรคมะเร็งในลำไส้ได้\n\nส่วนประกอบของเมนูใหม่นี้ประกอบไปด้วยสลัดผักไฮโดรหลากชนิด, มะเขือเทศเชอร์รี่, แครอท, บร็อคโครี่ อกไก่ลอกหนังอบนุ่ม และน้ำสลัดโฮมเม้ด ซึ่งวัตถุดิบที่เลือกมาขอบอกเลยว่าล้วนแต่มีประโยชน์มากมายทั้งสิ้น\n\nโดยประโยชน์ของผักแต่ละชนิดที่ใช้ในเมนูนี้แตกต่างกัน จึงอยากนำเสนอให้ทุกท่านได้รู้จักตามนี้ค่ะ\n\n## 1. Red coral ช่วยสร้างเม็ดเลือด ให้เส้นใยอาหารสูง ป้องกันโรคปากนกกระจอก ช่วยป้องกันโรคโลหิตจาง มีวิตามินซีสูง\n\n## 2. Red Oak Lettuce ช่วยในการสร้างเม็ดเลือด บำรุงสายตา บำรุงเส้นผม บำรุงประสาทและกล้ามเนื้อ\n\n## 3. Green Oak Lettuce มีกากใยอาหารมาก โดยกากใยพวกนี้จะช่วยล้างผนังลำไส้ กำจัดพวกไขมันและอนุมูลอิสระที่เกาะตามผนังลำไส้ อันเป็นสาเหตุของการเกิดโรคมะเร็งในลำไส้\n\n## นอกจากนี้พลอยยังรวบรวมประโยชน์ของผักไฮโดรโปนิกส์มาฝากกันค่ะ\n\n1. ผักไฮโดรโปนิกส์เป็นผักที่มีคุณค่าทางอาหารสูง และไม่มีสารเคมีที่เป็นพิษต่อร่างกาย\n\n2. มีความปลอดภัยต่อผู้บริโภคสูง เนื่องจากการปลูกผักไร้ดินเป็นการนำสารละลายธาตุอาหารมาละลาย โดยใช้ธาตุอาหารที่เหมาะสมกับความต้องการพืช เช่นเดียวกับการปลูกพืชบนดิน แต่ต่างกันตรงที่ผักที่ปลูกในดินจะต้องอาศัยจุลินทรีย์มาเปลี่ยนเป็นอาหาร ทำให้บางครั้งหากในดินมีธาตุโลหะหนักที่เป็นพิษต่อผู้บริโภค จุลินทรีย์ก็จะเปลี่ยนให้พืชสามารถดูดธาตุที่เป็นพิษเข้าไปได้ ในขณะที่การปลูกพืชไร้ดิน จะสามารถควบคุมแร่ธาตุที่มีความจำเป็นต่อการเจริญเติบโตของพืชได้ ผู้บริโภคจึงได้รับประทานผักสดสะอาดที่มีความปลอดภัยสูง\n\n3. ข้อดีของการบริโภคผักไฮโดรโปนิกส์ คือ การคงคุณประโยชน์ที่โดดเด่นที่สุดของผักเอาไว้ได้อย่างเต็มที่ เช่น กากใยอาหาร ที่เป็นตัวช่วยในการล้างผนังลำไส้และเป็นตัวช่วยในการขับถ่าย\n\n4. มีการรับรองว่าพืชผักไร้ดินจะมีปริมาณแร่ธาตุที่เป็นประโยชน์เท่ากับพืชผักที่ปลูกบนดินหรือสูงกว่าเล็กน้อย แต่พืชผักไร้ดินจะมีกลิ่นที่มาจากน้ำมันหอมระเหยและมีรสชาติน่าชวนชิมมากกว่าพืชผักที่ปลูกบนดิน\n\n5. ผักไฮโดรโปนิกส์ที่นิยมส่วนใหญ่จะเป็นผักสลัดที่นำมารับประทานสด เช่น ผักกรีนคอส (Green Cos) เป็นผักที่อุดมไปด้วยธาตุเหล็กที่ช่วยป้องกันโรคโลหิตจาง นอกจากจะใช้เป็นส่วนประกอบในสลัดแล้ว ยังนิยมนำไปผัดน้ำมันอีกด้วย, ผักกรีนโอ๊ค (Green Oak) หรือ ผักเรดโอ๊ค (Red Oak) เป็นผักที่อุดมไปด้วยวิตามินเอ วิตามินซี โฟเลท และธาตุเหล็ก, ผักเรดคอรัล (Red Coral) เป็นผักที่อุดมไปด้วยใยอาหาร โฟเลท สารต้านอนุมูลอิสระ รวมไปถึงเบต้าแคโรทีน, ผักบัตเตอร์เฮด (Butterhead) เป็นผักที่อุดมไปด้วยโฟเลทและสารต้านอนุมูลอิสระ เป็นต้น\n\n## การสรุป\n\nดังนั้นหากกำลังไดเอท ลดความอ้วนกันอยู่ อยากจะฉีกกฎก็การทานอาหารคลีนดิลิเวอร์รี่แบบเดิมๆ\n\nขอแนะนำเมนูสลัดผักอกไก่เลยค่ะ ^^ และในอนาคตเร็วๆนี้จะเพิ่มเติมเมนูให้หลากหลายขึ้นเพื่อตอบโจทย์ความต้องการในการทานอาหารคลีนที่หลากหลายของลูกค้าทุกท่านนะคะ",

  "content_md": "# การกินอาหารคลีน ให้เห็นผลมากที่สุด\n\n## เปลี่ยนชีวิตด้วยการกินคลีน ที่ใคร ๆ ก็ทำได้\n\nหลายคนคงเคยได้ยินคำว่า \"อาหารคลีน\" กันมาบ้างแล้ว แต่หลายคนอาจยังสงสัยว่า การกินอาหารคลีนที่ถูกต้องเป็นอย่างไร และจะทำอย่างไรให้เห็นผลชัดเจนที่สุด บทความนี้จะมาไขข้อข้องใจเกี่ยวกับการกินคลีนอย่างละเอียด พร้อมเคล็ดลับที่จะช่วยให้คุณเห็นผลลัพธ์ได้เร็วและยั่งยืน\n\n## อาหารคลีนคืออะไร? ทำไมถึงดีต่อสุขภาพ\n\nอาหารคลีน หมายถึง อาหารที่ผ่านกระบวนการแปรรูปน้อยที่สุด หรือไม่ผ่านการแปรรูปเลย เน้นความเป็นธรรมชาติ สด ใหม่ ไม่มีสารเคมี หรือสารปรุงแต่งที่เป็นอันตรายต่อร่างกาย การกินอาหารคลีนไม่ใช่แค่เทรนด์สุขภาพชั่วคราว แต่เป็นไลฟ์สไตล์ที่ช่วยให้ร่างกายได้รับสารอาหารที่มีประโยชน์อย่างครบถ้วน\n\nการกินอาหารคลีนมีประโยชน์มากมาย เช่น:\n\n* ช่วยควบคุมน้ำหนักได้อย่างมีประสิทธิภาพ\n* เพิ่มพลังงานให้กับร่างกาย ไม่เหนื่อยง่าย\n* ช่วยให้ระบบย่อยอาหารทำงานได้ดีขึ้น\n* ลดความเสี่ยงต่อโรคเรื้อรังต่าง ๆ เช่น เบาหวาน ความดันโลหิตสูง\n* ผิวพรรณสดใส มีสุขภาพดี\n* ภูมิคุ้มกันแข็งแรง ไม่เจ็บป่วยง่าย\n\n## หลักการกินอาหารคลีนให้เห็นผลมากที่สุด\n\n### 1. เลือกวัตถุดิบธรรมชาติ ไม่ผ่านการแปรรูป\n\nถ้าอยากเห็นผลจากการกินคลีนเร็วที่สุด สิ่งสำคัญที่สุดคือการเลือกวัตถุดิบที่สด ใหม่ และผ่านการแปรรูปน้อยที่สุด เน้นอาหารจากธรรมชาติ เช่น ผัก ผลไม้ตามฤดูกาล เนื้อสัตว์ไม่ติดมัน ไข่ ธัญพืชไม่ขัดสี และถั่วต่าง ๆ การเลือกซื้อวัตถุดิบออร์แกนิคยิ่งดี แต่ถ้าข้อจำกัดด้านงบประมาณ การล้างผักผลไม้ให้สะอาดก็สามารถช่วยลดสารเคมีตกค้างได้เช่นกัน\n\n### 2. เลี่ยงอาหารแปรรูปและน้ำตาล\n\nน้ำตาลและอาหารแปรรูปเป็นศัตรูตัวฉกาจของการกินคลีน เพราะมักมีสารเคมี สารกันบูด และน้ำตาลปริมาณมาก ซึ่งส่งผลเสียต่อร่างกายในระยะยาว ลดการบริโภคอาหารประเภทนี้ลงให้มากที่สุด เช่น:\n\n* อาหารสำเร็จรูป อาหารกระป๋อง\n* เครื่องดื่มที่มีน้ำตาลสูง เช่น น้ำอัดลม น้ำหวาน ชาเขียวพร้อมดื่ม\n* ขนมขบเคี้ยว ขนมหวาน เบเกอรี่\n* อาหารฟาสต์ฟู้ด\n* อาหารแปรรูปที่มีไขมันทรานส์สูง\n\n### 3. ปรับสัดส่วนอาหารให้สมดุล\n\nการกินคลีนให้เห็นผลไม่ได้หมายถึงการกินแต่ผักผลไม้เพียงอย่างเดียว แต่ต้องรับประทานให้ครบทุกหมวดหมู่ในสัดส่วนที่เหมาะสม หลักการง่าย ๆ คือ:\n\n* ครึ่งหนึ่งของจานอาหารควรเป็นผักหลากสี\n* หนึ่งส่วนสี่เป็นโปรตีนคุณภาพดี เช่น อกไก่ ปลา ไข่ เต้าหู้\n* หนึ่งส่วนสี่เป็นคาร์โบไฮเดรตเชิงซ้อน เช่น ข้าวกล้อง มันเทศ ควินัว\n\nการจัดสัดส่วนแบบนี้จะช่วยให้ร่างกายได้รับสารอาหารครบถ้วนและควบคุมปริมาณแคลอรี่ได้ง่ายขึ้น\n\n### 4. ดื่มน้ำเปล่าให้เพียงพอ\n\nน้ำเป็นส่วนสำคัญของการกินคลีน ควรดื่มน้ำเปล่าอย่างน้อยวันละ 8 แก้ว หรือประมาณ 2 ลิตร การดื่มน้ำเพียงพอช่วยล้างสารพิษออกจากร่างกาย ช่วยในการย่อยอาหาร ทำให้ผิวพรรณสดใส และยังช่วยลดความอยากอาหารได้อีกด้วย\n\nลดการดื่มเครื่องดื่มที่มีคาเฟอีน แอลกอฮอล์ และน้ำอัดลม แล้วหันมาดื่มน้ำเปล่า น้ำสมุนไพร หรือชาสมุนไพรไม่มีน้ำตาลแทน\n\n### 5. ปรุงอาหารด้วยวิธีที่ดีต่อสุขภาพ\n\nวิธีการปรุงอาหารส่งผลต่อคุณค่าทางโภชนาการอย่างมาก หากต้องการเห็นผลจากการกินคลีนเร็วที่สุด ควรเลือกวิธีการปรุงอาหารที่ดีต่อสุขภาพ เช่น:\n\n* นึ่ง - วิธีที่ช่วยรักษาสารอาหารได้ดีที่สุด\n* ต้ม - วิธีง่าย ๆ ที่ช่วยลดไขมัน\n* อบ - ใช้น้ำมันน้อย แต่ยังคงรสชาติ\n* ผัดแบบใช้น้ำมันน้อย - เลือกใช้น้ำมันที่มีประโยชน์ เช่น น้ำมันมะกอก น้ำมันรำข้าว\n* หลีกเลี่ยงการทอด หรือผัดน้ำมันมาก ๆ\n\n## เทคนิคพิเศษเพื่อให้การกินคลีนเห็นผลเร็วขึ้น\n\n### 1. วางแผนมื้ออาหารล่วงหน้า\n\nการวางแผนมื้ออาหารล่วงหน้าเป็นกลยุทธ์สำคัญสำหรับผู้ที่ต้องการเห็นผลจากการกินคลีนอย่างรวดเร็ว ลองจัดเตรียมอาหารสำหรับทั้งสัปดาห์ในวันหยุด (Meal Prep) จะช่วยให้คุณ:\n\n* ไม่หลงไปกินอาหารที่ไม่ดีต่อสุขภาพเพราะความหิวหรือความเร่งรีบ\n* ควบคุมปริมาณและคุณภาพของอาหารได้ดีขึ้น\n* ประหยัดเวลาและเงิน\n* ลดความเครียดจากการต้องคิดว่าจะกินอะไรในแต่ละมื้อ\n\n### 2. กินอาหารเล็กๆ แต่บ่อยครั้ง\n\nแทนที่จะกิน 3 มื้อใหญ่ต่อวัน ลองปรับเป็นกิน 5-6 มื้อเล็ก ๆ ห่างกันประมาณ 3 ชั่วโมง จะช่วยให้:\n\n* ระบบเผาผลาญทำงานต่อเนื่อง\n* รักษาระดับน้ำตาลในเลือดให้คงที่\n* ลดความหิวและการกินมากเกินไปในมื้อถัดไป\n* เพิ่มพลังงานตลอดทั้งวัน\n\n### 3. ให้ความสำคัญกับการนอนหลับ\n\nการนอนหลับอย่างเพียงพอ (7-8 ชั่วโมง) เป็นส่วนสำคัญของการกินคลีนให้เห็นผล การนอนน้อยส่งผลให้ฮอร์โมนความหิว (เกรลิน) เพิ่มขึ้น และฮอร์โมนอิ่ม (เลปติน) ลดลง ทำให้เรามีแนวโน้มที่จะกินมากเกินความจำเป็น โดยเฉพาะอาหารประเภทแป้งและน้ำตาล\n\n### 4. ออกกำลังกายควบคู่กับการกินคลีน\n\nการออกกำลังกายสม่ำเสมอร่วมกับการกินคลีนจะช่วยให้เห็นผลลัพธ์ได้เร็วขึ้น 2-3 เท่า ควรผสมผสานการออกกำลังแบบคาร์ดิโอ (เช่น วิ่ง ว่ายน้ำ ปั่นจักรยาน) กับการฝึกเวทเพื่อเสริมสร้างกล้ามเนื้อ อย่างน้อยสัปดาห์ละ 3-4 ครั้ง\n\n### 5. ฟังสัญญาณจากร่างกาย\n\nการกินคลีนที่ดีต้องรู้จักฟังสัญญาณจากร่างกายด้วย กินเมื่อหิวจริง ๆ และหยุดเมื่ออิ่มพอดี ไม่จำเป็นต้องกินให้หมดจานเสมอไป การฝึกสติขณะรับประทานอาหาร (Mindful Eating) จะช่วยให้คุณรับรู้ความอิ่มได้ดีขึ้น และเพลิดเพลินกับอาหารมากขึ้นด้วย\n\n## ตัวอย่างเมนูอาหารคลีน 7 วัน\n\n### วันจันทร์\n\n* เช้า: โยเกิร์ตกรีกใส่กราโนล่าโฮมเมด ผลไม้สด และน้ำผึ้งเล็กน้อย\n* สาย: ผลไม้ตามฤดูกาล 1 ส่วน\n* กลางวัน: สลัดไก่ย่างกับผักรวม น้ำสลัดน้ำมันมะกอก\n* บ่าย: ถั่วคั่วไม่เกลือ 1 กำมือ\n* เย็น: ปลาย่างกับผักนึ่งและควินัว\n\n### วันอังคาร\n\n* เช้า: สมูทตี้ผักโขมกับผลไม้ และเมล็ดเจีย\n* สาย: ไข่ต้ม 1-2 ฟอง\n* กลางวัน: ข้าวกล้องกับแกงเขียวหวานอกไก่ใส่ผักเยอะ ๆ\n* บ่าย: แอปเปิ้ล 1 ลูกกับเนยถั่ว 1 ช้อนโต๊ะ\n* เย็น: สเต๊กอกไก่กับมันเทศอบและผักย่าง\n\n### วันพุธ\n\n* เช้า: ข้าวโอ๊ตหุงกับนมอัลมอนด์ใส่ผลไม้และอัลมอนด์สไลซ์\n* สาย: สมูทตี้โปรตีน\n* กลางวัน: สลัดผักรวมกับทูน่า อโวคาโด และไข่ต้ม\n* บ่าย: แครอทสติ๊กกับฮัมมัส\n* เย็น: แกงส้มชะอมกุ้งกับข้าวกล้อง\n\n### วันพฤหัสบดี\n\n* เช้า: ไข่ตุ๋นกับผักและขนมปังโฮลเกรน\n* สาย: กล้วย 1 ลูกกับโยเกิร์ตกรีก\n* กลางวัน: ข้าวกล้องผัดกะเพราไก่สับ (ใช้น้ำมันน้อย) ไข่ดาว\n* บ่าย: ฟรุตสลัด\n* เย็น: ซุปผักกับเต้าหู้และมันฝรั่งม่วง\n\n### วันศุกร์\n\n* เช้า: โยเกิร์ตกรีกกับเบอร์รี่และน้ำผึ้ง\n* สาย: ถั่วแระญี่ปุ่น (เอดามาเมะ)\n* กลางวัน: พาสต้าโฮลเกรนผัดน้ำมันมะกอกกับผักโขม มะเขือเทศ และไก่ย่าง\n* บ่าย: ชาเขียวไม่มีน้ำตาลกับถั่ว\n* เย็น: สลัดแซลมอนย่างกับอะโวคาโดและควินัว\n\n### วันเสาร์\n\n* เช้า: ไข่เจียวผักกับขนมปังโฮลเกรน\n* สาย: สมูทตี้ผลไม้\n* กลางวัน: ซูชิโรลผักกับอโวคาโดและแซลมอน\n* บ่าย: โยเกิร์ตกรีกกับเมล็ดเจียและผลไม้\n* เย็น: เต้าหู้ผัดขิงกับข้าวกล้องและผักนึ่ง\n\n### วันอาทิตย์\n\n* เช้า: แพนเค้กกล้วยโฮมเมด (แป้งถั่ว กล้วย ไข่)\n* สาย: ส้ม 1-2 ลูก\n* กลางวัน: ต้มยำกุ้งน้ำใสกับข้าวกล้อง\n* บ่าย: พุดดิ้งเมล็ดเจีย\n* เย็น: อกไก่อบสมุนไพรกับมันฝรั่งม่วงและผักย่าง\n\n## หรือหากคุณเป็นสายขี้เกียจทำหรือไม่สะดวก สามารถให้ร้าน Under360 ช่วยได้ ตัวอย่างเมนูของร้าน\n\n* อกไก่พันสาหร่ายทรงเครื่อง\n* มักกะโรนีผักโขมอบชีส\n* แซลมอนย่าง วุ้นเส้นผัดซอสกะเพรา\n* ข้าวยำไข่เจียวฝอยอกไก่สับ\n* เพนเน่ซอสโบโลเนสมีทบอลอกไก่\n* หมี่เตี๊ยวผัดพริกเผาฟองเต้าหู้ไก่ฉีก\n* ข้าวสะโพกไก่ตุ๋นเกาลัด\n* เส้นหมี่น้ำยาทูน่า(ไร้)กะทิอกไก่\n\n## การเริ่มต้นกินคลีนสำหรับผู้เริ่มต้น\n\nหากคุณเพิ่งเริ่มต้นการกินคลีน อย่าเปลี่ยนแปลงทุกอย่างในทันที เพราะอาจทำให้รู้สึกเครียดและล้มเลิกได้ง่าย ลองเริ่มจากขั้นตอนเล็ก ๆ เหล่านี้:\n\n1. **ค่อย ๆ ลดน้ำตาล** - เริ่มจากการลดปริมาณน้ำตาลในกาแฟหรือชา แล้วค่อย ๆ ลดขนมหวานลงทีละนิด\n2. **เพิ่มปริมาณผักในทุกมื้อ** - แม้แต่อาหารจานโปรดของคุณก็สามารถเพิ่มผักเข้าไปได้\n3. **เปลี่ยนธัญพืชขัดขาวเป็นธัญพืชไม่ขัดสี** - เช่น เปลี่ยนจากข้าวขาวเป็นข้าวกล้อง\n4. **ลดอาหารแปรรูปทีละอย่าง** - เริ่มจากการทำอาหารเองง่าย ๆ แทนการซื้ออาหารสำเร็จรูป\n5. **ทำความเข้าใจฉลากโภชนาการ** - เรียนรู้การอ่านฉลากเพื่อเลือกผลิตภัณฑ์ที่ดีต่อสุขภาพ\n\n## เห็นผลเมื่อไหร่? ระยะเวลาที่จะเห็นการเปลี่ยนแปลง\n\nหลายคนสงสัยว่าการกินคลีนจะเห็นผลเมื่อไหร่ คำตอบคือ การเปลี่ยนแปลงจะเกิดขึ้นตั้งแต่สัปดาห์แรก แต่จะแตกต่างกันไปในแต่ละบุคคล โดยทั่วไปคุณจะสังเกตเห็น:\n\n* **1-2 สัปดาห์แรก**: รู้สึกมีพลังงานมากขึ้น ระบบย่อยอาหารทำงานดีขึ้น นอนหลับสบายขึ้น\n* **2-4 สัปดาห์**: ผิวพรรณเปล่งปลั่ง น้ำหนักเริ่มลดลง (ประมาณ 1-2 กก./สัปดาห์) อาการแพ้บางอย่างอาจดีขึ้น\n* **1-3 เดือน**: สุขภาพโดยรวมดีขึ้น มีรูปร่างกระชับขึ้น ระดับพลังงานสูงและคงที่ตลอดวัน\n* **3-6 เดือน**: การเปลี่ยนแปลงภายในร่างกาย เช่น ระดับคอเลสเตอรอล น้ำตาลในเลือด และความดันโลหิตเริ่มดีขึ้น\n\nความอดทนและความสม่ำเสมอเป็นกุญแจสำคัญสู่ความสำเร็จ การกินคลีนไม่ใช่การไดเอทแบบชั่วคราว แต่เป็นการปรับเปลี่ยนวิถีชีวิตในระยะยาว\n\n## ความท้าทายและวิธีรับมือ\n\nการกินคลีนอาจพบเจอความท้าทายบ้าง โดยเฉพาะในช่วงแรก เช่น:\n\n1. **อาการอยากน้ำตาล** - แก้ไขโดยกินผลไม้หรือดาร์กช็อกโกแลตที่มีโกโก้สูง\n2. **การกินนอกบ้าน** - เลือกร้านที่มีตัวเลือกสุขภาพ หรือดูเมนูล่วงหน้าและวางแผนการสั่ง\n3. **งบประมาณจำกัด** - ซื้อผักผลไม้ตามฤดูกาล ใช้โปรตีนที่ราคาไม่แพง เช่น ไข่ ถั่ว เต้าหู้\n4. **เวลาในการเตรียมอาหารน้อย** - จัดเตรียมอาหารล่วงหน้าในวันหยุด หรือเลือกเมนูที่ทำง่าย ใช้เวลาน้อย\n5. **ครอบครัวไม่ได้กินคลีน** - ปรับเมนูให้เป็นทางเลือกสุขภาพที่ทุกคนสามารถรับประทานได้ หรือเตรียมส่วนของตัวเองแยก\n\n## มาเริ่มต้นกินคลีนกันเถอะ!\n\nการกินอาหารคลีนเป็นวิธีที่ยอดเยี่ยมในการดูแลสุขภาพ ควบคุมน้ำหนัก และมีชีวิตที่มีพลัง แม้จะมีความท้าทายบ้าง แต่ผลลัพธ์ที่ได้รับคุ้มค่าเกินคาด ไม่ว่าจะเป็นรูปร่างที่ดีขึ้น สุขภาพแข็งแรง ผิวพรรณสดใส หรือความมั่นใจที่มากขึ้น\n\nอย่าลืมว่า การกินคลีนไม่ใช่การอดอาหารหรือทรมานตัวเอง แต่เป็นการเลือกอาหารที่มีประโยชน์มากกว่า และสามารถปรับให้เข้ากับไลฟ์สไตล์ของคุณได้ เริ่มต้นวันนี้ด้วยขั้นตอนเล็ก ๆ และคุณจะประหลาดใจกับการเปลี่ยนแปลงที่เกิดขึ้น! หือจะให้ทางร้านเราดูแลได้นะคะที่ร้าน Under360 ได้ที่นี่เลย!\n\n* คลิกสั่งซื้อเลย\n* สมัครสมาชิกได้รับส่วนลด 50 บาท สำหรับลูกค้าใหม่",

  "content_md": "ช่วงนี้เทรนด์รักสุขภาพกำลังมาแรงแซงทุกโค้ง ไหนจะคลิปออกกำลังกาย ไหนจะโพสรูปแชร์อาหารคลีน พลอยเลยเชื่อว่าเพื่อนๆหลายๆคนก็อยากที่จะลดความอ้วน อวดหุ่นสวยกันบ้าง แต่จะเริ่มต้นลดน้ำหนักต้องทำยังไง ยิ่งเสิชยิ่งงง ยิ่งซับซ้อนมากกว่าที่จะเข้าใจ สุดท้ายก็ล้มเลิก...!\n\nจะบอกว่าอย่าพึ่งท้อและล้มเลิกกันนะคะ วันนี้พลอยมาแนะนำวิธีการลดน้ำหนักอย่างถูกต้องค่ะ\n\nอาจจะยาวหน่อย ค่อยๆอ่านและทำความเข้าใจวันละนิด ผอมแบบสุขภาพดีชัวร์\n\n## 1. คำนวน ชั่งน้ำหนัก\n\nเริ่มต้นด้วยการหาค่า BMI หรือค่าดัชนีมวลกายกันก่อนเลยว่า สรุปแล้ว เราอ้วนจริงไหม?\n\nพอคำนวณออกมาแล้ว มาดูค่าตามนี้เลยค่ะ:\n- ผอมเกินไป = <18.5\n- ปกติ = 18.5–24.9\n- อวบๆ จั้มมั่ม = 25–29.9\n- อ้วน = BMI 30 หรือมากกว่า\n\nใครเลยเกณฑ์ปกติมาแล้ว มาลดน้ำหนักกันซักหน่อยค่า\n\nจากนั้นมาคำนวณดูว่าเราใช้พลังงานต่อวันเท่าไหร่ เพื่อที่จะได้นำมาคำนวณแคลลอรี่ในการทานอาหารต่อไปได้ ส่วนใหญ่ผู้ชายจะใช้พลังงานเฉลี่ย 2,000kcal ผู้หญิงประมาณ 1,500kcal หากจะคำนวณเป๊ะๆ ตามนี้เลย\n\n### 1.1 หาค่า BMR\n\nค่า BMR คือค่า การใช้พลังงานขั้นต่ำของร่างกายคนเราในแต่ละวัน โดยยังไม่นับพลังงานจากการเดิน ยืน นั่ง นอน ออกกำลังกาย เป็นค่าพลังงานการทำงานในอวัยวะร่างกายเท่านั้น หรือสรุปง่ายๆว่า **เป็นค่าพลังงานขั้นต่ำที่ไม่ควรทานต่ำกว่านี้เด็ดขาด** เพราะถ้าต่ำกว่าค่านี้ จะกลายเป็นอดอาหาร ลดน้ำหนักได้แค่ปุปปับ สุดท้ายก็จะโยโย่อีก ใครสงสัยว่าอดอาหารไม่ดียังไง พลอยเคยเขียนบทความไว้ได้เลยค่ะ\n\n_ยกตัวอย่างเช่น ผญอายุ 25 ปี สูง160cm หนัก 50kg คำนวณค่า BMR ได้ 1,312 แปลว่าวันๆนึงร่างกายจะเผาผลาญขั้นต่ำที่ 1,300 กิโลแคลลอรี่ ไม่ควรทานน้อยกว่าแคลลอรี่นี้ค่ะ_\n\n### 1.2 หาค่า TDEE\n\nค่า TDEE คล้ายกับค่า BMR แต่เพิ่มค่าการเผาผลาญขึ้นจากการทำกิจกรรมต่างๆในชีวิตประจำวันเข้ามาด้วย\n\n_ยกตัวอย่างเช่น ผญอายุ 25 ปี สูง160cm หนัก 50kg ออกกำลังกาย 3-5 วันต่อสัปดาห์ ได้ค่า TDEE ที่ 1,930 กิโลแคลลอรี่ แปลว่าถ้ามีกิจวัตรประจำวันเช่นนี้ร่างกายจะเผาผลาญที่ 1,900 กิโลแคลลอรี่ห้ามทานมากกว่าแคลลอรี่นี้_\n\n**สรุป** หาค่า BMR และ TDEE ออกมาให้ได้ก่อน\n\nและในหนึ่งวันไม่ควรทานอาหารต่ำกว่าค่า BMR ของตนเอง\n\n## 2. ตั้งเป้าหมายว่าจะลดน้ำหนักให้ได้กี่กิโล\n\nพอได้ค่าการเผาผลาญจากข้อ 1 มาแล้ว เราก็สามารถมาคำนวณได้ว่าเราจะลดการรับพลังงานจากอาหารให้เหลือวันละเท่าไหร่เพื่อไปให้ถึงเป้าหมายที่ต้องการ ในระยะเวลาที่ไม่หักโหมจนเกินไป ซึ่งระยะเวลาในการลดน้ำหนักไม่ควรน้อยกว่า 30 วัน โดยเฉลี่ยลดน้ำหนักแบบสุขภาพดีจะอยู่ที่ 0.5 - 1 กิโลกรัมต่อสัปดาห์ โดยการลดน้ำหนัก 1 กิโลกรัมเกิดจากแคลลอรี่ที่หายไป 7,700kcal ดังนั้นหากเราต้องการลดน้ำหนัก 1 เดือนจาก 50kg เหลือ 48kg แสดงว่าแคลลอรี่ต้องหายไป 15,400kcal แปลว่าต้องลดแคลลอรี่ลงวันละ 15,400/30 = 500kcal\n\n_ยกตัวอย่างเดิม ผญอายุ 25 ปี สูง160cm หนัก 50kg ออกกำลังกาย 3-5 วันต่อสัปดาห์_\n\n_ค่า BMR 1,300kcal ค่า TDEE 1,900kcal ดังนั้นหากเราต้องการลดน้ำหนัก 1 เดือนจาก 50kg เหลือ 48kg แสดงว่าแคลลอรี่ต้องหายไป 15,400kcal แปลว่าต้องลดแคลลอรี่ลงวันละ 15,400/30 = 500kcal_\n\n## 3. จัดโปรแกรมการทานอาหาร\n\nการลดน้ำหนักได้นั้นต้องปรับเรื่องการกิน 70% ออกกำลังกาย 30% และควรทานอาหารตรงเวลา แบ่งเป็น ทานข้าวเช้าก่อน 9.00 น ข้าวเที่ยง 12.00 - 13.00 น ข้าวเย็น 18.00 - 19.00 น หรือใครนอนดึก ทานอย่างต่ำก่อนนอน 2 ชั่วโมง\n\nและอาหารที่ควรหลีกเลี่ยง ได้แก่ ของทอด ของหวาน ของมัน เช่น น้ำอัดลม ชาเขียวโออิชิ ไอติม กล้วยแขก ขนมปังหมูหยอง หรือถ้าทำอาหารทานเองก็ควรงดใช้น้ำมัน\n\nและควรทานอาหารที่มีประโยชน์แก่ร่างกาย ได้แก่ ผัก ผลไม้ เนื้อสัตว์ไขมันต่ำ ข้าวแป้งไม่ขัดสี เมนูที่แนะนำได้แก่ เสต็กอกไก่มันบด(ไร้เนย ไรน้ำมัน) สลัดผักอกไก่ย่าง(ไร้น้ำมัน) ข้าวหมูอบ(ไร้มัน) เป็นต้น\n\nแต่สิ่งสำคัญที่อยากแนะนำทุกคนเลยคือ อย่าเครียด อย่าไปกังวลกับแคลลอรี่หรือตัวเลขมากเกินไป มี cheat meal หรือ ขนมตามใจปากบ้างเล็กน้อย เพื่อลดความเครียดลง หรือสาวๆติดขนมจุบจิบก็แนะนำไปเลือกหยิบจากร้านสุขภาพต่างๆได้เลย มีหลายตัวเลยที่คลีนและมีแต่สิ่งดีดีเข้าร่างกาย\n\n## 4. จัดตารางออกกำลังกาย\n\nผู้ที่ลดน้ำหนักเริ่มต้นคงไม่พ้นการออกกำลังกายแบบ คาร์ดิโอ เพราะคาร์ดิโอช่วยเผาผลาญพลังงานได้มาก คาริดิโอที่แนะนำ ได้แก่ การวื่ง (จะลู่หรือสวนก็ได้) เป็นเวลา 20-30 นาที เริ่มจากสัปดาห์ละ 2 วันก่อน หากร่างกายชิน ให้เพิ่มเป็นอาทิตย์ละ 4 วัน\n\nพอคาร์ดิโอชนชินแล้ว ต่อจากนี้แนะนำให้เริ่มเล่นเวท ซึ่งเวทนั้นมีหลายท่ามากมาย อาจจะต้องสลับท่าไปในแต่ละวันค่ะ\n\nยกตัวอย่างการเวทด้วยวิธีการ body weight ไม่ต้องมีอปุกรณ์ เช่นท่า Squat เป็นท่าที่ทำให้กล้ามเนื้อขาแข็งแรง ก้นงอนงาม\n\n_\\*ไม่แนะนำสำหรับผู้มีน้ำหนักตัวมากหรือมีปัญหาหัวเข่า\\*_\n\nเมื่อทำตามที่กล่าวไปแล้ว แรกๆจะรู้สึกเหนื่อยและท้อมาก เพราะไม่เคยออกกำลังกายและทานแบบนี้มาก่อน **แต่อย่างที่บอกคือไม่อยากให้เครียด ลองหันมาทานอาหารคลีนสม่ำเสมอ** **แต่มีมื้อที่ตามใจปากบ้าง ออกกำลังกายให้เป็นประจำเพื่อเผาผลาญพลังงาน** **จากนั้นน้ำหนักจะลดอย่างช้าๆ ร่างกายเริ่มเผาผลาญได้ดีขึ้น** **สัดส่วนเล็กลง ไม่อยากโฟกัสกับที่น้ำหนักมาก เพราะคิดว่าผลลัพธ์ที่ดีที่สุดคือ สุขภาพแข็งแรงไม่เจ็บป่วยนั่นเองค่า**",

  "title": "เครื่องดื่มเกลือแร่จำเป็นต้องดื่มหรือไม่?",
  "excerpt": "ไขข้อสงสัยว่าเครื่องดื่มเกลือแร่ (sports drink) จำเป็นต้องดื่มจริงไหม ควรดื่มเมื่อไหร่ และเลือกยี่ห้อไหนให้เหมาะกับการออกกำลังกายแต่ละแบบ",
  "cover_url": "https://static.wixstatic.com/media/9bfc29_c94dcc81d14849d587a490f2941ccef3~mv2.jpg",
  "created_at": "2017-03-22T09:00:00+07:00",
  "content_md": "ยุคนี้เป็นยุคแห่งสังคมรักสุขภาพ ทั้งการเลือกทานอาหารคลีนและออกกำลังกายเพื่อให้สุขภาพแข็งแรง เลยจะเห็นกันได้ว่าในปัจจุบันมีเครื่องดื่มประเภทเกลือแร่ (sports drink) ออกมามากมายหลายยี่ห้อ เราในฐานะผู้บริโภคจึงต้องรู้ให้ทันว่าเครื่องดื่มเกลือแร่จำเป็นจริงไหม และแต่ละแบรนด์ต่างกันอย่างไร\n\nพลอยเชื่อว่าทุกท่านที่กำลังอ่านบทความนี้อยู่เป็นคนรักสุขภาพและใส่ใจการดูแลตนเอง ดังนั้นนอกจากทานอาหารคลีนแล้ว หลายท่านก็จะมีกิจกรรมเป็นการออกกำลังกายร่วมด้วยซะส่วนใหญ่\n\nคำถามคือเวลาออกกำลังกายเสร็จ สูญเสียเหงื่อค่อนข้างมาก จริงๆแล้วในเหงื่อนั้นประกอบไปด้วยอะไร เลยต้องชี้แจงก่อนว่าสิ่งที่ระเหยไปพร้อมกับเหงื่อ ส่วนใหญ่ก็คือน้ำ และมีเกลือแร่ร่วมด้วยนิดหน่อย\n\nดังนั้นสิ่งที่ควรกังวลมากที่สุดคือการสูญเสียน้ำค่ะ เพราะฉะนั้นเวลาออกกำลังกายจึงมักมีคำแนะนำให้จิบน้ำบ่อยๆ\n\n### แล้วเครื่องดื่มเกลือแร่ (sports drink)หละ? ควรดื่มหรือไม่\n\nพลอยขอแปลคำตอบจาก The Guardian UK มาไว้ ณ ที่นี้นะคะ\n\n> \"จริงๆแล้วการดื่มเครื่องดื่มเกลือแร่จำเป็นหรือไม่ขึ้นอยู่กับระยะเวลาและความหนักหน่วงของการออกกำลังกาย โดยปกติแล้วการดื่มน้ำเปล่าอย่างเดียวก็เพียงพอแล้วสำหรับการออกกำลังกายที่ไม่เกิน 1 ชั่วโมง แต่หากเกิน 1 ชั่วโมงแนะนำให้ดื่มเครื่องดื่มเกลือแร่ค่ะ\"\n\n*ที่มา \"It depends on the intensity / duration of your workout. Water is generally sufficient for shorter sessions but for exercise lasting more than 60 mins, a Sports Drink is recommended\" says Wendy Martinson, registered dietician and sports nutritionist.*\n\nซึ่งจุดนี้พลอยขอเสริมเองนะคะ ว่าจะรู้ได้อย่างไรว่าเราออกกำลังกายหนักจนร่างกายต้องการเกลือแร่แล้ว? โดยปกติร่างกายสามารถปรับตัวต่อการเสียเหงื่อได้ โดยไม่จำเป็นต้องให้เกลือแร่ชดเชย โดยเฉพาะคนที่ออกกำลังกายเป็นประจำ (อาทิตย์ละ 3 ครั้งขึ้นไป) เว้นแต่การออกกำลังกายที่หนักและต่อเนื่องนานๆ จนร่างกายขาดเกลือแร่จริงๆ ร่างกายจะส่งสัญญานออกมา เช่น มีอาการเป็นตะคริวเกิดขึ้นกับกล้ามเนื้อ ซึ่งมักจะเกิดกับคนที่นานๆออกกำลังกาย (เช่น ออกทุกวันหยุด 1 ครั้งต่อสัปดาห์ ก็ถือว่านานๆทีนะคะ)\n\nหรือดูได้จากประเภทของการออกกำลังกาย หากออกด้วยการคาร์ดิโออย่างเดียว บอดี้เวทเบาๆนิดๆ ดื่มน้ำเปล่าก็เพียงพอแล้ว\n\nแต่ถ้าฮาร์ดคอร์ขึ้นมาหน่อย ในเชิงแข่งขันกีฬา เช่น เวทเทรนนิ่งหนักๆ ปั่นจักรยานทางไกล ไตรกีฬา ฟุตบอล บาส ตีแบตเป็นชั่วโมง ประเภทนี้ก็ควรจะได้รับน้ำตาลจาก Sport Drink ค่ะ\n\n### สรุป\n\n**ดังนั้นเครื่องดื่มเกลือแร่ไม่จำเป็นต้องดื่มทุกวัน หรือดื่มพร่ำเพื่อ คนที่ควรดื่มคือบุคคลที่ออกกำลังกายหนักเกิน 1 ชั่วโมง**\n\nโดยส่วนมากเครื่องดื่มเกลือแร่มัก มีส่วนผสมของกลูโคส หรือซูโครส หรือเด็กซ์โทรสและโซเดียม โปแตสเซียม และคลอไรด์ อยู่ในสภาพอิเลคโทรไลค์ สามารถทำหน้าที่ช่วยให้น้ำเข้าสู่เซลล์ร่างกายได้เร็วขึ้น\n\nซึ่งปัจจัยถัดมาที่ควรตระหนักถึงก็คือ**เราจะเลือกเครื่องดื่มเกลือแร่ตัวไหนดี?**\n\nวันนี้พลอยมี Info-graphic ดีดีจากเพจ **Beauty and the Trainer** มาฝากกันค่ะ\n\n**จากภาพจะเห็นได้ว่า:**\n- ในหมวดของ sport drink แบรนด์ที่ไม่มีวัตถุกันเสียมีแค่ 2 แบรนด์ ได้แก่ ยี่ห้อที่ 1 และ ยี่ห้อที่ 5\n- เครื่องดื่มที่ให้พลังงานสูงสุด น้ำตาลมากสุด โซเดียมเยอะสุด ได้แก่ ยี่ห้อ ที่ 3\n\n**ดังนั้นพลอยขอแนะนำว่า การเลือก sport drink ก็ควรเลือกให้เหมาะกับกิจกรรมที่ออกกำลังกายไป:**\n- คนที่ออกกำลังกายหนักมากต้องการเติมน้ำตาลเข้าสู้กระแสเลือดอย่างรวดเร็ว อาจจะเลือกยี่ห้อ ที่ 2 และ 3 จากซ้ายมือ ดื่มปุ๊บตื่นปั๊บ Sports drink หรือ Energy Drink กันแน่ (ส่วนตัวคิดว่าน้ำตาลเยอะเกินไปนะคะ)\n- คนที่ออกกำลังกายทั่วไปหรือนักกีฬาที่มีการเสียเหงื่อ ขอแนะนำยี่ห้อแรกค่ะ เพราะได้ครบทั้งน้ำตาล และเกลือแร่\n- คนที่ทำกิจกรรมเบาๆมีเสียเหงื่อบ้าง แนะนำเลือกยี่ห้อที่ 5 และ 6 เพราะมุ่งเน้นไปที่การชดเชยน้ำเข้าสู่ร่างกาย ไม่ได้เน้นน้ำตาล\n\nส่วนน้ำอัดลมเรียกว่าไม่แนะนำเลยค่ะ มีแต่น้ำตาลไม่มีอิเลกโทรไลท์ที่ร่างกายต้องการ เมื่อเสียเหงื่อค่ะ\n\n**เราลองมาเลือกดื่มตัวที่เหมาะสมกับเรา และไม่ให้น้ำตาลสูงเกินไปกันดีกว่านะคะ**\n\nขอบคุณข้อมูลกราฟจากเพจ **Beauty and the Trainer** มา ณ ที่นี้ด้วยค่า\n\n---\n\n**แท็ก:** ออกกำลังกาย, อาหารเสริม",
